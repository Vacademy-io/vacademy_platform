jobs:
  # Build the two frontend images FROM THE SELECTED BRANCH and push them to ECR
  # (tag = image_tag, plus :latest). The standalone FE images exist only for
  # stage/clients (cloud prod uses Cloudflare), so they're built on-demand here
  # as part of a manual stage deploy rather than on every main push. Backend
  # service images are built separately via the per-service build workflows.
  build-frontends:
    if: ${{ github.event.inputs.rebuild_frontends != 'false' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin
            context: frontend-admin-dashboard
            repository: frontend-admin-dashboard/frontend-admin-dashboard-repo
          - name: learner
            context: frontend-learner-dashboard-app
            repository: frontend-learner-dashboard-app/frontend-learner-dashboard-repo
    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push ${{ matrix.name }} frontend
        working-directory: ./${{ matrix.context }}
        env:
          ECR_REGISTRY: public.ecr.aws/e0x1f4p4
          REPOSITORY: ${{ matrix.repository }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          docker build -t "$ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG" -t "$ECR_REGISTRY/$REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$REPOSITORY:latest"
          echo "Pushed $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG (+ :latest)"

  deploy:
    needs: build-frontends
    # Run after the FE build succeeds, OR when it was skipped (rebuild_frontends=false).
    # Skips if the FE build failed, so we never deploy on a broken frontend image.
    if: ${{ always() && (needs.build-frontends.result == 'success' || needs.build-frontends.result == 'skipped') }}
