name: Deploy Assessment to LKE

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: main
      image_tag:
        description: "Image tag to push (use a UNIQUE tag for branch builds, e.g. the branch name, so you don't overwrite main's :latest)"
        required: true
        default: latest
  push:
    branches:
      - main
    paths:
      - "assessment_service/**"

jobs:
  build-and-deploy:
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Authenticate GitHub Package Registry
        env:
          JAVA_TOKEN: ${{ secrets.JAVA_TOKEN }}
          ACCESS_GITHUB_USERNAME: ${{ secrets.ACCESS_GITHUB_USERNAME }}
        run: |
          echo "${JAVA_TOKEN}" | docker login ghcr.io -u ${ACCESS_GITHUB_USERNAME} --password-stdin
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>${ACCESS_GITHUB_USERNAME}</username><password>${JAVA_TOKEN}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Build Project
        working-directory: ./assessment_service
        env:
          JAVA_TOKEN: ${{ secrets.JAVA_TOKEN }}
          ACCESS_GITHUB_USERNAME: ${{ secrets.ACCESS_GITHUB_USERNAME }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: mvn -s settings.xml clean install -DskipTests -Dsentry.authToken=$SENTRY_AUTH_TOKEN

      # To push to ECR you need to login through us-east-1
      # https://github.com/aws-actions/amazon-ecr-login/issues/587
      # https://github.com/aws-actions/amazon-ecr-login?tab=readme-ov-file#troubleshooting
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: "us-east-1"

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        working-directory: ./assessment_service
        env:
          ECR_REGISTRY: public.ecr.aws/e0x1f4p4
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
          REPOSITORY: assessment-service/assessment-service-repo
          GITHUB_TOKEN: ${{ secrets.JAVA_TOKEN }}
          ACCESS_GITHUB_USERNAME: ${{ secrets.ACCESS_GITHUB_USERNAME }}
          JAVA_TOKEN: ${{ secrets.JAVA_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG . --build-arg GITHUB_TOKEN=${GITHUB_TOKEN} --build-arg ACCESS_GITHUB_USERNAME=${ACCESS_GITHUB_USERNAME} --build-arg JAVA_TOKEN=${JAVA_TOKEN} --build-arg SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
          docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG
          echo "Docker Image Link = $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG"
          # Capture the digest we just pushed and deploy THAT, not the :latest tag. ECR Public's
          # CDN can keep serving the previous tag→manifest mapping for many minutes, so a plain
          # `rollout restart` on :latest silently boots the OLD image — which, when it skips a
          # Flyway migration, surfaces as confusing HTTP 511s from the services sharing that DB.
          # RepoDigests is populated by the push above. Fail loudly rather than deploy the wrong image.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG 2>/dev/null | cut -d'@' -f2 || true)
          if ! echo "$DIGEST" | grep -qE '^sha256:[a-f0-9]{64}$'; then
            echo "::error::Could not resolve the pushed image digest (got '$DIGEST')."
            exit 1
          fi
          echo "Pushed digest = $DIGEST"
          echo "image_ref=$ECR_REGISTRY/$REPOSITORY@$DIGEST" >> $GITHUB_OUTPUT

      # KUBECONFIG is sourced from the Hetzner k3s prod cluster (see /etc/rancher/k3s/k3s.yaml on the control-plane node)

      # TODO: This kubeconfig is global kubeconfig with access to whole cluster
      # In production refrain from using this and use k8s service account with limited access
      # Each service account has permissions like IAM and each has its own kubeconfig
      # replace global kubeconfig with service account's kubeconfig
      # https://nicwortel.nl/blog/2022/continuous-deployment-to-kubernetes-with-github-actions
      - name: Connect to Hetzner k3s kubernetes cluster
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        id: connect-to-k8s-cluster
        uses: Azure/k8s-set-context@v4.0.0
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.VACADEMY_PROD_KUBECONFIG}}

      - name: Deploy to Kubernetes
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          kubectl set env deployment/assessment-service \
            DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            DB_USERNAME=${{ secrets.DB_USERNAME }} \
            APP_USERNAME=${{ secrets.APP_USERNAME }} \
            APP_PASSWORD=${{ secrets.APP_PASSWORD }} \
            CLOUD_FRONT_URL=${{ secrets.CLOUD_FRONT_URL }} \
            ASSESSMENT_SERVICE_DB_URL=jdbc:postgresql://pgbouncer:6432/assessment_service \
            ASSESSMENT_SERVICE_READ_DB_URL=jdbc:postgresql://pgbouncer:6432/assessment_service_read \
            SCHEDULING_TIME_FRAME=${{ secrets.SCHEDULING_TIME_FRAME }} \
            SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }} \
            INTERNAL_SERVICE_TOKEN=${{ secrets.INTERNAL_SERVICE_TOKEN }}

      # Deploy the exact digest this run pushed. `rollout restart` on :latest is NOT safe here:
      # ECR Public's CDN can serve a stale tag→manifest mapping for tens of minutes, so the new
      # pod may silently boot the previous image (green workflow, old code, skipped migrations).
      # Setting the image by digest is atomic and a no-op only when the digest truly is unchanged.
      - name: Deploy image by digest
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        id: deploy-image
        env:
          DEPLOYMENT_NAME: assessment-service
          NAMESPACE: default
          IMAGE_REF: ${{ steps.build-image.outputs.image_ref }}
        run: |
          echo "Deploying $IMAGE_REF"
          kubectl set image deployment/$DEPLOYMENT_NAME $DEPLOYMENT_NAME=$IMAGE_REF --namespace $NAMESPACE
          # An unchanged digest makes `set image` a no-op, so nudge the rollout to pick up the
          # env vars set above.
          kubectl rollout restart deployment $DEPLOYMENT_NAME --namespace $NAMESPACE
          # Fail the workflow if the new pods never become ready, instead of reporting green.
          kubectl rollout status deployment/$DEPLOYMENT_NAME --namespace $NAMESPACE --timeout=10m
