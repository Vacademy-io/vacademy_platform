spring.application.name=admin_core_service
server.port=8072
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'
management.endpoints.web.base-path=/admin-core-service
management.endpoints.web.path-mapping.health=actuator/health
springdoc.api-docs.path=/admin_core_service/api-docs
springdoc.swagger-ui.path=/admin_core_service/swagger-ui.html
spring.profiles.active=stage
springdoc.api-docs.path=/admin-core-service/api-docs
springdoc.swagger-ui.path=/admin-core-service/swagger-ui.html
spring.profiles.active=${environment}


# ============ HikariCP Connection Pool Configuration ============
# These settings are CRITICAL for preventing inconsistent API latency

# Maximum number of connections in the pool
# Recommended: (2 * CPU_cores) + effective_spindle_count
# For 2 CPU pods with SSD: ~20-30 connections
spring.datasource.hikari.maximum-pool-size=8

# Minimum number of idle connections to maintain
# Helps prevent cold connection delays
spring.datasource.hikari.minimum-idle=2

# How long (ms) to wait for a connection from the pool
# 60 seconds is reasonable - fail fast rather than hang
spring.datasource.hikari.connection-timeout=60000

# How long a connection can be idle before being retired
spring.datasource.hikari.idle-timeout=300000

# Maximum lifetime of a connection (should be less than DB's wait_timeout)
spring.datasource.hikari.max-lifetime=600000

# Connection validation timeout
spring.datasource.hikari.validation-timeout=5000

# Keep connections alive (useful for firewalls/proxies that kill idle connections)
spring.datasource.hikari.keepalive-time=60000

# Log pool usage warnings
spring.datasource.hikari.leak-detection-threshold=60000

# ============ Read (Slave) DataSource HikariCP Pool ============
# Cap the read-replica pool tightly. Without these overrides HikariCP defaults
# to maximum-pool-size=10 / minimum-idle=10 per replica → with 4 admin-core
# replicas that's 40 idle Postgres connections just for the (lightly used)
# read replica. Capping to max=3 / minimum-idle=0 frees ~28 connection slots
# in the shared Postgres budget without affecting current read throughput.
# Bean wiring: DataSourceConfiguration#slaveDataSource binds this prefix
# (see @ConfigurationProperties("spring.datasource.read.hikari")).
spring.datasource.read.hikari.maximum-pool-size=3
spring.datasource.read.hikari.minimum-idle=0
spring.datasource.read.hikari.idle-timeout=30000
spring.datasource.read.hikari.max-lifetime=600000
spring.datasource.read.hikari.connection-timeout=10000

# Sentry Configuration
sentry.dsn=${SENTRY_DSN}
sentry.send-default-pii=true
sentry.logs.enabled=true
# Performance Monitoring - 100% of transactions (reduce in production for cost optimization)
sentry.traces-sample-rate=1.0

# Database query monitoring
sentry.trace-propagation-targets=localhost,127.0.0.1
# Additional performance settings
sentry.in-app-includes=vacademy.io

# ============ White-Label / Cloudflare Configuration ============
# Set these env variables in your deployment environment:
# CLOUDFLARE_API_TOKEN, CLOUDFLARE_ZONE_ID
cloudflare.api.token=${CLOUDFLARE_API_TOKEN:}
cloudflare.zone.id=${CLOUDFLARE_ZONE_ID:}
cloudflare.learner.target=${CLOUDFLARE_LEARNER_TARGET:learner.vacademy.io}
cloudflare.admin.target=${CLOUDFLARE_ADMIN_TARGET:admin.vacademy.io}
cloudflare.teacher.target=${CLOUDFLARE_TEACHER_TARGET:teacher.vacademy.io}
vacademy.base.domain=${VACADEMY_BASE_DOMAIN:vacademy.io}

# ============ Ad Platform Integration (Meta Lead Ads + Google Lead Forms) ============
# Meta Developer App credentials
meta.app.id=${META_APP_ID:}
meta.app.secret=${META_APP_SECRET:}

# Meta webhook verify token — set a strong random string, same value registered in Meta App Dashboard
meta.webhook.verify.token=${META_WEBHOOK_VERIFY_TOKEN:}

# OAuth redirect URI — must match the URI registered in Meta App > Facebook Login > Valid OAuth Redirect URIs
meta.oauth.redirect.uri=${META_OAUTH_REDIRECT_URI:https://api.vacademy.io/admin-core-service/v1/oauth/meta/callback}

# After Meta OAuth callback succeeds, the browser is redirected here with ?session_key=UUID
# Set to the admin dashboard integrations page path
# The callback redirects browser here with ?session_key=UUID appended.
# Default points to the Settings → Ad Integrations tab.
meta.oauth.frontend.callback.url=${META_OAUTH_FRONTEND_CALLBACK_URL:https://admin.vacademy.io/settings?selectedTab=integrations}

# AES-256-GCM key for encrypting OAuth tokens at rest.
# Generate: openssl rand -base64 32
# Store as GitHub Actions secret OAUTH_TOKEN_ENCRYPTION_KEY
oauth.token.encryption.key=${OAUTH_TOKEN_ENCRYPTION_KEY:}

# Meta token refresh job cron (default: daily at 02:00 UTC)
meta.token.refresh.cron=${META_TOKEN_REFRESH_CRON:0 0 2 * * ?}

# ============ Zoom "General app" (Connect-with-Zoom OAuth + Meeting SDK) ============
# ONE app's Client ID + Secret serve BOTH the OAuth handshake and SDK signing — set just these
# two. (Connect-with-Zoom only returns each institute's per-user refresh token, stored per
# account; the app's own client id/secret can't come from OAuth and must be configured here.)
# Required Zoom app scopes: meeting:write, user:read, recording:read (user-managed → userId=me).
zoom.app.client-id=${ZOOM_APP_CLIENT_ID:}
zoom.app.client-secret=${ZOOM_APP_CLIENT_SECRET:}

# OAuth redirect URI — MUST match the value registered in the Zoom app (OAuth Redirect URL +
# allow-list). Defaults are fine for stage; override per environment.
zoom.oauth.redirect.uri=${ZOOM_OAUTH_REDIRECT_URI:https://backend-stage.vacademy.io/admin-core-service/live-sessions/provider/zoom/oauth/callback}
# Where the browser lands after the callback (admin Settings → Live Session).
zoom.oauth.frontend.callback.url=${ZOOM_OAUTH_FRONTEND_CALLBACK_URL:https://admin.vacademy.io/settings}

# OPTIONAL: only set these to point SDK signing at a DIFFERENT app than zoom.app.* (rare).
# Resolution order for SDK signing: per-account SDK creds → zoom.sdk.* → zoom.app.*.
zoom.sdk.client-id=${ZOOM_SDK_CLIENT_ID:}
zoom.sdk.client-secret=${ZOOM_SDK_CLIENT_SECRET:}
# Host-only / same-account caveat for platform SDK signing: see docs/zoomintegration/zoom-onboarding-design.md
