spring.application.name=auth_service

# ==== Redis Configuration for Spring Session ====
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=5000ms

# Spring Session Configuration
spring.session.store-type=redis
spring.session.redis.namespace=spring:session:auth-service
spring.session.timeout=1800s

# ==== Sign in with Apple — allowed native id_token audiences (iOS bundle ids) ====
# The prod profile MUST define this explicitly: if it resolves empty the audience
# validator fails closed and rejects EVERY native Apple sign-in. One bundle id per
# iOS Xcode target; set APPLE_NATIVE_AUDIENCES to override.
apple.native.audiences=${APPLE_NATIVE_AUDIENCES:io.vacademy.student.app,com.sevencs.learner,io.ssdc.student.app,io.fivesep.student.app,io.shikshanation.app,io.shikshanation.learner,io.enarkuplift.app,io.chanakayaiasacademy.app,io.edzumo.app,io.sadbhavana.com,io.hcca.app}

