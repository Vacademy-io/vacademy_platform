# Vacademy platform message bundle — default (English).
# Shared across all services via the common_service classpath; Spring Boot's
# MessageSourceAutoConfiguration picks up "messages" as the default basename,
# so no per-service spring.messages.* configuration is needed (encoding
# defaults to UTF-8). Locale is resolved per-request by LocaleResolutionFilter.
