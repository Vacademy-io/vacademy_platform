<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vacademy — Feature Catalog</title>
<meta name="description" content="Explore every product and feature of the Vacademy platform: LMS, Assessments, Live Classroom, CRM & Sales, Marketing, ERP, Finance, Vacademy AI, Communication and more.">
<style>
/* ============================================================
   Vacademy Feature Catalog — self-contained, no external assets.
   MAINTENANCE: feature content lives in the single DATA object at
   the bottom of this file (search for "const DATA"). Edit that
   object to add/rename products, features and sub-features — the
   page renders entirely from it. Keep vacademy-features.md in sync.
   ============================================================ */
:root{
  --brand:hsl(24 85% 54%);
  --brand-soft:hsl(24 85% 96%);
  --brand-ink:hsl(24 70% 38%);
  --bg:#faf9f7;
  --surface:#ffffff;
  --surface-2:#f4f2ef;
  --ink:#1c1917;
  --ink-2:#57534e;
  --ink-3:#a8a29e;
  --line:#e7e5e4;
  --line-2:#d6d3d1;
  --shadow:0 1px 2px rgb(0 0 0 / .05),0 4px 16px rgb(0 0 0 / .06);
  --shadow-lg:0 4px 8px rgb(0 0 0 / .06),0 12px 40px rgb(0 0 0 / .12);
  --radius:14px;
  --hl:#fef3c7;
}
@media (prefers-color-scheme: dark){
  :root{
    --brand:hsl(24 90% 58%);
    --brand-soft:hsl(24 45% 16%);
    --brand-ink:hsl(24 90% 68%);
    --bg:#141210;
    --surface:#1e1b18;
    --surface-2:#282420;
    --ink:#f5f0eb;
    --ink-2:#c0b8b0;
    --ink-3:#7d766f;
    --line:#332e29;
    --line-2:#453f38;
    --shadow:0 1px 2px rgb(0 0 0 / .4),0 4px 16px rgb(0 0 0 / .35);
    --shadow-lg:0 4px 8px rgb(0 0 0 / .5),0 16px 48px rgb(0 0 0 / .55);
    --hl:#4a3a10;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:var(--brand-ink);text-decoration:none}
a:hover{text-decoration:underline}
mark{background:var(--hl);color:inherit;border-radius:3px;padding:0 1px}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.hwrap{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.logo-mark{
  width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--brand),hsl(14 85% 50%));color:#fff;font-weight:800;font-size:18px;
}
.logo b{font-size:16px;letter-spacing:-.01em}
.logo span{display:block;font-size:11px;color:var(--ink-3);margin-top:-2px}
.searchbox{position:relative;flex:1;max-width:560px;margin-left:auto}
.searchbox input{
  width:100%;padding:9px 36px 9px 38px;border:1px solid var(--line-2);border-radius:10px;
  background:var(--surface);color:var(--ink);font-size:14px;outline:none;transition:border-color .15s, box-shadow .15s;
}
.searchbox input:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 20%,transparent)}
.searchbox .sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.searchbox kbd{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font:600 11px/1 ui-monospace,monospace;color:var(--ink-3);border:1px solid var(--line-2);
  border-radius:5px;padding:3px 6px;background:var(--surface-2);
}
.updated{font-size:12px;color:var(--ink-3);white-space:nowrap}
@media (max-width:720px){.updated{display:none}.logo span{display:none}}

/* ---------- search results panel ---------- */
#results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;max-height:min(70vh,640px);overflow:auto;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  display:none;
}
#results.open{display:block}
.rgroup{padding:10px 14px 4px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.ritem{display:block;width:100%;text-align:left;padding:10px 14px;border-top:1px solid var(--line);transition:background .1s}
.ritem:hover,.ritem.active{background:var(--surface-2)}
.ritem .rt{font-weight:600;font-size:14px}
.ritem .rp{font-size:12px;color:var(--ink-3);margin-top:1px}
.ritem .rd{font-size:13px;color:var(--ink-2);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rnone{padding:22px 14px;color:var(--ink-3);font-size:14px;text-align:center}

/* ---------- layout ---------- */
main{max-width:1200px;margin:0 auto;padding:28px 20px 80px}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-3);margin-bottom:18px;flex-wrap:wrap}
.crumbs button{color:var(--brand-ink);font-weight:600}
.crumbs button:hover{text-decoration:underline}

/* ---------- home ---------- */
.hero{text-align:center;padding:38px 10px 30px}
.hero h1{font-size:clamp(28px,4.5vw,44px);letter-spacing:-.03em;line-height:1.12;font-weight:800}
.hero h1 em{font-style:normal;background:linear-gradient(100deg,var(--brand),hsl(4 80% 56%));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{max-width:680px;margin:14px auto 0;color:var(--ink-2);font-size:16px}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.stat{
  background:var(--surface);border:1px solid var(--line);border-radius:999px;
  padding:7px 16px;font-size:13px;color:var(--ink-2);box-shadow:var(--shadow);
}
.stat b{color:var(--ink);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:34px}
.pcard{
  text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);transition:transform .15s, box-shadow .15s, border-color .15s;
  display:flex;flex-direction:column;gap:10px;
}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--pc,var(--brand))}
.picon{
  width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;
  background:color-mix(in srgb,var(--pc,var(--brand)) 14%,var(--surface));color:var(--pc,var(--brand));
}
.pcard h3{font-size:17px;letter-spacing:-.01em}
.pcard .tag{font-size:13px;color:var(--ink-2)}
.pcard .cnt{margin-top:auto;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--ink-3)}
.pcard .cnt .go{color:var(--pc,var(--brand));font-weight:700;display:flex;align-items:center;gap:4px}
.byline{margin-top:44px;text-align:center;font-size:12.5px;color:var(--ink-3)}

/* ---------- pillar view ---------- */
.pillar-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:6px}
.pillar-head .picon{width:52px;height:52px;border-radius:14px}
.pillar-head h1{font-size:clamp(24px,3.5vw,34px);letter-spacing:-.02em;line-height:1.15}
.pillar-head .tag{color:var(--ink-2);font-size:15px;margin-top:2px}
.pillar-desc{color:var(--ink-2);font-size:15px;max-width:820px;margin:10px 0 4px}
.toolbar{display:flex;align-items:center;gap:10px;margin:18px 0 6px;flex-wrap:wrap}
.toolbar .chipbtn{
  font-size:12.5px;font-weight:600;color:var(--ink-2);border:1px solid var(--line-2);
  border-radius:999px;padding:5px 12px;background:var(--surface);
}
.toolbar .chipbtn:hover{border-color:var(--brand);color:var(--brand-ink)}
.pillar-body{display:grid;grid-template-columns:230px 1fr;gap:28px;align-items:start;margin-top:14px}
@media (max-width:900px){.pillar-body{grid-template-columns:1fr}.sidenav{display:none}}
.sidenav{position:sticky;top:76px;max-height:calc(100vh - 100px);overflow:auto;padding-right:6px}
.sidenav a{
  display:block;font-size:13px;color:var(--ink-2);padding:6px 10px;border-left:2px solid var(--line);
  border-radius:0 8px 8px 0;
}
.sidenav a:hover{color:var(--ink);text-decoration:none;background:var(--surface-2)}
.sidenav a.on{color:var(--brand-ink);border-left-color:var(--brand);font-weight:600;background:var(--brand-soft)}

/* ---------- feature card ---------- */
.fcard{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow);margin-bottom:16px;scroll-margin-top:84px;
}
.fcard.flash{animation:flash 1.6s ease-out}
@keyframes flash{0%,45%{border-color:var(--brand);box-shadow:0 0 0 4px color-mix(in srgb,var(--brand) 25%,transparent)}100%{}}
.fhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.fhead h2{font-size:19px;letter-spacing:-.01em}
.fhead .ftag{font-size:13px;color:var(--brand-ink);font-weight:600}
.fdesc{color:var(--ink-2);font-size:14.5px;margin-top:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.chip{
  font-size:11.5px;font-weight:600;border-radius:999px;padding:3px 10px;
  background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line);
}
.chip.role{background:color-mix(in srgb,var(--pc,var(--brand)) 10%,var(--surface));color:var(--pc,var(--brand-ink));border-color:transparent}
.sf-toggle{
  margin-top:14px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--brand-ink);
}
.sf-toggle svg{transition:transform .18s}
.sf-toggle[aria-expanded="true"] svg{transform:rotate(90deg)}
.sflist{display:none;margin-top:10px;border-top:1px solid var(--line)}
.sflist.open{display:block}
.sf{
  display:grid;grid-template-columns:minmax(160px,240px) 1fr;gap:6px 18px;
  padding:11px 2px;border-bottom:1px solid var(--line);scroll-margin-top:100px;
}
.sf:last-child{border-bottom:0}
.sf .sn{font-size:13.5px;font-weight:650}
.sf .sd{font-size:13.5px;color:var(--ink-2)}
.sf.flash{background:var(--hl)}
@media (max-width:640px){.sf{grid-template-columns:1fr;gap:2px}}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);padding:26px 20px 40px;text-align:center;color:var(--ink-3);font-size:12.5px}
footer .fw{max-width:1200px;margin:0 auto}

/* ---------- print ---------- */
@media print{
  header,.sidenav,.toolbar,footer{display:none!important}
  .sflist{display:block!important}
  .fcard{box-shadow:none;break-inside:avoid}
  body{background:#fff}
}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="logo" onclick="go('#/')" title="Home">
      <div class="logo-mark">V</div>
      <div><b>Vacademy</b><span>Feature Catalog</span></div>
    </div>
    <div class="searchbox">
      <svg class="sicon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Search products, features, capabilities…" autocomplete="off" spellcheck="false">
      <kbd>/</kbd>
      <div id="results" role="listbox"></div>
    </div>
    <div class="updated" id="updated"></div>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="fw" id="foot"></div>
</footer>

<script>
/* ================= DATA ================= */
const DATA = __DATA_JSON__;
/* ======================================== */

const ICONS = {
  lms:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V4a2 2 0 0 0-2-2H6.5A2.5 2.5 0 0 0 4 4.5v15Z"/><path d="M4 19.5A2.5 2.5 0 0 0 6.5 22H20v-5"/><path d="M9 7h6"/>',
  assess:'<path d="M9 11l3 3 8-8"/><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/>',
  live:'<rect x="2" y="5" width="14" height="12" rx="2"/><path d="m22 7-6 4 6 4V7Z"/>',
  crm:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  mkt:'<path d="m3 11 18-7-7 18-2.5-7.5L3 11Z"/>',
  erp:'<rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/>',
  fin:'<circle cx="12" cy="12" r="9"/><path d="M15 9.5c-.6-1-1.7-1.5-3-1.5-1.8 0-3 1-3 2.2 0 3 6 1.5 6 4.3 0 1.3-1.3 2.2-3 2.2-1.4 0-2.6-.6-3.2-1.6"/><path d="M12 6.5v11"/>',
  ai:'<path d="M12 2a4 4 0 0 1 4 4c1.7.3 3 1.8 3 3.6 0 .8-.2 1.5-.7 2.1A3.9 3.9 0 0 1 20 15a4 4 0 0 1-4 4 4 4 0 0 1-8 0 4 4 0 0 1-4-4c0-1.3.6-2.5 1.7-3.3A3.6 3.6 0 0 1 5 9.6C5 7.8 6.3 6.3 8 6a4 4 0 0 1 4-4Z"/><path d="M12 8v8"/><path d="m9 11 3-3 3 3"/>',
  comm:'<path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10Z"/><path d="M8 9h8"/><path d="M8 12.5h5"/>',
  voice:'<rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 19v3"/>',
  cmty:'<circle cx="12" cy="12" r="3.5"/><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/><path d="m5 5 2 2"/><path d="m17 17 2 2"/><path d="m19 5-2 2"/><path d="m7 17-2 2"/>',
  plat:'<rect x="2" y="4" width="20" height="13" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/>',
  rpt:'<path d="M3 3v17a1 1 0 0 0 1 1h17"/><path d="M8 16v-5"/><path d="M13 16V8"/><path d="M18 16v-8"/>',
  vid:'<path d="M20.2 6 4 6.5A2 2 0 0 0 2 8.5v9A2 2 0 0 0 4 19.5h16a2 2 0 0 0 2-2v-9a2 2 0 0 0-1.8-2.5Z"/><path d="m6.2 2.4 1.6 3.8"/><path d="m11.4 2 1.6 3.8"/><path d="m16.6 1.7 1.6 3.8"/><path d="m10 10.5 4.5 2.6-4.5 2.6v-5.2Z"/>',
  auto:'<path d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z"/>'
};
function icon(k,s){return '<svg width="'+(s||22)+'" height="'+(s||22)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[k]||ICONS.plat)+'</svg>'}
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- derived counts ---------- */
const nFeat = DATA.pillars.reduce((s,p)=>s+p.features.length,0);
const nSub  = DATA.pillars.reduce((s,p)=>s+p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0),0);
document.getElementById('updated').textContent = 'Updated '+DATA.meta.updated;
document.getElementById('foot').innerHTML =
  esc(DATA.meta.name)+' Feature Catalog · '+DATA.pillars.length+' products · '+nFeat+' features · '+nSub+' capabilities · Updated '+esc(DATA.meta.updated)+
  '<br>Maintained alongside <code>vacademy-features.md</code>. To update: edit the <code>DATA</code> object inside this file.';

/* ---------- routing ---------- */
function go(h){ if(location.hash===h){render()} else {location.hash=h} }
window.addEventListener('hashchange', render);

function parseHash(){
  const h = location.hash.replace(/^#\/?/,'');
  if(!h) return {view:'home'};
  const parts = h.split('/').filter(Boolean); // p/<pillar>/<feature?>
  if(parts[0]==='p' && parts[1]){
    const p = DATA.pillars.find(x=>x.id===parts[1]);
    if(p) return {view:'pillar', p, fid:parts[2]||null};
  }
  return {view:'home'};
}

/* ---------- home ---------- */
function renderHome(){
  const cards = DATA.pillars.map(p=>{
    const preview = p.features.slice(0,4).map(f=>esc(f.name)).join(' · ');
    return '<button class="pcard" style="--pc:'+p.color+'" onclick="go(\'#/p/'+p.id+'\')">'
      +'<div class="picon">'+icon(p.icon)+'</div>'
      +'<h3>'+esc(p.name)+'</h3>'
      +'<div class="tag">'+esc(p.tagline)+'</div>'
      +'<div class="tag" style="font-size:12px;color:var(--ink-3)">'+preview+'…</div>'
      +'<div class="cnt"><span>'+p.features.length+' features · '
      +p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0)+' capabilities</span>'
      +'<span class="go">Explore <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></span></div>'
      +'</button>';
  }).join('');
  return '<div class="hero"><h1>'+DATA.meta.headline+'</h1>'
    +'<p>'+esc(DATA.meta.subhead)+'</p>'
    +'<div class="stats"><span class="stat"><b>'+DATA.pillars.length+'</b> products</span>'
    +'<span class="stat"><b>'+nFeat+'</b> features</span>'
    +'<span class="stat"><b>'+nSub+'</b> capabilities</span>'
    +'<span class="stat"><b>4</b> apps — admin, learner web, mobile, desktop</span></div></div>'
    +'<div class="grid">'+cards+'</div>'
    +'<div class="byline">Tip: press <b>/</b> anywhere to search every feature and capability.</div>';
}

/* ---------- pillar ---------- */
function featCard(p,f){
  const roles=(f.roles||[]).map(r=>'<span class="chip role">'+esc(r)+'</span>').join('');
  const plats=(f.platforms||[]).map(r=>'<span class="chip">'+esc(r)+'</span>').join('');
  const sfs=(f.subFeatures||[]).map((s,i)=>'<div class="sf" id="sf-'+f.id+'-'+i+'"><div class="sn">'+esc(s.name)+'</div><div class="sd">'+esc(s.description)+'</div></div>').join('');
  return '<article class="fcard" id="f-'+f.id+'" style="--pc:'+p.color+'">'
    +'<div class="fhead"><h2>'+esc(f.name)+'</h2><span class="ftag">'+esc(f.tagline||'')+'</span></div>'
    +'<p class="fdesc">'+esc(f.description)+'</p>'
    +'<div class="chips">'+roles+plats+'</div>'
    +((f.subFeatures&&f.subFeatures.length)?
      '<button class="sf-toggle" aria-expanded="false" onclick="toggleSf(this)">'
      +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>'
      +f.subFeatures.length+' capabilities</button><div class="sflist">'+sfs+'</div>':'')
    +'</article>';
}
function toggleSf(btn){
  const open = btn.getAttribute('aria-expanded')==='true';
  btn.setAttribute('aria-expanded', String(!open));
  btn.nextElementSibling.classList.toggle('open', !open);
}
function setAll(open){
  document.querySelectorAll('.sf-toggle').forEach(b=>{
    b.setAttribute('aria-expanded',String(open));
    b.nextElementSibling.classList.toggle('open',open);
  });
}
function renderPillar(p){
  const nav = p.features.map(f=>'<a href="#/p/'+p.id+'/'+f.id+'" data-f="'+f.id+'">'+esc(f.name)+'</a>').join('');
  const cards = p.features.map(f=>featCard(p,f)).join('');
  return '<div class="crumbs"><button onclick="go(\'#/\')">All products</button>'
    +'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="m9 6 6 6-6 6"/></svg>'
    +'<span>'+esc(p.name)+'</span></div>'
    +'<div class="pillar-head" style="--pc:'+p.color+'"><div class="picon">'+icon(p.icon,26)+'</div>'
    +'<div><h1>'+esc(p.name)+'</h1><div class="tag">'+esc(p.tagline)+'</div></div></div>'
    +'<p class="pillar-desc">'+esc(p.description)+'</p>'
    +'<div class="toolbar"><button class="chipbtn" onclick="setAll(true)">Expand all</button>'
    +'<button class="chipbtn" onclick="setAll(false)">Collapse all</button>'
    +'<span style="font-size:12.5px;color:var(--ink-3)">'+p.features.length+' features · '
    +p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0)+' capabilities</span></div>'
    +'<div class="pillar-body"><nav class="sidenav" id="snav">'+nav+'</nav><div>'+cards+'</div></div>';
}

/* ---------- render ---------- */
let scrollObs=null;
function render(){
  const r = parseHash();
  const app = document.getElementById('app');
  closeResults();
  if(scrollObs){scrollObs.disconnect();scrollObs=null}
  if(r.view==='home'){ app.innerHTML = renderHome(); window.scrollTo(0,0); document.title='Vacademy — Feature Catalog'; return; }
  app.innerHTML = renderPillar(r.p);
  document.title = r.p.name+' — Vacademy Feature Catalog';
  // sidenav active tracking
  const links=[...document.querySelectorAll('#snav a')];
  scrollObs=new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){
      links.forEach(l=>l.classList.toggle('on', l.dataset.f===e.target.id.slice(2)));
    }});
  },{rootMargin:'-80px 0px -70% 0px'});
  document.querySelectorAll('.fcard').forEach(c=>scrollObs.observe(c));
  if(r.fid){
    const el=document.getElementById('f-'+r.fid);
    if(el){
      const t=el.querySelector('.sf-toggle'); if(t){t.setAttribute('aria-expanded','true');t.nextElementSibling.classList.add('open')}
      requestAnimationFrame(()=>{el.scrollIntoView({block:'start'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1700)});
    }
  } else window.scrollTo(0,0);
}

/* ---------- search ---------- */
const INDEX=[];
DATA.pillars.forEach(p=>{
  INDEX.push({kind:'product',p,text:(p.name+' '+p.tagline+' '+p.description).toLowerCase()});
  p.features.forEach(f=>{
    INDEX.push({kind:'feature',p,f,text:(f.name+' '+(f.tagline||'')+' '+f.description).toLowerCase()});
    (f.subFeatures||[]).forEach((s,i)=>INDEX.push({kind:'cap',p,f,s,i,text:(s.name+' '+s.description).toLowerCase()}));
  });
});
function hl(text,terms){
  let out=esc(text);
  terms.forEach(t=>{ if(!t)return;
    out=out.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');
  });
  return out;
}
function search(q){
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  if(!terms.length) return [];
  const hits=INDEX.filter(e=>terms.every(t=>e.text.includes(t)));
  const rank={product:0,feature:1,cap:2};
  // rank name-matches first within kind
  hits.sort((a,b)=>{
    const an=terms.every(t=>(a.kind==='cap'?a.s.name:a.kind==='feature'?a.f.name:a.p.name).toLowerCase().includes(t))?0:1;
    const bn=terms.every(t=>(b.kind==='cap'?b.s.name:b.kind==='feature'?b.f.name:b.p.name).toLowerCase().includes(t))?0:1;
    return (rank[a.kind]-rank[b.kind])||(an-bn);
  });
  return hits.slice(0,60);
}
const qEl=document.getElementById('q'), rEl=document.getElementById('results');
let activeIdx=-1, curHits=[];
function closeResults(){rEl.classList.remove('open');activeIdx=-1}
function openHit(e){
  closeResults(); qEl.blur();
  if(e.kind==='product'){go('#/p/'+e.p.id);return}
  const target='#/p/'+e.p.id+'/'+e.f.id;
  if(location.hash===target){render()} else {location.hash=target}
  if(e.kind==='cap'){
    setTimeout(()=>{const el=document.getElementById('sf-'+e.f.id+'-'+e.i);
      if(el){el.scrollIntoView({block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1800)}},80);
  }
}
function renderResults(q){
  curHits=search(q);
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  if(!q.trim()){closeResults();return}
  if(!curHits.length){rEl.innerHTML='<div class="rnone">No matches for “'+esc(q)+'”</div>';rEl.classList.add('open');return}
  const groups={product:'Products',feature:'Features',cap:'Capabilities'};
  let html='',last='';
  curHits.forEach((e,idx)=>{
    if(e.kind!==last){html+='<div class="rgroup">'+groups[e.kind]+'</div>';last=e.kind}
    const title=e.kind==='cap'?e.s.name:e.kind==='feature'?e.f.name:e.p.name;
    const path=e.kind==='cap'?(e.p.name+' › '+e.f.name):e.kind==='feature'?e.p.name:(e.p.features.length+' features');
    const desc=e.kind==='cap'?e.s.description:e.kind==='feature'?e.f.description:e.p.tagline;
    html+='<button class="ritem" data-i="'+idx+'" onclick="openHit(curHits['+idx+'])">'
      +'<div class="rt">'+hl(title,terms)+'</div><div class="rp">'+esc(path)+'</div>'
      +'<div class="rd">'+hl(desc,terms)+'</div></button>';
  });
  rEl.innerHTML=html;rEl.classList.add('open');activeIdx=-1;
}
qEl.addEventListener('input',()=>renderResults(qEl.value));
qEl.addEventListener('focus',()=>{if(qEl.value.trim())renderResults(qEl.value)});
qEl.addEventListener('keydown',e=>{
  const items=[...rEl.querySelectorAll('.ritem')];
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    if(!items.length)return;
    activeIdx=(activeIdx+(e.key==='ArrowDown'?1:-1)+items.length)%items.length;
    items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));
    items[activeIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    if(activeIdx>=0&&curHits[activeIdx])openHit(curHits[activeIdx]);
    else if(curHits.length)openHit(curHits[0]);
  } else if(e.key==='Escape'){qEl.value='';closeResults();qEl.blur()}
});
document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))closeResults()});
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==qEl&&!/input|textarea/i.test(document.activeElement.tagName)){
    e.preventDefault();qEl.focus();qEl.select();
  }
});

render();
</script>
