:root{
  --brand:#ED7424;
  --display:#C05F1F;
  --brand-soft:#FBEADB;
  --brand-ink:#B45309;
  --bg:#F7F0E6;
  --surface:#FFFFFF;
  --surface-2:#F1E8DA;
  --ink:#221C17;
  --ink-2:#5C534B;
  --ink-3:#A2968A;
  --line:#E9DFD0;
  --line-2:#D9CDBA;
  --shadow:0 1px 2px rgb(60 40 10 / .04),0 6px 20px rgb(60 40 10 / .07);
  --shadow-lg:0 6px 16px rgb(60 40 10 / .08),0 20px 50px rgb(60 40 10 / .16);
  --radius:18px;
  --hl:#FBE3C8;
  --fd:'Fraunces',Georgia,'Times New Roman',serif;
  --fm:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
}
@media (prefers-color-scheme: dark){
  :root{
    --brand:#F08434;
    --display:#F08434;
    --brand-soft:#3A2717;
    --brand-ink:#F5A05C;
    --bg:#171310;
    --surface:#211B16;
    --surface-2:#2B231D;
    --ink:#F4EDE3;
    --ink-2:#C7BBAD;
    --ink-3:#8A7D6F;
    --line:#352C24;
    --line-2:#463A2F;
    --shadow:0 1px 2px rgb(0 0 0 / .4),0 6px 20px rgb(0 0 0 / .35);
    --shadow-lg:0 6px 16px rgb(0 0 0 / .5),0 24px 60px rgb(0 0 0 / .6);
    --hl:#4A3413;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:var(--brand-ink);text-decoration:none}
a:hover{text-decoration:underline}
mark{background:var(--hl);color:inherit;border-radius:3px;padding:0 1px}
.kicker{font:700 11px/1 var(--fm);letter-spacing:.16em;text-transform:uppercase;color:var(--brand)}

/* ---------- header ---------- */
header.site{
  position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 86%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.hwrap{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.logo svg{display:block}
.logo b{font-size:16px;letter-spacing:-.01em}
.logo span{display:block;font-size:11px;color:var(--ink-3);margin-top:-2px}
.searchbox{position:relative;flex:1;max-width:560px;margin-left:auto}
.searchbox input{
  width:100%;padding:9px 36px 9px 38px;border:1px solid var(--line-2);border-radius:12px;
  background:var(--surface);color:var(--ink);font-size:14px;outline:none;transition:border-color .15s, box-shadow .15s;
}
.searchbox input:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 22%,transparent)}
.searchbox .sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.searchbox kbd{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font:600 11px/1 var(--fm);color:var(--ink-3);border:1px solid var(--line-2);
  border-radius:5px;padding:3px 6px;background:var(--surface-2);
}
.updated{font-size:12px;color:var(--ink-3);white-space:nowrap;font-family:var(--fm)}
@media (max-width:720px){.updated{display:none}.logo span{display:none}}

/* ---------- search results ---------- */
#results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;max-height:min(70vh,640px);overflow:auto;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  display:none;
}
#results.open{display:block}
.rgroup{padding:12px 14px 4px;font:700 10.5px var(--fm);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
.ritem{display:block;width:100%;text-align:left;padding:10px 14px;border-top:1px solid var(--line);transition:background .1s}
.ritem:hover,.ritem.active{background:var(--surface-2)}
.ritem .rt{font-weight:650;font-size:14px}
.ritem .rp{font-size:12px;color:var(--ink-3);margin-top:1px}
.ritem .rd{font-size:13px;color:var(--ink-2);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rnone{padding:22px 14px;color:var(--ink-3);font-size:14px;text-align:center}

/* ---------- layout ---------- */
main{max-width:1200px;margin:0 auto;padding:28px 20px 80px}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-3);margin-bottom:18px;flex-wrap:wrap}
.crumbs button{color:var(--brand-ink);font-weight:600}
.crumbs button:hover{text-decoration:underline}

/* ---------- home ---------- */
.hero{padding:52px 10px 34px;max-width:900px}
.hero h1{
  font-family:var(--fd);font-weight:900;text-transform:lowercase;
  font-size:clamp(40px,7vw,76px);letter-spacing:-.01em;line-height:1.02;color:var(--display);
}
.hero p{max-width:680px;margin:22px 0 0;color:var(--ink-2);font-size:17px;line-height:1.6}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}
.stat{
  background:var(--surface);border:1px solid var(--line);border-radius:999px;
  padding:7px 16px;font-size:13px;color:var(--ink-2);box-shadow:var(--shadow);
}
.stat b{color:var(--ink);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px;margin-top:30px}
.pcard{
  text-align:left;background:var(--surface);border:1px solid color-mix(in srgb,var(--line) 60%,transparent);
  border-radius:var(--radius);padding:22px 22px 20px 30px;box-shadow:var(--shadow);
  transition:transform .15s, box-shadow .15s;position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:9px;
}
.pcard::before{
  content:'';position:absolute;left:10px;top:18px;bottom:18px;width:6px;border-radius:999px;
  background:var(--pc,var(--brand));
}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.pcard .kicker{color:var(--pc,var(--brand))}
.pcard h3{font-size:19px;letter-spacing:-.015em;font-weight:750}
.pcard .tag{font-size:13.5px;color:var(--ink-2)}
.pcard .prev{font-size:12px;color:var(--ink-3)}
.pcard .cnt{margin-top:auto;padding-top:8px;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--ink-3)}
.pcard .go{color:var(--pc,var(--brand));font-weight:700;display:flex;align-items:center;gap:4px}
.demobtn{
  display:inline-flex;align-items:center;gap:7px;margin-top:2px;
  font-size:12.5px;font-weight:700;color:var(--pc,var(--brand));
}
.demobtn:hover{text-decoration:underline}
.byline{margin-top:44px;text-align:center;font-size:12.5px;color:var(--ink-3)}

/* ---------- pillar view ---------- */
.pillar-head{display:flex;gap:18px;align-items:flex-start;margin-bottom:6px;flex-wrap:wrap}
.picon{
  width:52px;height:52px;border-radius:14px;display:grid;place-items:center;flex-shrink:0;
  background:color-mix(in srgb,var(--pc,var(--brand)) 14%,var(--surface));color:var(--pc,var(--brand));
}
.pillar-head h1{
  font-family:var(--fd);font-weight:900;font-size:clamp(30px,4.5vw,46px);
  letter-spacing:-.01em;line-height:1.08;color:var(--display);
}
.pillar-head .tag{color:var(--ink-2);font-size:15px;margin-top:4px}
.pillar-desc{color:var(--ink-2);font-size:15px;max-width:820px;margin:12px 0 4px}
.toolbar{display:flex;align-items:center;gap:10px;margin:18px 0 6px;flex-wrap:wrap}
.chipbtn{
  font-size:12.5px;font-weight:650;color:var(--ink-2);border:1px solid var(--line-2);
  border-radius:999px;padding:6px 14px;background:var(--surface);
}
.chipbtn:hover{border-color:var(--brand);color:var(--brand-ink)}
.chipbtn.solid{background:var(--pc,var(--brand));border-color:var(--pc,var(--brand));color:#fff}
.chipbtn.solid:hover{filter:brightness(1.07);color:#fff}
.pillar-body{display:grid;grid-template-columns:230px 1fr;gap:28px;align-items:start;margin-top:14px}
@media (max-width:900px){.pillar-body{grid-template-columns:1fr}.sidenav{display:none}}
.sidenav{position:sticky;top:76px;max-height:calc(100vh - 100px);overflow:auto;padding-right:6px}
.sidenav a{
  display:block;font-size:13px;color:var(--ink-2);padding:6px 10px;border-left:2px solid var(--line);
  border-radius:0 8px 8px 0;
}
.sidenav a:hover{color:var(--ink);text-decoration:none;background:var(--surface-2)}
.sidenav a.on{color:var(--brand-ink);border-left-color:var(--pc,var(--brand));font-weight:650;background:var(--brand-soft)}

/* ---------- feature card ---------- */
.fcard{
  background:var(--surface);border:1px solid color-mix(in srgb,var(--line) 60%,transparent);
  border-radius:var(--radius);padding:22px 22px 20px 30px;box-shadow:var(--shadow);
  margin-bottom:16px;scroll-margin-top:84px;position:relative;overflow:hidden;
}
.fcard::before{
  content:'';position:absolute;left:10px;top:20px;bottom:20px;width:5px;border-radius:999px;
  background:color-mix(in srgb,var(--pc,var(--brand)) 55%,var(--surface));
}

const nSub  = DATA.pillars.reduce((s,p)=>s+p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0),0);

document.getElementById('updated').textContent = 'Updated '+DATA.meta.updated;

/* ---------- routing ---------- */
function go(h){ if(location.hash===h){render()} else {location.hash=h} }
window.addEventListener('hashchange', render);

function parseHash(){
  const h = location.hash.replace(/^#\/?/,'');
  if(!h) return {view:'home'};
  const parts = h.split('/').filter(Boolean);
  if(parts[0]==='p' && parts[1]){
    const p = DATA.pillars.find(x=>x.id===parts[1]);
    if(p) return {view:'pillar', p, fid:parts[2]||null};
  }
  return {view:'home'};
}

/* ---------- home ---------- */

/* ---------- pillar ---------- */
function featCard(p,f){
  const roles=(f.roles||[]).map(r=>'<span class="chip role">'+esc(r)+'</span>').join('');
  const plats=(f.platforms||[]).map(r=>'<span class="chip">'+esc(r)+'</span>').join('');
  const sfs=(f.subFeatures||[]).map((s,i)=>'<div class="sf" id="sf-'+f.id+'-'+i+'"><div class="sn">'+esc(s.name)+'</div><div class="sd">'+esc(s.description)+'</div></div>').join('');
  return '<article class="fcard" id="f-'+f.id+'" style="--pc:'+p.color+'">'
    +'<div class="fhead"><h2>'+esc(f.name)+'</h2><span class="ftag">'+esc(f.tagline||'')+'</span></div>'
    +'<p class="fdesc">'+esc(f.description)+'</p>'
    +'<div class="chips">'+roles+plats+'</div>'
    +((f.subFeatures&&f.subFeatures.length)?
      '<button class="sf-toggle" aria-expanded="false" onclick="toggleSf(this)">'
      +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>'
      +f.subFeatures.length+' capabilities</button><div class="sflist">'+sfs+'</div>':'')
    +'</article>';
}
function toggleSf(btn){
  const open = btn.getAttribute('aria-expanded')==='true';
  btn.setAttribute('aria-expanded', String(!open));
  btn.nextElementSibling.classList.toggle('open', !open);
}
function setAll(open){
  document.querySelectorAll('.sf-toggle').forEach(b=>{
    b.setAttribute('aria-expanded',String(open));
    b.nextElementSibling.classList.toggle('open',open);
  });
}
function renderPillar(p){
  const nav = p.features.map(f=>'<a href="#/p/'+p.id+'/'+f.id+'" data-f="'+f.id+'">'+esc(f.name)+'</a>').join('');
  const cards = p.features.map(f=>featCard(p,f)).join('');
  return '<div class="crumbs"><button onclick="go(\'#/\')">All products</button>'
    +'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="m9 6 6 6-6 6"/></svg>'
    +'<span>'+esc(p.name)+'</span></div>'
    +'<div class="pillar-head" style="--pc:'+p.color+'"><div class="picon">'+icon(p.icon,26)+'</div>'
    +'<div><span class="kicker" style="color:'+p.color+'">'+esc(p.id)+' · '+p.features.length+' features</span><h1>'+esc(p.name)+'</h1><div class="tag">'+esc(p.tagline)+'</div></div></div>'
    +'<p class="pillar-desc">'+esc(p.description)+'</p>'
    +'<div class="toolbar" style="--pc:'+p.color+'">'
    +(p.demo?'<button class="chipbtn solid" onclick="openDemo(\''+p.id+'\')">▶ Guided demo</button>':'')
    +'<button class="chipbtn" onclick="setAll(true)">Expand all</button>'
    +'<button class="chipbtn" onclick="setAll(false)">Collapse all</button>'
    +'<span style="font-size:12.5px;color:var(--ink-3)">'
    +p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0)+' capabilities</span></div>'
    +'<div class="pillar-body" style="--pc:'+p.color+'"><nav class="sidenav" id="snav">'+nav+'</nav><div>'+cards+'</div></div>';

/* ---------- render ---------- */
let scrollObs=null;
function render(){
  const r = parseHash();
  const app = document.getElementById('app');
  closeResults();
  if(scrollObs){scrollObs.disconnect();scrollObs=null}
  if(r.view==='home'){ app.innerHTML = renderHome(); window.scrollTo(0,0); document.title='Vacademy — Feature Catalog'; return; }
  app.innerHTML = renderPillar(r.p);
  document.title = r.p.name+' — Vacademy Feature Catalog';
  const links=[...document.querySelectorAll('#snav a')];
  scrollObs=new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){
      links.forEach(l=>l.classList.toggle('on', l.dataset.f===e.target.id.slice(2)));
    }});
  },{rootMargin:'-80px 0px -70% 0px'});
  document.querySelectorAll('.fcard').forEach(c=>scrollObs.observe(c));
  if(r.fid){
    const el=document.getElementById('f-'+r.fid);
    if(el){
      const t=el.querySelector('.sf-toggle'); if(t){t.setAttribute('aria-expanded','true');t.nextElementSibling.classList.add('open')}
      requestAnimationFrame(()=>{el.scrollIntoView({block:'start'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1700)});
    }
  } else window.scrollTo(0,0);
}

/* ---------- search ---------- */
const INDEX=[];
DATA.pillars.forEach(p=>{
  INDEX.push({kind:'product',p,text:(p.name+' '+p.tagline+' '+p.description).toLowerCase()});
  p.features.forEach(f=>{
    INDEX.push({kind:'feature',p,f,text:(f.name+' '+(f.tagline||'')+' '+f.description).toLowerCase()});
    (f.subFeatures||[]).forEach((s,i)=>INDEX.push({kind:'cap',p,f,s,i,text:(s.name+' '+s.description).toLowerCase()}));
  });
});
function hl(text,terms){
  let out=esc(text);
  terms.forEach(t=>{ if(!t)return;
    out=out.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');
  });
  return out;
}
function search(q){
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  if(!terms.length) return [];
  const hits=INDEX.filter(e=>terms.every(t=>e.text.includes(t)));
  const rank={product:0,feature:1,cap:2};
  hits.sort((a,b)=>{
    const an=terms.every(t=>(a.kind==='cap'?a.s.name:a.kind==='feature'?a.f.name:a.p.name).toLowerCase().includes(t))?0:1;
    const bn=terms.every(t=>(b.kind==='cap'?b.s.name:b.kind==='feature'?b.f.name:b.p.name).toLowerCase().includes(t))?0:1;
    return (rank[a.kind]-rank[b.kind])||(an-bn);
  });
  return hits.slice(0,60);
}
const qEl=document.getElementById('q'), rEl=document.getElementById('results');
let activeIdx=-1, curHits=[];
function closeResults(){rEl.classList.remove('open');activeIdx=-1}
function openHit(e){
  closeResults(); qEl.blur();
  if(e.kind==='product'){go('#/p/'+e.p.id);return}
  const target='#/p/'+e.p.id+'/'+e.f.id;
  if(location.hash===target){render()} else {location.hash=target}
  if(e.kind==='cap'){
    setTimeout(()=>{const el=document.getElementById('sf-'+e.f.id+'-'+e.i);
      if(el){el.scrollIntoView({block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1800)}},80);
  }
}
function renderResults(q){
  curHits=search(q);
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  if(!q.trim()){closeResults();return}
  if(!curHits.length){rEl.innerHTML='<div class="rnone">No matches for “'+esc(q)+'”</div>';rEl.classList.add('open');return}
  const groups={product:'Products',feature:'Features',cap:'Capabilities'};
  let html='',last='';
  curHits.forEach((e,idx)=>{
    if(e.kind!==last){html+='<div class="rgroup">'+groups[e.kind]+'</div>';last=e.kind}
    const title=e.kind==='cap'?e.s.name:e.kind==='feature'?e.f.name:e.p.name;
    const path=e.kind==='cap'?(e.p.name+' › '+e.f.name):e.kind==='feature'?e.p.name:(e.p.features.length+' features');
    const desc=e.kind==='cap'?e.s.description:e.kind==='feature'?e.f.description:e.p.tagline;
    html+='<button class="ritem" data-i="'+idx+'" onclick="openHit(curHits['+idx+'])">'
      +'<div class="rt">'+hl(title,terms)+'</div><div class="rp">'+esc(path)+'</div>'
      +'<div class="rd">'+hl(desc,terms)+'</div></button>';
  });
  rEl.innerHTML=html;rEl.classList.add('open');activeIdx=-1;
}
qEl.addEventListener('input',()=>renderResults(qEl.value));
qEl.addEventListener('focus',()=>{if(qEl.value.trim())renderResults(qEl.value)});
qEl.addEventListener('keydown',e=>{
  const items=[...rEl.querySelectorAll('.ritem')];
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    if(!items.length)return;
    activeIdx=(activeIdx+(e.key==='ArrowDown'?1:-1)+items.length)%items.length;
    items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));
    items[activeIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    if(activeIdx>=0&&curHits[activeIdx])openHit(curHits[activeIdx]);
    else if(curHits.length)openHit(curHits[0]);
  } else if(e.key==='Escape'){qEl.value='';closeResults();qEl.blur()}
});
document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))closeResults()});
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==qEl&&!/input|textarea/i.test(document.activeElement.tagName)){
    e.preventDefault();qEl.focus();qEl.select();
  }
  if(e.key==='Escape'&&demoState){closeDemo()}
  if(demoState&&e.key==='ArrowRight'){demoStep(1)}
  if(demoState&&e.key==='ArrowLeft'){demoStep(-1)}
});

  whiteboard: w => '<div class="mwb"><div class="wtools"><span class="wtool">✏️</span><span class="wtool">▢</span><span class="wtool">T</span><span class="wtool">🖼</span></div>'
    +'<div class="wscript">'+esc(w.title||'')+'</div>'
    +'<div class="wreact"><span>👍 24</span><span>🎉 11</span><span>🙋 6</span></div></div>',
  notify: w => '<div class="mnotify">'+w.items.map(n=>'<div class="nrow"><span class="nch">'+esc(n.channel)+'</span><span>'+esc(n.text)+'</span></div>').join('')+'</div>',
  wizard: w => '<div class="mwizard">'+w.steps.map((s,i)=>'<span class="ws'+(i===(w.active||0)?' on':'')+'"><span class="wn">'+(i+1)+'</span>'+esc(s)+'</span>'+(i<w.steps.length-1?'<span class="wl"></span>':'')).join('')+'</div>',
};
function renderWidget(w){
  if(w.cols){return '<div class="mrow c'+w.cols.length+'">'+w.cols.map(renderWidget).join('')+'</div>'}
  const fn = W[w.type];
  const inner = fn ? fn(w) : '<span style="color:var(--ink-3)">['+esc(w.type)+']</span>';
  return '<div class="wg" '+(w.id?'data-wid="'+esc(w.id)+'"':'')+'>'+inner+'</div>';
}
function renderScreen(scr){
  const widgets = scr.widgets.map(renderWidget).join('');
  if(scr.device==='phone'){
    const tabs=(scr.nav||[]).map(n=>{const on=n.endsWith('*');return '<span class="pt'+(on?' on':'')+'">'+esc(on?n.slice(0,-1):n)+'</span>'}).join('');
    return '<div class="phone"><div class="p-status"><span>9:41</span><span>••• ⌁ ▮</span></div>'
      +'<div class="p-body">'+widgets+'</div>'
      +(tabs?'<div class="p-tabs">'+tabs+'</div>':'')+'</div>';
  }
  const nav=(scr.nav||[]).map(n=>{const on=n.endsWith('*');return '<div class="ni'+(on?' on':'')+'">'+esc(on?n.slice(0,-1):n)+'</div>'}).join('');
  return '<div class="mock"><div class="mock-top">'
    +'<svg width="18" height="18" viewBox="0 0 512 512" fill="none"><rect x="258.938" y="427.189" width="104.187" height="348.192" rx="52.0933" transform="rotate(-143.162 258.938 427.189)" fill="#ED7424"/><rect x="-0.163552" y="0.687932" width="104.187" height="186.707" rx="52.0933" transform="matrix(0.851484 -0.52438 -0.52438 -0.851484 142.718 299.424)" fill="#ED7424"/></svg>'
    +'<span class="mt-title">'+esc(scr.title||'')+'</span>'
    +'<span class="mt-search">Search…</span><span class="mt-av">SN</span></div>'
    +'<div class="mock-body">'+(nav?'<div class="mock-nav">'+nav+'</div>':'')
    +'<div class="mock-main">'+widgets+'</div></div></div>';
}

let demoState=null;
function openDemo(pid){
  const p = DATA.pillars.find(x=>x.id===pid);
  if(!p||!p.demo) return;
  demoState={p, demo:p.demo, step:0, screenId:null};
  document.getElementById('demoKick').textContent='Guided demo';
  document.getElementById('demoTitle').textContent=p.name;
  document.getElementById('demoOv').classList.add('open');
  document.body.style.overflow='hidden';
  showStep(0);
}
function closeDemo(){
  demoState=null;
  document.getElementById('demoOv').classList.remove('open');
  document.body.style.overflow='';
}
function demoStep(d){
  if(!demoState)return;
  const n=demoState.step+d;
  if(n<0)return;
  if(n>=demoState.demo.steps.length){closeDemo();return}
  showStep(n);
}
function showStep(n){
  const {demo}=demoState;
  demoState.step=n;
  const st=demo.steps[n];
  if(st.screen!==demoState.screenId){
    const scr=demo.screens.find(s=>s.id===st.screen);
    document.getElementById('demoStage').innerHTML=scr?renderScreen(scr):'';
    demoState.screenId=st.screen;
  }
  document.querySelectorAll('#demoStage .wg.spot').forEach(el=>el.classList.remove('spot'));
  if(st.target){
    const el=document.querySelector('#demoStage [data-wid="'+CSS.escape(st.target)+'"]');
    if(el){el.classList.add('spot');el.scrollIntoView({block:'center',behavior:'smooth'})}
  }
  document.getElementById('stepKick').textContent='Step '+(n+1)+' of '+demo.steps.length;
  document.getElementById('stepTitle').textContent=st.title;
  document.getElementById('stepText').textContent=st.text;
  document.getElementById('stepDots').innerHTML=demo.steps.map((_,i)=>'<span class="dot'+(i===n?' on':'')+'"></span>').join('');
  document.getElementById('btnBack').disabled=(n===0);
  document.getElementById('btnNext').textContent=(n===demo.steps.length-1)?'Finish':'Next';
}
document.getElementById('demoOv').addEventListener('click',e=>{if(e.target.id==='demoOv')closeDemo()});

render();
</script>
