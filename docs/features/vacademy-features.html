<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vacademy — Feature Catalog</title>
<meta name="description" content="Explore every product and feature of the Vacademy platform: LMS, Assessments, Live Classroom, CRM & Sales, Marketing, ERP, Finance, Vacademy AI, Communication and more.">
<style>
/* ============================================================
   Vacademy Feature Catalog — self-contained, no external assets.
   MAINTENANCE: feature content lives in the single DATA object at
   the bottom of this file (search for "const DATA"). Edit that
   object to add/rename products, features and sub-features — the
   page renders entirely from it. Keep vacademy-features.md in sync.
   ============================================================ */
:root{
  --brand:hsl(24 85% 54%);
  --brand-soft:hsl(24 85% 96%);
  --brand-ink:hsl(24 70% 38%);
  --bg:#faf9f7;
  --surface:#ffffff;
  --surface-2:#f4f2ef;
  --ink:#1c1917;
  --ink-2:#57534e;
  --ink-3:#a8a29e;
  --line:#e7e5e4;
  --line-2:#d6d3d1;
  --shadow:0 1px 2px rgb(0 0 0 / .05),0 4px 16px rgb(0 0 0 / .06);
  --shadow-lg:0 4px 8px rgb(0 0 0 / .06),0 12px 40px rgb(0 0 0 / .12);
  --radius:14px;
  --hl:#fef3c7;
}
@media (prefers-color-scheme: dark){
  :root{
    --brand:hsl(24 90% 58%);
    --brand-soft:hsl(24 45% 16%);
    --brand-ink:hsl(24 90% 68%);
    --bg:#141210;
    --surface:#1e1b18;
    --surface-2:#282420;
    --ink:#f5f0eb;
    --ink-2:#c0b8b0;
    --ink-3:#7d766f;
    --line:#332e29;
    --line-2:#453f38;
    --shadow:0 1px 2px rgb(0 0 0 / .4),0 4px 16px rgb(0 0 0 / .35);
    --shadow-lg:0 4px 8px rgb(0 0 0 / .5),0 16px 48px rgb(0 0 0 / .55);
    --hl:#4a3a10;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:var(--brand-ink);text-decoration:none}
a:hover{text-decoration:underline}
mark{background:var(--hl);color:inherit;border-radius:3px;padding:0 1px}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 88%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.hwrap{max-width:1200px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.logo-mark{
  width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--brand),hsl(14 85% 50%));color:#fff;font-weight:800;font-size:18px;
}
.logo b{font-size:16px;letter-spacing:-.01em}
.logo span{display:block;font-size:11px;color:var(--ink-3);margin-top:-2px}
.searchbox{position:relative;flex:1;max-width:560px;margin-left:auto}
.searchbox input{
  width:100%;padding:9px 36px 9px 38px;border:1px solid var(--line-2);border-radius:10px;
  background:var(--surface);color:var(--ink);font-size:14px;outline:none;transition:border-color .15s, box-shadow .15s;
}
.searchbox input:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 20%,transparent)}
.searchbox .sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.searchbox kbd{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font:600 11px/1 ui-monospace,monospace;color:var(--ink-3);border:1px solid var(--line-2);
  border-radius:5px;padding:3px 6px;background:var(--surface-2);
}
.updated{font-size:12px;color:var(--ink-3);white-space:nowrap}
@media (max-width:720px){.updated{display:none}.logo span{display:none}}

/* ---------- search results panel ---------- */
#results{
  position:absolute;top:calc(100% + 8px);left:0;right:0;max-height:min(70vh,640px);overflow:auto;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  display:none;
}
#results.open{display:block}
.rgroup{padding:10px 14px 4px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.ritem{display:block;width:100%;text-align:left;padding:10px 14px;border-top:1px solid var(--line);transition:background .1s}
.ritem:hover,.ritem.active{background:var(--surface-2)}
.ritem .rt{font-weight:600;font-size:14px}
.ritem .rp{font-size:12px;color:var(--ink-3);margin-top:1px}
.ritem .rd{font-size:13px;color:var(--ink-2);margin-top:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rnone{padding:22px 14px;color:var(--ink-3);font-size:14px;text-align:center}

/* ---------- layout ---------- */
main{max-width:1200px;margin:0 auto;padding:28px 20px 80px}
.crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-3);margin-bottom:18px;flex-wrap:wrap}
.crumbs button{color:var(--brand-ink);font-weight:600}
.crumbs button:hover{text-decoration:underline}

/* ---------- home ---------- */
.hero{text-align:center;padding:38px 10px 30px}
.hero h1{font-size:clamp(28px,4.5vw,44px);letter-spacing:-.03em;line-height:1.12;font-weight:800}
.hero h1 em{font-style:normal;background:linear-gradient(100deg,var(--brand),hsl(4 80% 56%));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p{max-width:680px;margin:14px auto 0;color:var(--ink-2);font-size:16px}
.stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.stat{
  background:var(--surface);border:1px solid var(--line);border-radius:999px;
  padding:7px 16px;font-size:13px;color:var(--ink-2);box-shadow:var(--shadow);
}
.stat b{color:var(--ink);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:34px}
.pcard{
  text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);transition:transform .15s, box-shadow .15s, border-color .15s;
  display:flex;flex-direction:column;gap:10px;
}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--pc,var(--brand))}
.picon{
  width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;
  background:color-mix(in srgb,var(--pc,var(--brand)) 14%,var(--surface));color:var(--pc,var(--brand));
}
.pcard h3{font-size:17px;letter-spacing:-.01em}
.pcard .tag{font-size:13px;color:var(--ink-2)}
.pcard .cnt{margin-top:auto;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--ink-3)}
.pcard .cnt .go{color:var(--pc,var(--brand));font-weight:700;display:flex;align-items:center;gap:4px}
.byline{margin-top:44px;text-align:center;font-size:12.5px;color:var(--ink-3)}

/* ---------- pillar view ---------- */
.pillar-head{display:flex;gap:16px;align-items:flex-start;margin-bottom:6px}
.pillar-head .picon{width:52px;height:52px;border-radius:14px}
.pillar-head h1{font-size:clamp(24px,3.5vw,34px);letter-spacing:-.02em;line-height:1.15}
.pillar-head .tag{color:var(--ink-2);font-size:15px;margin-top:2px}
.pillar-desc{color:var(--ink-2);font-size:15px;max-width:820px;margin:10px 0 4px}
.toolbar{display:flex;align-items:center;gap:10px;margin:18px 0 6px;flex-wrap:wrap}
.toolbar .chipbtn{
  font-size:12.5px;font-weight:600;color:var(--ink-2);border:1px solid var(--line-2);
  border-radius:999px;padding:5px 12px;background:var(--surface);
}
.toolbar .chipbtn:hover{border-color:var(--brand);color:var(--brand-ink)}
.pillar-body{display:grid;grid-template-columns:230px 1fr;gap:28px;align-items:start;margin-top:14px}
@media (max-width:900px){.pillar-body{grid-template-columns:1fr}.sidenav{display:none}}
.sidenav{position:sticky;top:76px;max-height:calc(100vh - 100px);overflow:auto;padding-right:6px}
.sidenav a{
  display:block;font-size:13px;color:var(--ink-2);padding:6px 10px;border-left:2px solid var(--line);
  border-radius:0 8px 8px 0;
}
.sidenav a:hover{color:var(--ink);text-decoration:none;background:var(--surface-2)}
.sidenav a.on{color:var(--brand-ink);border-left-color:var(--brand);font-weight:600;background:var(--brand-soft)}

/* ---------- feature card ---------- */
.fcard{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px;box-shadow:var(--shadow);margin-bottom:16px;scroll-margin-top:84px;
}
.fcard.flash{animation:flash 1.6s ease-out}
@keyframes flash{0%,45%{border-color:var(--brand);box-shadow:0 0 0 4px color-mix(in srgb,var(--brand) 25%,transparent)}100%{}}
.fhead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.fhead h2{font-size:19px;letter-spacing:-.01em}
.fhead .ftag{font-size:13px;color:var(--brand-ink);font-weight:600}
.fdesc{color:var(--ink-2);font-size:14.5px;margin-top:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.chip{
  font-size:11.5px;font-weight:600;border-radius:999px;padding:3px 10px;
  background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line);
}
.chip.role{background:color-mix(in srgb,var(--pc,var(--brand)) 10%,var(--surface));color:var(--pc,var(--brand-ink));border-color:transparent}
.sf-toggle{
  margin-top:14px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--brand-ink);
}
.sf-toggle svg{transition:transform .18s}
.sf-toggle[aria-expanded="true"] svg{transform:rotate(90deg)}
.sflist{display:none;margin-top:10px;border-top:1px solid var(--line)}
.sflist.open{display:block}
.sf{
  display:grid;grid-template-columns:minmax(160px,240px) 1fr;gap:6px 18px;
  padding:11px 2px;border-bottom:1px solid var(--line);scroll-margin-top:100px;
}
.sf:last-child{border-bottom:0}
.sf .sn{font-size:13.5px;font-weight:650}
.sf .sd{font-size:13.5px;color:var(--ink-2)}
.sf.flash{background:var(--hl)}
@media (max-width:640px){.sf{grid-template-columns:1fr;gap:2px}}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);padding:26px 20px 40px;text-align:center;color:var(--ink-3);font-size:12.5px}
footer .fw{max-width:1200px;margin:0 auto}

/* ---------- print ---------- */
@media print{
  header,.sidenav,.toolbar,footer{display:none!important}
  .sflist{display:block!important}
  .fcard{box-shadow:none;break-inside:avoid}
  body{background:#fff}
}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="logo" onclick="go('#/')" title="Home">
      <div class="logo-mark">V</div>
      <div><b>Vacademy</b><span>Feature Catalog</span></div>
    </div>
    <div class="searchbox">
      <svg class="sicon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Search products, features, capabilities…" autocomplete="off" spellcheck="false">
      <kbd>/</kbd>
      <div id="results" role="listbox"></div>
    </div>
    <div class="updated" id="updated"></div>
  </div>
</header>

<main id="app"></main>

<footer>
  <div class="fw" id="foot"></div>
</footer>

<script>
/* ================= DATA ================= */
const DATA = {"meta":{"name":"Vacademy","headline":"Everything your institute needs.<br><em>One platform.<\/em>","subhead":"Vacademy unifies LMS, assessments, live classrooms, CRM & admissions, marketing, communication, finance, HR and a full AI studio — so coaching institutes, schools and edtech companies can run everything from one place, under their own brand.","updated":"2026-07-17","terminologyNote":"Every term below (Course, Level, Session, Batch, Learner, …) is configurable per institute via Settings → Naming Settings — your clients can rename them to match their own vocabulary (e.g. \"Course\" → \"Program\", \"Learner\" → \"Student\")."},"pillars":[{"id":"lms","name":"Learning Management (LMS)","icon":"lms","color":"#ED7424","tagline":"Author rich courses and deliver them beautifully on every device","description":"Vacademy's Learning Management pillar covers everything from building a course to a learner finishing it: a full course library, flexible 2-to-5 level hierarchies, and a slide-based editor supporting more than a dozen content types including video, PDFs, quizzes, code labs, Jupyter notebooks and SCORM. Content can be dripped, reused across batches, put through editorial approval, and protected against leaks — while learners consume it in a distraction-free player with true progress tracking, a personalized home dashboard, and automatically issued completion certificates.","features":[{"id":"course-builder","name":"Course Builder & Course Library","tagline":"Create, organize and sell every course from one library","description":"A central library where your team creates and manages every offering — classic courses, memberships, products or services — all on the same engine. Each course carries rich, marketing-ready details: description, learning outcomes, target audience, tags, preview image, banner and promo media. Search, filters, sorting and pagination keep even the largest catalogs manageable, and teaching teams are set up from day one with instructor invitations.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Guided course creation wizard","description":"Step-by-step setup for name, description, learning outcomes, about section, target audience, tags, preview image, banner and promo media (image, uploaded video or YouTube link) with built-in image cropping."},{"name":"Four offering types","description":"Create each offering as a Course, Membership, Product or Service — the same engine sells classic courses, recurring memberships or one-off services."},{"name":"Bulk course creation","description":"Create many courses in a single operation instead of one at a time."},{"name":"Course cards with live stats","description":"Library cards show ratings, instructors with photos, tags and optionally the count of actively enrolled learners per course."},{"name":"Search, filter and sort","description":"Find courses by keyword, level, tag or owning staff member; sort results and page through large catalogs."},{"name":"Edit and delete with safeguards","description":"Update course details anytime; deletion asks for confirmation and supports removing multiple courses at once."},{"name":"Faculty-scoped views","description":"Teachers with restricted access see only their own courses, with irrelevant filters hidden automatically."},{"name":"Instructor invitations","description":"Invite co-instructors onto a course while creating it, so teaching teams are in place from the start."}]},{"id":"course-hierarchy","name":"Flexible Course Hierarchy","tagline":"2-to-5 level course structures that match how you teach","description":"Structure courses with 2, 3, 4 or 5 levels of depth — from a simple chapter list up to full Level → Session → Subject → Module → Chapter trees — instead of being forced into a flat lesson list. Every layer can be added, renamed, reordered by drag-and-drop, copied, moved and deleted. Academic sessions (year or semester) and levels (class or grade) are optional and switch on or off per institute.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Selectable course depth","description":"Choose a 2, 3, 4 or 5-level structure per course, or fix a default depth institute-wide so all courses stay consistent."},{"name":"Levels management","description":"Add, update and delete levels (e.g. Class 9, Beginner/Advanced) with durations and thumbnails."},{"name":"Academic sessions","description":"Create, edit and delete academic sessions (e.g. 2026-27) and map level/session combinations into batches."},{"name":"Session-to-session content rollover","description":"Roll a whole session's content forward into a new academic session in one action — no rebuilding each year."},{"name":"Subjects and modules","description":"Add, update, reorder and delete subjects and their modules, each with names and thumbnails."},{"name":"Chapters with copy and move","description":"Create and edit chapters, drag to reorder, and copy or move a chapter with all its slides to another module, course or batch."},{"name":"Outline vs structure view","description":"Choose whether learners and staff see a course as a flat outline or a nested structure, with sections expanded or collapsed by default."}]},{"id":"slide-authoring","name":"Slide-Based Content Authoring","tagline":"Every lesson is a slide — 12+ content types, one editor","description":"Chapters are built from slides — individual learning units that can be a video, PDF, rich document, quiz, question, assignment, assessment, audio track, SCORM package, code editor, Jupyter notebook, Scratch project or interactive presentation. Authors work in a single editor with a chapter sidebar, adding, reordering, renaming, copying and moving slides freely, with full version history and engagement stats on every slide.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"12+ slide types from one menu","description":"Add PDF, PPT presentation, rich document, video (upload, YouTube or Vimeo), question, quiz, assignment, assessment, presentation, Jupyter notebook, Scratch project, audio, code editor and SCORM slides from a single add menu."},{"name":"Draft / publish lifecycle","description":"Slides are authored as drafts and explicitly published; draft and published content are stored separately so edits never leak early, and slides can be unpublished again."},{"name":"Drag-and-drop reordering","description":"Reorder slides in the chapter sidebar with drag-and-drop; the new order saves instantly."},{"name":"Copy and move slides","description":"Copy or move any slide to a different chapter, module, subject or course — ideal for reusing lessons across batches."},{"name":"Version history and restore","description":"Every save is captured in a content history timeline; authors can view past versions of a slide and restore any of them with one click."},{"name":"Slide-level engagement stats","description":"An activity panel shows which learners viewed or submitted on each slide, flags late submissions, and exports all submissions to CSV."},{"name":"In-context doubt resolution","description":"Learner doubts raised on a slide appear in a sidebar where staff can reply, assign a teacher, mark resolved or delete."},{"name":"Read-time analytics by content type","description":"Slide counts and estimated read time per content type help gauge course length at a glance."}]},{"id":"course-player","name":"Interactive Course Player","tagline":"One player for video, documents, quizzes, code and more","description":"Learners consume content slide by slide in a distraction-free player with a full course-tree sidebar. The player natively renders more than a dozen content types — video, rich documents, PDFs, slide decks, audio, quizzes, assignments, code editors, notebooks, Scratch, SCORM and whiteboards — and always remembers exactly where the learner left off, down to the video second or PDF page.","roles":["Learner"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Every slide type, natively rendered","description":"Videos, documents, PDFs, presentation decks, audio, questions, quizzes, assignments, code editors, Jupyter notebooks, Scratch projects, SCORM packages and whiteboard slides all play inside one consistent player."},{"name":"Course tree navigation","description":"A collapsible sidebar shows the full Subject → Module → Chapter → Slide tree with per-item completion indicators and free navigation."},{"name":"Resume where you left off","description":"Every slide records progress, so learners resume at the exact video second or document page they left — on any device."},{"name":"Custom video player","description":"Plays YouTube, Vimeo and institute-uploaded videos with speed control and watch-position tracking."},{"name":"Rich documents with math and diagrams","description":"Rich-text lesson pages render cleanly, including math formulas and diagrams, in a focused reading view."},{"name":"PDF viewer with page tracking","description":"The in-app PDF viewer tracks pages read, so completion reflects how much of a document was actually studied."},{"name":"AI-generated video lessons","description":"Plays AI-produced lesson videos with synchronized visuals and narration, including a live progress display while a video is still generating."},{"name":"Animated interactive lessons","description":"Animated HTML lessons can embed live code editors, Scratch projects or Jupyter notebooks directly inside the lesson."},{"name":"Embedded assessments","description":"Full assessments can be launched from within a course chapter without leaving the learning flow."},{"name":"End-of-course feedback slide","description":"An automatic feedback step at the end of a course collects the learner's rating and comments."}]},{"id":"video-slides","name":"Video Lessons with In-Video Questions","tagline":"Videos that check understanding, not just play","description":"Add video lessons by uploading files or linking YouTube, Vimeo or Google Drive videos. Authors drop questions at exact timestamps so playback pauses and learners must answer before continuing — turning passive watching into active learning. Behind the scenes the platform tracks genuine watch time, pauses and skips, giving you trustworthy engagement data instead of simple view counts.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Multiple video sources","description":"Upload video files to secure cloud storage or link YouTube, Vimeo and Google Drive videos."},{"name":"Timestamped question authoring","description":"Insert questions at any point in the timeline, edit each question's time frame, preview it, and manage the full question list per video."},{"name":"Pause-and-answer playback","description":"The video pauses at preset moments and shows a question the learner answers in place before playback resumes."},{"name":"True watch-time tracking","description":"Records actual watched intervals, pause counts and jumps — not just 'opened the video' — for accurate completion data."},{"name":"Video + notes split screen","description":"Pair a video with a side-by-side document or whiteboard for follow-along notes."},{"name":"Per-slide activity logs","description":"Every learning interaction — video watched, PDF page read, quiz attempted — is logged and powers learner progress reports and engagement insights."}]},{"id":"quiz-question-slides","name":"Quiz, Question & Survey Slides","tagline":"Auto-graded practice woven into every chapter","description":"Drop standalone questions, multi-question quizzes or surveys directly between lessons. Question types include single-choice, multiple-choice, true/false, numeric, one-word and long-answer — including comprehension variants built on a shared passage. Objective questions grade themselves instantly, scores feed into learner progress, and question slides can also run as surveys to collect feedback inside the course.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Six question types","description":"MCQ single answer, MCQ multiple answers, true/false, numeric, one-word and long answer — plus comprehension versions of MCQ and numeric questions built on a passage."},{"name":"Automatic evaluation","description":"Objective types are auto-graded against configured correct answers; long answers can be collected for manual review."},{"name":"Marks and negative marking","description":"Set marks per question with optional negative marking, and allow or block skipping per question."},{"name":"Explanations and media","description":"Attach an explanation shown after answering and add images and media to questions and options."},{"name":"Survey mode","description":"Run question slides as surveys with no right answer to collect learner feedback inside the course."},{"name":"Preview as a learner","description":"Preview the full quiz exactly as a learner will see it before publishing."},{"name":"Learner quiz experience","description":"Quizzes run with timers, attempt limits, instant feedback, scorecards and a review mode inside the course player."}]},{"id":"assignments","name":"Assignments & Homework","tagline":"Deadline-driven homework with submissions, marks and reports","description":"Assignment slides give learners homework with a go-live date, deadline, total and passing marks, reference attachments and structured questions. Learners submit file uploads directly inside the course within precisely enforced submission windows, with configurable re-attempts. Staff review every submission per slide, spot late work, and export everything to CSV, while grades flow back to the learner's homework area.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Scheduling and live deadlines","description":"Set a go-live date and due date per assignment; submission windows are enforced against server time with a live countdown, and late submissions are flagged."},{"name":"Re-attempt policy","description":"Allow a configurable number of resubmissions per learner; the app tracks attempts used and blocks further submissions once exhausted."},{"name":"Marks and passing criteria","description":"Define total and passing marks; learners see their graded marks and pass/fail outcome once evaluated."},{"name":"Attachments and structured questions","description":"Attach reference files and add structured questions with typed answers and options."},{"name":"File-upload submissions","description":"Learners upload one or more files as their submission, with allowed file types configurable by the teacher."},{"name":"Submission review and CSV export","description":"See every learner's submission in an activity sidebar and download all submissions as a CSV."},{"name":"Homework list and reports","description":"A dedicated homework area lists all pending and completed homework across courses, with report views summarizing submissions and outcomes over time."}]},{"id":"documents-pdfs-presentations","name":"Documents, PDFs & Presentation Decks","tagline":"Rich docs, PDFs and animated slide decks learners love","description":"Written content comes in every flavor: upload PDFs, convert Word documents into editable pages, author rich documents in a modern block editor, or let AI write the lesson for you. PowerPoint decks convert automatically — either into polished PDFs or into smooth animated web slideshows that replay build steps — so presentations look as good online as they did in class.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"PDF slides","description":"Upload PDFs with an in-app viewer; page counts are tracked so learner progress can be measured page by page."},{"name":"Rich document editor","description":"Create documents in a modern block-based editor with headings, lists, media and formatting; existing Word docs upload and convert to editable content."},{"name":"AI-written documents","description":"Ask AI to author or rewrite a document slide from a prompt — content arrives as a polished lesson you can keep refining with AI."},{"name":"Animated PPT decks","description":"Upload a .pptx and it becomes a web slideshow that preserves build-step animations as elegant cross-fades, played in an in-course deck player."},{"name":"PowerPoint-to-PDF conversion","description":"Classic .ppt and modern .pptx decks convert to PDFs through a professional-grade conversion engine with standard and high-quality modes; very large decks upload straight to cloud storage and convert by reference, sidestepping size limits."},{"name":"Embedded URL slides","description":"Embed any external web page or tool directly inside a chapter as its own slide."}]},{"id":"coding-stem-slides","name":"Coding & STEM Slides","tagline":"Runnable code, Jupyter notebooks and Scratch inside lessons","description":"Teach programming inside the course itself. Code editor slides give learners an in-browser editor where they write and run code against the lesson's starter files; Jupyter notebook and Scratch project slides embed full interactive STEM environments. Every learner code submission is stored and reviewable by staff.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"In-browser code editor slides","description":"Author coding exercises with starter code; learners write and execute code in the browser with real language runtimes."},{"name":"Jupyter notebook slides","description":"Embed interactive Jupyter notebooks as lessons for data science and Python teaching."},{"name":"Scratch project slides","description":"Embed Scratch projects for block-based coding, ideal for younger learners."},{"name":"Coding submission review","description":"Every learner code submission is saved; staff can list submissions per slide and open any individual submission."}]},{"id":"bulk-content-upload","name":"Quick Add & Bulk Content Upload","tagline":"Publish a whole course of files in minutes","description":"Two accelerators for content migration. Quick Add lets authors drop many files and links into a chapter at once — PDFs, docs, videos, audio, YouTube links, web links, code editors, notebooks and presentations — all published in one go. The Bulk Content Upload wizard ingests an entire zip or CSV manifest whose folder structure maps to Subjects, Modules and Chapters, previews the resulting course tree, then creates everything automatically — even across multiple courses in one upload.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Quick Add for chapters","description":"Drag in multiple files and links; each becomes a correctly-typed, auto-titled, instantly published slide."},{"name":"Zip-based course import","description":"Upload a zip whose folders mirror your course depth (Subject/Module/Chapter); files inside become slides in the right place."},{"name":"CSV manifest import","description":"Alternatively drive the import from a CSV listing titles, types and URLs, with built-in validation results and help."},{"name":"Multi-course upload","description":"One zip can carry several courses at once, each in its own top-level folder."},{"name":"Video-link list files","description":"Plain text files of YouTube or video URLs expand into individual video slides with sensible titles."},{"name":"Preview and issue checking","description":"A preview tree shows exactly what will be created, with warnings for misplaced or skipped files before you commit."},{"name":"Progress and results report","description":"Watch the import run step by step and get a results summary of everything created."},{"name":"Sample zip download","description":"Download a sample zip that demonstrates the expected folder conventions."}]},{"id":"drip-content","name":"Drip Content & Prerequisites","tagline":"Unlock content by date, progress or prerequisites","description":"Control exactly when learners can access content. Drip rules apply at course, chapter or individual-slide level and unlock content on a calendar date, after completion thresholds, after specific prerequisite chapters or slides, or strictly in sequence. Learners see locked items with clear unlock requirements, guiding them through a structured path that unlocks automatically as they progress.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Date-based unlock","description":"Release a chapter or slide automatically on a chosen date and time."},{"name":"Completion-based unlock","description":"Unlock content when a learner reaches a completion threshold, including averages over the last N items."},{"name":"Prerequisite rules","description":"Require specific chapters or slides to be finished to a threshold before new content opens."},{"name":"Sequential learning","description":"Force learners to complete the previous item before moving on."},{"name":"Three levels of control","description":"Configure drip at whole-course, chapter or individual-slide level, each with its own dialog and enable toggle."},{"name":"Locked badges and unlock requirements","description":"Locked items show a lock indicator in the course tree, and learners see exactly what they must complete to unlock the next piece of content."}]},{"id":"certificates","name":"Certificates: Designer, Auto-Issue & Bulk Generation","tagline":"Design once — certificates issue themselves","description":"Design completion certificates visually with no designer needed: start from a template gallery, customize in a drag-and-drop editor or drop to HTML for full control, or upload your own PDF design and place data fields exactly where they belong. Certificates then issue automatically the moment a learner crosses the completion threshold — celebrated in-app with confetti, downloadable from the course page, and emailed with the PDF attached. Bulk generation personalizes hundreds of certificates at once from a batch or CSV.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Template gallery","description":"Start from professionally designed built-in certificate templates."},{"name":"Visual drag-and-drop editor","description":"Design text, images and layout in a visual editor with a customization panel."},{"name":"HTML mode","description":"Drop to full HTML editing for pixel-perfect branded certificates."},{"name":"Upload your own PDF design","description":"Use an existing certificate design as the template by uploading it as a PDF."},{"name":"Drag-and-drop field placement","description":"Place name, email and any custom CSV column onto the exact spot on the certificate with a visual field palette."},{"name":"Student data from batch or CSV","description":"Pull learners from an enrolled batch or upload a CSV (with a downloadable template) and get validation results before generating."},{"name":"Live per-student preview","description":"Preview exactly how any individual learner's certificate will look before generation."},{"name":"Bulk generation and download","description":"Generate personalized certificates for a whole batch at once and download the PDFs plus a generation summary."},{"name":"Auto-issue on course completion","description":"Certificates generate automatically with the learner's name and course details once completion passes the institute-set threshold."},{"name":"In-app celebration, view and download","description":"A completion banner with confetti celebrates the milestone, and learners view and download their certificate from the course page."},{"name":"Automatic certificate emails","description":"Every issued certificate is recorded and delivered to the learner by branded email with the PDF attached."}]},{"id":"learner-home-dashboard","name":"Learner Home Dashboard","tagline":"Everything a learner needs on one personalized screen","description":"The learner's landing page brings together courses, live classes, tests, progress, attendance and announcements in one place. Institutes control exactly which widgets appear, so every brand shapes its own home experience — including a gamified 'Play' theme for younger audiences.","roles":["Learner","Admin"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Continue Learning card","description":"One-tap resume that takes the learner straight back to the exact lesson slide they last studied."},{"name":"Learning stats cards","description":"At-a-glance counters for enrolled courses, assigned tests and upcoming live sessions."},{"name":"Upcoming live classes widget","description":"Today's and upcoming live sessions with join buttons, all converted to the learner's own timezone."},{"name":"Weekly attendance widget","description":"The learner's live-class attendance for the week (present / absent / pending) right on the home screen."},{"name":"Past learning insights","description":"A 7-day activity view with charts showing how much the learner studied recently."},{"name":"Pinned announcements panel","description":"Institute announcements pinned by admins appear at the top of the dashboard."},{"name":"Raise a query card","description":"Learners can raise a support query to the institute directly from the dashboard."},{"name":"Gamification panel","description":"Streak counter, XP display, level progress ring and achievement badges appear when gamification is enabled."},{"name":"Membership, books and orders widgets","description":"Optional widgets showing the learner's active membership, purchased books and materials, and order history."},{"name":"Institute-configurable widget layout","description":"Admins choose per institute which dashboard widgets learners see, including alternative hero styles and a kid-friendly Play theme."},{"name":"Terms acceptance prompt","description":"A first-login modal captures the learner's acceptance of the institute's terms and conditions."},{"name":"Notifications preview","description":"Recent notifications listed on the dashboard with a link to the full notification center."}]},{"id":"course-approval-workflow","name":"Course Approval Workflow","tagline":"Teachers author, admins approve — quality stays controlled","description":"Require editorial review before courses go live. Teachers author courses or create an editable copy of a live course, submit for review, and can withdraw a submission. Admins get a pending-review dashboard where they approve or reject with full course history and an approval summary — so published content is always vetted, and the live version stays untouched until approval.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Teacher-authored courses","description":"Teachers create their own courses and track them in an authored-courses tab with detailed status."},{"name":"Editable copies of live courses","description":"Teachers edit a safe copy of a published course; the live version stays untouched until approval."},{"name":"Submit and withdraw for review","description":"Send a course for review or pull it back; an edit-permission check tells teachers when a course is locked."},{"name":"Admin approval dashboard","description":"Admins see all courses pending review, open full review details, and approve or reject with reasons."},{"name":"Approval history and summary","description":"Every course keeps an approval history, and a summary view shows the institute's review pipeline at a glance."},{"name":"In-review protection","description":"Slides under review are guarded against conflicting edits."}]},{"id":"content-reuse","name":"Content Copy & Reuse Across Batches","tagline":"Build once, reuse everywhere — with lineage tracking","description":"Copy whole course content between batches, sessions and courses, so new intakes start from proven material. The platform records copy lineage, showing where a batch's content originally came from, and copy or move is available at every level: course, session, subject, module, chapter and slide.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Copy whole course content","description":"Duplicate a batch's full content tree into another batch or course in one operation."},{"name":"Copy lineage badge","description":"See the ancestry of copied content — which batch it was copied from — right on the course page."},{"name":"Granular copy and move","description":"Copy or move individual subjects, chapters and slides between any location in the library."},{"name":"Copy content during course creation","description":"Start a new course by copying content from an existing one via a guided dialog."}]},{"id":"scorm-import","name":"SCORM Course Import","tagline":"Your existing SCORM e-learning works out of the box","description":"Institutes with existing e-learning content can upload SCORM packages as slides. The platform hosts and plays each package and records learner progress and completion back into the course, so legacy content plugs straight into the modern LMS.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web"],"subFeatures":[{"name":"SCORM package upload","description":"Upload a SCORM zip; it is unpacked, hosted and playable as a slide."},{"name":"Progress tracking","description":"Learner sessions record SCORM tracking data, so scores and completion flow into course progress."},{"name":"SCORM preview","description":"Authors preview the package inside the editor before publishing."}]},{"id":"audio-lessons","name":"Audio Lessons","tagline":"Podcast-style audio as first-class course content","description":"Upload audio files as slides for language drills, lectures or podcast-style lessons. Audio plays in a dedicated in-course player with progress tracked like any other slide, and follows the same draft-and-publish lifecycle as all content.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Audio upload and player","description":"Upload audio files which learners play in an in-course audio player with progress tracking."},{"name":"Draft and publish for audio","description":"Audio slides follow the same draft/publish lifecycle as other content."}]},{"id":"whiteboard-presentations","name":"Interactive Presentation & Whiteboard Slides","tagline":"Draw, present and teach on an infinite canvas","description":"Presentation slides open an infinite whiteboard canvas where teachers sketch diagrams, drawings and full slide decks. The same presentations can be used live through the presentation client, bridging course content and classroom teaching.","roles":["Admin","Teacher"],"platforms":["Admin Web","Engage Client"],"subFeatures":[{"name":"Whiteboard-style presentation editor","description":"Create presentation slides on a freeform drawing canvas with shapes, text and sketches."},{"name":"Create presentations from the library","description":"Spin up a new interactive presentation directly from the study library for use in live teaching."}]},{"id":"study-material-library","name":"Study Material File Library","tagline":"Organized folders of study docs with audience control","description":"Beyond courses, staff maintain a folder-based library of standalone study documents. Upload files or create study docs in-app, organize them into folders, and control whether each document is visible to learners, staff only, or both.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web"],"subFeatures":[{"name":"Folders","description":"Create, list and delete folders to organize study materials."},{"name":"Upload or create study docs","description":"Upload existing files or author new study documents directly in the app, singly or in bulk."},{"name":"Audience-based access","description":"Set each document's visibility to Learner, Admin or Both."}]},{"id":"course-settings","name":"Course Settings & Authoring Policies","tagline":"Institute-wide rules for how courses get built","description":"Define how course creation behaves across the institute: which detail fields are required, the default and fixed course depth, whether sessions and levels are used, default view mode, and how finished courses reach the public catalogue. Per-course settings panels add workflow automation triggers, sub-organization sharing, offer pricing defaults and external LMS connections.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Required-field policies","description":"Choose which course information fields are mandatory or enabled, from descriptions to banner images and promo media."},{"name":"Structure defaults","description":"Set the default course depth, lock it institute-wide, enable or disable sessions and levels, and set the default view mode and outline state."},{"name":"Catalogue publishing mode","description":"Decide whether finished courses go to the public catalogue automatically, manually, or with a prompt each time."},{"name":"Learner creation permissions","description":"Optionally allow learners to create courses, and control whether payment, discount and referral options can be changed per course."},{"name":"Per-course settings editor","description":"Override institute defaults for a single course through a dedicated settings panel."},{"name":"Workflow triggers per course","description":"Attach automation workflows to course events (e.g. on enrollment) and manage the triggers from the course settings panel."},{"name":"Sub-organization sharing","description":"Associate a course's batches with sub-organizations for franchise or multi-branch setups."},{"name":"External LMS connections","description":"Connect a course to an external LMS — LearnDash, Moodle or any custom LMS — with a saved connection library and one-click connection tests; Vacademy's built-in LMS needs no setup."},{"name":"Offer pricing and rounding defaults","description":"Configure offer pricing with automatic rounding rules for clean price points."}]},{"id":"content-protection","name":"Content Protection","tagline":"Keep your paid content from walking out the door","description":"Per-role content protection controls make it harder to copy or leak your study material. Configure protections separately for Admins, Teachers and Learners, control who may download slides and documents role by role, and rely on in-viewer protection plus a mobile privacy screen against screenshots.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Per-role protection profiles","description":"Enable protection rules separately for Admin, Teacher, Learner and other roles."},{"name":"In-viewer copy protection","description":"Protect slide content from copying inside the study viewer."},{"name":"Slide download control","description":"Decide role by role who may download slides and documents."},{"name":"Mobile privacy screen","description":"The mobile app adds a privacy screen that guards content against screenshots."}]}]},{"id":"assessments","name":"Assessments & Evaluation","icon":"assess","color":"#7C3AED","tagline":"Every exam format — online, offline, OMR — with manual and AI grading","description":"A complete examination engine that takes institutes from question authoring to published results — online exams, mock tests, practice papers, homework, surveys and pen-and-paper tests all run on the same platform. Staff build papers from a rich question-type library or import them from Word, control exactly who takes each test, monitor exams live, and grade with manual tools or AI that evaluates handwritten answer sheets in minutes. Learners get a resilient exam experience on web, mobile and desktop, followed by detailed report cards with peer comparison and leaderboards.","features":[{"id":"assessment-creation-wizard","name":"Assessment Creation Wizard","tagline":"Build any exam in four guided steps","description":"A step-by-step wizard walks staff through creating an assessment: basic details, questions and sections, participants, and access control. It supports multiple assessment types — Exam, Mock, Practice, Survey and Manual-Upload exams where learners submit files instead of answering on screen — each with tailored options. Assessments stay in draft until published, so nothing goes live by accident.","roles":["Admin","Teacher","Assessment Creator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Five assessment types","description":"Choose between Exam, Mock test, Practice test, Survey, and Manual-Upload exam where learners submit PDFs, files or videos instead of answering on screen."},{"name":"Basic details and instructions","description":"Name the assessment, link it to a subject, and write rich-text instructions participants see before starting."},{"name":"Live date window","description":"Define the start and end date/time between which participants can begin and must finish."},{"name":"Timed preview window","description":"Optionally give participants a timed preview to read the paper before the clock starts."},{"name":"Automatic or manual evaluation","description":"Pick instant machine grading, or manual evaluation where teachers grade answer sheets."},{"name":"Submission modes","description":"Choose auto-submit when time expires or manual submit by the learner; manual-upload exams accept PDF, file, live-recorded video or uploaded video submissions."},{"name":"Result release policy","description":"Release results automatically after the exam ends, after each submission, or hold them for manual release."},{"name":"Re-attempt settings","description":"Set a default re-attempt count and optionally let learners raise re-attempt requests for admin approval."},{"name":"Extra-time requests","description":"Optionally let learners request more time during the exam, granted with admin consent."},{"name":"Section switching control","description":"Allow or block participants from moving back and forth between sections during the attempt."},{"name":"OMR mode","description":"Enable OMR-style answering for pen-and-paper tests whose responses are entered later."},{"name":"Duration distribution","description":"Apply the time limit at whole-assessment level, per section, or per question."},{"name":"Draft / publish lifecycle","description":"Assessments stay in draft while being built and publish only when ready; each wizard step tracks its own complete/incomplete status."},{"name":"Public or private visibility","description":"Mark an assessment public (open to anyone via link) or private (restricted to selected learners)."}]},{"id":"question-type-library","name":"Rich Question Type Library","tagline":"Nine question types, from MCQ to live coding","description":"Author questions in a wide range of formats: single-correct MCQ, multiple-correct MCQ, true/false, one-word answer, long answer, fill-in-the-blank, match-the-following, numeric answer, and coding questions graded in the browser against test cases. Comprehension passages group related questions under one shared text, and every question supports formatted text, images and mathematical formulas.","roles":["Admin","Teacher","Assessment Creator"],"platforms":["Admin Web"],"subFeatures":[{"name":"MCQ — single correct","description":"Classic multiple choice with one correct answer."},{"name":"MCQ — multiple correct","description":"Multiple-select questions with support for partial credit."},{"name":"True / False","description":"Quick binary questions."},{"name":"One-word answer","description":"Short free-text answers auto-checked against accepted words."},{"name":"Long answer","description":"Essay-style subjective questions with an answer key for evaluators, graded manually or by AI."},{"name":"Numeric answer","description":"Numeric questions with validation modes: single digit, any integer, positive integer, or decimal."},{"name":"Fill in the blank","description":"Sentence-completion questions with inline blanks."},{"name":"Match the following","description":"Pair items across two columns."},{"name":"Coding questions","description":"Learners write source code in an in-exam editor; submissions run against test cases and return a verdict with per-test-case results."},{"name":"Comprehension groups","description":"Attach a shared passage to sets of single-correct, multiple-correct or numeric questions."},{"name":"Rich content everywhere","description":"Question text, options and explanations support formatted text, images and mathematical formulas."},{"name":"Per-question evaluation mode","description":"Each question is marked for automatic or manual evaluation, so mixed papers grade the objective part instantly."}]},{"id":"ai-answer-sheet-evaluation","name":"AI Answer-Sheet Evaluation","tagline":"AI grades whole batches of answer sheets in minutes","description":"Upload scanned answer sheets and let AI do the grading: the system reads each PDF — including handwriting and math — extracts every answer, applies your marking rubric, and awards question-wise marks with written feedback. Evaluate one learner or a whole classroom in a single run, watch progress live, and review or override any AI mark before results go out. Evaluation time drops from days to minutes while teachers keep the final say.","roles":["Admin","Teacher","Evaluator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Rubric management","description":"Create, edit and delete a marking rubric per assessment, down to individual questions, so the AI grades to your standard."},{"name":"AI-drafted criteria and templates","description":"Ask AI to draft evaluation criteria automatically, or manage a library of reusable criteria templates."},{"name":"Batch evaluation","description":"Select individual students or evaluate many at once, with live per-student status from pending through processing to completed."},{"name":"Handwriting and math reading","description":"The AI reads scanned PDFs including handwritten answers and mathematical notation, rendering math properly in the review view."},{"name":"Live progress tracking","description":"Watch each stage — PDF processing, answer extraction, criteria generation, grading, saving — with per-question statuses while evaluation runs."},{"name":"Annotated answer sheets","description":"The reviewed PDF shows AI annotations and margin notes anchored to the learner's actual writing."},{"name":"Per-student summaries with remarks","description":"Each student gets a consolidated score breakdown and written evaluation summary; evaluators can add their own remarks."},{"name":"Human review and override","description":"Teachers review each AI-graded question and adjust marks before release; a badge flags answers graded before a rubric change."},{"name":"Stop, retry and run history","description":"Stop a running evaluation, retry failures, and browse a history of every AI evaluation run per attempt with its status."},{"name":"Evaluator AI quick portal","description":"A focused portal for teachers who just want papers checked: a trimmed two-step builder for subjective papers, a student roster, batch evaluation and a guided first-time tour."}]},{"id":"manual-evaluation-workspace","name":"Manual Evaluation & Answer-Sheet Checking","tagline":"Grade answer sheets on screen, attempt by attempt","description":"A dedicated evaluation area lists every assessment awaiting grading and walks evaluators through attempts one learner at a time. Evaluators upload or view scanned answer sheets, annotate PDFs directly in the browser, award marks per question, and save partial work as drafts before final submission — with a built-in calculator and progress tracking along the way.","roles":["Admin","Teacher","Evaluator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Evaluation queue","description":"Live, upcoming and past tabs of assessments with a participant sidebar showing who still needs grading."},{"name":"Answer sheet upload","description":"Upload a learner's scanned answer sheet against their attempt for evaluation."},{"name":"PDF annotation editor","description":"Mark up scanned answer sheets directly in the browser, with the ability to reset annotations before confirming."},{"name":"Per-question marks entry","description":"Award marks question-by-question against the answer key and maximum marks, with totals computed automatically."},{"name":"Built-in calculator","description":"A calculator overlay for totalling marks without leaving the sheet."},{"name":"Evaluation drafts","description":"Save grading progress as a draft, resume later, or discard it."},{"name":"Update marks and attempts","description":"Correct previously submitted marks at question or attempt level."},{"name":"All-attempts view","description":"See every attempt of an assessment with its evaluation status in one list."},{"name":"Evaluator progress tracking","description":"See pages reviewed, questions not yet visited, total marks awarded and time spent on each evaluation."},{"name":"Quick checking setup","description":"Spin up a lightweight assessment with sections purely for answer-sheet checking, with AI-assisted publishing."}]},{"id":"learner-exam-experience","name":"Learner Exam Experience","tagline":"A serious exam hall on any device","description":"Learners take scheduled and practice assessments in a purpose-built exam interface with sections, multi-level timers, a question palette and auto-submission. Answers stream continuously to the server, so crashes and flaky networks lose nothing, and interrupted attempts can be resumed. The same experience runs on web, mobile and desktop apps.","roles":["Learner"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Exam catalog with tabs","description":"Assessment lists organized into live, upcoming, past and attempted tabs, with search and pull-to-refresh."},{"name":"Instructions and timed preview","description":"Learners see exam details, duration, marking information and instructions before starting; where enabled, a timed preview lets them read the paper before the attempt clock starts."},{"name":"Question navigator and list view","description":"A palette showing answered, unanswered and marked questions with one-tap jumps, plus a scrollable full-paper list view."},{"name":"Timers at every level","description":"Assessment-level, section-level and per-question countdowns with automatic submission at expiry."},{"name":"Controlled section switching","description":"Multi-section papers where the institute decides whether learners may move between sections."},{"name":"Autosave and network resilience","description":"Answers and time state stream to the server throughout the attempt, with a live network status indicator protecting learners on unstable connections."},{"name":"Resume interrupted attempts","description":"If the app closes mid-exam, learners rejoin the running attempt and continue exactly where they were."},{"name":"In-exam announcements","description":"Admin broadcasts reach learners mid-exam without interrupting the attempt."},{"name":"Homework and file submissions","description":"Manual-upload assessments accept file, PDF or video submissions that learners mark complete."},{"name":"Re-attempt and extra-time requests","description":"Where allowed, learners request another attempt or more time and admins approve from the monitoring console."},{"name":"Attention tracking","description":"The exam screen records tab-switch and visibility events as part of the attempt data available to the institute."}]},{"id":"live-exam-monitoring","name":"Live Exam Monitoring & Submissions Console","tagline":"Watch, extend, close and manage attempts in real time","description":"While an exam runs, staff see participants grouped into Attempted, Ongoing and Pending tabs with live counters, search and filters. Individual and bulk actions cover the whole exam-day toolkit: extend time, force-close submissions, remove participants, send reminders, grant re-attempts and release results.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Attempt status tabs","description":"Participants split into Attempted, Ongoing and Pending lists with a live summary strip and counters."},{"name":"Increase time","description":"Add extra minutes to ongoing attempts, individually or in bulk."},{"name":"Close submissions","description":"Force-submit ongoing attempts, individually or in bulk."},{"name":"Grant re-attempts","description":"Give selected learners another attempt after they have submitted."},{"name":"Remove participants","description":"Take pending participants off the exam roster in bulk."},{"name":"Send reminders","description":"Nudge pending participants who have not started yet."},{"name":"Release results","description":"Release results per learner, in bulk, or for the entire assessment when set to manual release."},{"name":"Search and filters","description":"Find participants by name and filter each tab before applying bulk actions."}]},{"id":"question-paper-bank","name":"Question Paper Bank","tagline":"A searchable, taggable library of reusable papers","description":"Every question paper lives in a central bank where staff can search, filter, favourite and reuse it across assessments. Papers are organised by level, subject and tags, and a public community bank lets institutes pull shared papers into their private collection with one click — protecting institute IP while making reuse effortless.","roles":["Admin","Teacher","Assessment Creator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Create and edit papers","description":"Author papers question-by-question in the editor, edit titles and metadata later, and preview the full paper at any time."},{"name":"Filters and search","description":"Filter the bank by level, subject and tags, search by name, and narrow by creation date range."},{"name":"Favourites","description":"Star frequently used papers into a separate Favourites view."},{"name":"Question tags","description":"Tag questions and papers for topic-wise organisation and retrieval."},{"name":"Public question bank","description":"Browse a public community bank of shared question papers with the same filters."},{"name":"Copy public papers to private","description":"One click imports a public paper into the institute's private bank for editing and use."},{"name":"Archive papers","description":"Remove outdated papers from the active bank without touching past assessments."},{"name":"Question selector","description":"Pick individual questions from existing papers when assembling a new assessment section."}]},{"id":"docx-question-import","name":"Word / DOCX Question Import","tagline":"Turn a Word file into a digital question paper","description":"Upload a question paper written in Microsoft Word and the platform converts it into structured digital questions automatically — options, correct answers, explanations, tags, images and mathematical formulas included. Simple markers tell the importer where questions, options and answers begin, comprehension passages come across intact, and a diagnostics view flags anything that could not be parsed.","roles":["Admin","Teacher","Assessment Creator"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"One-click DOCX conversion","description":"Upload a .docx file and get back fully structured questions with options, answers and explanations, including multi-line question stems."},{"name":"Configurable markers","description":"Tell the importer which identifiers your paper uses for questions, options and answers so almost any format can be parsed."},{"name":"Question type auto-detection","description":"Based on the answer given, each question is classified automatically: single-choice MCQ, multiple-correct MCQ, numeric, one-word, or long-answer."},{"name":"Comprehension passages","description":"Passage-based sets with sub-questions are imported with the passage attached to every sub-question."},{"name":"Auto-marking setup","description":"Correct answers from the document become auto-evaluation rules, so imported papers are instantly auto-gradable."},{"name":"Topic tags from the document","description":"Tag lines around a question are captured as subject tags on that question, deduplicated automatically."},{"name":"Images and formulas preserved","description":"Embedded pictures, diagrams and equation images — including legacy Word formats — are converted to web-friendly formats and hosted so they render on any device."},{"name":"Diagnostics and error reporting","description":"Questions that break the expected format are flagged with a specific reason, so staff fix problems before saving instead of silently corrupting the paper."},{"name":"Preview before save","description":"Review and edit every imported question before the paper is added to the bank."},{"name":"Downloadable format templates","description":"A library of template files shows the exact document format to follow before uploading."}]},{"id":"sections-marking-schemes","name":"Sections & Marking Schemes","tagline":"Flexible sections with fine-grained marking rules","description":"Split any assessment into multiple sections, each with its own description, duration and marking rules. Marking is highly configurable — per-question marks, negative marking, partial credit, cutoff marks and question shuffling can all be set per section, with total marks calculated live as the paper is built.","roles":["Admin","Teacher","Assessment Creator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Multiple sections","description":"Add, reorder, describe and delete sections; attach a different question paper or question set to each."},{"name":"Marks per question","description":"Set default marks per question for a section, then fine-tune question-by-question with adaptive marking."},{"name":"Negative marking","description":"Switch on negative marking per section and set how many marks are deducted for wrong answers."},{"name":"Partial marking","description":"Award partial credit on multi-select questions where the learner gets some options right."},{"name":"Cutoff marks","description":"Define a per-section cutoff score for pass and qualification decisions."},{"name":"Question randomization","description":"Shuffle question order per participant to deter copying."},{"name":"Section-wise duration","description":"Give each section its own time budget when duration is distributed by section or question."},{"name":"Live total-marks calculation","description":"The builder totals marks across sections in real time so the paper always adds up."}]},{"id":"participant-registration","name":"Participant Management & Open Registration","tagline":"Closed batch exams or open public tests","description":"Decide exactly who can take each assessment. Closed tests are assigned to selected batches or individual learners; open tests get a shareable public link and QR code with a custom registration form, so anyone can sign up — ideal for scholarship tests and lead-generation exams. Registration windows, form fields and participant lists are all under staff control.","roles":["Admin","Teacher","Counsellor","Learner","Parent"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Closed tests by batch","description":"Assign the assessment to one or more batches so every enrolled learner is pre-registered."},{"name":"Closed tests by learner","description":"Hand-pick individual learners from the institute roster."},{"name":"Bulk batch registration","description":"Register whole batches to an assessment in one operation."},{"name":"Open public tests with link and QR","description":"Generate a public join link and downloadable QR code so anyone can register and take the test."},{"name":"Custom registration form","description":"Build the open-registration form with text and dropdown fields, mark fields required, and drag to reorder them."},{"name":"Registration window","description":"Set registration open and close dates independently of the exam window, plus registration instructions."},{"name":"Public assessment page","description":"Every open assessment gets a shareable page, addressed by a short code, showing the exam name, schedule and instructions where prospects self-register instantly."},{"name":"Participant status check","description":"Registrants can look up whether their registration and attempt are confirmed."},{"name":"Registered participants list","description":"View, filter and export everyone registered, including their registration source: admin pre-registration, batch, or open link."},{"name":"Expected participants","description":"Record expected participant counts for planning open tests."}]},{"id":"learner-results-report-cards","name":"Learner Results & Report Cards","tagline":"Rich post-exam reports learners can download","description":"After results release, learners get a detailed report: score breakdown, peer comparison, leaderboard position, and how the rest of the cohort answered each question. Reports download as formatted PDFs, or as AI-narrated report cards with written feedback on the attempt.","roles":["Learner","Parent"],"platforms":["Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Report list and detail","description":"Learners see all their assessment reports and open question-wise detail for any attempt."},{"name":"Peer comparison","description":"Compare personal performance against batch averages and toppers."},{"name":"Leaderboard","description":"Where enabled by the institute, learners view the assessment leaderboard."},{"name":"Option distribution","description":"See what percentage of peers picked each option on every question."},{"name":"PDF report download","description":"Download the report as a formatted PDF."},{"name":"AI report card","description":"Generate an AI-written PDF report with narrative feedback on the attempt."}]},{"id":"re-evaluation-engine","name":"Re-evaluation Engine","tagline":"Regrade anything after marking-scheme changes","description":"If an answer key or marking rule changes after the exam, staff trigger re-evaluation at any granularity: the entire assessment, selected participants, or specific participants on specific questions. Every evaluation change is recorded in an audit log for accountability.","roles":["Admin","Teacher","Evaluator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Full assessment re-evaluation","description":"Regrade every attempt of the assessment in one action."},{"name":"Participant-level re-evaluation","description":"Regrade only the selected learners' attempts."},{"name":"Question-wise re-evaluation","description":"Regrade chosen questions for chosen participants — ideal after an answer-key correction."},{"name":"Evaluation audit log","description":"A per-assessment log records manual evaluation and regrade events for accountability."}]},{"id":"omr-offline-entry","name":"Offline / OMR Response Entry","tagline":"Digitise pen-and-paper exam responses fast","description":"For exams conducted on paper, staff enter learner responses into the platform afterwards and get the full digital stack — grading, leaderboards and reports — as if the exam were online. Entry works question-by-question or in a fast spreadsheet-style table view.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Create offline attempts","description":"Pick a learner and create an attempt on their behalf for the offline exam."},{"name":"Question-by-question entry","description":"A question navigator with a response form for careful data entry, rendering the original rich question content."},{"name":"Table entry mode","description":"A spreadsheet-like grid to enter many responses quickly."},{"name":"One-shot create-and-submit","description":"Create the attempt and submit all responses in a single step."},{"name":"Automatic grading of entered data","description":"Entered responses are graded by the same engine, feeding results, ranks and analytics."},{"name":"Institute-level offline entry setting","description":"Turn manual marks entry for offline and paper assessments on or off across the institute."}]},{"id":"surveys-feedback-forms","name":"Surveys & Feedback Forms","tagline":"Collect and analyse responses like a survey pro","description":"The same builder powers unscored surveys: send questionnaires to batches or the public and analyse results in a dedicated dashboard. Staff view aggregate distributions per question, drill into individual respondents, and export the respondent list.","roles":["Admin","Teacher","Counsellor","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"Survey builder","description":"Create surveys with the standard question types, sections, open or closed distribution and custom registration forms — with marking hidden since surveys are unscored."},{"name":"Survey overview analytics","description":"Per-question response distributions with charts and completion metrics."},{"name":"Question-wise responses","description":"Inspect all answers to a single question across respondents."},{"name":"Respondent-wise view","description":"Open one respondent and read their entire submission."},{"name":"Respondent exports","description":"Export the respondent list as CSV or PDF."},{"name":"Survey access control","description":"Separate staff access lists for survey creation, live notifications, submissions and reports."}]},{"id":"question-paper-export-printing","name":"Question Paper Export & Printing","tagline":"Print-ready papers with your formatting rules","description":"Export any question paper or assessment as a print-ready PDF for offline exams. Layout, typography and answer-space options are configurable, and multiple paper sets can be produced for anti-cheating distribution in exam halls.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Print settings","description":"Control layout, font size and whether images keep their aspect ratio."},{"name":"Custom header fields","description":"Add custom input fields such as name and roll number, plus an optional question-set code, to the printed paper."},{"name":"Answer spacing","description":"Configure blank answer space under each question for written exams."},{"name":"Multiple paper sets","description":"Generate several sets of the same paper for anti-cheating distribution in exam halls."},{"name":"Preview and export","description":"Preview the final formatted paper on screen before downloading the PDF."}]},{"id":"exam-notifications-reminders","name":"Exam Notifications & Reminders","tagline":"Automatic alerts to learners and parents","description":"The platform notifies participants — and optionally their parents — at every stage of an assessment: when it is created, shortly before it goes live, the moment it starts, and when reports are ready. Scheduled jobs send these automatically across email, WhatsApp and push, and staff can fire manual reminders to learners who have not attempted yet.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Learner notifications","description":"Opt-in notifications when the assessment is created, before it goes live with a configurable lead time, when it goes live, and when the report is generated."},{"name":"Parent notifications","description":"The same notification set can be sent to parents independently of learners."},{"name":"Automated scheduling","description":"An hourly scheduler sends upcoming and started notifications without any manual work."},{"name":"Manual reminders","description":"Select pending participants who have not attempted and send them a reminder in bulk."},{"name":"Multi-channel delivery","description":"Notifications go out over email, WhatsApp and push notifications."},{"name":"Result notification recipients","description":"Configure which recipients — learner, parents, staff — are notified when results release."}]},{"id":"assessment-access-control","name":"Assessment Access Control & Collaboration","tagline":"Decide which staff can create, watch and grade","description":"Per-assessment permissions let institutes split duties across the team. Separate access lists control who can edit the assessment, who gets live-exam alerts, who can see submissions and reports, and who participates in evaluation — assigned by role or by inviting individual staff.","roles":["Admin","Teacher","Evaluator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Creation access","description":"Grant specific roles or users the right to edit the assessment setup."},{"name":"Live notification access","description":"Choose who is alerted while the exam is running."},{"name":"Submission and report access","description":"Control who can open submissions and analytics for each assessment."},{"name":"Evaluation access","description":"Assign the evaluators allowed to grade answer sheets."},{"name":"Invite institute users","description":"Search existing staff by role and add them to any access list; filter and revoke invitations."}]},{"id":"course-embedded-assessments","name":"Assessments & Quizzes Inside Courses","tagline":"Full tests and instant quizzes in the course flow","description":"Embed a complete test from the assessment engine into any course chapter — link an existing assessment or create a new one without leaving the course editor — and review learner submissions right beside the content. Chapter quizzes give learners timers, attempt limits, instant scorecards and a full answer-review mode.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Link existing assessment","description":"Place any assessment already built in the institute as a slide in the course."},{"name":"Create assessment in place","description":"Open a create-assessment form from within the course editor and attach the new test immediately."},{"name":"Submissions panel","description":"Review learner attempts and results for the embedded assessment directly from the slide view."},{"name":"Quiz timer with warnings","description":"Countdown timer with an on-screen warning; the quiz auto-submits when time expires."},{"name":"Attempt limits","description":"Cap re-attempts per quiz; once attempts are exhausted the learner moves to review mode."},{"name":"Instant scorecard","description":"A score summary appears immediately after submission."},{"name":"Answer review mode","description":"Learners revisit each question to see their answer, the correct answer and explanations."},{"name":"Attempt history","description":"Past attempts are stored and viewable, so learners can track improvement."}]},{"id":"assessment-organization","name":"Assessment & Homework Organization","tagline":"Every test and homework organised by status at a glance","description":"The assessments home organises everything into Live, Upcoming, Previous and Draft tabs with search, filters and per-row quick actions. A dedicated homework area gives the same status-based view for homework tests, with creation running through the standard wizard pre-set to homework mode.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Status tabs","description":"Live, Upcoming, Previous and Draft tabs keep the assessment list manageable."},{"name":"Filters and search","description":"Filter by batch, subject and other attributes; search assessments by name."},{"name":"Quick actions menu","description":"Per-assessment menu for editing, viewing details and submissions, exporting the paper, and deleting."}
