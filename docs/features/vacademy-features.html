es dedicated calling analytics: daily dial, connect and talk-time trends, a per-counsellor breakdown with outcome counts, a day-of-week by hour heatmap showing when calls actually connect, and a follow-up aging view. Every report respects each viewer's team scope.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Daily calling series","description":"Day-by-day dials, connects and talk time over any date range, with a per-counsellor breakdown including outcome counts."},{"name":"Connect-time heatmap","description":"A day-of-week × hour-of-day grid of dials and connects (in the institute's timezone), revealing the golden hours to call."},{"name":"Follow-up aging report","description":"See how long overdue follow-ups have been waiting, so managers clear the backlog before leads go cold."},{"name":"Calls-per-day sales widget","description":"A calls-per-day widget on the sales dashboard keeps daily calling activity in front of the team."},{"name":"Role-scoped reporting","description":"Every report is automatically scoped: a counsellor sees their own numbers, a team head their team's, leadership the whole institute."}]},{"id":"off-platform-call-upload","name":"Off-Platform Call Upload","tagline":"Made the call on your own phone? Upload it","description":"Counsellors who call a lead from a personal phone or another system can upload the recording afterwards. The call joins the universal call record against the right lead — with direction, duration and time — and, if Call Intelligence is on, gets transcribed and analyzed exactly like a platform call.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Recording upload dialog","description":"Upload an audio file against a lead with optional direction, duration, counterparty number and call time; the uploader becomes the call's counsellor unless another is chosen."},{"name":"Joins the universal call log","description":"Uploaded calls appear in the same call log, lead history and reports as provider calls — nothing lives in a side spreadsheet."},{"name":"Same AI analysis pipeline","description":"Uploaded recordings flow through the identical transcription, scoring and coaching analysis as live calls."}]},{"id":"per-minute-billing","name":"Per-Minute Call Billing & Credit Metering","tagline":"Transparent pay-per-minute billing from your credit wallet","description":"Calls carried on Vacademy's telephony bill by the minute against the institute's credit wallet, with separate meters for human voice minutes and AI conversation minutes, inbound and outbound. Rates can be tailored per institute, every charge is applied exactly once, and an automatic reconciliation sweep guarantees no call is missed or double-billed.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Four independent meters","description":"Outbound voice, inbound voice, outbound AI-conversation and inbound AI-conversation minutes are metered separately — an outbound AI call pays voice + AI, while an inbound call answered by a human pays voice only."},{"name":"Only Vacademy-carried calls billed","description":"Calls on the institute's own provider account (Exotel, Airtel) and uploaded recordings are never metered — only minutes on Vacademy-provided lines."},{"name":"Per-institute rate flexibility","description":"Standard per-minute credit rates with per-institute overrides per meter and a per-call minimum charge; minutes round up."},{"name":"Guaranteed exactly-once charging","description":"Every charge is applied exactly once, completed calls are stamped when billed, and a reconciliation job retries any charge lost to a transient failure."},{"name":"Channel-day rental support","description":"The billing model also supports per-channel per-day rental pricing for reserved concurrent-call capacity."}]}]},{"id":"ai","name":"Vacademy AI","icon":"ai","color":"#9333EA","tagline":"AI that builds courses, coaches teachers and tutors learners","description":"Vacademy AI puts a full team of AI assistants inside your institute: course builders that turn a single prompt into publish-ready courses, copilots that convert every lecture into notes, quizzes and exam papers, and a branded 24/7 tutor for learners. Everything is governed from one place — choose the AI models that power each job, control exactly where AI appears, and see every credit spent down to the individual conversation.","features":[{"id":"ai-course-builder","name":"AI Course Builder","tagline":"From one prompt to a publish-ready course","description":"Describe the course you want and the AI drafts the whole thing — structure, lesson pages, diagrams, videos, quizzes and homework — ready to review and publish into your study library. Ground the entire course in your own reference PDFs and web pages so content reflects your actual syllabus, and fine-tune everything from chapter count to video voice before generating. What used to take a semester of production ships in an afternoon.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Prompt-based course creation","description":"Type what you want to teach (with clickable example prompts) and get a full course outline plus content. Optional course-goal and learning-outcome fields sharpen the result."},{"name":"Audience targeting","description":"Set learner age range, skill level and course language so difficulty and tone match your students."},{"name":"Reference material grounding","description":"Attach reference PDFs and website URLs (with built-in page scraping) so the AI writes from your actual material — including real figures pulled from your PDFs — instead of generic knowledge."},{"name":"Prerequisite files and links","description":"Add documents and URLs describing what learners should already know, so the course starts at the right level."},{"name":"Structure controls","description":"Choose the number of subjects, modules and chapters, slides per chapter, chapter length in minutes, and overall course depth on a slider."},{"name":"Content-type toggles","description":"Switch on diagrams, code snippets (with programming-language choice), practice problems, curated YouTube videos, AI-generated videos, AI slide decks, AI storybooks, quizzes, homework and worked solutions per course."},{"name":"AI model choice and bring-your-own keys","description":"Pick a specific AI model or leave it on Auto; optionally supply your own OpenAI or Gemini API keys so generation runs on your accounts."},{"name":"Cost preview and confirmation","description":"See the exact credit cost before you commit, with a confirmation dialog showing current usage."},{"name":"Automatic draft resume","description":"In-progress course drafts save automatically; resume or discard a saved draft next time you open the builder."}]},{"id":"ai-outline-editor","name":"AI Outline Editor & Copilot","tagline":"Review, rearrange and regenerate every AI page before publishing","description":"Every AI-drafted course lands in a split-view workspace: the full course hierarchy on one side, a live content editor on the other. Rearrange chapters and pages by drag and drop, inspect and refine the AI prompt behind every planned page, rewrite or regenerate anything you're not happy with, and watch the rest of the course generate in the background — then create the real course in one click.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"One-prompt course outlines","description":"Generate a structured outline of sessions and pages — objectives, topic explanations, quizzes, homework and solutions — from a plain course description."},{"name":"Interactive outline tree","description":"Browse the generated course as chapters and pages; rename, delete or regenerate any chapter or individual page inline."},{"name":"Drag-and-drop restructuring","description":"Reorder chapters and pages by dragging; the final course is created in exactly the order you arrange."},{"name":"Rich page-type palette","description":"Generated pages span learning objectives, topic pages, documents, PDFs, images, quizzes, assessments, homework, solutions, assignments, videos, AI videos, AI slide decks, AI storybooks, code-explainer videos, live code editors, notebooks and visual coding blocks."},{"name":"Per-page AI prompts","description":"Every planned page carries an editable generation prompt you can inspect and refine before content is created."},{"name":"In-place content editing","description":"Edit any page in a rich editor with auto-rendered flowchart diagrams, embedded YouTube players, images and media replacement."},{"name":"Per-page regeneration","description":"Regenerate a single page — or just its video or code section — with a fresh AI pass."},{"name":"Regenerate with feedback","description":"Give the AI corrective instructions and regenerate the outline without starting over."},{"name":"Background generation with progress","description":"Page content generates in the background with per-page and per-chapter progress indicators, so you keep editing while the rest fills in."},{"name":"Course metadata editing","description":"Adjust course title, description and other details before the course is created."},{"name":"One-click publish to study library","description":"Turn the approved draft into a real course with subjects, modules, chapters and pages in your study library."}]},{"id":"learner-ai-tutor","name":"Learner AI Tutor","tagline":"A 24/7 branded tutor that knows what each learner studies","description":"A built-in AI tutor rides along on every learner screen, aware of the course and lesson currently open. It explains concepts, summarizes lessons, generates practice quizzes with instant feedback, and runs full voice conversations — including AI-led mock interviews and oral tests in the learner's language. Admins design the tutor completely: its name, personality, hard rules, chat modes, voices and exactly which pages it appears on.","roles":["Learner","Admin"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App","Public Web","Admin Web"],"subFeatures":[{"name":"Context-aware chat","description":"The tutor knows the current lesson and offers one-tap quick actions like 'Explain this', 'Summarize', 'Quiz me', 'Hint' and 'Learning path'."},{"name":"Practice quizzes in chat","description":"Say 'I want to practice' and the tutor generates a timed quiz, grades the submission, and returns per-question feedback, explanations, a scorecard and study recommendations."},{"name":"Voice conversations","description":"Hands-free voice mode in three formats — voice doubt-solving, AI-led mock interviews and AI oral tests — with language selection and an animated voice avatar."},{"name":"Attachments and math input","description":"Learners attach images and files to questions and use a math toolbar for proper notation."},{"name":"Offline message queue","description":"Messages composed offline are queued and sent automatically when connectivity returns."},{"name":"Tutor persona designer","description":"Name the tutor, set its role (Tutor, Mentor, Guide), institute name, core instruction, hard-rules list, instruction-adherence level and creativity."},{"name":"Six chat mode toggles","description":"Enable or disable General Chat, Ask Doubt, Practice Quiz, Mock Interview, Voice Doubt and Oral Test modes for learners."},{"name":"Voice selection","description":"Choose the male and female voices the tutor speaks with in voice modes."},{"name":"Page visibility control","description":"Decide exactly where the tutor appears: Dashboard, All Courses, Course Details, Study Material — even logged-out catalogue pages."}]},{"id":"instructor-copilot","name":"Instructor Copilot","tagline":"Record a class; get notes, quizzes and homework automatically","description":"A before, during and after companion for every lecture. Record your class live in the browser (or upload the audio) and the copilot transcribes it and generates classroom-ready material: structured notes, a summary, flashcards, a quiz, slide and video ideas, plus the classwork and homework you assigned in class — all downloadable as polished PDFs within minutes of the session ending.","roles":["Teacher","Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Lecture workflow dashboard","description":"Guided Before-Lecture, In-Lecture and After-Lecture views organize preparation, capture and follow-up."},{"name":"Live recording or upload","description":"Record lecture audio directly in the browser or upload a pre-recorded file; automatic speech-to-text transcription follows."},{"name":"Eight generated artifacts per lecture","description":"Transcription, notes, summary, flashcards, quiz, slide ideas, video ideas, plus homework and classwork — each generated from what was actually taught."},{"name":"Configurable quiz generation","description":"Set grade level, question type and language before generating, then download a formatted quiz PDF ready to run as homework."},{"name":"Classwork and homework capture","description":"Tasks and assignments mentioned in class are extracted into numbered lists with completion checkboxes and a due-date field on the homework PDF."},{"name":"Professional PDF downloads","description":"Every artifact exports as a cleanly formatted, printable PDF — notes, summary, quiz, classwork and homework."},{"name":"Lecture log history","description":"Every processed lecture is saved as a log you can reopen, rename, regenerate content for, or delete; failed generations can be retried."},{"name":"Built-in audio player","description":"Replay the lecture recording alongside its generated content."}]},{"id":"lecture-intelligence","name":"Live Class Lecture Intelligence","tagline":"Every recorded class becomes notes, quizzes and exam papers","description":"After a live class is recorded, AI converts it into study assets: a full transcript, polished lecture notes, and complete practice assessments generated from what was actually taught. Export professional printable exam papers with answer keys, or publish everything straight into courses and the assessment center — with your own name, schedule and marking overrides.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web"],"subFeatures":[{"name":"Automatic recording transcription","description":"Kick off transcription for any live-session recording and track its status; stuck jobs are caught and recovered automatically."},{"name":"AI lecture notes","description":"One click turns the transcript into well-structured study notes with headings and images, with copy, download and regenerate options; the latest version is saved with the recording."},{"name":"Assessment generation with question-type control","description":"Generate assessments from the lecture with control over question types: MCQ single-correct, MCQ multiple-correct, true/false, one-word and long-answer."},{"name":"Question-type presets","description":"Ready-made bundles — Only MCQs, MCQs + True/False, MCQs + One Word, Mixed Assessment, Subjective + Objective Mix — for one-click paper composition."},{"name":"Printable exam paper export","description":"Export generated assessments as professional PDF question papers — student copy and answer-key copy — with optional institute letterhead, title, marks and dated footer."},{"name":"Past papers and notes history","description":"Every assessment and notes version generated from a recording is kept in a per-class history for reuse."},{"name":"One-click publish with overrides","description":"Push notes into courses as lesson pages, or publish quizzes to courses or directly to the Assessment Center — as draft or published, with details overridable before going live."},{"name":"Link class materials to chapters","description":"Attach the recording and materials to one or more course chapters so they appear in the learning library, with duplicate protection and a materials history."}]},{"id":"lesson-planner-lecture-coach","name":"AI Lesson Planner & Lecture Coach","tagline":"Plan lectures with AI, then get coached on delivery","description":"Tell the planner your lecture title, topics, class level, teaching style, language and time available, and it drafts a structured, minute-by-minute lesson plan you can edit and export. After class, upload a recording of your delivery and receive a scored evaluation report across eight teaching criteria with concrete, constructive suggestions — ideal for teacher training and self-development.","roles":["Teacher","Admin"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Minute-by-minute lesson plans","description":"Generate a time-boxed, topic-wise lecture timeline that fits your stated duration, class level and language (English or Hindi)."},{"name":"Teaching-style aware content","description":"State your preferred method — storytelling, more examples, and so on — and the plan matches that style."},{"name":"Engagement and homework options","description":"Toggle in mid-lecture questions for engagement and an assignment or homework section at the end."},{"name":"Edit and export","description":"Refine the draft plan in place and export the finished version."},{"name":"Scored delivery feedback","description":"Recorded lectures are evaluated across eight criteria — delivery, content quality, student engagement, assessment, inclusivity, classroom management, teaching aids and professionalism — with a total score."},{"name":"Constructive commentary","description":"Each section carries specific comments and actionable suggestions, plus recognition of strong moments in the lecture."},{"name":"Broad audio support with background processing","description":"Accepts WAV, FLAC, MP3, AAC and M4A recordings; long files and long generations process in the background with automatic retries."},{"name":"PDF report export","description":"Download the full evaluation report as a PDF for peer review or records."},{"name":"Model choice","description":"Pick a preferred AI model or use the institute default, with automatic fallbacks."}]},{"id":"interactive-content-generator","name":"Interactive Content Generator","tagline":"One prompt, thirteen kinds of interactive learning content","description":"One prompt-driven engine produces thirteen kinds of learning content that run right inside the course player — from quizzes and illustrated storybooks to playable games, simulations and code playgrounds. Every format is age-tuned, multilingual, and delivered as ready-to-use interactive material.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","API"],"subFeatures":[{"name":"Quiz","description":"Auto-generated question sets with options, correct answers, explanations, difficulty rating and passing score."},{"name":"Storybook","description":"Page-by-page illustrated stories with per-page illustrations, narration text, age range, themes, learning objectives, interactive touch hotspots, and discussion questions and activities at the back."},{"name":"Interactive game","description":"Self-contained playable games built around the topic, complete with scoring."},{"name":"Puzzle book","description":"A collection of themed puzzles for practice and engagement."},{"name":"Simulation","description":"Physics or economics-style interactive sandboxes learners can manipulate."},{"name":"Flashcards","description":"Spaced-repetition style card decks generated from the topic."},{"name":"Map exploration","description":"Interactive clickable maps for geography and location-based lessons."},{"name":"Worksheet","description":"Printable or interactive homework sheets."},{"name":"Code playground","description":"Interactive coding exercises learners can edit and run."},{"name":"Timeline","description":"Chronological event visualizations for history and process topics."},{"name":"Conversation","description":"Language-learning dialogue content with role-play exchanges."},{"name":"Slides","description":"Presentation decks in classic slide style, generated from a plain prompt."},{"name":"Practice quiz inside chat","description":"The learner tutor detects practice intent, generates a timed quiz on the topic, grades the submission, and returns per-question feedback, score and study recommendations."}]},{"id":"ai-question-paper-generator","name":"AI Question Paper Generator (Vsmart)","tagline":"Question papers from PDFs, photos, audio or a plain prompt","description":"A family of AI tools that produce editable question papers from whatever you have: a PDF or slide deck, a scanned or photographed printed paper, an audio lecture, or just a topic prompt. Every job runs in the background with a task tracker, results land in your question bank, and finished papers export as PDF or DOC or publish straight into an assessment.","roles":["Admin","Teacher","Assessment Creator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Vsmart Upload — paper from documents","description":"Upload PDF, DOC/DOCX or PPT/PPTX and generate a question paper from the whole file or just a pasted section, guided by topics you add."},{"name":"Vsmart Extract — digitize printed papers","description":"Upload a photo, scan or PDF of an existing printed paper; OCR turns it into a digital, editable question set you can save to the question bank."},{"name":"Vsmart Image — questions from pictures","description":"Upload JPG/PNG images of handwritten notes, textbook pages or board work and get questions generated from the extracted text."},{"name":"Vsmart Audio — questions from recordings","description":"Upload WAV, FLAC, MP3, AAC or M4A audio and set number of questions, level, focus topic, question type (MCQ, short answer, descriptive, mixed) and language."},{"name":"Vsmart Topics — questions from a prompt","description":"Describe the coverage you want in plain language and set count, difficulty, chapter and language preferences."},{"name":"Vsmart Chat — refine by chatting","description":"After generation, chat with the AI to modify the paper: add more MCQs, add higher-order questions, simplify a question, or focus on part of the document."},{"name":"Vsmart Organizer — auto-group by topic","description":"Generate questions from a file and have them automatically arranged under topic headings for chapter-wise tests, with drag-to-refine."},{"name":"Vsmart Sorter — prompt-controlled ordering","description":"Sort and reorder generated questions with plain-language instructions like 'put questions 5 and 6 from Plant Nutrition first'."},{"name":"Question configuration","description":"Control how many questions, difficulty, question type (single-choice, multiple-choice and comprehension variants and more) and output language for each generation."},{"name":"Background AI task tracker","description":"All generations run in the background; a My AI Tasks list shows status per job with retry for failures — you can navigate away and come back."},{"name":"Export and reuse","description":"Export finished papers as PDF or DOC question papers (with paper-set formatting), regenerate with a custom prompt, and push questions into assessments."},{"name":"My Resources file library","description":"A personal library of uploaded source files you can re-run tools against without re-uploading."},{"name":"Complete assessment generation","description":"Generate a full, structured assessment (sections, questions, answers) ready to publish into the assessment system."},{"name":"AI model picker","description":"Choose which AI model runs each tool via a model selector backed by the institute's model registry."}]},{"id":"ai-presentation-generator","name":"AI Presentation Generator","tagline":"Complete slide decks written and designed by AI","description":"Generate a full presentation from raw text or data in the language of your choice, then regenerate any individual slide you're not happy with. Output is clean, structured slide content ready to present with the platform's live presentation tools.","roles":["Admin","Teacher"],"platforms":["Admin Web","Engage Client","API"],"subFeatures":[{"name":"Deck from text or data","description":"Paste source text or data and get a fully structured slide deck, with language selection and AI model choice."},{"name":"Single-slide regeneration","description":"Regenerate one slide in place without touching the rest of the deck."},{"name":"Prompt-driven decks","description":"Generate a presentation-style deck straight from a plain prompt — no source document required."}]},{"id":"admin-ai-agent","name":"Admin AI Agent","tagline":"An AI assistant that actually does things in your portal","description":"Chat with an AI agent that understands your institute's data and performs real platform actions on your behalf — looking things up and executing the right operation instead of just answering. It streams replies live, asks clarifying questions when it needs more detail, and always operates within the signed-in user's role and permissions. Admins decide exactly which capabilities each role's assistant gets.","roles":["Admin","Teacher","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Action-taking chat","description":"The agent maps your request to real platform operations and executes them within your institute context and permissions, returning results in the conversation."},{"name":"Live streaming replies","description":"Responses stream in real time, with progress visible while longer actions run."},{"name":"Clarifying-question loop","description":"When the agent needs more information it pauses and asks; you reply in the same thread and it continues."},{"name":"Smart capability matching","description":"The agent understands the platform's full capability set, so a plain-language request finds the right action every time."},{"name":"Secure institute context","description":"The agent operates with the signed-in user's own credentials, so answers and actions respect their role and institute."},{"name":"Conversation history","description":"Agent sessions and messages are stored and reviewable in the AI usage console."},{"name":"Role-based access controls","description":"Grant a baseline toolset to all staff and fine-tune per-role access for advanced tools, so counsellors, teachers and admins each get an assistant matched to their job."}]},{"id":"ai-website-builder","name":"AI Website Builder & Page Copilot","tagline":"Describe your institute; AI builds and edits your website","description":"Type a short brief and the AI composes a complete, on-brand web page — or an entire multi-page site — using your real course catalogue, your images and your chosen page type. Compare multiple design directions side by side, accept the one you like as an editable draft, then keep refining by chat: tell the copilot 'make the hero darker' or 'add a testimonials section' and review each proposed edit before applying. Nothing goes live until you publish.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Brief-to-page generation","description":"Write a plain-language brief, pick a page type — Homepage, Course landing, About us, Admissions, Contact — and receive a fully composed page of real builder sections you can edit normally."},{"name":"Whole-site generation","description":"Toggle 'whole site' to have the AI generate a complete multi-page website in one run."},{"name":"Grounded in your real courses","description":"Optionally grounds the copy in your actual course and batch offerings so generated pages advertise what you really sell — in your institute's own terminology."},{"name":"Your images plus AI images","description":"Upload photos or paste image URLs for the AI to place; optionally let it auto-generate missing images, and generate logo options from a text prompt."},{"name":"Inspiration references","description":"Provide inspiration images or a source website URL to steer the visual direction."},{"name":"Multiple design directions","description":"'Try another direction' regenerates with a distinct angle — editorial-premium, bold conversion-focused, minimal-calm — and every generation lands as a separate variant so drafts are never overwritten."},{"name":"AI brand kit","description":"Derive a brand kit — colors, fonts, theme — and apply it as the site's global theme in one click."},{"name":"Credit estimate before generating","description":"See the AI credit cost up front on the confirmation step."},{"name":"Review before accepting","description":"Inspect the generated section list and preview, then accept to add it as a local draft — nothing goes live until you save and publish."},{"name":"Chat-based page editing","description":"Instructions like 'rewrite the FAQ answers to be friendlier' are turned into a short list of concrete edits — add a section, restyle a block, rewrite copy — applied to the page you are editing."},{"name":"Change preview before apply","description":"Each proposed edit is summarized so you see exactly what will change before accepting."},{"name":"Works with the normal editor","description":"Copilot edits land as regular unsaved changes — undo, tweak manually, save as draft, and publish on your schedule."}]},{"id":"math-document-ocr","name":"Math & Document OCR","tagline":"Equations and figures extracted perfectly from scans and PDFs","description":"Specialized math-aware OCR converts scanned pages and PDFs into clean digital content: handwritten or printed equations become editable math notation, and textbook PDFs become structured pages with real figures and tables preserved. This is what grounds AI course and question generation in your institute's actual materials.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Equation image digitization","description":"Extract editable math notation from an equation image — ideal for digitizing math question banks."},{"name":"PDF to structured content","description":"Full PDFs convert to clean digital pages with math preserved, tables kept as tables, and figures extracted as hosted images."},{"name":"Course grounding from reference PDFs","description":"Uploaded reference PDFs steer AI course outlines and content, and the document's real figures are embedded verbatim into lessons and videos instead of AI-invented ones."},{"name":"Conversion caching","description":"Converted documents are cached, so re-using the same PDF across passes never pays for a second conversion."},{"name":"Layout-aware scanned-document OCR","description":"A high-throughput OCR pipeline with region detection handles scanned documents and complex page layouts."}]},{"id":"ai-model-registry","name":"AI Model Registry & Model Choice","tagline":"Choose which AI brain powers every job","description":"A live catalog of AI models spans Google, Anthropic, OpenAI, DeepSeek and free community models, each tagged with quality and speed scores, pricing and recommended uses. Every AI tool offers a model picker fed from the registry — leave it on Auto or pin a specific model per feature, and even per stage of video production. Platform admins retune defaults and pricing live, with no downtime.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Browsable model catalog","description":"Every model lists its provider, tier (free, standard, premium, ultra), context size, image support, pricing, quality score and speed score — filterable by tier, provider, use case or free-only."},{"name":"Free-tier models","description":"A rotating set of genuinely free models lets users generate at zero model cost."},{"name":"Auto or explicit selection","description":"Every model picker defaults to Auto (recommended) with the option to pin a specific model."},{"name":"Per-use-case defaults with failover","description":"Each use case — content, outlines, video, images, evaluation, copilot, agent, analytics, speech, presentations — has a default, a fallback and a free-tier model, resolved automatically with graceful failover."},{"name":"Per-stage overrides in video production","description":"Override the model for individual video-production stages — shot planning, narration writing, per-scene visuals, act planning and corrective regeneration — or mass-apply one model to all overridable stages; quality-critical review stages stay on vetted defaults."},{"name":"Credit multipliers by tier","description":"Free models charge nothing, standard 1x, premium 2x, ultra 4x — pricing users can see before choosing."},{"name":"Live model management","description":"Platform admins add models, update pricing and scores, swap the free-tier set, and change use-case defaults live — no deployment needed."},{"name":"Provider and tier statistics","description":"Provider counts and per-tier average pricing feed the model-picker interfaces."}]},{"id":"ai-settings-hub","name":"AI Settings Hub","tagline":"Govern every AI feature from one place","description":"One place to govern all AI on the platform: bring your own provider keys, set default models per feature, white-label the AI course builder under your own name, feed the AI an institute knowledge base, and set the visual branding for every AI-generated video. The learner tutor's persona and visibility are shaped here too.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Bring-your-own AI keys","description":"Add your own provider API keys (OpenAI-style and Google-style) and choose models per feature, or use system defaults."},{"name":"Course AI configuration and white-labeling","description":"Set your AI course builder's display name (e.g. 'CourseCrafter AI'), an institute-level default course prompt, and hard rules the AI must always follow."},{"name":"AI video style and branding","description":"Choose the visual style for AI-generated videos and apply your institute branding — intro/outro slides, watermark, background themes, templates and typography."},{"name":"Institute knowledge base","description":"Feed the AI typed knowledge entries — announcements, policies, processes, events, results and general info — so its answers reflect your institute."},{"name":"Learner tutor controls","description":"The Learner AI Tutor's persona, chat modes, voices and page visibility are all configured from this hub (see Learner AI Tutor)."},{"name":"Usage view","description":"AI consumption is surfaced right inside settings, with drill-down into the full usage console."}]},{"id":"ai-usage-console","name":"AI Usage & Audit Console","tagline":"Know exactly who used AI, for what, and at what cost","description":"A transparent metering console for all AI activity in the institute: per-user usage, itemized logs, and full conversation transcripts. Every AI feature — course generation, video, evaluation, agents, call analysis and more — is tracked, and tools show their credit cost before you run them.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Usage by user","description":"See which staff members and learners are using AI and how much, with per-user drill-down into their logs and conversations."},{"name":"Usage summary and itemized logs","description":"An institute-wide summary plus itemized logs across 16 tracked activity types — course outlines, content, images, video, text-to-speech, evaluation, presentations, conversations, lectures, PDF questions, agent actions, analytics, copilot, call intelligence and more."},{"name":"Conversation transcripts","description":"Browse all AI conversations and open the full message history of any session for audit or quality review."},{"name":"Upfront cost preview","description":"Cost badges and previews on AI tools show the credit price before generation starts, driven by live, adjustable rates."}]},{"id":"ai-credits","name":"AI Credits (Pay-As-You-Go)","tagline":"Transparent prepaid credits for every AI action","description":"All AI features run on a prepaid credit balance, so costs are always visible and controlled — you see the price of an action before you run it and every credit spent afterwards. Credit packs, in-app top-up, invoicing and payment handling are covered in full under Finance & Payments.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Prepaid credit balance","description":"Every AI action draws from a single institute credit balance, keeping spend predictable and capped."},{"name":"Cost preview before you spend","description":"Expensive actions show a credit-cost badge and a confirmation dialog with the exact estimated cost before running."},{"name":"Usage ledger and analytics","description":"Overview, Usage, Analytics and History tabs show your balance, every transaction, and spend broken down by tool, model and learner activity."},{"name":"Credit packs and top-up","description":"Buy credit packs in your currency with secure in-app top-up; billing details, invoices and payment handling live under Finance & Payments."}]},{"id":"explore-ai-hub","name":"Explore AI Hub","tagline":"One front door to every AI capability","description":"A single launchpad that routes staff to the right AI tool for the job: creating educational content, building end-to-end courses, the lecture assistant, the lesson planner, and the full AI tools catalog. Designed so non-technical staff discover everything the AI can do.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Guided entry cards","description":"Cards for creating educational content (videos, storybooks, quizzes, timelines), building end-to-end courses, the lecture assistant, the lesson planner and other AI learning tools — each linking straight to the right studio."},{"name":"Works on any device","description":"The hub adapts from a desktop grid to a compact mobile list so teachers can jump into tools from anywhere."}]}]},{"id":"video","name":"AI Video Studio (Vimotion)","icon":"vid","color":"#C026D3","tagline":"Prompt-to-video studio: avatars, voiceovers, editing, reels","description":"Vimotion is Vacademy's AI Video Studio: type a brief and get a finished, branded, narrated video — script, visuals, voiceover, music and captions produced automatically in minutes. Beyond generation, it is a complete video operation: a full post-production editor, avatars and voice cloning, dialogue-driven story scenes, reels from long recordings, screen recording, translation with lip-sync, and a developer API for video at scale. Every video renders in your brand, in 60+ languages, with credit costs shown before you spend.","features":[{"id":"prompt-to-video","name":"AI Video Generator (Prompt to Video)","tagline":"Type a topic, get a finished narrated video","description":"Turn a plain-text prompt, document or link into a complete narrated video. The AI writes the script, records the voiceover, designs every animated scene, adds captions and renders a final MP4 — while you watch each production stage complete live. Videos can also play instantly inside the course player as interactive scenes, and the same engine powers landscape explainers, vertical shorts and marketing films alike.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"One-prompt creation","description":"Enter a topic or a full brief in plain language — length, format and audience are parsed automatically, with no prompt engineering or template hunting required."},{"name":"Any-source briefing","description":"Start from a PDF, slide deck, document, blog post or Notion page; the AI condenses it into a structured script that preserves the author's argument and message hierarchy."},{"name":"Website grounding from URLs","description":"Paste a URL and the system visits the page, captures its screenshots and images, and grounds the video in that site's actual content."},{"name":"Reference-file grounding","description":"Attach images and PDFs and the AI uses their real facts and figures in the video instead of inventing material."},{"name":"Target audience control","description":"Pick the audience — from Class 1-2 through Graduate/Professional — and the script, vocabulary and visuals adapt to that level."},{"name":"Target duration control","description":"Choose the intended length from 30 seconds to 10 minutes; pacing, shot count and script density are sized to hit it."},{"name":"60+ narration languages","description":"Generate videos narrated in 60+ languages grouped by region, including 9 Indian languages and regional English variants, with voice gender and named-voice selection."},{"name":"Landscape and portrait output","description":"Produce 16:9 videos for courses and YouTube or 9:16 vertical videos for Shorts and Reels, with an on/off toggle for burned-in, word-synced captions."},{"name":"Script review mode","description":"Stop generation at the script stage, review and edit the narration, then continue to full production."},{"name":"Stage-by-stage generation","description":"Generate up to any checkpoint — script only, script plus audio, full visual timeline, or final MP4 — and resume from any completed stage without redoing earlier work."},{"name":"Live progress streaming","description":"Real-time progress shows the current stage, percentage and messages while the video builds; creators can leave and come back."},{"name":"Cancel, retry and resume","description":"Cancel a running generation mid-flight, retry a failed run from its last successful checkpoint, and resume interrupted runs without losing spend."},{"name":"Generation history and settings reuse","description":"A history sidebar lists every past generation with status and output links; reopen results or reuse a previous run's voice, tier, brand kit and visual settings."},{"name":"Smart intent routing preview","description":"Before you submit, the studio previews how your request will be routed — which tools and stages will run, whether URLs will be scraped or the web searched — and lets you override any decision."},{"name":"Instant interactive playback","description":"Videos can play immediately in the course player as synced audio and animated scenes, so learners get content right away while the MP4 render is optional."},{"name":"Course builder integration","description":"AI course outlines can mark slides as video items; the pipeline generates each one and streams progress straight into the course editor."},{"name":"Course-wide video settings","description":"A single settings card controls how every video in a generated course is produced — narration language, voice, audio quality, video model, target length and quality tier — set once and applied throughout."},{"name":"Versioned re-renders","description":"Re-render any video on a prompt change without re-recording; past versions remain intact for rollback."}]},{"id":"quality-tiers-ai-director","name":"Quality Tiers & AI Director","tagline":"Choose your quality level, from free to film-grade","description":"Five quality tiers — Free, Standard, Premium, Ultra and Super Ultra — let you trade cost against polish on every video. Higher tiers switch on an AI Director that plans the whole edit like a filmmaker, generates multiple candidate designs for key scenes and picks the best, and runs automated visual quality inspections before anything ships.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Five quality tiers","description":"Free (stock-only, fastest), Standard, Premium, Ultra and Super Ultra — each tier unlocks more design intelligence, sound design and review passes, with per-tier pricing."},{"name":"AI Director planning","description":"On Premium and above, a director model plans acts, beats, shot types, emphasis, motion density and per-scene styling before any visuals are generated."},{"name":"Frontier-model creative concepts","description":"Top tiers explore multiple divergent creative concepts with anti-repetition prompting, so videos never look templated."},{"name":"Best-of-N hero shots","description":"On key scenes — hook, hero, closing — the system generates 2-4 candidate designs at different creative angles and a visual judge compares actual rendered frames to pick the winner."},{"name":"AI vision review of every scene","description":"A vision model inspects each rendered scene for visible defects such as broken text or clipped layouts, with bounded regeneration of anything that fails."},{"name":"Pixel-accurate overflow checks","description":"A deterministic bounding-box check walks every rendered frame and flags any text or media crossing the canvas edge — catching clipped headlines no reviewer can miss."},{"name":"Animation density enforcement","description":"A validator ensures every scene has enough animated elements and none of the forbidden anti-patterns, keeping motion quality consistently high."},{"name":"Creativity critic","description":"Ultra tiers run a director's-eye scoring gate on hero shots and elevate any scene that falls below the creative bar."},{"name":"AI-choreographed transitions","description":"An edit choreographer authors scene-to-scene transitions instead of using one stock crossfade everywhere."},{"name":"Two-pass script review","description":"Premium scripts are drafted, then reviewed and rewritten in a second pass for tighter narration."},{"name":"Cost guardrails and transparency","description":"Every quality gate carries its own cost cap, credit pre-flight checks block runs your balance cannot support, and each run records a per-stage cost breakdown so you can see exactly where credits went."}]},{"id":"voiceover-tts-cloning","name":"AI Voiceover, Text-to-Speech & Voice Cloning","tagline":"Hundreds of natural voices — or your own, cloned","description":"Every video gets a natural, studio-grade voiceover. A free standard tier covers 50+ languages, premium tiers add named studio voices for global and Indian languages, and voice cloning reproduces a real instructor's or founder's voice from a two-minute sample — so your star presenter narrates every video in every language. Narration also works standalone for podcasts, phone systems and accessibility.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Standard voices in 50+ languages","description":"Male and female neural voices included free across 50+ languages and locales, from US/UK/India English to Hindi, Tamil, Spanish, Japanese, Arabic and more."},{"name":"Premium Indian voices","description":"35+ named voices with authentic Indian accents across Hindi, Tamil, Telugu, Bengali, Marathi, Kannada, Gujarati, Malayalam, Punjabi, Odia and Indian English."},{"name":"Premium global voices","description":"Multiple named studio-grade voices per language for 25+ global languages, with graceful fallback when a language and gender combination is unavailable."},{"name":"Voice picker with audio samples","description":"Browse a 200+ voice library filtered by language, accent, gender, age and tone, and audition every voice with a sample clip before choosing; lock a default voice per workspace."},{"name":"Automatic provider routing","description":"On the premium tier, Indian languages and global languages route automatically to the best voice engine for each — no configuration needed."},{"name":"Voice cloning from a 2-minute sample","description":"Upload two minutes of clean audio — phone-mic quality is fine — and get a quality-checked clone that carries the original's cadence, warmth and quirks."},{"name":"Consent-governed clones","description":"Every clone carries a consent record, stays scoped to your workspace, is never shared or used for third-party training, and can be revoked in one click with a full audit log."},{"name":"Cross-language clone fidelity","description":"A cloned voice speaks 80+ languages with the same cadence — a message recorded once becomes a localized series without dubbing studios."},{"name":"Inline direction marks","description":"Slow a word, lift a phrase, pause for breath — pace and emphasis marks placed inline in the script, plus per-paragraph emotion presets."},{"name":"Custom pronunciation lexicons","description":"Define how product names and jargon are pronounced, per workspace."},{"name":"Word-level timestamping","description":"Narration is aligned to word-level timestamps with automated verification, powering captions, scene sync and sentence editing."},{"name":"Per-scene audio and retakes","description":"Narration is recorded per sentence and per scene, so individual lines can be edited or re-taken later without regenerating the whole track."},{"name":"Voice-matched pacing","description":"Scene timings adapt to how fast each chosen voice actually speaks and to the content style."},{"name":"Standalone audio export","description":"Ship narration as standalone audio in WAV, MP3, OGG or OPUS, download it or stream it via API to any channel — cleared for commercial use."}]},{"id":"avatars-presenters","name":"AI Avatars & On-Screen Presenters","tagline":"Your best instructor on camera — without a camera","description":"Put a lifelike presenter in any video. Upload one clear face photo or a two-minute phone recording and the platform builds a reusable avatar that presents any script with lip-synced speech in 80+ languages — or pick from a library of 30+ pre-built presenters. Control exactly how much screen time the host gets, and choose between multiple avatar engines at different price and fidelity points.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Custom avatar from a photo","description":"Upload a front-facing photo plus an optional description of clothing, demeanour and background; the system generates consistent per-scene presenter footage lip-synced to the narration."},{"name":"Avatar from a 2-minute recording","description":"Record two minutes on any phone in a quiet room and receive a brand-grade avatar within 24 hours, complete with a quality-assurance pass — no green screen or crew."},{"name":"Saved avatar library","description":"Save reusable avatar identities with their face, engine and voice, pick them from a dropdown for any video, and choose from 30+ diverse pre-built presenters across age, gender and ethnicity."},{"name":"Multiple avatar engines","description":"Seven generation engines spanning budget to premium fidelity, each labelled with its per-second credit price, so you pick the cost/realism trade-off per video."},{"name":"Host screen-time dial","description":"Set what percentage of scenes show the host on camera (0-100%); the Director places host appearances on hooks, recaps and key beats while narration plays continuously."},{"name":"First-person script rewrite","description":"When a host is enabled, the script is automatically rewritten in first person so the presenter speaks naturally."},{"name":"Cross-language presenting","description":"The same face speaks 80+ languages with lips matching the words and the source voice's rhythm preserved, with per-language preview before render."},{"name":"Personalized avatar videos at scale","description":"Pipe in a CRM feed — first name, company, deal value — and generate thousands of personalized presenter videos from one recording, with per-variable preview and approval gates."},{"name":"Consent, IP controls and audit","description":"Avatar likeness rights are locked to your workspace with consent records, never reused by third parties, and every avatar render is recorded in an audit log."},{"name":"Resolution and frame-rate options","description":"480p or 720p avatar output with adjustable frame rates on engines that support it."},{"name":"Segment-level re-renders","description":"Edit any sentence and re-render only that segment; versioned sources allow rollback."}]},{"id":"dialogue-story-scenes","name":"Storybook & Drama Dialogue Scenes","tagline":"Characters that talk on camera, in consistent voices","description":"Turn lessons into short films: the AI writes characters and dialogue, then produces lip-synced, voice-matched acted scenes. Choose Storybook mode, where a narrator carries the video and dialogue scenes land at dramatic moments, or Drama mode — a pure dialogue film with no narrator at all. Save a cast once and the same faces and voices star across a whole series.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Storybook mode","description":"The narrator carries the video and 1-4 dialogue scenes appear at dramatic moments for emotional impact."},{"name":"Drama mode","description":"A pure dialogue film — every scene is characters talking, clips carry their own ambience, and the clip budget is raised accordingly."},{"name":"Voice-locked characters","description":"The default engine lip-syncs characters to the platform's own per-character AI voices, so each character sounds identical across scenes and sequel videos."},{"name":"Budget dialogue engine","description":"A lower-cost alternative engine speaks the lines itself — strong visuals at roughly half the price, for productions where per-clip voice consistency matters less."},{"name":"Intelligent voice casting","description":"Each character gets a distinct voice matched to their age and personality; no two characters share a voice, and you can override any casting choice."},{"name":"Reusable saved casts","description":"Save a finished video's cast — names, portraits, reference sheets and voice assignments — and reuse it so a series keeps the same faces and voices."},{"name":"Character consistency via reference images","description":"Up to 9 reference images lock character and setting appearance across independently generated clips."},{"name":"Clip quality control and re-takes","description":"Every filmed clip passes an automated quality check, and in Assist Mode you can review clips and send back specific shots with re-take notes."},{"name":"Dialogue budget caps","description":"Dialogue-scene spend is estimated up front and capped per tier, so drama videos stay within predictable cost."}]},{"id":"cinematic-ai-clips","name":"Cinematic AI Video Clips","tagline":"True AI-generated film clips inside your videos","description":"On the top quality tiers, opt in to fully AI-generated cinematic video clips woven into your video as full-frame hero scenes or inline moments — with optional generated sound of their own. A built-in cost circuit-breaker caps AI-clip spend per video so premium footage never runs away with your budget.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"AI hero clips","description":"The AI Director plans full-frame generated video scenes where real footage doesn't exist — opt-in per run."},{"name":"Inline AI clips","description":"Individual scenes can embed short AI-generated clips inside larger layouts."},{"name":"Optional clip audio","description":"AI clips can carry their own generated sound; master narration is automatically silenced during those moments."},{"name":"Hard per-video cost cap","description":"A circuit breaker rejects further AI-clip generation past a fixed per-video ceiling and falls back to standard scene designs, so costs never run away."},{"name":"Worst-case cost preview","description":"The pre-generation estimate shows the AI-clip upper bound in credits before you commit."},{"name":"Extended clip chaining","description":"Image-to-video chaining supports clips longer than a single generation window."}]},{"id":"shot-library-motion-design","name":"Cinematic Shot Library & Motion Design","tagline":"18+ scene types, 8 visual themes, real motion design","description":"Videos are assembled from a library of professionally designed animated scene types — data stories, process steps, equation builds, device mockups, kinetic titles and more — each with its own motion language. Eight ready-made visual themes, style modes and preference controls keep every video on-brand and non-generic.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"18+ animated scene types","description":"Text diagrams, image and video heroes, split comparisons, lower thirds, annotated maps, animated data stories, process steps, equation builds, product heroes, kinetic text, SVG infographics, device mockups and more."},{"name":"Curated shot templates","description":"Battle-tested layouts including definition cards, quote callouts, stat blocks, step progressions, three-up grids, horizontal timelines and article zoom-pans."},{"name":"Motion primitives","description":"Reusable animation building blocks — number counters, typewriter text, growing bar charts, progress rings, staggered lists, underline sweeps and equation term reveals."},{"name":"8 visual themes","description":"Whiteboard, Cerulean, Glamour, Diorama, Neon, Chalkboard, Blueprint and Minimal — each a complete look with its own palette and design rules."},{"name":"Visual style modes","description":"Educational (clean lecture look), Marketing (premium brand-film look with depth and choreographed motion) or Bold (high-energy social styling) — auto-detected from content or set explicitly."},{"name":"Visual preference sliders","description":"Bias the mix of stock footage, AI imagery, SVG diagrams, motion graphics, app mockups and AI video per family — or just type preferences in plain language like 'use more diagrams'."},{"name":"On-screen text density control","description":"Choose minimal, low, auto or rich on-screen text independently of narration length — from title-only scenes to full supporting labels."},{"name":"Domain-aware shot selection","description":"The planner picks scene types suited to the subject — math gets equation builds, business gets data stories — and enforces shot diversity so scenes never repeat."},{"name":"Subject-matched pacing and music mood","description":"Speaking pace, transition style and music mood adapt to the detected subject and target duration."}]},{"id":"footage-imagery-sourcing","name":"Real Footage & Imagery Sourcing","tagline":"Real stock, real news photos, and AI imagery — automatically","description":"Every scene is dressed with the right imagery without the creator lifting a finger. The pipeline searches licensed stock photo and video libraries, pulls real news and web images for named people, places and events, and generates AI images where nothing real fits — with an AI ranking pass choosing the best match instead of the first result.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Stock photo and video search","description":"Automatic licensed stock search per scene with orientation matching and built-in redundancy for reliability."},{"name":"Real-entity image search","description":"Web-powered image and video search finds actual photos of specific people, places, events and products that stock libraries don't have."},{"name":"AI image generation","description":"Custom images are generated for abstract or conceptual scenes, with prompt enhancement on higher tiers."},{"name":"AI-ranked selection","description":"Instead of taking the first search result, higher tiers run an AI ranking over the top candidates and pick the best-fitting photo or clip."},{"name":"Visual continuity","description":"Continuity mode keeps characters and settings visually consistent across scenes in the same video."},{"name":"Reference image placement","description":"Attached reference images are understood by a vision model and threaded into the script and scene design, so real diagrams appear exactly where they belong."},{"name":"Tier-based sourcing policy","description":"The free tier is stock-only; higher tiers prefer stock and use AI generation only where stock can't deliver."}]},{"id":"use-your-own-footage","name":"Use Your Own Footage","tagline":"AI videos built from your recordings and screenshots","description":"Upload your own videos and images — demos, lectures, podcasts, product walkthroughs — and the AI understands them: transcribing speech, detecting scenes and faces, and mapping screen regions. Generated videos then splice in your real footage with graphics intelligently overlaid around it, turning raw recordings into polished produced videos.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Video indexing with podcast and demo modes","description":"Uploaded videos are analyzed with mode-specific pipelines — podcast (faces, speech) or demo (screen activity) — producing transcripts, scene maps and spatial layouts, with visible processing status."},{"name":"Image indexing","description":"Photos, screenshots and diagrams are indexed as reusable assets the planner can place into scenes."},{"name":"Multi-source generation","description":"Attach up to 5 indexed videos to one generation; the AI Director plans which source clips to use where."},{"name":"Original audio or AI narration","description":"Keep the source video's own audio as the narration, or let AI narrate over the footage — with an option to duck narration during source clips so their real sound plays."},{"name":"Source clip priority","description":"Tell the Director to lean lightly or heavily on your footage versus generated visuals."},{"name":"Smart overlay placement","description":"Face detection identifies free screen regions so text and graphics never cover the speaker."},{"name":"Asset library management","description":"Browse, filter, inspect and delete uploaded source videos and images from a dedicated library."}]},{"id":"sound-design-music","name":"AI Sound Design & Generated Music","tagline":"Original score and sound effects on every video","description":"Videos ship with a complete audio mix, not just a voice. A sound planner places tasteful effects on transitions and emphasis moments, AI generates fresh custom effects so videos never reuse the same whoosh, and an AI composer writes an original background score matched to each video's emotional arc.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Automatic sound-effect placement","description":"Cues are derived from scene types, animation events and narration emphasis, with per-tier caps and a one-click off switch."},{"name":"AI-generated fresh effects","description":"Bespoke effects — typewriter ticks, paper rustle, chart-growth tones, whooshes and stingers — are generated to match actual on-screen animation events."},{"name":"Curated sound library with semantic search","description":"A role-based catalog of transition whooshes, chimes and impacts with semantic matching and repeat-avoidance so the same file isn't overused."},{"name":"AI-composed background music","description":"An original score is composed per video from the Director's music plan — mood, style and emotional beats — tiled seamlessly for long videos and delivered as an editable track."},{"name":"Curated music fallback","description":"A mood-tagged royalty-free library (ambient, triumphant, cinematic, tense, playful, reflective) keeps every video scored."},{"name":"Music controls","description":"Enable or disable background music per run, set its starting volume, and adjust or remove it later in the editor."},{"name":"Full audio mixdown","description":"Narration, source-clip audio, dialogue-scene audio, music and effects are mixed with loudness normalization into the final render."}]},{"id":"assist-mode","name":"Assist Mode — Human-in-the-Loop Co-Direction","tagline":"Approve the AI's creative decisions like a film director","description":"Instead of a fully automatic video, Assist Mode pauses the pipeline at the creative checkpoints you choose and asks for your decision in a chat-style panel. Approve or redirect the concept, shot plan, narration, visual style, casting and filmed clips — so the final video matches your vision without you doing the production work.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"13 configurable decision gates","description":"Enable any subset of pause points: creative concept, shot plan, styleframe, asset requests, narration, cast, dailies, visual casting, shot look, contact sheet, voice, music and avatar."},{"name":"Conversational approvals with five answer modes","description":"Each gate arrives as a chat card where you select an option, edit the draft directly, type free-form direction, let the AI decide this one, or auto-approve all remaining decisions of that kind."},{"name":"Shot plan review and editing","description":"See, reorder and rewrite the full planned shot list before any visuals are generated."},{"name":"Narration review and editing","description":"Edit narration per scene or replace the full script at the gate before the voiceover is recorded."},{"name":"Visual casting with live stock search","description":"At the visual-casting gate, search stock media live and hand-pick the exact footage or photo for each scene."},{"name":"Dailies review with re-takes","description":"Review each filmed dialogue clip alongside its automated quality verdict and send back specific shots with a note describing what the re-take must fix."},{"name":"Design identity approval","description":"Approve the video's visual signature — font pairing, motion style, finishing and color arc — before every shot is produced in that style."},{"name":"Per-decision or batched granularity","description":"Pause at every individual choice, including per-shot, or receive same-kind decisions consolidated in batches."},{"name":"Persistent, resumable decisions","description":"Pending decisions survive page reloads; the run resumes cleanly the moment an answer arrives."},{"name":"Live pipeline map","description":"Watch production as a node graph — research, pitch, screenplay, narration, shot planning, storyboard, talent, filming, score and final cut — with live status per stage."},{"name":"Thumbnail picker","description":"Choose the video's cover image from generated frame options."},{"name":"Production audit trail","description":"An audit sheet exposes every stage's inputs and outputs for quality inspection."}]},{"id":"video-editor","name":"AI Video Editor","tagline":"Fix any scene or sentence without regenerating the video","description":"Every generated video opens in a full timeline editor: scrub frame-accurately, rewrite narration sentence by sentence in the same voice, move and restyle on-screen elements directly on the canvas, and layer music and effects — then re-render the final cut. An AI edit assistant also takes plain-English instructions like 'change the headline' or 'cut the intro', shows you the proposed change, and applies surgical fixes without a costly full regeneration.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Timeline scrubbing and live playback","description":"Frame-accurate scrubbing with a real in-browser playback engine, so you review edits instantly without waiting for renders."},{"name":"Scene and shot management","description":"Add, edit, reorder, duplicate or delete scenes on the timeline, override a shot's captions, and download individual shots."},{"name":"Edit with AI in plain English","description":"Type an instruction — 'swap the background video', 'add captions in French', 'drop the last 10 seconds' — and the assistant applies a fast targeted patch or a full remake as needed, with a preview you accept, reject or refine."},{"name":"AI gap-fill scenes","description":"Generate a brand-new scene to fill a gap in the timeline, styled to match its neighbors."},{"name":"Sentence-level re-narration","description":"Rewrite one sentence and the platform re-records just that line in the same voice, splices it into the master audio with crossfades, and ripples all later timings automatically."},{"name":"Mute a sentence or scene","description":"Replace any sentence's or scene's audio with equal-length silence in one click."},{"name":"On-canvas visual editing","description":"Select, drag and resize text and media layers directly on the video canvas with alignment guides and a full layer stack."},{"name":"Built-in media picker and overlays","description":"Search stock photos and videos, generate AI images on demand, add image and video overlays, and maintain a saved media library — all inside the editor."},{"name":"Advanced markup editing","description":"Power users can open any scene's underlying markup in a built-in code editor for pixel-level control."},{"name":"Caption styling","description":"Ready-made caption style presets plus per-shot caption overrides."},{"name":"Audio tracks, music and transitions","description":"Manage multiple audio tracks with waveforms, add or remove music and sound cues, trim silent tails, and apply shot-to-shot transitions from a library."},{"name":"Channel restyling","description":"Restyle a finished video for a new channel — different brand frame, pacing and captions — and export in every aspect ratio needed."},{"name":"AI thumbnails","description":"Each video gets AI-generated thumbnail options with the headline typeset into the image; swap the selected option or regenerate."},{"name":"Safe collaborative saving","description":"Conflict detection warns when someone else saved the same video, so edits are never silently lost; script, audio, timings and renders are stored as separate recoverable assets."}]},{"id":"brand-kits","name":"Brand Kits & Video Branding","tagline":"Every video in your colors, fonts and logo — automatically","description":"Define your brand once — palette, fonts, logo, intro and outro, watermark and standing creative instructions — and every AI video applies it automatically at render time. Named brand kits keep separate identities for different brands or departments, a one-click scraper drafts a complete kit from any public website, and per-video overrides handle special cases without touching saved settings.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Institute-wide branding defaults","description":"Configure intro slide, outro slide, watermark, background theme and typography defaults with live previews; every generated video follows them."},{"name":"Named brand kits","description":"Create multiple kits — palette, fonts, layout, intro/outro, watermark and director instructions — set a default, and pick a kit per video to fully replace defaults for that run."},{"name":"AI brand kit from a website","description":"Paste a URL and the platform screenshots the site, detects logo, palette and fonts, and drafts a ready-to-save brand kit including intro, outro and watermark designs."},{"name":"Brand voice instructions","description":"A free-text instruction block in the kit steers the AI's script, planning and scene design on every video — tone rules, taglines, do/don't lists."},{"name":"Per-video overrides","description":"Layer one-shot overrides — palette tweaks, a different intro/outro or watermark, custom director instructions — on a single generation without changing saved settings."},{"name":"Intro and outro cards","description":"Branded opening and closing segments with configurable duration and design, baked into the render."},{"name":"Watermark control","description":"Configurable watermark position, opacity and design; branding can be toggled off per render."},{"name":"Governance and template locks","description":"Workspace brand definitions are locked with permission-gated overrides, version history, per-template approval gates and a render audit trail — so every team ships on-brand video self-serve."},{"name":"Template library by team","description":"Pre-built templates organized by team and use case — launch films, sales videos, training, social cuts, executive updates — forkable into a workspace library and lockable for reuse."}]},{"id":"rendering-export","name":"Professional Rendering & Export","tagline":"Broadcast-ready MP4s from a dedicated render farm","description":"Final videos render on dedicated infrastructure with parallel chunked encoding, so long videos finish fast without affecting the rest of the platform. Creators control resolution, frame rate and a full caption styling suite — including karaoke-style word highlighting — at export time, and one render can serve every channel's aspect ratio.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Resolution and orientation options","description":"Export at 720p or 1080p in landscape (1920x1080) or portrait (1080x1920)."},{"name":"Frame rate options","description":"Choose 15, 20, 25, 30, 45 or 60 fps per render."},{"name":"Caption styling suite","description":"Phrase or karaoke word-highlight styles, multiple font families and weights, text and background colors with opacity, stroke, highlight color, position and size presets."},{"name":"Multi-ratio output","description":"Produce 16:9, 9:16 and 1:1 cuts for every channel from the same project."},{"name":"Branding toggle at export","description":"Show or hide watermarks and branding per render without editing the video."},{"name":"Parallel chunked rendering","description":"Videos render in parallel chunks with aggregate progress reporting for fast turnaround on long content."},{"name":"Render job management","description":"Submit, track and cancel render jobs; completion updates the video automatically."},{"name":"Source footage compositing","description":"Scenes using your own uploaded footage are composited with frame-accurate seeking and correctly mixed audio."}]},{"id":"reels-clip-finder","name":"AI Reels & Clip Finder","tagline":"Turn one lecture into a week of viral shorts","description":"Point the platform at any long recording and it finds the most engaging moments, scores them like a social media editor, and renders them as short-form reels with captions and branding. A three-step funnel — free scan, low-cost AI preview, full render — means you only pay for clips worth publishing.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Free engagement scan","description":"Heuristic scoring finds up to 50 candidate moments, rating each on hook strength, pacing, information density, loop-back potential and topic concentration."},{"name":"Targeting controls","description":"Set target reel duration (10-120 seconds), tolerance, aspect ratio, topic keywords and must-include time ranges; re-scan anytime."},{"name":"Candidate preview","description":"Review each candidate with a segment player, a thumbnail strip, and a word-importance timeline showing why the moment scored well."},{"name":"AI preview enrichment","description":"Selected candidates get an AI pass that writes a hook title and rationale, grades words for caption emphasis, and corrects misheard names and terms in the transcript."},{"name":"Aspect ratios and layouts","description":"Render 9:16, 16:9 or 1:1 with full-speaker, stacked or picture-in-picture layouts."},{"name":"B-roll options","description":"Auto-pick relevant stock b-roll from the transcript, or supply your own video."},{"name":"Silence trimming and pacing","description":"Off, gentle or tighter silence trimming plus configurable playback pace up to 1.5x clean up dead air."},{"name":"Cut plan overrides","description":"Manually override the AI's cut points with your own spans before rendering."},{"name":"Reel scene editing","description":"Add, update or delete overlay scenes on a finished reel just like the main video editor."},{"name":"Render tracking and retry","description":"Stage-by-stage progress per reel with one-click retry on failures, plus full reel management."}]},{"id":"long-form-projects","name":"Long-Form Edit Projects (Multi-Clip Wizard)","tagline":"Raw recordings to a finished edit in guided steps","description":"A project-based workspace that assembles long-form videos from your raw footage through a guided AI wizard: arrange and slice clips, clean up silences and filler words, add titles and captions, lay in music and effects, and build straight into the editor for final polish. The AI proposes a plan at every step; you refine it in conversation and confirm before anything is built.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Project workspace","description":"Create and manage projects that bundle multiple indexed video and image assets with a prompt, preferences and per-project options; a dashboard tracks build status per project."},{"name":"Four-step AI wizard","description":"Arrangement (clip ordering), Cuts (what to trim), Overlays (titles, captions, text) and Audio (music and effects) — each step offers an AI plan, chat-style refinement and explicit confirmation."},{"name":"Smart cut detection","description":"Automatic silence and filler-word detection proposes cuts; segment picking and sequencing tools assemble the story."},{"name":"Overlay and caption proposals","description":"The AI proposes titles, text overlays and captions placed on the timeline; every proposal is editable."},{"name":"Audio proposals","description":"The AI proposes background music and sound effects; a master soundtrack is assembled per build with per-track control."},{"name":"Deep control at every layer","description":"Override per asset, per project, per wizard step, per operation and per build — skip steps, reorder, or hand-edit anything the AI proposed."},{"name":"Builds and publishing","description":"Create multiple builds — fork a previous build, change aspect ratio or frame rate — track their status, publish the winner and delete the rest."},{"name":"Frame-level build editing","description":"Add, update, delete and reorder scenes on a finished build before rendering."},{"name":"Editor handoff and final render","description":"Open any build directly in the AI video editor for polish, then render to MP4 with the full export options."}]},{"id":"translation-localization","name":"Video Translation & Lip-Synced Localization","tagline":"One video localized into 80+ markets in one batch","description":"Translate any video — script, voiceover and captions — into 80+ languages with frame-accurate lip sync, so the result looks filmed in the target language rather than dubbed. Brand glossaries protect product names from translation, per-segment review lets humans approve the lines that matter, and one batch produces the entire localized set.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Frame-accurate lip sync","description":"Mouth movements match the new language — for AI avatars and real human talent alike — with per-language preview before render."},{"name":"Brand-glossary protection","description":"A workspace-locked glossary protects product names, trademarks and idioms from translation; translation memory carries across projects."},{"name":"Per-segment review and approval","description":"Reviewers approve individual translated lines before render, per market."},{"name":"Batch multi-market rendering","description":"Pick target markets and produce the full localized set — voiced, captioned, lip-synced — in one batch, with an audit log of every locale shipped."},{"name":"Works on any source video","description":"Localize videos made on the platform or uploaded from anywhere."},{"name":"Native-speaker QA","description":"Enterprise plans add a native-speaker quality-assurance review per market."}]},{"id":"transcription","name":"AI Transcription & Translation","tagline":"Accurate word-timed transcripts for any recording","description":"Any audio or video file can be transcribed with word-level timestamps, in the source language or translated into English. Transcription powers captions, video indexing, reels, clip extraction and searchable content across the platform.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Async transcription jobs","description":"Submit any media file, choose accuracy level, and receive the finished transcript with completion callbacks."},{"name":"Word-level timestamps","description":"Every word is timed, enabling synced captions, sentence editing and clip extraction."},{"name":"
