Translate mode","description":"Transcribe in the source language, translate to English, or produce both in one job."},{"name":"Multiple output formats","description":"Plain text and structured formats for downstream use."}]},{"id":"screen-recorder","name":"Screen Recorder with Auto-Edit","tagline":"Record once, auto-edit, ship anywhere","description":"Record a browser tab, application window or full screen with webcam picture-in-picture and background removal — straight from the browser with nothing to install. The platform then automatically removes filler words and dead space, tightens pacing, adds captions and brand-stamps the result for internal shares, support replies or social.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Browser-based capture","description":"Record tab, window or full screen with webcam picture-in-picture and background removal — no extension or install."},{"name":"Automatic filler removal","description":"'Ums', silences and dead space are cut with pacing-aware trims, with a one-click 'keep raw' option for technical demos."},{"name":"Caption and brand stamping","description":"Captions in source and target language plus workspace brand marks applied to every recording."},{"name":"Multi-destination sharing","description":"Push the same cut to chat, drive or support tools as an internal share, ticket reply or social short."}]},{"id":"thumbnail-maker","name":"Thumbnail Maker","tagline":"Click-worthy, on-brand thumbnails with A/B variants","description":"Generate platform-perfect thumbnails from a finished video, a frame or a brief — with preset compositions tuned for YouTube click-through, LinkedIn scroll-stop, TikTok hooks and X. Brand type, color and logo lockups apply automatically, and multiple variants per video can be pushed straight into YouTube A/B testing.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Platform composition presets","description":"Presets for YouTube, LinkedIn, TikTok and X with per-platform safe-area and crop logic."},{"name":"Automatic brand styling","description":"Type, palette, logo lockup and overlay style applied at render time, with per-channel variations."},{"name":"A/B variant generation","description":"Four composition variants per video, pushed directly to YouTube A/B tests with per-variant performance reporting."}]},{"id":"ppt-to-video","name":"PowerPoint to Video & Animated Slides","tagline":"Slide decks that present themselves","description":"Upload a deck and get two superpowers: a narrated presenter video — speaker notes become the script, transitions are animated, and pacing matches each slide's density — or web-ready animated slides that replay your click-by-click entrance animations beautifully in the browser. Existing uploaded decks can be upgraded in bulk.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Engage Client","API"],"subFeatures":[{"name":"Multi-format deck input","description":"PPTX, Keynote, Google Slides and PDF supported, with slide text, speaker notes and visual hierarchy read automatically."},{"name":"Speaker-notes narration","description":"Speaker notes become the narration script when present; otherwise copy is generated — optionally in a cloned voice."},{"name":"Content-aware pacing","description":"Each slide gets a timing window matched to its density — no flat per-slide timing."},{"name":"Branded motion layer","description":"Transitions, lower-thirds and motion language applied per your brand template, tweakable per slide."},{"name":"Animation-preserving web slides","description":"Click-by-click entrance animations are detected from the PPTX and replayed as smooth build steps in the online deck player, rendered at high fidelity."},{"name":"Async conversion and bulk upgrade","description":"Submit decks as background jobs and upgrade previously uploaded decks to the animated format in bulk."},{"name":"Flexible export","description":"Every aspect ratio from one deck, exported to MP4, WebM or GIF preview with auto-captions."}]},{"id":"image-to-video","name":"Image to Video","tagline":"Product stills turned into branded motion clips","description":"Turn product shots, screenshots or stock images into motion clips with composition-aware camera moves, narration and on-brand captions. Built for product pages, retargeting creative and email — with batch rendering across an entire product catalog.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Composition-aware motion","description":"Each image receives the camera move its composition warrants — pans, zooms, parallax — with per-image override and preview."},{"name":"Automatic brand framing","description":"Lower-thirds, logo placement rules, color overlays and locked caption styles applied at render time."},{"name":"Catalog batch rendering","description":"Render hundreds of clips across a product catalog in one pass, in every aspect ratio."},{"name":"Ad-account push","description":"Push finished clips directly to ad accounts and asset managers."}]},{"id":"video-api","name":"Video API & Automation","tagline":"Video as infrastructure, wired into your stack","description":"The entire video engine is available as a documented developer API: create API keys, generate videos programmatically from your CRM, product, LMS or marketing tools, and receive webhooks when each video is ready. Teams wire it so releases trigger launch films, CRM stages trigger personalized outreach, and catalogs render per-SKU video automatically.","roles":["Admin","Teacher"],"platforms":["API","Admin Web"],"subFeatures":[{"name":"API key management","description":"Generate, list and revoke workspace-scoped API keys directly from the studio."},{"name":"In-app interactive documentation","description":"Docs cover generation, status polling and asset endpoints with ready-to-copy JavaScript, Python and cURL examples."},{"name":"Cost and route preview endpoints","description":"Programmatically preview the credit cost and planned production route for a prompt before generating."},{"name":"Personalization at scale","description":"Submit a template plus variables from a CRM, CSV or webhook — name, company, deal value — and generate thousands of personalized videos with preview and approval gates."},{"name":"Lifecycle webhooks","description":"Signed webhooks with retries fire at every render lifecycle event; bulk generation is built in."},{"name":"Release-pipeline integration","description":"Connect the API to your changelog or release process so walkthroughs and launch content refresh automatically with every ship."},{"name":"Catalog and ad integrations","description":"Wire a product catalog or CSV feed for per-SKU video and push variants directly to ad platforms."},{"name":"Throughput guarantees","description":"Priority render queues and guaranteed API throughput on higher plans."}]},{"id":"cost-preview-guardrails","name":"Cost Preview & Spend Guardrails","tagline":"Know the credit cost before you press Generate","description":"Before any video generates, creators see an itemized credit estimate for their exact selections — tier, duration, voice tier, avatar, AI clips, dialogue scenes — next to their live balance. Hard per-run caps, tier balance checks and a full run ledger keep AI video spend predictable and auditable.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Itemized pre-flight estimate","description":"The cost preview prices your exact configuration — tier, model, duration, voice tier, avatar, music, AI clips, dialogue mode — and shows the breakdown next to your balance."},{"name":"Worst-case rows for premium add-ons","description":"AI clips and dialogue scenes show upper-bound rows so maximum possible spend is visible before submit."},{"name":"Tier balance checks","description":"Runs are blocked up front if the balance can't realistically cover the chosen quality tier."},{"name":"Per-run caps and circuit breakers","description":"Every expensive subsystem — AI clips, vision review, best-of-N designs — carries its own hard cost cap."},{"name":"Run cost ledger","description":"Each generation records a per-stage, per-model cost breakdown reconciled into credit transactions for full auditability."}]},{"id":"studio-workspace","name":"Vimotion Studio Workspace","tagline":"A dedicated video studio workspace for your team","description":"Vimotion is a self-contained studio environment for video teams: a dashboard organizes recent videos, assets, avatars, brand kits, reels and team members, while an onboarding wizard and guided tour get new studios productive quickly. The workspace runs on desktop and inside a mobile app shell.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Studio dashboard","description":"A tabbed workspace — Recent videos, Assets, Avatars, Brand Kits, Reels and Team — with a desktop sidebar and mobile-friendly navigation."},{"name":"Onboarding wizard","description":"Step-by-step setup covering account type, contact details, verification, studio details and brand panel (colors, fonts, logo)."},{"name":"Avatar and brand kit managers","description":"Create and edit saved presenter avatars and brand kits in dedicated panels, directly usable in every new video."},{"name":"Team management","description":"Invite and manage the studio's team members from the workspace."},{"name":"Guided product tour","description":"A built-in interactive tour and help menu walk new users through the studio and editor."},{"name":"Mobile app shell","description":"The workspace runs inside a native mobile shell, with the heavy editor reserved for desktop."}]},{"id":"vimotion-standalone-offering","name":"Vimotion Standalone Product & Enterprise Governance","tagline":"A standalone video studio, from free pilot to enterprise","description":"Vimotion also ships as a standalone product with its own signup, self-serve pricing and enterprise governance. Prospects join via waitlist or invite code, start on a free pilot video, and scale to plans with per-team approval gates, SSO, SOC 2 compliance, data residency choices and consent-governed AI — everything IT, security and procurement need to say yes.","roles":["Admin"],"platforms":["Public Web","Admin Web"],"subFeatures":[{"name":"Early access and invite codes","description":"A public waitlist with live counter, invite codes with usage limits and redemption audit, and a funnel console to invite or reject applicants."},{"name":"Verified self-serve signup","description":"Email-OTP-verified signup with a dedicated studio login; a brief typed on the website carries through signup so the studio opens pre-loaded with the visitor's intent."},{"name":"Self-serve pricing tiers","description":"Four transparent tiers from a free pilot video to enterprise, with a public per-tier feature matrix, monthly/annual billing with proration, and invoicing/PO support on higher plans."},{"name":"Render credit system","description":"Each hero render uses one credit while social cuts from the same brief are free; unused credits roll over on paid plans."},{"name":"Identity and access","description":"SSO/SAML, automated user provisioning, role-based brand kits and an audit log accessible via console and API."},{"name":"Security, compliance and residency","description":"SOC 2 Type II, GDPR, custom DPAs and indemnity terms, with US/EU data regions and deployment options up to dedicated single-tenant hosting."},{"name":"AI governance","description":"Workspace-scoped voice and avatar models, per-asset consent records with revocation, and a guarantee that customer inputs and outputs are never used for model training."},{"name":"Procurement readiness","description":"Annual invoicing, custom MSAs, line-item POs, pre-completed security questionnaires, and dedicated customer success with quarterly reviews on enterprise plans."}]},{"id":"vimotion-growth-programs","name":"Vimotion Public Site & Adoption Programs","tagline":"Try it, learn it, and earn with it — before you buy","description":"A dedicated public website lets prospects experience Vimotion before signing up: type a video brief right on the homepage, watch real unedited output, and explore team-specific playbooks. Free browser tools, live masterclass cohorts, a tutorial library and a public changelog support adoption, while an affiliate program rewards partners who refer B2B teams.","roles":["Admin"],"platforms":["Public Web"],"subFeatures":[{"name":"Interactive marketing website","description":"A homepage brief prompt that carries into the studio, a showcase wall of sample videos, a live unedited demo render, an interactive feature explorer, and honest pricing and limitations pages."},{"name":"Team use-case playbooks","description":"Eight audience-specific pages — marketing, sales, onboarding, internal comms, education and L&D, eCommerce, localization and agencies — each with worked workflows and an adoption plan."},{"name":"Free browser tools","description":"Single-purpose free utilities — caption translator, voice tone detector, thumbnail generator and transcript clipper — as a low-friction way to try the platform."},{"name":"Masterclass cohorts","description":"Quarterly live, hands-on training sessions per buyer team, taught by the product team in real workspaces."},{"name":"Learning resources and changelog","description":"A getting-started rollout guide, tutorial library, editorial blog and a public versioned changelog documenting every release."},{"name":"Affiliate program","description":"30% recurring commission for 12 months on referred workspaces, 90-day attribution, monthly payouts and curated partner approval."}]}]},{"id":"automation","name":"Automation & Workflows","icon":"auto","color":"#0EA5E9","tagline":"Visual workflows and one-click automations across the platform","description":"Automation & Workflows turns every event in your institute — an enrollment, a missed class, a payment, a new lead — into the next right action, automatically. Build sophisticated flows on a visual canvas, switch on ready-made automations with one click, or simply describe what you want and let AI draft it. Every run is logged step-by-step, so you always know exactly what was sent, to whom, and when.","features":[{"id":"visual-workflow-builder","name":"Visual Workflow Builder","tagline":"Drag-and-drop automation engine for your whole institute","description":"A full visual builder for event-driven and scheduled automations across the platform. Drag nodes onto a canvas — triggers, data queries, filters, conditions, loops, emails, WhatsApp, push notifications, webhooks and more — wire them together, test them safely, and publish. Workflows listen to what actually happens (attendance, payments, enquiries, live classes, assessments) and fire the next move without anyone lifting a finger. Every run is logged step-by-step so you can see exactly what happened and to whom.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"35+ trigger events","description":"Fire workflows on enrollment, re-enrollment, learner termination, lead form submission, lead opt-out, installment due, live class created/started/ended, payment success/failure, abandoned cart, subscription cancelled, membership expiry, course created, doubt raised, assignment submitted, invites, counsellor assignment, follow-ups due or overdue, lead SLA breaches, lead status changes, inbound AI calls, and assessment lifecycle events."},{"name":"Scheduled workflows","description":"Run automations on a schedule — cron expressions, intervals or day-of-month, timezone-aware, with start and end dates and next-run visibility."},{"name":"20 node types","description":"Trigger, Query, Transform, Filter, Aggregate, Action, Send Email, Send WhatsApp, Push Notification, HTTP Request, Chatbot, Delay, If/Else, For-Each loop, Merge, Schedule Task, Update Record, Set Lead Status, Router and AI Call nodes — all in a searchable palette."},{"name":"Prebuilt data queries","description":"Ready-made lookups like batch students, live-session attendance (present and absent lists), fee installments, admin team emails, attendance reports and user contact details — no technical setup needed."},{"name":"Point-and-click condition & aggregate builders","description":"Build branching logic and data aggregations visually, with a variable picker that surfaces every value available at each step."},{"name":"Template gallery with 26 use-case templates","description":"Start from proven templates — batch emails, parent updates, lead confirmations, fee reminders, expiry checks, session recaps, assessment notifications, engagement summaries and more — each with a short question wizard."},{"name":"Outgoing webhooks (Zapier, Make, Pabbly, n8n)","description":"Send learner or cart details to any external URL on events like enrollment or abandoned checkout, with a fully configurable payload and per-course scoping."},{"name":"Incoming webhook trigger","description":"Each workflow can expose its own webhook URL, so external systems can start it directly."},{"name":"Safe test runs & manual triggering","description":"Test-run a workflow before publishing, or fire it on demand outside its schedule — with clear warnings before real messages go out."},{"name":"Pre-publish validation","description":"Built-in validation catches misconfigured steps with errors and warnings before anything goes live."},{"name":"Execution history & step-by-step logs","description":"Every run appears in a history tab with summary cards (total, completed, failed, success rate, average duration), a visual execution flow, a timeline, and per-node logs including messages sent and any errors."},{"name":"Duplicate-safe delivery","description":"Built-in safeguards ensure a learner never receives the same automated message twice for the same event."},{"name":"Workflow management","description":"Search and list all workflows (event-driven vs scheduled), edit them on the canvas, pause or deactivate with full history preserved, and view a simplified diagram of any automation."}]},{"id":"ai-workflow-creation","name":"AI-Assisted Workflow Creation","tagline":"Describe the automation — AI drafts the workflow","description":"Type your goal in plain language — 'email parents every Friday with attendance' — and AI drafts a complete, ready-to-review workflow on the canvas. It asks clarifying questions when needed, explains its reasoning step-by-step, and flags anything that needs your attention. Nothing goes live until you review and publish.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Plain-language drafting","description":"Describe what you want; the AI picks the right triggers, data queries, templates and actions and assembles the flow for you."},{"name":"Clarifying questions","description":"When your goal is ambiguous — which batch? which template? — the AI asks targeted follow-up questions and re-drafts."},{"name":"Step-by-step rationale","description":"Every draft comes with an explanation of why each step exists, so you can trust it and tweak it confidently."},{"name":"Human review before publish","description":"Drafts load into the visual builder for full review and editing — an admin always makes the final call to publish."},{"name":"Same validation as hand-built workflows","description":"AI drafts run through the standard validation checks, surfacing errors and warnings inline before going live."}]},{"id":"one-click-automations-library","name":"One-Click Automations Library","tagline":"Switch on ready-made automations — no builder required","description":"A curated library of plug-and-play automations organised by what they do for learners, parents and your own team. Each one is a plain-language toggle: pick a template (or use a provided sample), answer one or two simple questions, and it's live. Behind the scenes each recipe creates a full workflow you can inspect or extend later.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Audience & lead automations","description":"Instant welcome email on form submission, opt-out confirmations, immediate nurture and second-touch emails, and follow-ups sent a set number of days after a lead submits."},{"name":"Course announcements","description":"Automatically announce a newly published course to learners in chosen batches — built-in cross-sell."},{"name":"Live class automations","description":"'We're live now' alerts when a class starts, invites when one is scheduled, post-class follow-ups, and separate recap emails for learners who attended versus those who missed."},{"name":"Enrollment & onboarding","description":"Welcome emails with login credentials on enrollment, welcome-back emails on re-enrollment, sub-organisation member welcomes, and access-removed notices."},{"name":"Payments & fees automations","description":"Daily fee-due reminders, instant payment-success receipts, payment-failed emails with retry links, and abandoned-checkout nudges."},{"name":"Membership & renewal automations","description":"Scheduled expiry scans with configurable notice periods, renewal nudges when a plan enters its renewal window, cancellation win-back emails, and termination notices."},{"name":"Attendance & engagement reports","description":"Scheduled attendance reports across all batches, per-learner engagement summaries, and weekly attendance updates."},{"name":"Parent update automations","description":"Tell parents whether their child attended each live class, plus scheduled weekly attendance roll-ups."},{"name":"Admin team alerts","description":"Email your team on every new enrollment, payment success or failure, new lead, new course, new doubt raised, assignment submission, and post-class attendance summaries."},{"name":"Assessment notifications","description":"Notify a batch when an assessment is published and remind them when the assessment window opens."},{"name":"Guided configuration","description":"Each recipe asks only friendly questions — which template, which batch, what time, how many days — with sample email templates offered when you have none."},{"name":"Toggle on and off with confidence","description":"Automations show as simple switches; turning one off pauses the underlying workflow with all history preserved."}]},{"id":"whatsapp-chatbot-flow-builder","name":"WhatsApp Chatbot Flow Builder","tagline":"Build WhatsApp bots that qualify leads while you sleep","description":"A visual drag-and-drop builder for automated WhatsApp conversations. Trigger flows on keywords or events, send messages, templates or interactive button menus, branch on replies, trigger platform workflows mid-chat, and hand over to AI for free-form conversation. Every conversation is recorded as a session, with live inspection and analytics to show how each flow performs.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Nine node types","description":"Build flows from Trigger, Send Message, Send Template, Send Interactive, Condition, Workflow Action, Delay, HTTP Webhook and AI Response nodes connected on a visual canvas."},{"name":"Six trigger types","description":"Start flows on keyword match (contains or exact), first contact from a new number, button reply, enrollment events, form submissions, or engagement-threshold events."},{"name":"Free-form messaging","description":"Send text, images, videos or documents inside the 24-hour conversation window — no template approval needed."},{"name":"Approved template sends","description":"Send pre-approved WhatsApp templates with body parameters, header media and buttons."},{"name":"Interactive buttons & lists","description":"Send tappable button menus and list pickers to guide users through choices."},{"name":"Conditional branching & personalisation","description":"Branch the conversation on the user's reply or resolved variables, with a default fallback path; personalisation variables are substituted throughout the flow."},{"name":"AI-powered replies","description":"Hand the conversation to AI for natural, free-form answers to open-ended questions inside the flow."},{"name":"Workflow actions & external webhooks","description":"Trigger any platform workflow from inside a chat — create a lead, enroll a learner, send an email — or call an external URL mid-conversation to fetch or push data."},{"name":"Timed delays","description":"Pause a flow for minutes or hours (for example, follow up after 24 hours) with a scheduler that reliably resumes where it left off."},{"name":"Variable capture to lead fields","description":"Map chat answers into lead fields — name, email, mobile, city and more — plus custom fields and session variables, building a lead record straight from the conversation."},{"name":"Session viewer & tracking","description":"Every user's journey through a flow is a session with a clear status (active, completed, timed-out or error), browsable message-by-message."},{"name":"Flow analytics","description":"Per-flow and institute-wide analytics on sessions and completions show exactly how each bot performs."},{"name":"Flow lifecycle management","description":"Draft, activate, deactivate, duplicate, archive and edit flows, with everything listed in one place."},{"name":"Works with your WhatsApp provider","description":"Flows run transparently over the institute's connected WhatsApp provider."}]},{"id":"audience-drip-messaging","name":"Audience Messaging & Drip Automation","tagline":"Message an entire lead list in one send","description":"Send WhatsApp, email or push messages to everyone in a campaign audience, with template variables auto-filled from each lead's form answers and filters to narrow the recipient list. A full history of what was sent to each audience is kept, and leads who opt out are handled automatically — including a polite goodbye sequence.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Multi-channel sends","description":"Choose WhatsApp (template-based with language selection), email (utility or promotional, with subject and rich body), push notification or in-app alert."},{"name":"Variable mapping","description":"Map template variables to lead fields so every message is personalised automatically."},{"name":"Recipient filtering","description":"Narrow a send by lead source, submission date range or custom-field values instead of blasting the whole list."},{"name":"Communication history","description":"A per-campaign log of every message sent, and per-lead communication history right in the lead drawer."},{"name":"Opt-out management","description":"Leads who reply STOP or tap opt-out are moved to an opt-out list immediately; silent leads can be auto-opted-out by an inactivity scanner."},{"name":"Opt-out goodbye drip","description":"A polite goodbye sequence goes out on opt-out — immediate for explicit opt-outs, next morning for inactivity — with a second message two days later."},{"name":"Suppression everywhere","description":"Opted-out and deleted leads are excluded from every future recipient list automatically."}]},{"id":"engagement-nudges","name":"Automated Engagement Nudges","tagline":"Automatically re-engage learners who go quiet","description":"Configure inactivity triggers that automatically send a WhatsApp message when a learner or lead hasn't engaged for a chosen period. Rules can be scoped to a batch or the whole institute, chained so a nudge only fires after a previous message, and paired with audience filters that find inactive users ready for a campaign.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Inactivity thresholds","description":"Define a time threshold — cumulative or since last activity — after which a chosen template is sent automatically to the inactive contact."},{"name":"Sequenced nudges","description":"Require that a previous message was already sent before the next nudge fires, enabling drip-style re-engagement sequences."},{"name":"Inactive-audience filters","description":"Find inactive users, inactive phone numbers, users at a specific point in a message sequence, or users by the messages they have or haven't received — ready to target with a campaign."},{"name":"Real engagement signals","description":"Learner activity events are logged continuously, so triggers evaluate on real usage rather than guesswork."},{"name":"Per-batch or institute-wide scope","description":"Each trigger rule is scoped to a specific batch or the whole institute and can be switched on or off independently."}]}]},{"id":"finance","name":"Finance & Payments","icon":"fin","color":"#059669","tagline":"Fees, invoices, subscriptions and 6+ payment gateways","description":"Vacademy Finance & Payments handles every way an education business collects money — online course sales, recurring subscriptions, school-style fee installments, and front-office cash collection — with the funds settling directly into your own payment gateway account. Branded tax-compliant invoicing, shareable payment links, self-service learner billing and audited fee adjustments replace a patchwork of gateway dashboards, billing tools and spreadsheets with one connected system.","features":[{"id":"payment-gateway-integrations","name":"Payment Gateway Integrations","tagline":"Your gateway, your money — connected in minutes","description":"Connect the payment gateway your institute already uses and collect money directly into your own account — Vacademy never sits between you and your funds. Six gateways are supported out of the box, each with guided credential entry, copy-paste webhook URLs and automatic payment verification. Manage, edit and deactivate gateways any time.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Stripe","description":"Accept international card payments with your own API keys, including saved cards and recurring charges. An optional webhook signing secret verifies every payment callback."},{"name":"Razorpay","description":"India's most popular gateway for UPI, cards, netbanking and wallets, with guided setup for key ID, key secret and webhook secret."},{"name":"PhonePe","description":"PhonePe Standard Checkout for Indian merchants — UPI, cards and wallets with INR settlement, live and sandbox environments, and credential-secured webhooks."},{"name":"Cashfree","description":"Cashfree Payments for India with hosted checkout and automatic payment-status callbacks."},{"name":"eWAY","description":"eWAY for Australian and international merchants, including tokenized recurring payments and automatic payment-status polling."},{"name":"PayPal","description":"Accept international payments through PayPal."},{"name":"Guided gateway setup","description":"Step-by-step, provider-specific setup inside Settings — field-by-field help, links to each provider's dashboard, and the exact webhook URL to paste in so payment statuses sync automatically."},{"name":"Secure webhook verification","description":"Incoming payment confirmations are signature-verified per gateway; failed callbacks are logged and can be reprocessed so no payment is ever lost."},{"name":"Real-time payment status checks","description":"Live order-status lookup against the gateway ensures a payer's screen always reflects the true outcome, even if a confirmation callback is delayed."},{"name":"Gateway lifecycle management","description":"View configured gateways, edit credentials, refresh status and deactivate a gateway at any time."}]},{"id":"flexible-payment-plans","name":"Flexible Payment Plans","tagline":"Free, one-time, subscription, installment or donation — price it your way","description":"Sell every course or batch under the pricing model that fits it: free access, one-time payments, recurring subscriptions, multi-installment fee plans or pay-what-you-want donations. Build payment options once, attach them to batches or enrollment invites as the default or a per-batch preference, and learners automatically see the right checkout.","roles":["Admin"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"Free enrollment plans","description":"Open a course at no charge, optionally with a validity period after which access expires."},{"name":"One-time (upfront) payment","description":"A single payment for access, with validity configurable in days or months and an optional strike-through 'was' price to show savings."},{"name":"Subscriptions with custom intervals","description":"Recurring plans with any billing intervals you define (e.g. 1/3/6/12 months), each with its own title, price and feature checklist on the plan card."},{"name":"Donation plans","description":"Let supporters pay what they want — configure suggested amounts, an optional minimum, and whether custom amounts are allowed."},{"name":"Installment fee plans","description":"Attach a multi-installment, school-style fee structure (tuition, admission, transport and more) as the payment option for a batch."},{"name":"Plan-level discounts","description":"Configure discounts directly on a plan — for example longer-commitment pricing — so the reduced price is what learners see at checkout."},{"name":"Enrollment approval gate","description":"Optionally require admin approval before a paid or free enrollment goes live."},{"name":"Default and preferred plans","description":"Mark one payment option as the institute default and set preferred options per batch; checkout picks the right one automatically."},{"name":"Multi-member plans","description":"Plans can carry a member count for family and group enrollments."},{"name":"Plan descriptions, tags and feature lists","description":"Each plan supports a marketing description, tag and feature list that render on public plan cards."},{"name":"Checkout previews","description":"Live previews show subscription and donation plans exactly as learners will see them before you publish."},{"name":"Plan library management","description":"Edit, list and safely delete payment plans from one place."}]},{"id":"subscriptions-auto-pay","name":"Subscriptions & Auto-Pay","tagline":"Recurring revenue with automatic off-session charging","description":"Recurring plans charge learners automatically when each period renews, using saved payment mandates on Stripe, Razorpay or eWAY. Learners manage their own memberships and cards; admins can see and change any learner's plan status at any time.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Payment mandates","description":"A saved, provider-agnostic auto-pay authorization per subscription charges renewals without the learner returning to checkout."},{"name":"Charge cap protection","description":"Every mandate carries a maximum amount derived from the plan, enforced before each recurring charge as an extra safety layer."},{"name":"Mandate lifecycle states","description":"Mandates move through Pending, Active, Paused, Revoked and Failed states, so admins always know why a renewal did or didn't charge."},{"name":"Learner self-service cancellation","description":"Learners can view their active memberships and cancel a subscription themselves from their account."},{"name":"Admin plan management","description":"List every learner plan, change plan status (Active, Pending Payment, Payment Failed, Canceled, Expired, Terminated), or cancel on a learner's behalf."},{"name":"Membership details view","description":"Per-learner membership lookup showing the plan, validity window, payment option and full payment history behind it."},{"name":"Expiry and re-enrollment policies","description":"Configurable policies define what happens when a plan expires, including re-enrollment rules and follow-up actions."},{"name":"Saved card updates","description":"Learners can securely replace the card on file and update billing details without contacting the institute."}]},{"id":"school-fee-structures","name":"School Fee Structures","tagline":"Real school fees: heads, installments, penalties, approvals","description":"Model true school-style fees with multiple fee heads — tuition, admission, transport, hostel, mess, sports and any custom types — each with its own amount, installment schedule and rules. Structures pass through a maker-checker approval before use and attach directly to batches, so every new admission inherits the right fee plan automatically.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Custom fee type catalog","description":"Define any number of fee heads with name, code and description (Tuition, Admission, Transport, Hostel, Mess, Sports, Exam and more) and reuse them across fee plans."},{"name":"Per-fee installment schedules","description":"Each fee head can be paid in full or split into numbered installments, each with its own amount, start/end dates and due date."},{"name":"Installment plan templates","description":"Ready-made Monthly, Quarterly, Term-wise and Annual structures, editable to your academic calendar, with one plan markable as the institute default."},{"name":"Late-payment penalties","description":"Mark a fee head as penalty-bearing with a configurable penalty percentage for overdue installments."},{"name":"Refundable flags","description":"Tag fee heads such as caution money as refundable for correct accounting."},{"name":"Built-in discounts","description":"Apply a percentage or flat discount to a fee head, keeping both the original and discounted amounts on record."},{"name":"Maker-checker approval","description":"Fee structures record who created them and require a separate approval step before going live."},{"name":"Batch linking","description":"Attach a fee structure to one or more batches or enrollment invites so new admissions automatically inherit the right fee plan."},{"name":"Fee-type priority ordering","description":"Set an institute-wide priority order of fee heads that controls how incoming payments are allocated across dues."},{"name":"Edit and retire safely","description":"Update structures and fee types or retire a structure without losing historical payment records."}]},{"id":"fee-collection-desk","name":"Fee Collection Desk","tagline":"Front-office counter for cash, cheque, UPI and card","description":"A guided four-step counter workflow for office staff: find the student, pick the installments being paid, record the payment, and hand over the receipt. Built for offline payments — cash, cheque, UPI or card — with automatic receipt generation on the spot.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Student search","description":"Find any student instantly by name or details as the first step of collection."},{"name":"Installment selection","description":"See all pending and overdue installments across fee heads and choose exactly which ones this payment covers."},{"name":"Offline payment modes","description":"Record Cash, Cheque, UPI or Card payments with a reference number and a free-text note."},{"name":"Smart payment allocation","description":"An allocation engine spreads a lump-sum payment across dues by fee-type priority — with overdue-only, upcoming-only or all-dues scopes — or allocate to specific installments manually."},{"name":"Instant receipts","description":"A fee receipt is generated on the spot with a download link, and past receipts remain downloadable per installment."},{"name":"On-the-spot adjustments","description":"Apply a concession or penalty during collection, routed through the approval workflow, before confirming the payment."},{"name":"Confirmation and success summary","description":"A confirmation dialog recaps amounts before recording, followed by a success screen with receipt and invoice actions."}]},{"id":"student-fee-ledger","name":"Student Fee Ledger","tagline":"Every student's fee position in one searchable table","description":"A master view of every student's fee status — expected, paid, due, overdue and waived amounts with a visual collection progress bar per student. Drill into any row for the full installment schedule, receipts and payment ledger, and act on a student's fees straight from their profile.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Status at a glance","description":"Each student is flagged Paid, Partial, Pending or Overdue with color-coded badges and a collection progress bar."},{"name":"Search and filters","description":"Filter the ledger by course, fee plan, status and more, with expandable rows showing per-fee-head detail."},{"name":"Installment drill-down","description":"See every installment with amounts, due dates, payments applied, adjustments and remaining balance."},{"name":"Receipts history","description":"List and download all fee receipts and invoice receipts for any student."},{"name":"Per-student fee tools","description":"From a student's profile, staff can view payment history, edit that student's installment plan, apply a plan-level discount, record an offline payment and generate an invoice."},{"name":"Learner self-view","description":"Learners can check their own dues and receipts and pay pending installments from their app."}]},{"id":"concessions-penalties","name":"Concessions & Penalties with Approval Workflow","tagline":"Discretionary fee changes, fully audited and approved","description":"Staff can propose a concession (fee waiver) or penalty on any installment, but nothing takes effect until an authorized approver signs off. Every request, approval, rejection and retraction is kept in a permanent, searchable audit trail.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Concession requests","description":"Reduce a student's installment by a chosen amount with a reason; the request is validated against the expected amount and queued for approval."},{"name":"Penalty application","description":"Add late-fee penalties to an installment, either manually or from the fee plan's configured penalty percentage."},{"name":"Pending approvals queue","description":"A dedicated Adjustment Approvals page lists every pending request with student, amount, type and requester for one-click approve or reject."},{"name":"Retraction","description":"Requesters can withdraw a pending adjustment before it is reviewed."},{"name":"Full adjustment history","description":"Per-installment and institute-wide history of every adjustment event — submitted, approved, rejected, retracted — with who did what and when."}]},{"id":"invoicing","name":"Invoicing","tagline":"Branded invoices — automatic on payment or raised on demand","description":"Every successful payment can generate a professional PDF invoice automatically, and admins can raise invoices manually for anything else — for one learner or in bulk — with live preview, taxes, payment links and reminders. Invoices are delivered by email and payable online.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"Automatic invoice on payment","description":"A branded PDF invoice is generated and emailed automatically after each successful online payment, including multi-course orders."},{"name":"Manual invoice creation","description":"Raise an invoice for any learner with free-form line items (description, quantity, unit price), currency, due date, custom invoice date and notes."},{"name":"Bulk invoicing","description":"Create the same invoice for many learners at once — each gets their own numbered invoice and payment link."},{"name":"Live preview before sending","description":"A pixel-accurate preview shows exactly what the learner will receive, with editable fields grouped by section."},{"name":"Editable details","description":"Override invoice number, customer name and address, institute details, tax label, place of supply and notes per invoice; totals are always computed, never editable."},{"name":"Per-invoice tax control","description":"Tax defaults from institute settings but can be switched off for an individual invoice."},{"name":"Payment link per invoice","description":"Every invoice gets a shareable payment link — copy it, email it, or send it over WhatsApp directly from the success screen."},{"name":"Mark paid manually","description":"Record an offline settlement against an invoice, with payment details, so books stay accurate."},{"name":"Void with reason","description":"Void an incorrect invoice with a recorded reason instead of deleting history."},{"name":"Duplicate invoice","description":"Clone a past invoice's line items, currency and notes into a new one; tax re-defaults from current settings for safety."},{"name":"Payment reminders","description":"Send a reminder email for any unpaid invoice or overdue installment with one click."},{"name":"PDF download and regeneration","description":"Download any invoice PDF at any time; expired links are regenerated automatically."},{"name":"Invoice lists and search","description":"Browse all invoices institute-wide or per learner; learners see their own invoices too."}]},{"id":"invoice-branding-tax-settings","name":"Invoice Branding, Templates & Tax Settings","tagline":"Your logo, your numbering, your country's taxes","description":"Control exactly how invoices look and how tax is applied. Pick and customize invoice templates with your branding, set your country, tax registration details and tax components, and choose how invoice emails reach payers — so every invoice is compliant out of the box.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Template gallery","description":"Choose from ready-made invoice templates and customize them; templates use placeholders like invoice number, line items, tax components and institute logo."},{"name":"Institute branding","description":"Invoices carry your institute logo, name and address automatically."},{"name":"Country and currency defaults","description":"Set your billing country and default invoice currency once; all new invoices inherit them."},{"name":"Custom tax label and components","description":"Name your tax (GST, VAT, Sales Tax) and split it into components with individual rates — e.g. CGST 9% + SGST 9% — that render as a tax table on the invoice, with different components possible per package type."},{"name":"Tax registration fields","description":"Store your GSTIN/tax ID, HSN/SAC code and place of supply so invoices meet local requirements."},{"name":"Invoice email placement","description":"Choose whether the PDF arrives in a dedicated invoice email or attached to the payment-confirmation email."},{"name":"Internal notification recipients","description":"Pick which admins are notified about invoice events."}]},{"id":"payment-links-public-checkout","name":"Payment Links & Public Checkout","tagline":"Anyone can pay from a link — no login needed","description":"Share a link and get paid. Public, branded payment pages let learners, parents or guests pay an invoice, settle fee installments, or buy a course through a stepped catalogue-to-cart-to-payment flow — all without signing in, with live payment-status tracking and a clear result screen. Every signup captures campaign attribution automatically.","roles":["Admin","Learner","Parent"],"platforms":["Public Web","Learner Web","Learner Mobile App","Admin Web"],"subFeatures":[{"name":"Public invoice payment page","description":"Each invoice link opens a mobile-friendly page showing the institute's logo, invoice details and line items, with a pay button that launches the configured gateway."},{"name":"Guest fee payment","description":"Fee dues and full installment schedules can be viewed and paid through open links — ideal for parents paying school fees without an account."},{"name":"Stepped course checkout","description":"Visitors move through catalogue, cart and payment steps with a clear progress indicator; the starting step is set by the page owner."},{"name":"Coupon entry at checkout","description":"Buyers apply coupon codes that are validated live and reflected in the payable amount."},{"name":"Enroll multiple learners at once","description":"A multi-enroll form captures several learners — for example siblings — in one transaction."},{"name":"Custom fields at signup","description":"Any custom fields configured on the page are collected and stored with the enrollment or lead."},{"name":"Automatic campaign attribution","description":"UTM source, medium, campaign, content and term on the link are captured and attributed to the resulting lead or enrollment."},{"name":"Instant account and access","description":"Successful checkout enrolls the learner into the mapped courses immediately, with a configurable success page and login access to start learning."},{"name":"Universal payment result page","description":"After checkout, payers land on a result screen that confirms success, failure or cancellation, polling the gateway for the final status."},{"name":"Multi-gateway checkout","description":"The same public flow works across Stripe, Razorpay, PhonePe, Cashfree, eWAY and PayPal based on the institute's configuration."},{"name":"Share via WhatsApp or email","description":"Payment links can be copied or sent over WhatsApp or email straight from the admin screens that generate them."}]},{"id":"learner-payment-center","name":"Learner Payment Center & In-App Checkout","tagline":"Learners see, manage and pay everything themselves","description":"Learners and parents get self-service access to their entire financial relationship with the institute: enrolling and paying in-app under any plan type, tracking dues and installments, downloading receipts and invoices, and managing memberships and saved cards — on web, mobile and desktop.","roles":["Learner","Parent"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App","Public Web"],"subFeatures":[{"name":"Checkout for every plan type","description":"Free enrollment, one-time purchase, subscription and donation checkouts, each with clear confirmation, success, pending and failure dialogs."},{"name":"Approval-based enrollment","description":"Courses that require institute approval show a pending-approval dialog with automatic status polling and a success dialog once approved."},{"name":"Enroll by invite","description":"Learners enroll through invite links sent by the institute, with a guided form and payment step where applicable."},{"name":"Gateway-matched payment experience","description":"Checkout adapts to the institute's gateway — inline card, hosted modal or redirect — across Stripe, Razorpay, PhonePe, Cashfree and eWAY, with a result page that routes redirect payments back into the course."},{"name":"Live payment status polling","description":"After paying, the app polls payment status and moves the learner from pending to success automatically — no manual refresh."},{"name":"Coupon codes at checkout","description":"Learners apply coupon codes during checkout with instant validation."},{"name":"My dues","description":"Pending and overdue installments across all fee heads, with amounts and due dates, payable online without visiting the office."},{"name":"My receipts and invoices","description":"Download past fee receipts and invoices anytime, and pay institute-issued invoices from a link."},{"name":"Membership management","description":"View active subscriptions and plans with validity, and cancel a recurring plan when needed."},{"name":"Saved payment method and billing details","description":"View the card on file, replace it securely, and keep billing name and address up to date for receipts."},{"name":"Payment history and expiry visibility","description":"A record of past payments with statuses and references, plus a list of enrollments nearing expiry so learners can renew in time."}]},{"id":"multi-currency-pricing","name":"Multi-Currency Pricing","tagline":"Charge in 16 currencies with correct local formatting","description":"Price courses, plans and invoices in the payer's currency. The platform supports 16 charge currencies and handles each one's symbol, formatting and minor-unit rules — including zero-decimal currencies like yen — correctly across checkout, invoices and reports.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"16 charge currencies","description":"USD, EUR, GBP, INR, AED, SAR, QAR, AUD, CAD, SGD, HKD, NZD, CHF, JPY, ZAR and MYR available anywhere a price is set."},{"name":"Per-currency prices","description":"Payment plans and coupons carry explicit prices per currency rather than converted approximations."},{"name":"Correct minor-unit handling","description":"Gateways are charged in exact minor units per currency — paise, cents, zero-decimal yen — eliminating rounding surprises."},{"name":"Localized symbols everywhere","description":"Every dashboard, invoice and checkout screen renders the right currency symbol and formatting automatically."},{"name":"Institute default currency","description":"Set your default currency once and all new plans and invoices inherit it."}]},{"id":"per-learner-markdowns","name":"Per-Learner Price Markdowns","tagline":"Case-by-case pricing without touching the public plan","description":"Give an individual enrollment a special price without editing the published plan. Apply a percentage or fixed-amount markdown to a plan for specific enrollment links, look up current markdowns before quoting a family, and reset back to standard pricing at any time.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Percent or absolute markdowns","description":"Reduce a plan's price by a percentage or a fixed amount for targeted enrollment invites."},{"name":"Markdown lookup","description":"Query which plans currently carry markdowns and by how much before quoting a price."},{"name":"One-click reset","description":"Remove a markdown and restore the standard published price instantly."},{"name":"Enrollment-invite discounts","description":"Attach discount options directly to specific enrollment invites so a particular admission link carries its own pricing."}]},{"id":"coupons-discount-codes","name":"Coupons & Discount Codes","tagline":"Discount codes with caps, scopes and email locks","description":"Create discount coupons that apply at any checkout: percentage or flat discounts with an optional maximum cap, usable institute-wide or scoped to specific courses and invite links, with usage limits and optional restriction to named email addresses. Coupon-driven promotions and campaigns pair with the Marketing & Website tools.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"Coupon codes","description":"Custom codes (e.g. SAVE20) with configurable percentage or flat discount value."},{"name":"Maximum discount cap","description":"Cap the monetary value of percentage discounts."},{"name":"Usage limits","description":"Limit total redemptions or leave a coupon unlimited."},{"name":"Scope control","description":"Run coupons institute-wide or scope them to specific courses or invite links."},{"name":"Email-restricted coupons","description":"Restrict a coupon to specific email addresses — perfect for negotiated or alumni discounts."},{"name":"Live validation at checkout","description":"Coupons are validated instantly at public and in-app checkout, with the discount reflected in the payable amount."}]}]},{"id":"erp","name":"Institute ERP, HR & Operations","icon":"erp","color":"#4338CA","tagline":"Enrollment, batches, branches, staff and payroll — run the institute","description":"Run the entire institute — not just the teaching — from one platform. This pillar covers the operational backbone: a complete learner directory with every enrollment tool from single admissions to 10,000-row bulk imports, batch and session structures with live seat inventory, automated renewals, branch and franchise management, parent engagement, and a full HR suite spanning staff attendance, leave, approvals and payroll. Everything your registrar, HR team and branch managers do daily, unified with your academics.","features":[{"id":"learner-directory","name":"Learner Directory & Profiles","tagline":"Every learner — searchable, filterable, fully profiled","description":"A central directory of every learner in the institute with fast search, deep filtering and a detailed profile panel for each person. Admins see enrollment details, contact and guardian info, custom fields, payment status and learning progress in one place, and can export any view to CSV.","roles":["Admin","Teacher","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Server-side search with auto-suggest","description":"Paginated learner table with name search and type-ahead suggestions, scoped to your institute and academic session."},{"name":"Rich filtering","description":"Filter by batch, status (active, inactive, invited, pending approval), gender, session expiry window, payment status, approval status, abandoned cart, sub-organization, sub-org role and any custom field."},{"name":"Side-panel profile","description":"Open any learner's full profile — personal details, batch memberships, custom fields, payment plan and enrollment history — without leaving the list."},{"name":"Learning progress drill-down","description":"See study progress per subject, module, chapter and slide, including video watch percentage, pages read, quiz and assignment completion, and last activity."},{"name":"Custom field values per learner","description":"View and edit institute-defined custom fields captured at enrollment for each learner."},{"name":"Edit learner details","description":"Update a learner's name, contact, address, guardian details and other profile fields at any time."},{"name":"CSV export","description":"Export the full filtered list or a basic-details version to CSV, including an account-credentials export for offline distribution."},{"name":"Learner statistics","description":"Aggregate headcounts by status, batch and user type for instant reporting."},{"name":"Multi-course memberships view","description":"See every course and batch a learner is enrolled in, with expiry date and status per enrollment."}]},{"id":"enrollment-invite-links","name":"Enrollment Invite Links","tagline":"Shareable enrollment pages with forms and payment built in","description":"Create branded invite links that let learners self-enroll into chosen courses and batches. Each invite carries its own registration form, payment plans, discounts and referral programs, and every response is tracked, reviewed and approved before or after enrollment.","roles":["Admin","Learner"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Invite builder","description":"Pick the courses, sessions, levels and batches an invite covers; optionally let the learner choose from allowed options via dropdowns."},{"name":"Custom registration form","description":"Add your custom fields to each invite's form to capture exactly the data you need; a sensible default form is generated automatically."},{"name":"Payment plans on invites","description":"Attach free, one-time, subscription or donation payment plans with pricing per invite."},{"name":"Discounts","description":"Configure discounts on invite pricing through a dedicated discount setup."},{"name":"Referral programs","description":"Attach referral reward programs so existing learners bring in new ones through the same link."},{"name":"Invite lifecycle management","description":"List, edit, preview, copy and activate or close invites — closed links stop accepting registrations."},{"name":"Response review queue","description":"Every submission is stored with status; browse, filter and accept or reject registrations individually or in bulk."},{"name":"Automatic registrant emails","description":"Invitation and status update emails are sent to registrants automatically."},{"name":"Default invite resolution","description":"Bulk operations and enrollments can resolve a batch's default invite automatically, keeping pricing and forms consistent everywhere."}]},{"id":"manual-assisted-enrollment","name":"Manual & Assisted Enrollment","tagline":"Enroll a learner in seconds, with or without payment","description":"Multiple ways to get learners into courses: a step-by-step enrollment wizard, direct admin enrollment into any batch, and enrollment on a learner's behalf with recorded offline payment. Enrollment automatically sends welcome messages with login credentials.","roles":["Admin","Counsellor","Learner"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Enrollment wizard","description":"Guided form to add a single learner with personal details, guardian info, batch selection, expiry and custom fields."},{"name":"Direct admin enrollment","description":"Enroll an existing or new user straight into a batch, optionally attaching a payment plan and recording an offline payment amount and mode."},{"name":"Add to more batches","description":"Attach additional course batches to an existing learner without re-entering their details."},{"name":"Automatic welcome messages","description":"Send the learner their username and password by email or WhatsApp the moment they are enrolled."},{"name":"Self-enrollment","description":"Learners can join through institute pages and catalog checkout, feeding the same directory."},{"name":"Re-enroll inactive learners","description":"One click restores access for a learner whose registration ended."},{"name":"Enrollment audit trail","description":"Every learner add and update is captured in the admin activity log automatically."}]},{"id":"bulk-learner-import","name":"Bulk Learner Import (CSV)","tagline":"Onboard hundreds of learners from one spreadsheet","description":"Upload a CSV to enroll whole batches at once. You control exactly which columns appear in the template — address, guardian details, expiry, status — and can auto-generate usernames, passwords and enrollment IDs so learners are login-ready immediately.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Configurable CSV template","description":"Choose optional columns (address, city, region, pincode, parent name, parent mobile/email, linked institute, expiry days, status) before download so the sheet matches your data."},{"name":"Auto-generated credentials","description":"Toggle auto-generation of usernames, passwords and enrollment IDs during import."},{"name":"Row-level validation","description":"Uploads are validated with per-row results so bad rows can be fixed and re-uploaded."},{"name":"Default expiry and status","description":"Apply a default access expiry and enrollment status to every imported learner."},{"name":"Credential distribution","description":"Send imported learners their login credentials in bulk after import."}]},{"id":"bulk-assign-deassign","name":"Bulk Assign & De-assign","tagline":"Move thousands of learners between courses, safely","description":"A bulk engine that assigns existing users, brand-new users or a filtered audience into one or more batches — or removes them — in a single operation. A dry-run preview shows exactly what will happen before you commit, with duplicate handling, offline payment capture and optional notifications.","roles":["Admin"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Assign by list, new users or filter","description":"Target explicit users, freshly created users with full profiles including guardian data, or a saved user filter — all in one operation."},{"name":"Multiple destination batches","description":"Each assignment specifies its batch, invite link, payment option, plan and access days, with per-assignment custom field values."},{"name":"Dry-run preview","description":"Simulate the whole operation and see the per-user outcome before committing anything."},{"name":"Duplicate handling","description":"Choose how already-enrolled users are treated (for example, skip) so re-runs are always safe."},{"name":"Offline payment capture","description":"Record a payment amount, mode, transaction ID and date against each bulk enrollment for fee reconciliation."},{"name":"Installment overrides","description":"Override installment schedules for bulk-enrolled users where payment plans apply."},{"name":"Soft or hard de-assign","description":"Remove learners from batches in recoverable soft mode or permanent hard mode, with optional notification and its own dry-run."},{"name":"Optional notifications and credentials","description":"Decide whether learners are notified and whether login credentials are sent as part of the bulk action."}]},{"id":"enrollment-approvals","name":"Enrollment Requests & Approvals","tagline":"Review and approve who joins, one by one or in bulk","description":"A dedicated inbox of learners whose enrollment is pending approval or who were invited but not yet confirmed. Filter by gender, preferred batch, payment status and payment option, then accept or decline individually or across a whole selection.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Pending-request inbox","description":"See every learner awaiting approval or confirmation, with their requested batch and payment details."},{"name":"Accept / decline actions","description":"Approve or reject a request in one click, with bulk accept and bulk decline across selections."},{"name":"Approval with batch placement","description":"Approving a request enrolls the learner into their requested batch immediately."},{"name":"Triage filters","description":"Filter requests by gender, preferred batch, payment status, approval status and payment option."},{"name":"Outreach from the inbox","description":"Share credentials or send WhatsApp and email to requestors without leaving the screen."}]},{"id":"learner-lifecycle-actions","name":"Learner Lifecycle Actions","tagline":"Change batch, extend, renew, terminate — solo or in bulk","description":"Day-to-day registrar actions available on any learner or any multi-select of learners: batch transfers, access extensions, next-session re-registration, termination and deletion, plus outbound actions like credential sharing, WhatsApp and email blasts, and certificate creation.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Change batch","description":"Move one or many learners to a different course, session and level in one dialog."},{"name":"Extend access","description":"Push out session expiry dates individually or in bulk."},{"name":"Re-register for next session","description":"Roll learners into the next academic session with target packages and access days; study material can carry over from the previous session."},{"name":"Terminate registration","description":"End a learner's enrollment, optionally triggering a configured off-boarding workflow."},{"name":"Re-enroll","description":"Restore an inactive learner's access with a single click."},{"name":"Delete learner","description":"Remove learner records entirely, with confirmation and bulk support."},{"name":"Share credentials","description":"Send usernames and passwords to selected learners via your configured channels."},{"name":"Bulk WhatsApp & email","description":"Message any selection of learners straight from the list."},{"name":"Create certificates","description":"Generate course-completion certificates for selected learners from the same bulk menu."}]},{"id":"batch-session-management","name":"Batch & Academic Session Management","tagline":"Structure courses into sessions, levels and batches","description":"Manage the institute's academic structure end to end: create academic sessions, levels and batches through guided steps, organize cohorts into hierarchies, and administer everything from one screen with learner counts always in view.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Create batch wizard","description":"A step-by-step dialog creates the course, level and session in sequence, producing a ready-to-enroll batch."},{"name":"Academic session administration","description":"Add, edit and delete academic sessions, with guards against destructive deletes."},{"name":"Batch listing & summary","description":"Paginated batch lists per session with learner counts, start times, status, and search."},{"name":"Parent-child batch hierarchies","description":"Link parent batches to child batches for cohort hierarchies and franchise structures."},{"name":"Sub-org association","description":"Assign batches to sub-organizations so each branch sees only its own cohorts."},{"name":"Learner grouping","description":"Tie batches to named groups for organizing cohorts within a course."},{"name":"Bulk batch lookup","description":"Look up many batches at once for reporting or integration scenarios."},{"name":"Safe deletion","description":"Remove batches that are no longer needed, individually or in bulk, with confirmation."}]},{"id":"seat-inventory","name":"Seat Inventory Management","tagline":"Cap seats per batch and watch availability live","description":"Set maximum seats for any batch and monitor capacity across the institute in real time. Seats are reserved and released automatically during enrollment, and dashboards flag batches that are nearly full — so sales can push urgency or admins can add capacity.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Per-batch capacity","description":"Set maximum seats and available slots for each batch, or mark it unlimited."},{"name":"Automatic reservations","description":"Seats are reserved and released automatically as learners move through enrollment flows — no overselling."},{"name":"Capacity stat cards","description":"At-a-glance totals: total batches, limited vs unlimited, total capacity, seats remaining, and low-availability and critical batches."},{"name":"Availability checks & filters","description":"Check availability for one batch or many at once, and filter inventory by course, level, session, search text and availability status."},{"name":"Table and card views","description":"Switch between a dense table and visual cards over the same inventory data."},{"name":"Quick capacity updates","description":"Update seat counts from a dialog without leaving the inventory screen."}]},{"id":"renewal-automation","name":"Enrollment & Renewal Automation","tagline":"Expiries, reminders and renewals that run themselves","description":"Define per-batch policies for everything around expiry: automated email, WhatsApp and push reminders before and on expiry, waiting periods, automatic renewal charges for saved payment methods, and re-enrollment rules. The scheduler executes these policies continuously without staff involvement.","roles":["Admin","Learner"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Pre-expiry and on-expiry notifications","description":"Configure templated reminders per channel (email, WhatsApp, push) triggered before expiry or the moment it arrives."},{"name":"Expiry processing pipeline","description":"Automated processing moves learners correctly through pre-expiry, waiting period and final expiry stages."},{"name":"Automatic renewal charging","description":"Subscription renewals are charged automatically, and the success or failure drives the learner's status."},{"name":"Re-enrollment rules","description":"Set re-enrollment gap validation and upgrade options, with invite links shown to expired learners."},{"name":"Repurchase behavior","description":"Choose whether a repurchase while still active stacks onto remaining time or overwrites it."},{"name":"Workflow hooks & learner actions","description":"Attach workflows and interactive elements — such as WhatsApp buttons — to each lifecycle stage."},{"name":"Sub-org payment routing","description":"The policy engine recognizes sub-organization-paid enrollments and routes renewal charges accordingly."}]},{"id":"sub-organization-management","name":"Sub-Organization (Branch & Franchise) Management","tagline":"Run branches, franchises and partner orgs under one roof","description":"Create and manage sub-organizations — branches, franchise partners or client companies — each with its own team, seat allocation and finances. Parent-institute admins see seat usage, a full financial ledger and subscription status per sub-org, while partners manage their own learner rosters without needing admin-portal access.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Learner Web"],"subFeatures":[{"name":"Create sub-orgs","description":"Spin up a sub-organization directly, or create one bundled with a subscription — seats, validity and courses — in one step."},{"name":"Seat usage tracking","description":"Monitor seats consumed versus purchased for each sub-org subscription."},{"name":"Financial ledger","description":"Per-sub-org ledger with invoice, payment, waiver, adjustment and penalty entries; record payments and mark invoices paid from the UI."},{"name":"Subscription status","description":"See each sub-org's subscription state and pending installments at a glance."},{"name":"Team roster","description":"Add or remove sub-org team members, list them with filters, and view each member's installment history."},{"name":"Scoped invite links","description":"Enrollment invites can be scoped to a sub-org so its learners register under the right branch."},{"name":"Analytics panel","description":"Per-sub-org dashboard covering admin payments, invoices, member courses and learner lists."},{"name":"Learner-to-sub-org linking","description":"Learners link to sub-orgs as direct, inherited or partnership members, and the main directory filters by sub-org."},{"name":"Member outstanding balances","description":"Per-member financial summary of total accrued, paid, balance and overdue amounts in the sub-org's currency."},{"name":"Partner self-serve roster","description":"Partners get their own in-app screen to view their member roster, add learners individually with custom fields, or bulk upload many at once."},{"name":"Partner member removal","description":"Partners can select and terminate members from their own organization directly."}]},{"id":"sub-org-self-registration","name":"Sub-Org Self-Registration","tagline":"Partners onboard themselves through a public link","description":"Publish a registration link that lets a new branch or partner organization sign itself up end to end: fill a custom form, accept terms, verify by OTP, complete KYC, pay online and receive a ready-made workspace with admin access — with optional manual approval by the parent institute.","roles":["Admin"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Registration templates","description":"Design reusable templates defining form steps, custom fields, terms document and consent items, seat count, validity, allowed team roles, admin permissions and included courses."},{"name":"Public multi-step flow","description":"Applicants save their details, verify email or phone by OTP with resend, and can resume an interrupted registration later."},{"name":"Built-in payments","description":"Collect registration payment online with retry support and a configurable vendor and currency."},{"name":"KYC verification","description":"Integrated identity verification with a document checklist and live status updates."},{"name":"Approval gate & caps","description":"Optionally require parent-institute approval, and cap total registrations per link."},{"name":"Completion experience","description":"Custom completion message, button label and redirect so new partners land exactly where you want them."},{"name":"Registrations pipeline","description":"List every registration with status — including KYC status — and manage templates centrally."}]},{"id":"staff-team-management","name":"Staff, Teams & Org Chart","tagline":"Your whole staff, their teams, and who reports to whom","description":"Manage every staff account centrally — invite by email with pre-assigned roles, create users in bulk, distribute credentials and reset passwords. Model your real organization with departments, nested teams, team heads and reporting lines, all visualized on an interactive org chart.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Institute users view","description":"List all staff with role and status filters, enable or disable accounts, and edit roles in place."},{"name":"Email invitations with roles","description":"Invite admins, teachers, course creators, assessment creators and evaluators with roles pre-assigned; resend or edit pending invitations before acceptance."},{"name":"Bulk user creation","description":"Create many users in one operation — onboard an entire teaching staff at once."},{"name":"Credentials & passwords","description":"Send login credentials individually or in batches, and update or reset passwords when someone is locked out."},{"name":"Search & profile management","description":"Type-ahead search across all users, with editable profiles — name, email, mobile, photo — reflected across every app."},{"name":"Teams & sub-teams","description":"Create named teams, nest them under parent teams, order them for display, and manage each member's access."},{"name":"Team heads & member roles","description":"Designate a head for each team and give every member a role label, such as 'Senior Counsellor'."},{"name":"Reporting lines & org chart","description":"Link each member to the person they report to, and see the whole hierarchy on a visual, drag-and-drop org chart with permission-controlled visibility."},{"name":"Hierarchy lookups","description":"Trace any member's full chain of managers upward, everyone beneath them, and every team they belong to."},{"name":"Sub-org scoped team views","description":"Filter users by sub-org and view a per-sub-org team page with its own analytics."},{"name":"Inactive-user export","description":"Export a CSV of users inactive for a chosen number of days to drive re-engagement."}]},{"id":"roles-permissions","name":"Roles & Granular Permissions","tagline":"Decide exactly what each role sees and can do","description":"Access is governed by roles — Admin, Teacher, Evaluator and Learner out of the box — plus unlimited custom roles you define yourself. Configure each role's entire portal experience: which sidebar sections, tabs, columns and dashboard widgets appear, and which sensitive actions are allowed.","roles":["Admin"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Built-in role set","description":"Admin, Teacher and Evaluator roles for staff plus the Learner role for students, each unlocking the right screens and actions."},{"name":"Custom roles","description":"Create, rename and delete institute-specific roles — such as 'Front Desk' or 'Lead Manager' — each with its own permission set and configuration screen."},{"name":"Per-institute role scoping","description":"The same person can be an Admin in one institute and a Teacher in another — roles are scoped to each workspace."},{"name":"Role lifecycle management","description":"Add or remove roles on users, view counts per role, filter by status (invited, active, disabled), and disable access without deleting the account."},{"name":"Per-user permission grants","description":"Grant individual users named permissions on specific resources, on top of what their roles provide."},{"name":"Layout & navigation control","description":"Toggle sidebar sections per role, and add custom tabs and sub-tabs — for example, links out to your own tools."},{"name":"Course & slide permissions","description":"Control access to All Courses, Authored Courses, Courses In Review and Course Approval, plus slide-level rights: copy, move, delete, download and read-only viewing."},{"name":"Learner profile tab control","descriptio
