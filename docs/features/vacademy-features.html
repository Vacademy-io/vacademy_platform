lish, and tracks verification status separately for marketing, transactional and notification email.","roles":["Admin"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Self-serve sender verification","description":"Start verification of a custom from-address directly from the product; the platform handles the email-provider setup behind the scenes."},{"name":"DNS record guidance","description":"The verification flow returns the DNS records needed for domain authentication and reports live verification status."},{"name":"Per-purpose sender identities","description":"Configure distinct verified senders for marketing, transactional and notification emails — each independently managed, testable and restorable to defaults."},{"name":"Sender configuration management","description":"Create, update, delete and test per-institute email configurations, including from-name display and default templates."}]},{"id":"webhooks-open-api","name":"Webhooks & Open API","tagline":"Connect Vacademy to anything you build, buy or use","description":"Real-time webhooks for platform events and a REST API covering the platform's core entities let you connect Vacademy to your own systems. Pre-built connectors cover your WordPress website, lead-ad platforms and payment gateways — included with the platform, no enterprise upsell.","roles":["Admin"],"platforms":["API","Admin Web"],"subFeatures":[{"name":"Real-time webhooks","description":"Signed webhook events across the learner lifecycle — enrollment, payments, exams, certificates, leads and more — delivered to your endpoints as they happen."},{"name":"REST API coverage","description":"Programmatic access to courses, batches, learners, exams, payments, certificates and leads for your own integrations."},{"name":"Reliable delivery","description":"Webhook deliveries retry automatically on failure so transient outages on your side don't lose events."},{"name":"Native connectors","description":"Ready-made integrations for WordPress sites, Meta and Google lead ads into the CRM, and payment-gateway webhooks."},{"name":"External LMS connections","description":"Manage connections to external learning systems from a single settings screen, with optional custom fields mapped across each connection so records stay in sync."}]},{"id":"institute-profile-settings","name":"Institute Profile & Settings Engine","tagline":"Your identity and configuration, all in one place","description":"Maintain the institute's public profile — name, address, contact, website and type — plus branding assets like theme color and letterhead used across portals, certificates and invoices. A per-institute settings engine underneath lets you define reusable custom fields, customize role display names, and configure dozens of behavior settings across the product.","roles":["Admin"],"platforms":["Admin Web","Public Web","API"],"subFeatures":[{"name":"Institute details editing","description":"Update name, address, email, website and other profile fields; separate learner-portal and admin-portal URLs are stored per institute."},{"name":"Institute types","description":"Classify your organization as a college, school, online coaching or offline coaching institute."},{"name":"Theme & letterhead branding","description":"Set the institute theme color (including role-based multi-hue themes) that skins both portals, and upload a letterhead used on generated documents."},{"name":"Custom field library","description":"Create institute-wide custom fields (text or dropdown), see where each field is used before changing it, and rename fixed system fields."},{"name":"Role display settings","description":"Customize how each role name appears to your team."},{"name":"Settings catalog","description":"Dozens of setting groups — course, LMS, lead, doubt management, live session, AI calling, content protection, theme and more — configured per institute from one place."},{"name":"Public discovery & branding endpoints","description":"Public search across institutes powers discovery experiences, and branding resolves by subdomain to serve white-labeled public pages."}]},{"id":"cloud-file-storage-delivery","name":"Cloud File Storage & Secure Media Delivery","tagline":"Every file stored safely, delivered fast, under your control","description":"Every image, video, PDF, recording and document across the platform is stored securely in the cloud and delivered through smart links you control. Uploads go straight from the user's device to cloud storage via secure one-time links, so even very large lecture videos upload fast, and protected content is served through expiring links that can't be reused forever.","roles":["Admin","Teacher","Counsellor","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App","Engage Client","Public Web","API"],"subFeatures":[{"name":"Direct-to-cloud uploads","description":"Files upload straight from the user's device to cloud storage using secure, time-limited upload links — no size bottlenecks, with public-page flows accepting uploads from visitors who aren't logged in."},{"name":"Public and private storage tiers","description":"Open content like thumbnails and catalogue images lives in a fast public tier; sensitive files sit in a private tier reachable only via authorized links, and a private file can be promoted to public when you choose."},{"name":"Encrypted storage for sensitive recordings","description":"Sensitive media such as phone-call recordings is stored with encryption at rest and is only reachable via expiring authorized links."},{"name":"Permanent and expiring links","description":"Open content gets stable always-on links suitable for websites and emails; protected content is served through links that expire after a chosen number of days."},{"name":"Automatic file cataloguing","description":"Each upload records its name, type, size, dimensions and originating feature, so every file stays organized and traceable to its source — and can be looked up by what it belongs to."},{"name":"Smart caching for speed","description":"Delivery uses browser caching and change-detection so repeat views load instantly without re-downloading, while access rules stay intact."},{"name":"Instant links & bulk lookups","description":"Uploads return a ready-to-use viewing link immediately, and pages with lots of media resolve many file links in one request to stay fast."},{"name":"Safe deletion","description":"Files can be removed individually or in batches, with soft-delete protecting user-library files from accidental permanent loss."}]},{"id":"file-library-sharing","name":"File Library & Sharing","tagline":"The right files, shared with exactly the right people","description":"A central library of files, links and rich notes that can be shared with exactly the right audience — a single user, a batch, a role or the whole institute, each with view or edit rights. Learners get a dedicated My Files area listing every report, note and document shared with them, organized into browsable folders.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App","API"],"subFeatures":[{"name":"Multi-format entries","description":"Store uploaded files, external web links or rich notes; media is classified as video, audio, PDF, document, image or note."},{"name":"Fine-grained sharing","description":"Grant access at user, batch, role or institute level, with separate view and edit permissions per grant."},{"name":"Access review & editing","description":"Inspect who can see any file and update its access list at any time; withdrawn shares disappear from learner views automatically."},{"name":"Personal folders with icons","description":"Each user's files are organized into named folders with custom icons — certificates, reports, notes — browsable one folder at a time."},{"name":"Learner My Files area","description":"Learners see everything shared with them with type icons and shared dates: links open in a new tab, rich notes read in an in-app preview, and files download via secure links — ideal for report cards, forms and study packs."},{"name":"Email asset library","description":"Upload and browse images used inside email campaigns, kept separate from learning content."}]},{"id":"document-conversion-engine","name":"Smart Document Conversion Engine","tagline":"PDFs and docs become clean, editable web content","description":"Behind features like question import and AI content generation sits a conversion engine that turns PDFs and Word documents into clean web text. It tracks every conversion's status, hosts extracted images automatically, and tidies messy formatting so the result is ready to use.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"PDF and document to web text","description":"Documents are converted to rich web text through professional conversion services, preserving structure and content."},{"name":"Conversion status tracking","description":"Every conversion job records its progress and finished result, so long conversions can be checked and retrieved when ready."},{"name":"Embedded images auto-hosted","description":"Images buried inside documents are extracted, uploaded to cloud storage and swapped for fast-loading hosted links."},{"name":"Legacy image format rescue","description":"Old Windows metafile graphics (WMF/EMF) common in older question banks are converted to modern images that display everywhere."},{"name":"Formatting cleanup","description":"Redundant styling and clutter produced by word processors is stripped so converted content looks clean and consistent."}]},{"id":"background-task-tracker","name":"Background Task Tracker","tagline":"Watch long-running jobs finish without babysitting them","description":"Long-running jobs like AI content generation and document processing are tracked per institute with live statuses. Users see their institute's recent tasks, check progress messages, and pick up results — including generated files — the moment a job completes.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Per-institute task history","description":"Each institute sees its own recent tasks with name, type, status and timestamps."},{"name":"Live status and messages","description":"Tasks report progress states and human-readable status messages while they run."},{"name":"Results with attached files","description":"Finished tasks deliver their output — structured results plus any generated file with a ready download link."},{"name":"Linked task chains","description":"Related jobs, like a re-run or follow-up step, stay linked so their history reads as one connected story."}]},{"id":"platform-data-migration","name":"Platform Data Migration","tagline":"Bring users, enrollments and payment history with you","description":"Move your existing business onto the platform without losing history. A general importer takes bulk users and enrollments complete with payment history, subscriptions, tags and custom fields, while specialized CSV pipelines migrate members from legacy CRMs with staging, validation and per-row result files — so billing continuity survives the cutover.","roles":["Admin"],"platforms":["API"],"subFeatures":[{"name":"Bulk user import","description":"Import users in bulk with per-item results and defaults, including custom fields and tags."},{"name":"Bulk enrollment import","description":"Import enrollments including one-time payments, payment history, subscriptions and gateway references, so billing continuity is preserved."},{"name":"Legacy CRM pipelines","description":"Staged CSV pipelines migrate individual and organization members across active, cancelled and expired segments, each returning a results file."},{"name":"Staging & validation","description":"Records land in staging with validation and status tracking before final migration."},{"name":"Migration status monitoring","description":"Check migration progress and per-record status throughout a cutover."}]},{"id":"platform-billing-pricing","name":"Transparent Platform Billing & Flat-Fee Pricing","tagline":"Flat pricing, no revenue share — keep what you collect","description":"Vacademy is sold on flat annual pricing with no revenue share, no learner caps hidden in the fine print, and no percentage of your fee collections. Everything your institute buys from Vacademy — plans and credit packs — runs through a clean billing pipeline with itemized, tax-compliant invoices and verified payment confirmation.","roles":["Admin"],"platforms":["Admin Web","Public Web","API"],"subFeatures":[{"name":"Flat-fee, no-revenue-share model","description":"A flat annual platform fee instead of a percentage of collections — institutes keep 100% of what they collect from learners."},{"name":"Included white-label add-ons","description":"Branded Android and iOS apps published on your developer accounts, payment-gateway integration and setup assistance are included in the plan rather than sold as upsells."},{"name":"Pay-per-use AI credits","description":"Core AI features are included, with metered AI usage billed through reviewable, controllable credits and a basic allowance included for normal academic use."},{"name":"Itemized platform invoices","description":"Each purchase produces an invoice with line items, tax breakup and totals tied to the exact payment record, with multi-currency price display for international buyers."},{"name":"Verified payment fulfillment","description":"Payments are confirmed via signed gateway callbacks, and support can manually fulfill a payment that verifiably succeeded but missed its callback."},{"name":"Full payment lifecycle audit","description":"Every platform payment tracks its complete lifecycle — created, paid, fulfilled, failed — for clean reconciliation."},{"name":"Data ownership & export","description":"Your institute owns its data outright, with full export capability."}]},{"id":" function icon(k,s){return '<svg width="'+(s||22)+'" height="'+(s||22)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[k]||ICONS.plat)+'</svg>'}
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- derived counts ---------- */
const nFeat = DATA.pillars.reduce((s,p)=>s+p.features.length,0);
const nSub  = DATA.pillars.reduce((s,p)=>s+p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0),0);
document.getElementById('updated').textContent = 'Updated '+DATA.meta.updated;
document.getElementById('foot').innerHTML =
  esc(DATA.meta.name)+' Feature Catalog · '+DATA.pillars.length+' products · '+nFeat+' features · '+nSub+' capabilities · Updated '+esc(DATA.meta.updated)+
  '<br>Maintained alongside <code>vacademy-features.md</code>. To update: edit the <code>DATA</code> object inside this file.';

/* ---------- routing ---------- */
function go(h){ if(location.hash===h){render()} else {location.hash=h} }
window.addEventListener('hashchange', render);

function parseHash(){
  const h = location.hash.replace(/^#\/?/,'');
  if(!h) return {view:'home'};
  const parts = h.split('/').filter(Boolean); // p/<pillar>/<feature?>
  if(parts[0]==='p' && parts[1]){
    const p = DATA.pillars.find(x=>x.id===parts[1]);
    if(p) return {view:'pillar', p, fid:parts[2]||null};
  }
  return {view:'home'};
}

/* ---------- home ---------- */
function renderHome(){
  const cards = DATA.pillars.map(p=>{
    const preview = p.features.slice(0,4).map(f=>esc(f.name)).join(' · ');
    return '<button class="pcard" style="--pc:'+p.color+'" onclick="go(\'#/p/'+p.id+'\')">'
      +'<div class="picon">'+icon(p.icon)+'</div>'
      +'<h3>'+esc(p.name)+'</h3>'
      +'<div class="tag">'+esc(p.tagline)+'</div>'
      +'<div class="tag" style="font-size:12px;color:var(--ink-3)">'+preview+'…</div>'
      +'<div class="cnt"><span>'+p.features.length+' features · '
      +p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0)+' capabilities</span>'
      +'<span class="go">Explore <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></span></div>'
      +'</button>';
  }).join('');
  return '<div class="hero"><h1>'+DATA.meta.headline+'</h1>'
    +'<p>'+esc(DATA.meta.subhead)+'</p>'
    +'<div class="stats"><span class="stat"><b>'+DATA.pillars.length+'</b> products</span>'
    +'<span class="stat"><b>'+nFeat+'</b> features</span>'
    +'<span class="stat"><b>'+nSub+'</b> capabilities</span>'
    +'<span class="stat"><b>4</b> apps — admin, learner web, mobile, desktop</span></div></div>'
    +'<div class="grid">'+cards+'</div>'
    +'<div class="byline">Tip: press <b>/</b> anywhere to search every feature and capability.</div>';
}

/* ---------- pillar ---------- */
function featCard(p,f){
  const roles=(f.roles||[]).map(r=>'<span class="chip role">'+esc(r)+'</span>').join('');
  const plats=(f.platforms||[]).map(r=>'<span class="chip">'+esc(r)+'</span>').join('');
  const sfs=(f.subFeatures||[]).map((s,i)=>'<div class="sf" id="sf-'+f.id+'-'+i+'"><div class="sn">'+esc(s.name)+'</div><div class="sd">'+esc(s.description)+'</div></div>').join('');
  return '<article class="fcard" id="f-'+f.id+'" style="--pc:'+p.color+'">'
    +'<div class="fhead"><h2>'+esc(f.name)+'</h2><span class="ftag">'+esc(f.tagline||'')+'</span></div>'
    +'<p class="fdesc">'+esc(f.description)+'</p>'
    +'<div class="chips">'+roles+plats+'</div>'
    +((f.subFeatures&&f.subFeatures.length)?
      '<button class="sf-toggle" aria-expanded="false" onclick="toggleSf(this)">'
      +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>'
      +f.subFeatures.length+' capabilities</button><div class="sflist">'+sfs+'</div>':'')
    +'</article>';
}
function toggleSf(btn){
  const open = btn.getAttribute('aria-expanded')==='true';
  btn.setAttribute('aria-expanded', String(!open));
  btn.nextElementSibling.classList.toggle('open', !open);
}
function setAll(open){
  document.querySelectorAll('.sf-toggle').forEach(b=>{
    b.setAttribute('aria-expanded',String(open));
    b.nextElementSibling.classList.toggle('open',open);
  });
}
function renderPillar(p){
  const nav = p.features.map(f=>'<a href="#/p/'+p.id+'/'+f.id+'" data-f="'+f.id+'">'+esc(f.name)+'</a>').join('');
  const cards = p.features.map(f=>featCard(p,f)).join('');
  return '<div class="crumbs"><button onclick="go(\'#/\')">All products</button>'
    +'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="m9 6 6 6-6 6"/></svg>'
    +'<span>'+esc(p.name)+'</span></div>'
    +'<div class="pillar-head" style="--pc:'+p.color+'"><div class="picon">'+icon(p.icon,26)+'</div>'
    +'<div><h1>'+esc(p.name)+'</h1><div class="tag">'+esc(p.tagline)+'</div></div></div>'
    +'<p class="pillar-desc">'+esc(p.description)+'</p>'
    +'<div class="toolbar"><button class="chipbtn" onclick="setAll(true)">Expand all</button>'
    +'<button class="chipbtn" onclick="setAll(false)">Collapse all</button>'
    +'<span style="font-size:12.5px;color:var(--ink-3)">'+p.features.length+' features · '
    +p.features.reduce((t,f)=>t+(f.subFeatures?.length||0),0)+' capabilities</span></div>'
    +'<div class="pillar-body"><nav class="sidenav" id="snav">'+nav+'</nav><div>'+cards+'</div></div>';
}

/* ---------- render ---------- */
let scrollObs=null;
function render(){
  const r = parseHash();
  const app = document.getElementById('app');
  closeResults();
  if(scrollObs){scrollObs.disconnect();scrollObs=null}
  if(r.view==='home'){ app.innerHTML = renderHome(); window.scrollTo(0,0); document.title='Vacademy — Feature Catalog'; return; }
  app.innerHTML = renderPillar(r.p);
  document.title = r.p.name+' — Vacademy Feature Catalog';
  // sidenav active tracking
  const links=[...document.querySelectorAll('#snav a')];
  scrollObs=new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){
      links.forEach(l=>l.classList.toggle('on', l.dataset.f===e.target.id.slice(2)));
    }});
  },{rootMargin:'-80px 0px -70% 0px'});
  document.querySelectorAll('.fcard').forEach(c=>scrollObs.observe(c));
  if(r.fid){
    const el=document.getElementById('f-'+r.fid);
    if(el){
      const t=el.querySelector('.sf-toggle'); if(t){t.setAttribute('aria-expanded','true');t.nextElementSibling.classList.add('open')}
      requestAnimationFrame(()=>{el.scrollIntoView({block:'start'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1700)});
    }
  } else window.scrollTo(0,0);
}

/* ---------- search ---------- */
const INDEX=[];
DATA.pillars.forEach(p=>{
  INDEX.push({kind:'product',p,text:(p.name+' '+p.tagline+' '+p.description).toLowerCase()});
  p.features.forEach(f=>{
    INDEX.push({kind:'feature',p,f,text:(f.name+' '+(f.tagline||'')+' '+f.description).toLowerCase()});
    (f.subFeatures||[]).forEach((s,i)=>INDEX.push({kind:'cap',p,f,s,i,text:(s.name+' '+s.description).toLowerCase()}));
  });
});
function hl(text,terms){
  let out=esc(text);
  terms.forEach(t=>{ if(!t)return;
    out=out.replace(new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');
  });
  return out;
}
function search(q){
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  if(!terms.length) return [];
  const hits=INDEX.filter(e=>terms.every(t=>e.text.includes(t)));
  const rank={product:0,feature:1,cap:2};
  // rank name-matches first within kind
  hits.sort((a,b)=>{
    const an=terms.every(t=>(a.kind==='cap'?a.s.name:a.kind==='feature'?a.f.name:a.p.name).toLowerCase().includes(t))?0:1;
    const bn=terms.every(t=>(b.kind==='cap'?b.s.name:b.kind==='feature'?b.f.name:b.p.name).toLowerCase().includes(t))?0:1;
    return (rank[a.kind]-rank[b.kind])||(an-bn);
  });
  return hits.slice(0,60);
}
const qEl=document.getElementById('q'), rEl=document.getElementById('results');
let activeIdx=-1, curHits=[];
function closeResults(){rEl.classList.remove('open');activeIdx=-1}
function openHit(e){
  closeResults(); qEl.blur();
  if(e.kind==='product'){go('#/p/'+e.p.id);return}
  const target='#/p/'+e.p.id+'/'+e.f.id;
  if(location.hash===target){render()} else {location.hash=target}
  if(e.kind==='cap'){
    setTimeout(()=>{const el=document.getElementById('sf-'+e.f.id+'-'+e.i);
      if(el){el.scrollIntoView({block:'center'});el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1800)}},80);
  }
}
function renderResults(q){
  curHits=search(q);
  const terms=q.toLowerCase().split(/\s+/).filter(Boolean);
  if(!q.trim()){closeResults();return}
  if(!curHits.length){rEl.innerHTML='<div class="rnone">No matches for “'+esc(q)+'”</div>';rEl.classList.add('open');return}
  const groups={product:'Products',feature:'Features',cap:'Capabilities'};
  let html='',last='';
  curHits.forEach((e,idx)=>{
    if(e.kind!==last){html+='<div class="rgroup">'+groups[e.kind]+'</div>';last=e.kind}
    const title=e.kind==='cap'?e.s.name:e.kind==='feature'?e.f.name:e.p.name;
    const path=e.kind==='cap'?(e.p.name+' › '+e.f.name):e.kind==='feature'?e.p.name:(e.p.features.length+' features');
    const desc=e.kind==='cap'?e.s.description:e.kind==='feature'?e.f.description:e.p.tagline;
    html+='<button class="ritem" data-i="'+idx+'" onclick="openHit(curHits['+idx+'])">'
      +'<div class="rt">'+hl(title,terms)+'</div><div class="rp">'+esc(path)+'</div>'
      +'<div class="rd">'+hl(desc,terms)+'</div></button>';
  });
  rEl.innerHTML=html;rEl.classList.add('open');activeIdx=-1;
}
qEl.addEventListener('input',()=>renderResults(qEl.value));
qEl.addEventListener('focus',()=>{if(qEl.value.trim())renderResults(qEl.value)});
qEl.addEventListener('keydown',e=>{
  const items=[...rEl.querySelectorAll('.ritem')];
  if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
    if(!items.length)return;
    activeIdx=(activeIdx+(e.key==='ArrowDown'?1:-1)+items.length)%items.length;
    items.forEach((it,i)=>it.classList.toggle('active',i===activeIdx));
    items[activeIdx].scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    if(activeIdx>=0&&curHits[activeIdx])openHit(curHits[activeIdx]);
    else if(curHits.length)openHit(curHits[0]);
  } else if(e.key==='Escape'){qEl.value='';closeResults();qEl.blur()}
});
document.addEventListener('click',e=>{if(!e.target.closest('.searchbox'))closeResults()});
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==qEl&&!/input|textarea/i.test(document.activeElement.tagName)){
    e.preventDefault();qEl.focus();qEl.select();
  }
});

render();
</script>
</body>
</html>
