rchase invoices automatically by email and/or WhatsApp."},{"name":"Branded short link","description":"Every page gets an auto-generated short URL on your own domain, with one-click copy for sharing."},{"name":"Post-purchase behaviour","description":"Custom success-page content, an after-payment redirect URL, an optional login button, back-navigation control during checkout, and allow/disallow deselecting bundled courses."},{"name":"Draft status and buyer preview","description":"Keep pages in draft, preview them exactly as buyers will see them, and activate when ready."}]},{"id":"lead-connectors","name":"Lead Ads & Form Connectors","tagline":"Every ad and form lead lands in your CRM automatically","description":"Connect Facebook/Instagram Lead Ads, Google lead forms and third-party form tools so every lead flows straight into your campaigns and audience lists — no CSV exports. A guided Meta sign-in picks the page and form, field mapping shapes each lead to your custom fields, and health monitoring plus backup polling keep leads arriving even when an ad platform hiccups.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web","API"],"subFeatures":[{"name":"Guided Meta connection","description":"One-click sign-in with Meta that lists the Pages you manage, warns when your account lacks full control of a Page, and returns you to your own white-label admin domain. Add several connectors in one session without repeating sign-in."},{"name":"Lead form and field mapping","description":"Browse each Page's lead forms, see their exact fields, and map every ad-form field to your campaign's custom fields — with auto-matching by name and unmapped fields kept under their original names."},{"name":"Real-time lead delivery","description":"Once connected, new leads from Meta ads land in your lead list within seconds via push delivery."},{"name":"Backup polling and manual sync","description":"A scheduled poller keeps re-fetching leads even if Meta's push delivery breaks, and a 'Sync leads now' button pulls the last 24 hours on demand — so nothing is lost."},{"name":"Connector health monitoring","description":"Per-connector health checks with diagnostics, last-lead-received time, automatic token refresh and a one-click re-subscribe fix — broken connectors surface honestly instead of silently dropping leads."},{"name":"Google Lead Form connector","description":"Generate a webhook URL and unique key to paste into Google Ads lead form extensions — no sign-in needed — routing submissions into a chosen campaign."},{"name":"Third-party form webhooks","description":"Receive submissions from Zoho Forms, Google Forms, Microsoft Forms or any generic webhook, with field mapping into your campaign's custom fields."},{"name":"Public campaign response forms","description":"Each marketing campaign gets a shareable public form — branded with your logo and colors, built from your own custom fields with validation — that captures respondents as leads with no login required."},{"name":"Routing and per-connector defaults","description":"Choose which audience list or campaign each connector feeds, and attach default values (like a branch or center name) so every lead is auto-tagged at capture."},{"name":"Connector lifecycle management","description":"List all active connectors with Meta/Google platform badges, edit, deactivate and copy webhook URLs from one place."},{"name":"Source tracking and deduplication","description":"Every lead is stamped with its source — website, Google Ads, Meta ads, manual entry and more — and repeat submissions from the same person are merged into the existing lead with the merge recorded on its timeline."},{"name":"Website enquiry capture","description":"Enquiries submitted from your public course catalogue pages are captured as leads automatically."},{"name":"Encrypted credential storage","description":"All connected-account tokens are encrypted at rest and never leave the server."}]},{"id":"email-campaigns","name":"Email Campaigns","tagline":"Design, target, schedule and send email blasts","description":"A dedicated email campaigning workspace for marketing and engagement emails. Start from a designed template or write your own, target precise audiences — including lead lists captured from your campaigns, not just enrolled users — and send now or on a schedule. Big blasts are rate-controlled automatically, and scheduled campaigns stay editable until they go out.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Campaign composer","description":"Separate internal campaign name and customer-facing subject line, rich-text or raw-HTML body, and hidden inbox preview text that appears next to the subject in recipients' inboxes."},{"name":"Template re-use","description":"Start a campaign from any saved email template — its subject auto-fills and stays editable — instead of designing from scratch."},{"name":"From-address and email classification","description":"Choose which configured sender address and display name the campaign goes out from; emails are classified as marketing, transactional or notification, each with its own deliverability treatment."},{"name":"Audience targeting with estimates","description":"Target by role, specific users, batches, tags, custom fields or captured lead lists, and see estimated recipient counts before sending."},{"name":"Exclusions","description":"Exclude specific people, batches or tags from any audience selection."},{"name":"Send now or schedule","description":"Immediate, one-time or recurring sends with timezone selection and quick picks like 'in 1 hour', 'tomorrow 9 AM' or 'next Monday 9 AM'."},{"name":"Review step and device preview","description":"A final review summarizes audience, schedule and content before confirming, with the rendered email previewable at mobile, tablet and laptop widths."},{"name":"Edit, reschedule and resend","description":"Open any not-yet-sent campaign back in the editor and change anything until its start time passes, or reopen a past campaign to adapt and send again."},{"name":"Bulk sending with rate control","description":"Large sends are processed as background batches with a configurable send rate, so big blasts don't trip provider limits."},{"name":"Attachments","description":"Emails can carry file attachments, including automatically generated documents like invoices."}]},{"id":"email-template-designer","name":"Drag-and-Drop Template Designer","tagline":"Build branded message templates without touching code","description":"A visual, block-based designer for creating reusable message templates. Drag in text, images, buttons and layout sections, insert personalisation variables from a picker, and save templates that then power announcements, campaigns and automated notifications.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Visual block editor","description":"Compose emails from drag-and-drop blocks — headings, text, images, buttons and sections — on a canvas with a formatting toolbar."},{"name":"Personalisation variables","description":"Insert merge fields like learner name or payment link from a picker; they're filled automatically per recipient at send time."},{"name":"Image uploads","description":"Upload and embed images directly inside the template editor."},{"name":"Template library with editing","description":"Create new templates and reopen any saved template later to edit it."},{"name":"Multi-channel template store","description":"The template library supports Email, WhatsApp, SMS and Push template types, each with its own variable list."}]},{"id":"course-catalog-discovery","name":"Course Catalog & Discovery","tagline":"A branded storefront where learners browse and enroll","description":"A public course storefront where learners and anonymous visitors browse, search and filter your catalog and open rich course detail pages before enrolling. Build any number of curated catalogues — including tag-based collections that stay current automatically — edit them safely as drafts with full revision history, and serve everything on your own custom domain.","roles":["Admin","Learner","Parent"],"platforms":["Admin Web","Public Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Public course catalog","description":"A browsable storefront of published courses with hero section, course cards, instructor call-to-action and supporter sections."},{"name":"Search, sort and filters","description":"Full-text course search with sorting, a filter panel (level, session, tags, price and more) and pagination."},{"name":"Multiple and tag-based catalogues","description":"Create any number of catalogues including a default one, plus shareable tag-scoped pages (like /jee or /neet) so campaigns can point buyers at a curated list that updates itself."},{"name":"Draft, publish and revision history","description":"Edit catalogues safely in a draft, publish atomically, discard drafts, and browse or restore from full revision history."},{"name":"Rich course detail pages","description":"Banner media, description, what-you-learn sections, the full curriculum structure — subjects, modules, chapters and slide counts — plus instructor info and stats, all viewable before enrolling."},{"name":"Ratings and reviews","description":"Average rating, rating distribution and learner reviews shown on the course page; enrolled learners can submit their own."},{"name":"Course leaderboard preview","description":"Course pages can showcase the batch leaderboard to build competitive excitement."},{"name":"Live seat availability","description":"Batch listings can reflect real-time seat availability from the seat inventory system."},{"name":"White-label catalog on your domain","description":"Domain-aware routing serves the catalog under the institute's own web domain with the institute's logo, colors and terminology."},{"name":"App-store compliant purchasing","description":"On iOS the app automatically adjusts paid-purchase UI where required, keeping the mobile app store-compliant."}]},{"id":"discount-coupons","name":"Discount Coupons","tagline":"Targeted promo codes with limits, scopes and expiry","description":"Create promotional codes that apply percentage or flat discounts at checkout. Control exactly who can use each code, on which courses, how many times and for how long — and the code is validated live on the public checkout before payment.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"Percentage or flat discounts","description":"Each coupon applies either a percentage (with an optional maximum discount cap) or a fixed amount in a chosen currency."},{"name":"Redemption window","description":"Set a start and end date; codes outside the window are rejected automatically."},{"name":"Usage limits","description":"Cap total redemptions per code or leave it unlimited."},{"name":"Email-restricted coupons","description":"Restrict a code to a specific list of email addresses for private offers."},{"name":"Course and batch scoping","description":"Limit a coupon to specific batches or enrollment invites so it only works where intended."},{"name":"Live validation at checkout","description":"The public checkout verifies the code instantly and shows the exact discounted amount before the learner pays."},{"name":"Coupon lifecycle management","description":"Create, edit, activate, deactivate and delete coupons; every applied discount is recorded against the payment for auditing."},{"name":"System-issued codes","description":"Coupons can also originate from registration flows, product pages or referral programs, not just manual creation."}]},{"id":"referral-programs","name":"Referral Programs","tagline":"Turn learners into your best acquisition channel","description":"Run configurable refer-a-friend programs where both the referrer and the new learner earn rewards. Choose from five benefit types, stack them into reward tiers, protect payouts with vesting, and deliver bonus content automatically by email or WhatsApp when a referral converts. Learners share and track everything from a referral screen in their app.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Five reward types","description":"Percentage discount, flat discount, bonus content (a file or link), free membership days, and reward points — configurable separately for the referrer and the referee."},{"name":"Reward tiers and thresholds","description":"Create tiered programs — for example bigger rewards after 5 referrals — with per-tier benefits, qualification rules, and points-per-referral thresholds."},{"name":"Vesting period","description":"Referrer rewards can vest only after a set number of days, protecting against refunds and fake signups."},{"name":"Offer stacking control","description":"Decide whether referral benefits can combine with other discounts or must apply alone."},{"name":"Automated reward delivery","description":"Bonus content and benefits are delivered automatically via email or WhatsApp using selectable message templates."},{"name":"Learner referral page","description":"Learners get an in-app screen with their copyable referral code and invite links, a table of who joined through them, and their earned rewards and points."},{"name":"Program templates and default","description":"Start from ready-made program templates, run multiple programs at once, and mark one as the institute default."},{"name":"Referral tracking and logs","description":"Every referral mapping and benefit payout is logged with status, beneficiary and timestamps; admins can query points balances per learner."}]},{"id":"branded-short-links","name":"Branded Short Links","tagline":"Short, trackable links on your own domain","description":"The platform automatically mints short, human-readable links for everything you share — sales pages, enrollment invites, learner invitations, coupons and notification links — and serves them from your own custom domain. Destinations can be updated later, so links people already have never break.","roles":["Admin","Counsellor","Learner"],"platforms":["Admin Web","Public Web","Learner Web","API"],"subFeatures":[{"name":"Automatic short links everywhere","description":"Sales pages, enrollment invites, learner invitations and coupon share links all get compact short codes automatically."},{"name":"Readable link slugs","description":"Short codes are generated from the content's name (like 'compiler-design') rather than random characters, with automatic suffixes when a name is taken."},{"name":"Your domain, not ours","description":"Short links resolve on the institute's own registered domain, keeping every shared URL on-brand."},{"name":"Self-healing destinations","description":"When the underlying page or invite changes, the short link updates in place — shared links never break, and deleted items clean up their links."},{"name":"One link per item, forever","description":"Requesting a link for the same course or invite always returns the same short URL — no duplicate links floating around."},{"name":"Instant redirect with info lookup","description":"Visiting a short link redirects immediately; an info mode also lets apps look up where a link points without redirecting."},{"name":"Usage logging and deactivation","description":"Each link records when it was last opened, and links can be deactivated so they stop resolving."},{"name":"Short links in messages","description":"Outbound notifications embed the short form of long deep links for cleaner SMS, WhatsApp and email content."}]},{"id":"youtube-publishing","name":"YouTube Channel Publishing","tagline":"Class recordings upload themselves to your YouTube channel","description":"Connect the institute's YouTube channel once and publish platform videos to it — including automatic publishing of live-class recordings. Set institute-wide upload defaults, trigger manual uploads, retry failures with one click, and audit the full upload history.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"One-time channel connection","description":"Securely connect the institute's YouTube account with clear status states (connected, needs reconnect, not connected) and check health anytime; disconnecting is admin-only."},{"name":"Upload defaults","description":"Set default privacy (Public, Unlisted, Private), category, license, language, tags and an optional default playlist applied to every upload."},{"name":"Automatic recording publishing","description":"Class recordings can be published to the channel automatically, with each upload traceable back to the live-class schedule it came from."},{"name":"Manual upload and retry","description":"Trigger an upload on demand and retry any failed job with one click."},{"name":"Upload history","description":"Track every video through Uploading, Uploaded, Failed or Cancelled states in a full history view."}]},{"id":"public-webinars","name":"Public Webinars & Guest Registration","tagline":"Run open demo classes that capture every registrant","description":"Make any live class public and share it as a registration link — perfect for demo classes, webinars and open houses. Visitors register through a custom form, verify their email, and join as guests without creating an account, while the institute captures every registrant's details as a ready-made follow-up list.","roles":["Admin","Counsellor","Learner"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Public or private access per class","description":"Mark a class private (enrolled batches only) or public, where anyone with the registration link can sign up."},{"name":"Custom registration forms","description":"Build the registration form from many field types — text, dropdown, number, email, URL, phone, date, long text, checkbox, radio and file upload — each optional or required."},{"name":"Email verification and duplicate check","description":"Registrants verify their email, and the system detects when an email is already registered for the session."},{"name":"Branded registration page with countdown","description":"The public page shows class details, institute branding, session status and a live countdown to start time."},{"name":"Guest join without an account","description":"Registered guests join through their own guest flow — including the built-in classroom, waiting room and in-page viewing — with attendance recorded separately."},{"name":"Registrant data for follow-up","description":"Admins can view all registration responses per session — a ready-made lead list for counsellors to work."}]},{"id":"demo-onboarding-links","name":"Public Onboarding & Instant Demo Workspaces","tagline":"Prospects go from a link to a live demo in minutes","description":"Shareable onboarding links let prospects answer a short qualification form — or skip it entirely — and drop straight into a live demo workspace matched to their organization type: school, distance learning, corporate or university. Every submission lands in a sales pipeline with instant alerts to your team.","roles":["Admin"],"platforms":["Public Web","Admin Web"],"subFeatures":[{"name":"Three link styles","description":"General links ask the full question set, custom links show hand-picked questions with prefilled answers, and direct-demo links skip questions entirely and go straight to the demo."},{"name":"Question form builder","description":"Links are assembled from a question catalogue supporting text, email, phone, long text, URL, single-select, multi-select, yes/no and even brand-color picker fields."},{"name":"Demos matched to institute type","description":"Four seeded demo environments — School, Distance Learning, Corporate and University — so every prospect sees a workspace that looks like their world."},{"name":"Instant demo handoff","description":"On submitting, the prospect is handed demo credentials and taken into the product immediately."},{"name":"Submission pipeline","description":"Submissions move through New, Viewed, Contacted, Won and Lost, with per-stage counts and filters by institute type."},{"name":"Instant team alerts","description":"A managed recipient list gets an email the moment a new prospect submits, so follow-up starts immediately."},{"name":"Link and demo management","description":"Create, edit and retire links with unique slugs, and update the demo accounts behind each institute type centrally without breaking existing links."}]},{"id":"conversion-tracking","name":"Conversion Tracking (GTM & UTM)","tagline":"Measure ad ROI end-to-end without engineering help","description":"Wire your own analytics and ad pixels into every enrollment touchpoint. Add a Google Tag Manager container institute-wide or per sales page so GA4, Meta Pixel and remarketing tags fire on your pages, and generate UTM-tagged share links straight from the editor for clean campaign attribution.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"GTM container per institute","description":"Paste a Container ID once and every tag you manage in GTM — GA4, Meta Pixel, remarketing — goes live on your platform pages."},{"name":"GTM per sales page","description":"Attach a separate GTM container to an individual sales page for campaign-specific conversion tracking."},{"name":"UTM tracking link generator","description":"Generate share links with utm_source, medium, campaign, term and content baked in, straight from the page editor toolbar."}]},{"id":"shareable-media-links","name":"Shareable Media Links","tagline":"Send a video or file as a simple expiring link","description":"Share individual videos and documents as short public links that open in a lightweight viewer — optionally tied to a recipient's phone number and auto-expiring after a set period. Ideal for WhatsApp distribution of sample lectures and notices.","roles":["Admin","Learner","Parent"],"platforms":["Public Web"],"subFeatures":[{"name":"Public media viewer","description":"A clean viewer page for shared videos (including YouTube embeds) and files — no login required."},{"name":"Phone-personalized links","description":"Links can embed the recipient's phone number for tracking and personalization."},{"name":"Auto-expiring links","description":"Shared links expire automatically after a set period to keep content controlled."}]},{"id":"vertical-solutions","name":"Vertical Solutions & Switching Support","tagline":"Purpose-built for every kind of education business","description":"Vacademy is packaged and positioned for specific education verticals, with dedicated solution configurations for exam coaching, schools, corporate training and more — plus free migration from existing tools and rapid go-live support. Localized presence spans India, the GCC, Australia and New Zealand.","roles":["Admin"],"platforms":["Public Web"],"subFeatures":[{"name":"Exam-coaching solutions","description":"Tailored configurations for IELTS (module-wise mocks, teacher-reviewed Writing and Speaking), NEET (auto-graded test series, PYQ banks, subject-wise reports) and UPSC (Prelims and Mains test series, daily current-affairs practice, AI-assisted answer evaluation)."},{"name":"Studio and wellness solutions","description":"Yoga and fitness studio setup with trial cohorts, membership and renewal handling, drip nurture and a white-label member platform."},{"name":"Schools, STEM, corporate and distance learning","description":"Dedicated positioning and setups for schools, STEM and robotics education companies scaling across schools, corporate L&D, and fully-online academies."},{"name":"Localized global reach","description":"Country- and city-specific presence across India, GCC (with Arabic-language options), Australia and New Zealand, a marketing site in 20 languages, and multi-currency pricing."},{"name":"Free migration and fast go-live","description":"Free migration from existing tools with go-live support in about 48 hours."},{"name":"Comparison and switching resources","description":"Head-to-head comparison guides against 65+ platforms — from Moodle and Canvas to Classplus, Graphy, Teachable and Docebo — with feature matrices, migration steps and switching stories to support an informed move."}]}]},{"id":"comms","name":"Communication Suite","icon":"comm","color":"#2563EB","tagline":"Announcements, email, WhatsApp, push and chat — one hub","description":"The Communication Suite gives your institute one place to reach — and hear back from — every learner, parent, teacher and lead. Broadcast rich announcements across email, WhatsApp, push and nine in-app surfaces; run two-way email and WhatsApp inboxes; resolve learner doubts to completion; and keep every message on-brand with reusable templates. Precise targeting, scheduling, approvals and deliverability protection are built in, so the right message reaches the right people at the right time.","features":[{"id":"announcement-center","name":"Announcement Center","tagline":"One announcement, delivered to every screen and channel","description":"Compose a rich announcement once and deliver it simultaneously over push notification, email and WhatsApp — and inside the apps as alerts, pins, popups, messages, posts or tasks. Announcements carry rich content, attachments and priority, move through a full lifecycle from draft to expired, and every send is tracked with delivery and read statistics.","roles":["Admin","Teacher","Counsellor"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App","API"],"subFeatures":[{"name":"Rich content composer","description":"Write announcements in a rich-text editor or switch to raw HTML source view. Content can be text, HTML, video or image, including full HTML email documents."},{"name":"Three delivery channels in one send","description":"Push notification, email and WhatsApp go out together, each with its own configuration — email subject and from-address, WhatsApp template with variable mapping, push title and body with character guidance."},{"name":"Email campaigning","description":"Full email sends with subject line, inbox preview text, template selection and campaign settings."},{"name":"Device preview","description":"Preview the announcement exactly as it will look on mobile, tablet and laptop before sending."},{"name":"Auto-fill push from content","description":"Push title and body populate automatically from the announcement, with a toggle to write them manually."},{"name":"Priority levels","description":"Mark each announcement Low, Normal, High or Urgent so critical notices stand out to recipients."},{"name":"Attachments and resources","description":"Attach documents, videos, links, images, audio and presentations so recipients get the materials with the message."},{"name":"Full announcement lifecycle","description":"Announcements move through Draft, Pending Approval, Scheduled, Active, Inactive and Expired states, with controls to activate or deactivate at any time."},{"name":"Delivery and read analytics","description":"Per-announcement stats show delivered, read, dismissed counts and dismiss rate, down to per-recipient delivery status with seen and dismissed timestamps."},{"name":"Edit, duplicate and re-deliver","description":"Update or duplicate any announcement, trigger delivery again on demand, and restart failed deliveries with recovery tracking."},{"name":"Planned and past views","description":"Separate history and schedule screens with search, status and date-range filters keep teams on top of what is queued and what already went out."}]},{"id":"in-app-channels","name":"In-App Announcement Channels","tagline":"Nine in-app surfaces, from popups to pinned dashboards","description":"Beyond email and WhatsApp, announcements appear inside the learner and admin apps in purpose-built ways: urgent alerts, dashboard pins, direct messages, class streams, a resources area, community posts, task assignments and full-screen overlays. Each surface has its own behaviour settings, and everything streams to open apps in real time.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"System alerts","description":"High-visibility alerts in users' alert trays with configurable auto-dismiss timing and priority handling."},{"name":"Dashboard pins","description":"Pin an announcement prominently on users' home dashboards for a set duration and position."},{"name":"Broadcast direct messages","description":"Deliver the announcement into each recipient's personal message inbox, with optional threaded replies."},{"name":"Class streams","description":"Post into a batch's stream, typed as General, Assignment, Live Class, Announcement, Discussion or Q&A."},{"name":"Resources feed","description":"Publish study materials into a resources area organised by folder, category and content type — document, video, link, image, audio or presentation."},{"name":"Community posts","description":"Publish to community spaces typed General, Q&A, Discussion, Study Group, Announcements, Events or Help & Support, with tags and replies."},{"name":"Announcement-as-task","description":"Turn an announcement into real work: linked slides, go-live and deadline times, estimated duration, attempts, mandatory flag and automatic deadline reminders, tracked through Live, Completed and Overdue states."},{"name":"Full-screen app overlays","description":"Show an unmissable dismissible popup on app open — ideal for exam notices, fee reminders and policy updates."},{"name":"Real-time delivery","description":"New announcements, pins, alerts and task status changes stream to open apps instantly over a live connection — no refresh needed."},{"name":"Unified message feed","description":"Every user gets a consolidated messages view with unread counts, per-channel feeds and mark-as-read or dismiss actions."},{"name":"Engagement tracking","description":"The platform records who read, dismissed, clicked, liked or shared each message, feeding delivery statistics."}]},{"id":"audience-targeting","name":"Smart Audience Targeting","tagline":"Target exactly who should hear it — nobody else","description":"Pick recipients by role, individual user, batch, tag, custom-field filter or marketing campaign audience, then layer exclusions on top. A live estimate shows how many people will receive the message before you send it.","roles":["Admin","Teacher","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Seven recipient types","description":"Address whole roles (all learners, all teachers), specific users, entire batches, batches restricted to certain org roles, tags, custom-field filters, or campaign audiences — mixed freely across multiple rows."},{"name":"Custom-field filters","description":"Narrow any audience with equals, contains, starts-with and ends-with filters on custom profile fields — for example, only learners whose city equals Pune."},{"name":"Per-row exclusions","description":"Exclude specific roles, users, batches or tags from any recipient row — for example, all learners except Batch X."},{"name":"Tag-based audiences","description":"Select one or many user tags as an audience, each with its own reach estimate."},{"name":"Campaign audiences","description":"Reach leads captured through marketing campaign forms directly from the announcement composer."},{"name":"Live reach estimate","description":"See the estimated recipient count for the whole announcement and per audience row before sending."},{"name":"Sub-organisation targeting","description":"For sub-org batches, choose whether the message goes to the batch's admins or its learners."}]},{"id":"scheduling-recurring","name":"Scheduling & Recurring Broadcasts","tagline":"Send now, later, or on a repeating schedule","description":"Announcements go out immediately, at a chosen future time, or on a repeating schedule such as every Monday at 9am. Everything is timezone-aware, visible on a schedule calendar, and executed by a reliable background scheduler.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Immediate send","description":"Deliver to the full resolved audience the moment the announcement is submitted."},{"name":"One-time scheduling","description":"Pick a future date and time in any timezone, with quick picks like 'in 1 hour', 'tomorrow 9 AM' or 'next Monday 9 AM'."},{"name":"Recurring schedules","description":"Define daily, weekly or custom repeat rules with optional start and end dates — perfect for weekly digests and fee reminders."},{"name":"Schedule calendar and queue management","description":"A schedule view lists upcoming one-time and recurring sends as calendar items, with edit, delete and a 'Deliver now' action to fire a scheduled announcement immediately."},{"name":"Reliable background delivery","description":"Scheduled sends run in the background with recovery — interrupted deliveries are detected and restarted without duplicating messages."}]},{"id":"doubts-help-queries","name":"Doubts & Help Queries","tagline":"Learners ask, the right teacher answers — tracked to resolution","description":"Learners raise doubts anchored to the exact spot in a lesson — even a specific moment in a video — and teachers answer in threaded conversations. A separate help-desk flow handles non-academic queries like payment or technical issues, with configurable types, automatic routing to the right staff, and tracking through resolution. Even logged-out website visitors can submit questions.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App","Public Web"],"subFeatures":[{"name":"Content-anchored doubts","description":"Doubts capture the exact content position — a video timestamp chip jumps anyone reading the doubt to that moment — so teachers see precisely what the learner was viewing."},{"name":"In-slide doubt sidebar","description":"Learners ask and teachers answer right next to the slide the doubt refers to, keeping the conversation in context."},{"name":"Threaded replies","description":"Every doubt is a conversation: replies, history and follow-ups stay together in one thread."},{"name":"Central doubts inbox","description":"Admins and teachers triage every doubt across courses in a filterable inbox — by batch, status, type and assignee."},{"name":"Automatic assignment rules","description":"Route new queries to the subject teacher, batch teacher, everyone in a role, or specific staff, with a fallback when no one matches — or keep assignment manual."},{"name":"Configurable query types","description":"Built-in types (Doubt, Payment Issue, Technical Issue) plus custom types with institute-defined labels and per-type routing."},{"name":"Guest queries","description":"Logged-out visitors submit questions with their name and email from public pages; replies and resolution notices are emailed to them directly."},{"name":"Learner query tracking","description":"Learners see all their raised queries with status and institute responses, and can mark their own doubts resolved."},{"name":"Resolution workflow","description":"Doubts move through Active and Resolved states with raised and resolved timestamps, keeping accountability clear."},{"name":"Instant staff alerts","description":"Device push notifications tell assigned staff the moment a new doubt arrives."}]},{"id":"whatsapp-business","name":"WhatsApp Business Messaging","tagline":"Official WhatsApp messaging at institute scale","description":"Send WhatsApp messages to learners and leads through official WhatsApp Business channels, connecting via your choice of provider — Meta's Cloud API, WATI or Combot. Bulk template sends personalise per recipient, delivery is confirmed end-to-end, and inbound replies flow back into the platform automatically.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Multi-provider support","description":"Connect through Meta's official Cloud API, WATI or Combot with credentials stored securely; the platform routes messages through whichever provider the channel uses."},{"name":"Guided webhook setup","description":"Copy-paste webhook configuration so inbound messages and delivery statuses flow back into the platform out of the box."},{"name":"Bulk template sending","description":"Send pre-approved templates with per-recipient variables to precisely targeted audiences."},{"name":"Rich media messages","description":"Messages support text, images, video, documents, audio, locations, contacts, buttons and interactive lists."},{"name":"Media headers and dynamic buttons","description":"Attach an image, video or document header to template sends and inject per-recipient URLs into buttons — for example, personal payment links."},{"name":"End-to-end delivery receipts","description":"Every message is tracked as sent, delivered, read or failed via provider webhooks, visible across analytics and contact timelines."},{"name":"Multiple numbers per institute","description":"Register one or more WhatsApp numbers against the institute, with webhook registration and verification handled in-product."},{"name":"Incoming message capture","description":"Replies and inbound messages are received, logged and routed to inboxes and chatbot flows automatically."},{"name":"Template-to-event mapping","description":"Map approved templates to system messages, such as which template is used for invoice notices or transactional updates."}]},{"id":"whatsapp-inbox","name":"WhatsApp Team Inbox","tagline":"Two-way WhatsApp conversations, right in the dashboard","description":"A shared WhatsApp inbox where staff see every conversation with learners and leads, reply in real time, and stay compliant with WhatsApp's rules automatically. When a conversation's 24-hour reply window has closed, agents send an approved template to re-open it.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Conversation list with unread counts","description":"All WhatsApp threads sorted by recency, showing sender name, last message and unread badge, with search and pagination."},{"name":"Full message history","description":"Scroll through the complete inbound and outbound history per contact, including delivery states on every message."},{"name":"Free-text replies","description":"Reply directly within WhatsApp's 24-hour customer-service window, with a clear notice when the window has expired."},{"name":"Template replies for expired windows","description":"Search and send any approved template — with variable prompts — to re-engage contacts outside the 24-hour window."},{"name":"Linked identities","description":"Conversations tie back to platform users wherever the phone number matches, so staff know exactly who they are talking to."}]},{"id":"whatsapp-template-studio","name":"WhatsApp Template Studio","tagline":"Build and get Meta-approved templates without leaving the platform","description":"Create official WhatsApp Business message templates in-app: compose header, body, footer and buttons, add numbered variables with sample values, preview the message live, and submit straight to Meta for approval. Already-approved templates sync in from your provider so they are immediately usable in campaigns and flows.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Full template composer","description":"Header, body text, footer and action buttons — matching Meta's template anatomy exactly."},{"name":"Marketing and utility categories","description":"Choose the Meta category that governs each template's pricing and rules."},{"name":"13 languages","description":"Author templates in English, English (US), Hindi, Spanish, Portuguese (BR), Arabic, French, German, Indonesian, Italian, Japanese, Korean and Chinese (Simplified)."},{"name":"Numbered variables with samples","description":"Insert {{1}}, {{2}}-style placeholders with one click; the builder tracks the count, requires a sample value for each (needed for Meta review), and lets you name variables for later mapping."},{"name":"Media headers","description":"Add a text header or an image, video or document header with a sample for Meta review."},{"name":"Live preview","description":"See the rendered message with sample values substituted as you type."},{"name":"Draft, submit and track approval","description":"Save drafts, edit them, submit to Meta from the template list, and monitor approval status and date per template."},{"name":"Provider sync","description":"Pull already-approved templates from your connected provider into the platform library, with last-synced status per template."}]},{"id":"communication-hub","name":"Communication Hub & Email Inbox","tagline":"One dashboard for all outbound and inbound email","description":"A command center for institute communications: at-a-glance email and WhatsApp performance stats, a cross-channel activity feed, and a shared two-way email inbox. When contacts reply to your emails, the replies land in per-contact conversation threads that staff answer without leaving the platform.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Channel stats overview","description":"Email and WhatsApp delivery statistics with per-batch breakdowns over a selectable window, shown as stat cards."},{"name":"Recent activity feed","description":"A cross-channel timeline of recent email and WhatsApp sends."},{"name":"Threaded email conversations","description":"Inbound and outbound emails group into per-contact conversation threads with a conversation list, filters and full thread view."},{"name":"Reply from the dashboard","description":"Compose and send email replies directly from the inbox, choosing which verified sender address to reply from."},{"name":"Inbox search","description":"Search conversations across the inbox to find a contact's thread quickly."},{"name":"Inbound setup status","description":"A status view shows whether inbound email receiving is configured and healthy for the institute."}]},{"id":"message-template-studio","name":"Message Template Studio","tagline":"On-brand email and message templates, reusable everywhere","description":"A visual drag-and-drop designer for reusable branded templates — email, WhatsApp, invoice email and invoice PDF layout — categorized as marketing, utility or transactional. Drop in blocks, style them visually, and insert personalization variables that auto-fill per recipient at send time. Saved templates are picked up across campaigns, announcements, automations and invoices.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Visual drag-and-drop editor","description":"Compose with header, hero, two-column, button and footer blocks built for email-safe layout, with visual controls for alignment and widths."},{"name":"Style manager with HTML access","description":"Edit colors, spacing and typography on any element without writing HTML — while full HTML access remains available for power users."},{"name":"Personalization variables","description":"A variables dialog lists all merge fields by category with click-to-insert; values like learner name or course fill per recipient automatically, and used variables are detected as you write."},{"name":"Four template types","description":"One studio covers Email, WhatsApp, Invoice and Invoice-Email templates, tagged as marketing, utility or transactional."},{"name":"Subject line and inbox preview","description":"Set template name, type, category, email subject and inbox preview text right from the editor."},{"name":"Shared image and font library","description":"Upload images once to cloud hosting and reuse them across every template; choose from 14 fonts including Roboto, Poppins, Montserrat and Georgia."},{"name":"Invoice templates","description":"Dedicated templates for the invoice email and the invoice PDF layout keep billing communication on-brand."},{"name":"Default templates and sample packs","description":"Mark a template as the default for its type so automations pick it up without configuration, and start from ready-made samples like welcome emails and reminders."},{"name":"Organized, searchable library","description":"Search, filter by type and provider, duplicate, delete, and rely on duplicate-name guards and per-type counts to keep the library tidy."}]},{"id":"email-deliverability","name":"Email Deliverability & Bounce Protection","tagline":"Automatic suppression keeps your sender reputation clean","description":"Send from multiple verified institute addresses while the platform protects your deliverability automatically: addresses that hard-bounce or complain are suppressed from future sends, admins review and manage the list, and recipients can opt out instantly via one-click unsubscribe links.","roles":["Admin","Learner"],"platforms":["Admin Web","Public Web","API"],"subFeatures":[{"name":"Verified sender addresses","description":"Add multiple sending addresses with display names and purposes — announcements, marketing, receipts, chat and community — each with its own verification status."},{"name":"Automatic suppression","description":"Bounced and complained addresses are captured from the email provider and blocked from future sends automatically."},{"name":"Suppression list management","description":"Search and browse all blocked addresses with details of why and when they bounced; unblock a corrected address or re-block one with instant effect."},{"name":"Bounce statistics","description":"A stats view summarises bounce volume and types across the institute."},{"name":"Pre-send batch checking","description":"Check a whole recipient list against the suppression list in one call before a bulk send."},{"name":"One-click unsubscribe","description":"Public per-channel unsubscribe links honor opt-outs instantly."}]},{"id":"transactional-email","name":"Transactional Email & OTP Delivery","tagline":"Reliable system emails: OTPs, invites and receipts","description":"The same messaging engine powers critical system emails — one-time login codes, new-user invitations and automated receipts — sent through the institute's verified senders with the same tracking and bounce protection as campaigns.","roles":["Admin","Teacher","Learner"],"platforms":["Learner Web","Learner Mobile App","API"],"subFeatures":[{"name":"Email OTP","description":"One-time verification codes are generated and emailed for secure login and identity verification."},{"name":"New user invitations","description":"Invitation emails onboard newly added users with their access details."},{"name":"Full delivery logging","description":"System emails carry the same status tracking as all other communication and appear in the contact timeline."}]},{"id":"push-notifications","name":"Push & In-App Notifications","tagline":"In-app inbox plus real push to phones and desktops","description":"A notification center collects everything users need to act on, while native push notifications reach Android and iOS devices even when the app is closed. Institutes connect their own Firebase project in minutes, and learners control exactly which notifications they receive.","roles":["Admin","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Notification center","description":"A full-page list of all notifications with read states, plus a dashboard preview of the latest."},{"name":"Mobile and web push","description":"Firebase-powered push to Android, iOS and web for classes, tests, announcements and messages — delivered even when the app is closed."},{"name":"Self-serve push setup","description":"Enable push for your institute by pasting your Firebase configuration — no engineering work required."},{"name":"Personal notification preferences","description":"A settings panel where each user chooses which notification types they receive."}]},{"id":"batch-chat","name":"Messaging & Batch Chat","tagline":"Direct messages and batch group chats inside the learning app","description":"Learners message teachers and peers one-to-one, participate in batch group chats, and follow community channels — all without leaving the app or exposing anyone's personal phone number. Institute-defined rules keep community spaces safe.","roles":["Learner","Teacher"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"One-to-one messages","description":"Start direct conversations from a new-chat modal and continue them in a threaded view."},{"name":"Batch group chat","description":"A chat panel scoped to the learner's batch for class-wide discussion."},{"name":"Conversation inbox","description":"A conversation list showing all active threads with unread indicators."},{"name":"Community rules panel","description":"Institute-defined rules displayed within community chat spaces."}]},{"id":"permissions-approvals","name":"Permissions, Moderation & Approval Workflow","tagline":"Control who can announce what, with maker-checker approval","description":"Decide per role who may send each type of communication — teachers can post to streams while only admins send system alerts, for example. Messages from restricted roles enter a pending-approval queue before anything goes out, and per-channel policies govern moderation, limits and retention across the whole suite.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","API"],"subFeatures":[{"name":"Per-channel role permissions","description":"For every in-app channel — community, pins, alerts, DMs, streams, resources, overlays — configure independently whether learners, teachers and admins can send."},{"name":"Approval queue","description":"A dedicated approvals screen lists announcements pending review; approvers approve or reject each one with a reason, and creators submit drafts for approval."},{"name":"Learner-to-learner DM control","description":"An explicit switch governs whether learners may direct-message other learners."},{"name":"Moderation controls","description":"Approval-required toggles, banned keyword lists, automatic moderation actions, daily announcement caps and per-channel reply on/off switches."},{"name":"Channel behaviour policies","description":"Auto-dismiss timing for alerts, pin limits and durations per user, stream tags and retention days, and a maximum file size for shared resources."},{"name":"Community guidelines","description":"Set a guidelines title and list of rules shown to your community."},{"name":"Institute defaults with restore","description":"All communication settings live in one per-institute configuration with sensible defaults, a default timezone for scheduled sends, validation and restore-to-defaults."},{"name":"Personal notification preferences","description":"Each user has their own preference profile controlling how they receive communications."}]}]},{"id":"voice","name":"Voice & AI Calling","icon":"voice","color":"#D97706","tagline":"Cloud telephony, IVR and AI agents that call for you","description":"Vacademy turns your admissions phone line into a complete calling operation: an AI voice agent that phones every enquiry within about a minute in natural Hindi, English or Hinglish, plus a full cloud-calling desk for your human counsellors — click-to-call, recordings, dispositions, IVR menus and smart inbound routing. Use Vacademy's own built-in telephony with no telecom setup, or plug in your existing Exotel, Plivo or Airtel IQ account. Every conversation is logged, transcribed and AI-scored, so managers coach from evidence and billing stays transparent, per minute.","features":[{"id":"vacademy-ai-voice-agent","name":"Vacademy AI Voice Agent","tagline":"An AI that phones your leads and sounds human","description":"A first-party AI calling agent that holds natural phone conversations with leads — greeting, qualifying, answering questions and handling objections — in Hindi, English or mixed Hinglish. New enquiries are dialled within about 60 seconds, and every call ends with the outcome, a lead rating and the answers you asked for written straight onto the lead record. Institutes author their own agent personas with custom scripts, voices and goals, and the agent hands the call to a human counsellor whenever the conversation warrants it.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Custom agent personas","description":"Create any number of named AI agents, each with its own opening line, conversation instructions, language, voice, direction (outbound, inbound or both) and enable/disable switch."},{"name":"Hindi, English and Hinglish","description":"The agent converses naturally in Hindi, English or mixed Hinglish and follows callers who switch mid-sentence — the way parents and students actually talk. Callers can interrupt it and it keeps up."},{"name":"37 natural Indian voices","description":"Pick from a catalog of 37 male and female Indian voices, with per-agent speaking pace (0.5–2.0x) and expressiveness controls, plus a voice tester in settings."},{"name":"Calls every lead in about 60 seconds","description":"New enquiries are dialled within about a minute of arriving, and imported lead lists are worked through automatically."},{"name":"Question extraction onto the lead","description":"Define the questions each agent should get answered — class, budget, timeline and more — and the extracted answers are written straight onto the lead record after the call."},{"name":"Automatic disposition and lead rating","description":"After each call the outcome and a lead rating land on the lead record, so counsellors pick up ready, pre-qualified leads."},{"name":"Custom dispositions per agent","description":"Each agent can carry its own list of allowed call outcomes, or inherit the institute's defaults."},{"name":"Mid-call human handoff","description":"The agent transfers the live call to configured human numbers when the caller asks for a person or the conversation warrants it, with voicemail as the final fallback."},{"name":"Call-length cap","description":"A per-agent maximum call duration keeps AI conversations — and their cost — bounded."},{"name":"Try it live before you buy","description":"Prospects can talk to the AI agent from the public website in Hindi, English or Hinglish, and listen to a real sample recording."},{"name":"Runs on Vacademy's own telephony","description":"AI calls are carried on the institute's Vacademy Voice numbers — no third-party AI-calling vendor or extra account required."}]},{"id":"vacademy-voice-telephony","name":"Vacademy Voice (Built-in Cloud Telephony)","tagline":"Business calling that works out of the box","description":"A first-party phone system: Vacademy provisions the numbers, carries the calls and bills per minute, so institutes get professional calling without opening their own telecom account or buying SIMs. It includes outbound click-to-call, inbound IVR, recording, and a built-in India-compliance layer covering calling hours, DND scrubbing and disclosures. Sold as simple published plans starting at ₹3,499/month.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Managed business numbers","description":"Vacademy provisions each institute's business numbers in its own isolated carrier subaccount, with a configurable default caller-ID for outbound calls."},{"name":"No telecom setup required","description":"No own telephony account or SIM needed — everything runs on Vacademy's telephony. DLT/PE registration is handled separately as Indian telecom regulation requires."},{"name":"India compliance guardrails","description":"Enforced before every dial: DND/NCPR number scrubbing, a configurable calling window (default 9 AM–9 PM in the institute's timezone), recording-consent and automated-call disclosures, and a DLT-registration gate for promotional campaigns."},{"name":"Concurrent-channel plans","description":"Plans define how many simultaneous calls the institute can run, with the purchased channel count acting as a hard dial cap."},{"name":"Recording and timezone controls","description":"A per-institute toggle records all inbound and outbound calls, and a timezone setting drives both the compliance window and reporting."},{"name":"Human handoff numbers","description":"Live calls can be transferred to configured human numbers, including mid-call handoff from the AI agent to a counsellor."},{"name":"Published plans from ₹3,499/month","description":"Voice Basic (₹3,499/mo, ₹3.99/min with ~850+ minutes included), Voice Pro (₹6,999/mo, ~1,750 minutes, adds direct calling and the full voice dashboard), and CRM + Voice monthly (₹8,999/mo). Recordings and full call history are included on every plan."},{"name":"Annual pay-per-use plan","description":"The flagship CRM + Voice annual plan (₹19,999/yr) charges a flat ₹3.49/min from minute one with no monthly minute minimum — built for seasonal admissions, with ₹0 minute charges in quiet months."}]},{"id":"ai-calling-automation","name":"AI Calling Automation & Guardrails","tagline":"Set the rules once — the AI works every lead within them","description":"Govern exactly how AI calling behaves for your institute: which AI provider to use, when the bot may dial, how many times it retries, and what happens after each outcome. Interested leads are auto-assigned to counsellors, and hard daily dial caps make a runaway campaign impossible.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Choice of AI provider","description":"Choose the AI voice provider per institute — Vacademy's own AI agent or an integrated third party (Aavtaar) — with credential management and no change to workflows or buttons."},{"name":"Campaign and agent registry","description":"Create named AI agents and campaigns (e.g. 'Class Feedback'), tagged inbound or outbound, plus a default campaign for ad-hoc calls — so every AI-call report is classified correctly and displays a friendly name."},{"name":"Calling shifts","description":"Define one or more daily time windows (e.g. 09:00–13:00 and 16:00–20:00, in the institute's timezone) in which the AI may dial; leads outside the window are automatically deferred and re-checked."},{"name":"Retry policy","description":"Set max retries per lead, minutes between retries, max AI calls per lead per day, and the minimum connect time that counts a call as answered."},{"name":"Institute-wide daily dial cap","description":"A hard ceiling on total AI dials in any rolling 24 hours — across every lead, campaign and manual click — as the ultimate runaway-spend guardrail."},{"name":"Outcome-to-action rules","description":"Map each call outcome to what happens next — assign a counsellor, stop retrying, or a custom outcome you define (e.g. 'Wrong Number'). Choose which dispositions are terminal and whether leads that exhaust all retries still reach a human."},{"name":"Counsellor assignment modes","description":"After an AI call, assign the lead to a counsellor manually, round-robin, or only to counsellors currently on shift."},{"name":"AI calls inside automation workflows","description":"Drop a 'Call with AI' step into any automation — for example, dial every new enquiry within about 60 seconds of it arriving — picking the agent by name."},{"name":"Lead-list button toggle","description":"Independently show or hide the manual 'AI call' button in lead lists without turning off workflow-driven AI calling."}]},{"id":"one-click-bulk-ai-calling","name":"One-Click & Bulk AI Calling","tagline":"AI-call one lead or a whole list, with a safe dry run","description":"Trigger an AI call on any single lead with one click, choosing which agent speaks and which number it calls from. For whole audiences, a 'Call all with AI' action first runs a dry run that counts eligible leads without dialing, then paces the calls in the background while outcomes and counsellor assignments land automatically.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Per-lead AI call button","description":"One click on any lead row places an immediate AI call, with the acting counsellor recorded as the call's owner."},{"name":"Agent and caller-ID chooser","description":"When the institute has multiple agents or numbers, a chooser lets the caller pick which persona speaks and which caller-ID is used — otherwise sensible defaults apply."},{"name":"Bulk campaign with dry run","description":"'Call all with AI' on an audience list first reports total vs eligible leads without dialing, then on confirmation dispatches paced background calls to every eligible lead."},{"name":"Automatic outcome processing","description":"Each call's end-of-call report drives the next step automatically — retry later, stop, or assign a counsellor — so no one has to babysit the campaign."},{"name":"Attempt tracking","description":"Each lead's AI calls display the true attempt number (Attempt 1, 2, 3...) so the retry sequence reads correctly in the call history."}]},{"id":"inbound-ai-receptionist","name":"Inbound AI Receptionist & Auto Lead Capture","tagline":"Your AI answers the phone and turns callers into leads","description":"The AI agent can answer your inbound line — as a menu option or the whole line — and hold a real qualification conversation. When an unknown number calls in, the system can automatically create a lead for the caller, de-duplicated by phone number, so every inbound enquiry becomes followable in the CRM.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"AI-answered inbound line","description":"Route inbound calls — directly or via an IVR menu choice — to an AI agent that greets, answers questions and qualifies the caller."},{"name":"Opt-in auto lead creation","description":"An explicit per-institute toggle: when on, unknown inbound callers are created (or matched) as leads by phone number, so no inbound interest is ever lost."},{"name":"Known-caller matching","description":"Inbound calls from existing leads are matched by phone number and attached to the right lead record automatically."},{"name":"Inbound/outbound classification","description":"AI-call reports are labelled inbound vs outbound, so dashboards cleanly separate 'they called us' from 'we called them'."}]},{"id":"call-intelligence","name":"Call Intelligence (AI Transcripts & Scoring)","tagline":"Every call transcribed, scored and summarized by AI","description":"Recordings of human and AI calls are automatically transcribed — Hindi, English and mixed speech — and analyzed by AI into a structured report: summary, outcome, ratings, objections, action items and coaching tips. You define the scoring rubric and the conversion goal, and the analysis attaches to the call and the lead, giving managers x-ray vision into thousands of conversations without listening to them.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Automatic transcription with translation","description":"Calls are transcribed in the spoken language (Hindi/English/Hinglish, auto-detected) plus an English translation pass, both stored against the call."},{"name":"AI summary and call type","description":"Each call gets a plain-language summary, an inferred call objective, and a type classification such as sales outreach, follow-up, demo booking, objection handling, payment or support."},{"name":"Dual scoring with conversion likelihood","description":"Two 0–10 scores per call — how effectively the counsellor advanced their objective and how strong the outcome was from the lead's perspective — plus a high/medium/low conversion-likelihood estimate."},{"name":"Custom scoring rubric and goal","description":"Define your own weighted quality metrics (defaults: rapport, needs discovery, objection handling, next step secured) and state the conversion goal — e.g. 'book a campus demo' — so every call is measured against what you actually want."},{"name":"Objection and sentiment analysis","description":"The AI lists each objection raised, whether and how it was handled, and reads the lead's overall sentiment."},{"name":"Action items, coaching tips and highlights","description":"Concrete follow-up action items, personalized coaching tips for the caller, a talk-time ratio, and verbatim highlight quotes from the conversation."},{"name":"Normalized outcome status","description":"Every call gets a normalized status — connected positive/neutral/negative, callback requested and more — that powers dashboards and filters."},{"name":"Choose which calls get analysed","description":"Select the sources — telephony calls, AI-agent calls and/or manual uploads — that flow through analysis."},{"name":"Analyze or re-analyze on demand","description":"Any call — old, skipped or failed — can be queued for analysis from its call-log entry with one click."},{"name":"Per-lead intelligence history","description":"All analyzed calls for a lead in one view, across counsellors and attempts, so anyone picking up the lead has full context."},{"name":"On/off switch with cost control","description":"Call Intelligence is a per-institute setting, metered against credits, with minimum-duration gates and clear skip reasons so money isn't spent analysing empty calls."}]},{"id":"counsellor-coaching-analytics","name":"Counsellor Coaching & Team Call Analytics","tagline":"Know exactly what each counsellor should improve","description":"Roll-ups over the AI call analysis turn thousands of conversations into coaching: each counsellor's weakest skills, recurring improvement tips and the objections they face most, with the calls behind them one click away. A comparison-first team view shows KPIs with deltas against the previous period, and every view is automatically scoped to the manager's own reporting line.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Team insights with trend deltas","description":"Whole-team KPIs — analyzed calls, average quality ratings, positive-sentiment share — each shown with its change versus the immediately preceding equal-length window."},{"name":"Per-counsellor breakdown","description":"One row per rep with analyzed calls, both quality ratings, call-status and sentiment distributions, leads dispositioned and calling reach — each with its own vs-previous delta."},{"name":"Personal coaching insights","description":"For each counsellor: their weakest rubric qualities, recurring coaching tips and the most common objections in their calls, with drill-down into the calls behind them."},{"name":"Team coaching insights","description":"The same coaching view aggregated across a manager's entire reporting line, highlighting top objections, top coaching tips and which counsellors need help on which skill."},{"name":"Counsellor profile tabs","description":"Each counsellor's profile includes Calls and Insights tabs showing their call history and intelligence-driven performance view."},{"name":"Manager-scoped visibility","description":"Every view is automatically scoped by the reporting hierarchy — managers see only their own reps."},{"name":"Flexible date windows","description":"7/30/90-day presets or custom ranges, with the comparison window computed automatically."}]},{"id":"click-to-call","name":"Click-to-Call from the CRM","tagline":"Dial any lead in one click, straight from their record","description":"Counsellors call leads directly from lead lists, the enquiry side view and the counsellor workbench — no separate dialer app. The system bridges the counsellor and the lead through the institute's telephony provider, picks the right caller-ID automatically, and logs everything against the lead. A one-click confirmation step prevents accidental dials from burning calling credit.","roles":["Admin","Counsellor","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"One-click bridged calling","description":"Click the phone icon on a lead and the system rings the counsellor first, then connects the lead — no numbers to type or copy."},{"name":"Caller-ID picker with smart recommendation","description":"Before dialing, a popover shows every available outbound number with the recommended one pre-selected — doubling as a confirm step so a stray click never places a paid call."},{"name":"Automatic number-selection strategies","description":"Choose how the outbound caller-ID is picked per institute: Sticky-per-Lead (the lead always sees the same number), Round Robin, or Region Match."},{"name":"Live call status","description":"Real-time call progress streams onto the screen — Queued, Counsellor Ringing, In Progress, Completed, No Answer, Busy and more — so the counsellor always knows where the call is."},{"name":"Calls panel on the lead record","description":"Every call — human and AI, inbound and outbound — appears in the lead's side-view call history with status, duration, attempt number and outcome."},{"name":"Call from the counsellor workbench","description":"Team leads reviewing a counsellor can open that counsellor's full call history in a coaching drawer."}]},{"id":"call-log-dashboard","name":"Unified Call Log & Calling Dashboard","tagline":"Every call across the team, filterable and exportable","description":"One central Call Log shows every call the organisation makes or receives — human and AI, inbound and outbound, across all connected providers — with headline KPIs and deep filters. Managers see their whole team's calls while each counsellor sees their own, based on the reporting hierarchy, and the filtered list exports to CSV or Excel in one click.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"KPI strip","description":"Headline numbers for the selected period: total calls, connected calls with connect rate, total talk time, and unique leads reached."},{"name":"Worklist chips","description":"One-tap chips surface actionable calls — Missed Inbound (call these back) and Callbacks Due (promised follow-ups whose time has come) — each with a live count badge."},{"name":"Deep filtering","description":"Filter by lead name, phone number, direction, call type (human/AI), provider, call status, disposition, counsellor and date range, with quick 7/30/90-day presets."},{"name":"CSV / Excel export","description":"Export the filtered call list (up to 25,000 rows) as CSV or XLSX for offline analysis or audits."},{"name":"Hierarchy-scoped visibility","description":"Access is automatically scoped by the reporting line: a counsellor sees their own calls, a team head their team's, leadership everything."},{"name":"Phone-number privacy control","description":"Lead phone numbers are masked by default; only staff granted a specific 'view call numbers' permission see unmasked numbers, on screen and in exports."},{"name":"AI outcome enrichment","description":"AI calls in the log show their AI-determined disposition and the true attempt number, so retry sequences read correctly."}]},{"id":"call-recordings","name":"Call Recordings & Playback","tagline":"Every conversation recorded, stored and replayable","description":"Calls are automatically recorded and attached to the lead they belong to, so anyone with access can replay the exact conversation to audit quality or settle a dispute. Recording can be switched off per institute for organisations that prefer not to record.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Automatic recording","description":"Outbound and inbound calls are recorded automatically across providers — recordings are fetched and stored even when the provider only makes them available after the call ends."},{"name":"In-app playback","description":"Play any recording directly inside the admin dashboard from the call log or the lead's call history — no downloads needed."},{"name":"Recording stored per lead","description":"Each recording lives against the specific lead and call attempt, so the full audio trail of a lead's journey is browsable in one place."},{"name":"Recording on/off switch","description":"A per-institute setting disables recording entirely for organisations that opt out."}]},{"id":"call-dispositions","name":"Call Dispositions & Callback Scheduling","tagline":"Log every outcome and never miss a promised callback","description":"After each call, counsellors pick an outcome from the institute's disposition catalog, add notes, and optionally schedule a callback. Outcomes can automatically move the lead to the matching pipeline stage, keeping the CRM in sync without extra data entry.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Disposition catalog","description":"A per-institute catalog of call outcomes — each with a label, colour and category — powers both the after-call picker and the dashboard's disposition filter."},{"name":"Post-call disposition sheet","description":"A quick after-call panel lets the counsellor set the outcome, add free-text notes and schedule a callback date/time in seconds."},{"name":"Automatic lead-stage sync","description":"When a disposition maps to a pipeline status (e.g. 'Interested'), saving it automatically updates the lead's status in the CRM."},{"name":"Callbacks worklist","description":"Scheduled callbacks surface in the Call Log's 'Callbacks Due' chip so promised follow-ups actually happen."},{"name":"Edit dispositions later","description":"Outcomes can be set or corrected from the call log after the fact, not just immediately post-call."}]},{"id":"smart-inbound-routing","name":"Smart Inbound Call Routing","tagline":"Callers reach the right counsellor automatically","description":"When a lead calls back, the system answers instantly and routes them intelligently — by default to the counsellor who last spoke to them, falling back to a voicemail number if nobody is available. Every inbound call, answered or missed, is logged against the lead so no callback opportunity is lost.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Last-counsellor routing","description":"An inbound caller is automatically connected to the counsellor who most recently spoke with them, preserving relationship continuity."},{"name":"Voicemail fallback","description":"If no matching counsellor is reachable, the call diverts to the institute's configured voicemail number instead of ringing out."},{"name":"Missed-call capture","description":"Missed and unanswered inbound calls are logged with the caller identified by phone number, and surface in the Call Log's 'Missed Inbound' worklist for callback."},{"name":"Instant answer decisions","description":"Routing decisions happen in a fraction of a second while the provider holds the caller, so callers hear ringing rather than dead air."}]},{"id":"ivr-builder","name":"IVR Builder (Multi-Level Phone Menus)","tagline":"Build 'Press 1 for admissions' menus visually","description":"Design the phone menus callers hear when they dial your numbers, in a visual tree editor — no telecom vendor required. Combine spoken prompts, key-press menus of any depth, call forwarding, voicemail and even an AI agent that talks to the caller, then attach a menu to each phone number and it goes live immediately.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Visual menu tree editor","description":"Create, edit and delete complete multi-level IVR menus in a tree editor inside Calling settings, with whole menus saved in one action and labels for easy management."},{"name":"Play prompt steps","description":"Speak a recorded or text-to-speech prompt to the caller, then continue to the next step; prompts are pre-generated so callers never wait for audio."},{"name":"Keypad menus of any depth","description":"Ask the caller to press a digit and branch to a different sub-tree per key — nested 'Press 1 / Press 2' menus to any level."},{"name":"Forward-to-team steps","description":"Ring one or more staff numbers (with the conversation recorded) so a menu choice connects the caller to the right counsellor or team."},{"name":"Voicemail steps","description":"Play a prompt and record the caller's message when no one can pick up."},{"name":"AI-agent steps","description":"Hand the call to a chosen AI voice agent mid-menu — e.g. 'Press 3 to talk to our admissions assistant'."},{"name":"Graceful hangup steps","description":"End the call with an optional closing message."},{"name":"Per-number menus","description":"Assign a default menu to each inbound number, choose where each call starts, and enable or disable menus independently."}]},{"id":"multi-provider-telephony","name":"Multi-Provider Telephony Integrations","tagline":"Bring your own telephony — Exotel, Plivo, Airtel IQ and more","description":"Institutes that already have a cloud-telephony account plug it into Vacademy and get click-to-call, recordings and the unified call log on top of it. Connect Exotel, Plivo, Airtel IQ (Vonage), Aavtaar or Vacademy's own voice service — each provider's quirks are absorbed behind one consistent experience, with encrypted credentials and an in-app setup guide showing the exact settings to paste into the provider's console.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Five providers, one experience","description":"Connect Exotel, Plivo, Airtel IQ/Vonage, Aavtaar or the first-party Vacademy voice service; the settings screen adapts to each provider's capabilities."},{"name":"Exotel integration","description":"Bridged outbound calls, a shared pool of ExoPhone caller-IDs, real-time call events, recordings, inbound routing and one-click number sync from the provider."},{"name":"Airtel IQ / Vonage integration","description":"Click-to-dial through Airtel IQ Business Connect with per-counsellor extensions and direct numbers, plus automatic import of the provider's call records so off-platform calls still appear in the log."},{"name":"Aavtaar.ai integration","description":"Connect an Aavtaar autonomous AI voice-agent account so its AI calls and end-of-call reports flow into the same lead records and call log."},{"name":"Calling on/off and service choice","description":"Turn calling on or off for the institute and choose which connected service counsellors dial through."},{"name":"Encrypted credential vault","description":"Provider API keys and secrets are stored encrypted; re-saving settings never wipes stored secrets, and each provider declares exactly the credential fields it needs."},{"name":"Number pool management","description":"Add phone numbers with nicknames, regions and preference order; enable or disable numbers, set a recommended number, and attach a default IVR menu per number — numbers auto-attach to the inbound call flow."},{"name":"Counsellor extension mapping","description":"Map each counsellor to their extension, optional dedicated caller-ID/DID and provider user ID so inbound calls reach the right person."},{"name":"Caller-ID and voicemail configuration","description":"Decide which number leads see when your team calls, plus a voicemail fallback number for unreachable moments."},{"name":"Balance visibility","description":"The provider wallet balance (e.g. Exotel) and Vacademy calling credits show at the top of Calling settings, so admins spot low credit before it interrupts a live call."},{"name":"Inbound setup guide","description":"A step-by-step in-app guide renders the exact copy-paste URLs and settings to configure in the provider's console."}]},{"id":"calling-reports","name":"Calling Reports & Heatmaps","tagline":"See when your team dials, connects and follows up","description":"The Reports Center includ
