n":"Show or hide each learner-profile tab per role — Overview, Progress, Tests, Membership, Payment History, Guardian, Enquiry, Lead Profile, Files, Badges, Reports and more."},{"name":"Sensitive account permissions","description":"Per-role switches for viewing learner passwords, sending password resets, accessing the learner portal on a learner's behalf, and editing institute details."},{"name":"Audience & campaign access modes","description":"Restrict a role to specific audience lists — ideal for counsellor teams working separate campaigns."},{"name":"Column & filter pickers","description":"Choose which learner-list columns and which lead-filter custom fields each role sees."},{"name":"Concurrent login limit","description":"Cap active sessions per account to prevent account sharing."},{"name":"Role display names","description":"Role labels shown across the portal respect your institute-configured display names."}]},{"id":"faculty-assignment","name":"Faculty & Teaching Assignment","tagline":"Map every teacher to their subjects and batches","description":"Assign teachers to the exact subjects and batches they teach, update assignments as timetables change, and browse the whole faculty with filters. Fine-grained access grants control what else each staff member can reach.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Assign subjects & batches","description":"Attach a teacher — existing or newly created — to one or more batches with specific subjects per batch."},{"name":"Update assignments","description":"Revise a teacher's batch-subject mapping at any time as timetables change."},{"name":"Faculty directory","description":"Search and filter all faculty with their statuses and assignments; a flat batch-subject view supports auditing."},{"name":"Course-creator lookup","description":"Quickly list faculty who create content, for authoring workflows."},{"name":"Per-user access grants","description":"Grant staff named access to specific resources with a chosen permission level, viewable per user."}]},{"id":"parent-guardian-linking","name":"Parent & Guardian Linking","tagline":"Connect parents to their children's learning accounts","description":"Link parent and guardian accounts to learners so families stay connected to progress, fees and communication. Link existing accounts or create new ones on the spot, in either direction, and backfill guardian links and portal credentials from historical records in bulk.","roles":["Admin","Parent","Learner"],"platforms":["Admin Web","Learner Mobile App","API"],"subFeatures":[{"name":"Link existing or create new","description":"Connect two existing accounts, or create a new guardian or student account on the spot with name, email and mobile."},{"name":"Bidirectional linking","description":"Works from either side — a parent adding their student or a student adding their parent — and supports multiple children per parent."},{"name":"Family relations lookup","description":"Look up a learner's parents or a parent's children from any profile, powering dashboards, notifications and fee communication."},{"name":"Parent lookup by mobile","description":"Find or match a parent account by phone number during admissions or messaging."},{"name":"Bulk guardian backfill","description":"Detect learners whose records contain parent details but no linked guardian account — including from leads — and create the links in one run."},{"name":"Credential backfill","description":"Send portal credentials to guardians of all existing students in one action, choosing who receives the notification."},{"name":"Parent experience settings","description":"Institute-level settings control how guardian details are collected and what parents can access."}]},{"id":"parent-portal","name":"Parent Portal","tagline":"A dedicated portal for parents, from admission to results","description":"Parents get their own portal — with a child selector for multi-child families — covering the entire journey: admission applications, interview and test scheduling, document verification, fee payments, attendance, progress and upcoming schedules. Ideal for schools running structured admission cycles and for keeping families engaged after enrollment.","roles":["Parent","Admin","Teacher"],"platforms":["Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"Multi-child support","description":"All children under one login, with one-tap switching between child profiles."},{"name":"Parent dashboard","description":"An overview per child of admission progress, attendance, scores, completion, certificates, payment status, schedule and pending actions."},{"name":"Digital application form","description":"Parents fill and submit the admission application online."},{"name":"Interview & tests module","description":"View and track scheduled interviews and entrance assessments."},{"name":"Admission tracker","description":"A step-by-step status tracker showing exactly where the child is in the admission pipeline."},{"name":"Document verification","description":"Upload required documents and track them through verification."},{"name":"Fee payments","description":"Pay admission and course fees online, with a clear breakdown of what is due."},{"name":"Schedule view","description":"The child's upcoming sessions and events, visible to parents."},{"name":"Branded parent mobile app","description":"A native mobile experience under the institute's own brand, with push notifications."},{"name":"Structured faculty messaging","description":"Parent-to-faculty messages routed through the platform, keeping staff personal numbers private."},{"name":"Progress digests & alerts","description":"Automatic progress digests and alerts delivered over WhatsApp, email and push."},{"name":"Multi-language interface","description":"Parents choose their preferred language for the portal."}]},{"id":"learner-attendance","name":"Learner Attendance Reports","tagline":"Learners and parents always know the attendance picture","description":"Attendance captured in live classes rolls up into learner- and parent-facing reports. A weekly widget shows day-by-day status on the dashboard, and a full report page lets families review attendance history across batches.","roles":["Learner","Parent"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Weekly attendance widget","description":"A day-by-day present, absent or pending view of the current week, right on the dashboard."},{"name":"Attendance report page","description":"Detailed attendance history with session-level records across batches."},{"name":"Attendance-driven stats","description":"Attendance percentages feed dashboard stats and achievement badges."}]},{"id":"planning-diary-logs","name":"Teacher Planning & Diary Logs","tagline":"Lesson plans and daily diaries, shareable with students","description":"Teachers record lesson plans and diary logs against a batch and subject for any interval — daily, weekly, monthly or yearly. Entries are rich documents with attachments, browsable as a table or timeline, and can be shared so learners and parents see what was planned versus what was done.","roles":["Teacher","Admin","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Plans and diaries","description":"Create forward-looking planning entries or retrospective diary logs — two distinct record types."},{"name":"Interval-based organization","description":"Attach logs to daily, weekly, monthly or yearly periods, with quick pickers for today, tomorrow, this week, next month and more."},{"name":"Rich content editor","description":"Write plans in a rich-text editor with an automatic title generator and file attachments."},{"name":"Batch & subject scoping","description":"Every entry ties to a specific batch and subject so records line up with the timetable."},{"name":"Share with students","description":"Toggle any plan to be visible to learners."},{"name":"Table & timeline views","description":"Browse logs as a filterable table or a chronological timeline, and edit entries in place."},{"name":"Learner-side today's plan","description":"Learners see the current day's plan highlighted on their planning page for quick action."},{"name":"Learner activity timeline","description":"Learners and parents browse planning and activity logs on a timeline, filter by period and type, and open attachments on each entry."}]},{"id":"custom-fields","name":"Custom Fields & Data Model Builder","tagline":"Capture exactly the data your institute needs","description":"Define your own data fields — text, dropdowns, dates, files, multi-selects and more — and attach them to enrollment forms, live-session and assessment registrations, audience campaigns or institute-wide learner records. Map custom fields to built-in system fields and keep both in sync automatically.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web","API"],"subFeatures":[{"name":"12 field types","description":"Text, textarea, email, URL, number, date, phone, dropdown, radio, checkbox, file upload and multi-select — dropdown-style fields carry their own configurable option lists."},{"name":"Attach fields anywhere","description":"Scope fields institute-wide or per enrollment invite, live session, assessment or audience form — each context gets its own tailored set."},{"name":"Reusable field library","description":"Create fields once and reuse them across enrollment invites, audience forms and learner profiles."},{"name":"Field groups & ordering","description":"Organize fields into groups and control their order on forms."},{"name":"File-upload answers","description":"Forms can collect document and image uploads as answers to custom fields."},{"name":"System-field mapping & sync","description":"Map custom fields to built-in fields on students, users or enquiries, and sync values automatically in either direction."},{"name":"Usage tracking & safe deletion","description":"See everywhere a field is used before deleting; deletions are soft and can be done in bulk."},{"name":"Custom fields in filters & columns","description":"Expose chosen custom fields as lead filters and learner-list columns per role, and render them on public enrollment and enquiry pages."}]},{"id":"catalog-operations-console","name":"Catalog Operations Console","tagline":"Administer every course, price and batch from one table","description":"A power-admin console over the entire course catalog. See every course and batch combination in a filterable table, edit course details, sessions, payment options and invites inline, and manage pricing at scale — including bulk offers and CSV-driven course creation.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Catalog table with filters","description":"A filterable, paginated table of all courses and their batch variants, with a detail sidebar per batch."},{"name":"Inline edit dialogs","description":"Edit a course, its session, its payment option or its enrollment invite directly from the table row."},{"name":"Bulk offer pricing","description":"Select eligible batches by session, level and status and apply an offer price across all of them at once, with per-row eligibility reasons, a results summary and a reset-to-original option."},{"name":"Bulk course creation from CSV","description":"Import many courses at once — with type, tags, batches, seat inventory and payment configuration per row — including similar-course detection, preview and global defaults."},{"name":"Payment configuration at scale","description":"Set free, one-time, subscription or donation pricing, currency, validity days, strike-through price and approval requirements during bulk creation."},{"name":"Publishing control","description":"Choose per course whether it appears in the public catalogue."}]},{"id":"student-terms-conditions","name":"Student Terms & Conditions","tagline":"Digital T&C signing built into enrollment","description":"Upload your institute's terms and conditions as a PDF and have learners sign digitally with their name during enrollment. Chosen staff are notified by email every time a learner signs.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web"],"subFeatures":[{"name":"T&C PDF upload","description":"Upload the terms document learners must accept."},{"name":"Named signature","description":"Require the learner's name on the signature for a stronger record."},{"name":"Sign notifications","description":"Notify chosen email recipients whenever a learner signs."}]},{"id":"hr-employee-records","name":"HR: Employee Records","tagline":"A proper HRIS for your staff, inside the platform","description":"Maintain complete employee records for all staff: profiles, departments, designations, employment type and status, bank accounts for salary and a document vault. Employee state changes — probation, notice period, relieved — are tracked formally. Fully API-driven, so it plugs into your existing systems.","roles":["Admin"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Employee profiles","description":"Create and update employee profiles with filtering and search across the workforce."},{"name":"Departments & designations","description":"Define departments and designations and organize employees under them."},{"name":"Employment types & statuses","description":"Track full-time, part-time and contract staff through statuses: active, probation, notice period, relieved, terminated."},{"name":"Bank details","description":"Store one or more bank accounts per employee for salary payout, editable over time."},{"name":"Document vault","description":"Upload and manage employee documents — offer letters, appointment letters, ID proofs, PAN, Aadhaar, passport, degrees, experience and relieving letters."},{"name":"Reporting-line view","description":"See any employee's position in the org chart — their manager and their reports."}]},{"id":"hr-staff-attendance","name":"HR: Staff Attendance & Shifts","tagline":"Check-ins, shifts, holidays and regularization","description":"Track staff attendance with self check-in and check-out or admin bulk marking, sourced manually, from biometric devices or by geo-location. Define shifts and assign them to employees, maintain the holiday calendar, and let staff request regularization of missed punches with approval.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Check-in / check-out","description":"Employees punch in and out; records capture the source — manual, biometric device or geo-location — and mode."},{"name":"Bulk attendance marking","description":"Mark attendance for many employees at once with statuses: present, absent, half day, on leave, holiday, weekend."},{"name":"Records & summaries","description":"Query attendance history and per-period summaries for one employee or across the institute."},{"name":"Attendance configuration","description":"Institute-level attendance settings, including the time-tracking mode."},{"name":"Regularization requests","description":"Staff raise requests for missed or incorrect punches; approvers act on them through the approval workflow."},{"name":"Shift management","description":"Create shifts, edit timings and assign shifts to employees."},{"name":"Holiday calendar","description":"Maintain holidays individually or via bulk upload, with edit and delete."}]},{"id":"hr-leave-management","name":"HR: Leave Management","tagline":"Policies, balances, approvals and comp-offs, automated","description":"A full leave system: define leave types and policies with monthly or yearly accrual, let staff apply — including half days — route approvals, and keep balances accurate with adjustments, scheduled accrual runs and year-end carry-forward processing. Compensatory off is supported end to end.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Leave types & policies","description":"Create leave types and policy rules with monthly or yearly accrual, and update them as HR rules evolve."},{"name":"Apply & track","description":"Employees apply for full or half-day leave, follow the status — pending, approved, rejected, cancelled — and cancel when needed."},{"name":"Approval queue","description":"Managers see pending applications and approve or reject in one action."},{"name":"Leave balances","description":"Per-employee balances with manual adjustment for corrections."},{"name":"Accrual & year-end runs","description":"Run accrual processing and year-end carry-forward or lapse processing across the institute."},{"name":"Compensatory off","description":"Grant comp-off for extra days worked, approve or reject requests, and keep full comp-off history."}]},{"id":"hr-approval-workflows","name":"HR: Approval Workflows","tagline":"Multi-step approval chains for every HR request","description":"Configure who approves what: build approval chains where each step is the reporting manager, department head or HR admin. Chains govern leave applications, attendance regularizations, reimbursements and loans, with a unified pending queue and a complete history.","roles":["Admin"],"platforms":["API"],"subFeatures":[{"name":"Approval chain builder","description":"Define ordered approver steps by type: reporting manager, department head or HR admin."},{"name":"Broad coverage","description":"Chains apply to leave applications, attendance regularization, reimbursements and loans."},{"name":"Unified pending queue","description":"Approvers see everything awaiting them in one place and approve or reject per request."},{"name":"Approval history","description":"A complete audit trail of who approved what, and when."}]},{"id":"hr-payroll","name":"HR: Payroll, Payslips & Disbursement","tagline":"Salary runs from calculation to paid, with holds","description":"Run monthly payroll end to end: create a run, auto-calculate every employee's entry from their salary structure, review component-level breakdowns, hold or release individual payouts, then approve and mark the run paid. Loans, salary advances and expense reimbursements flow into the same run, and payslips and bank-transfer files come out the other side.","roles":["Admin"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Payroll runs","description":"Create, process, approve, mark paid or delete runs; statuses move through draft, processing, processed, approved and paid."},{"name":"Entry-level detail","description":"Inspect each employee's payroll entry and every earning and deduction component behind it."},{"name":"Hold & release","description":"Put any employee's payout on hold within a run and release it later."},{"name":"Loans & salary advances","description":"Issue salary advances or personal loans, approve them, and track repayments that auto-deduct through payroll."},{"name":"Reimbursements","description":"Staff claim travel, medical, food, phone or internet expenses; approved amounts pay out through payroll."},{"name":"Payslip generation","description":"Generate payslips in bulk for a run, retrievable individually per employee."},{"name":"Bank export files","description":"Produce bank-ready disbursement exports for salary transfer, with a log of every export."},{"name":"Payroll summary reports","description":"Aggregate payroll cost reporting across periods for management and finance."}]},{"id":"hr-salary-structures-tax","name":"HR: Salary Structures & Employee Tax","tagline":"Reusable salary templates with India-ready tax handling","description":"Model compensation with earning and deduction components calculated as flat amounts or percentages of basic, CTC or gross. Combine components into reusable templates, assign structures per employee with overrides, and handle Indian income tax — investment declarations and old-versus-new regime computation — inside payroll so TDS deductions are correct.","roles":["Admin"],"platforms":["API"],"subFeatures":[{"name":"Salary components","description":"Define earning and deduction components as a fixed amount or a percentage of basic, CTC or gross, categorized fixed or variable."},{"name":"Salary templates","description":"Bundle components into templates for common pay grades, editable centrally."},{"name":"Employee structures with overrides","description":"Assign a structure to each employee with component-level overrides where needed."},{"name":"Revision history","description":"Every salary revision is recorded and listable for audits and increment cycles."},{"name":"Tax configuration","description":"Institute-level tax setup covering financial-year parameters."},{"name":"Investment declarations","description":"Employees submit and update declarations, and HR verifies them before they affect tax."},{"name":"Regime-aware tax computation","description":"A built-in engine computes each employee's liability under India's old or new tax regime, keeping TDS deductions accurate."}]}]},{"id":"analytics","name":"Analytics & Reports","icon":"rpt","color":"#0891B2","tagline":"Dashboards and reports for learning, sales, fees and engagement","description":"Every part of Vacademy — learning, sales, finance, communication and operations — feeds into a connected reporting layer, so leadership runs the institute on live data instead of end-of-month spreadsheets. Role-aware dashboards surface what matters to each team, AI turns raw activity into readable report cards for students and parents, and every report exports as branded PDFs or CSVs under your own letterhead.","features":[{"id":"ai-student-report-cards","name":"AI Student Report Cards","tagline":"A complete AI-written report on any student, on demand","description":"Generate a comprehensive report card for any learner that pulls together everything the platform knows — attendance, marks, course progress, assignments, live-class participation, doubts asked, login habits, achievements and certificates — and adds an AI-written narrative with insights and topic-level confidence. Export it as a polished PDF or email it straight to parents, and let learners open their own reports in the app.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"One-click report generation","description":"Kick off an AI analysis for any student and track the run until the finished report is ready."},{"name":"Comprehensive data sections","description":"Overview, identity, attendance, academics and subject marks, course progress, assignments, live classes, doubts and engagement, study habits, login activity, achievements and certificates — all aggregated automatically."},{"name":"AI narrative and insights","description":"A readable, teacher-quality narrative plus AI insights and per-topic confidence ratings that explain how the student is really doing."},{"name":"PDF export","description":"Download any report as a polished, branded PDF report card."},{"name":"Email delivery to parents","description":"Send the report card by formatted email — ideal for keeping parents in the loop."},{"name":"External data enrichment","description":"Attach records from outside the platform to a student's profile so they are woven into future reports."},{"name":"Learner reports hub","description":"Learners and parents open every institute-generated report card from a dedicated 'My Reports' area, with report status per run."},{"name":"Printable report view","description":"Report cards render in a clean, print-friendly layout for sharing and filing."}]},{"id":"admin-home-dashboard","name":"Admin Home Dashboard","tagline":"A role-aware command center with live KPIs","description":"The landing dashboard adapts to each staff member's role — admins see institute-wide KPIs and finance, teachers see today's classes and their courses. Widgets cover enrollments, live classes, doubts, notifications, payments and real-time user analytics, with one-click quick actions for the most common tasks.","roles":["Admin","Teacher","Evaluator"],"platforms":["Admin Web"],"subFeatures":[{"name":"Role-based widget bundles","description":"Admins, teachers, course creators, assessment creators and evaluators each get a curated default widget set, adjustable through display settings."},{"name":"KPI band with deltas","description":"Headline institute KPIs with change-over-period deltas so trends are obvious at a glance."},{"name":"Quick actions strip","description":"Role-relevant one-click actions: add student, new batch, announcement, payments, reports, today's classes, my courses, new course, assessments and evaluations."},{"name":"Operational widgets","description":"Widgets for enrolling learners, live classes with editable class links, unresolved doubts, recent notifications, pending actions, the learning center and the assessment center."},{"name":"Finance widgets","description":"A finance summary and recent transactions right on the home screen."},{"name":"Real-time usage widgets","description":"Live tiles for currently active users, hourly activity, daily trends, most active users, device usage and service usage."},{"name":"User management tabs","description":"Manage institute users, send invites and view learners without leaving the dashboard."},{"name":"Guided onboarding tracker","description":"New institutes see a step-by-step onboarding tracker that walks them through setting up their workspace."},{"name":"Admin profile editing","description":"Edit your own profile and account details directly from the dashboard."}]},{"id":"sales-dashboard","name":"Sales Dashboard","tagline":"Your whole sales operation on one screen","description":"A live command center for admissions sales: headline KPIs, the conversion funnel, source performance, call volume, follow-up risk and counsellor rankings — all filterable by team and date range. Auto-generated insights call out what changed and what needs attention.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"KPI band","description":"Headline numbers for the selected window — leads, conversions and other core sales metrics at a glance."},{"name":"Conversion funnel","description":"Stage-by-stage funnel showing exactly where leads drop off."},{"name":"Conversion by source","description":"Compare how each lead source — Meta, Google, website, walk-in — actually converts."},{"name":"Calls-per-day trend","description":"Daily calling volume charted over the selected window."},{"name":"New vs existing leads","description":"A time series separating fresh leads from returning ones."},{"name":"Reassignment volume","description":"Track how often leads move between counsellors over time."},{"name":"Upcoming and missed follow-ups","description":"Live widgets list follow-ups due soon and follow-ups already missed, so nothing slips."},{"name":"Campaign cards","description":"Per-campaign performance cards side by side for quick comparison."},{"name":"Counsellor leaderboard","description":"A team ranking embedded right on the dashboard."},{"name":"Automatic insights strip","description":"System-generated callouts highlight notable movements in your numbers."},{"name":"Team and date scoping","description":"7/30/90-day presets or custom ranges plus a team picker; permissions control whether a manager sees their team or the whole institute."}]},{"id":"crm-reports-center","name":"CRM Reports Center","tagline":"A dozen deep-dive sales reports in one hub","description":"A tabbed analytics hub with shared date, team and counsellor filters feeding every report — from top-line overviews and source analysis to revenue, cohorts and forecasts. Each tab exports to CSV and every view is deep-linkable for sharing with the team.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Overview report","description":"Top-line lead and conversion metrics for the selected window."},{"name":"Sources report","description":"Lead volume and conversion broken down by acquisition source."},{"name":"Funnel report","description":"Pipeline-stage funnel with drop-off analysis."},{"name":"Dispositions report","description":"How calls and leads are being dispositioned across the team."},{"name":"Calling report","description":"Call volume, connect rates and outcomes across human and AI calls."},{"name":"Activity report","description":"Team activity levels — notes, status changes, touches — with CSV export."},{"name":"Follow-ups report","description":"Follow-up completion and overdue analysis."},{"name":"Counsellors report","description":"Per-rep performance comparison across the team."},{"name":"Manager report","description":"Manager-level rollups across teams, with CSV export."},{"name":"Revenue report","description":"Revenue attributed to leads and campaigns."},{"name":"Cohort report","description":"How lead cohorts from different periods mature over time."},{"name":"Forecast report","description":"A forward-looking projection based on the current pipeline."},{"name":"Custom reports","description":"Build your own report views beyond the standard tabs."},{"name":"CRM intelligence report","description":"AI-assisted intelligence summaries of CRM performance when call intelligence is enabled."},{"name":"Center heatmap","description":"Center-level heatmap analytics of lead activity across locations."},{"name":"Shared filter bar and deep links","description":"Date presets or custom ranges, team scope and counsellor scope apply across every tab; the active tab lives in the URL for shareable deep links."}]},{"id":"admission-pipeline-dashboard","name":"Admission Pipeline Dashboard","tagline":"Your enquiry-to-admission funnel at a glance","description":"A dedicated dashboard showing total enquiries, applications and admissions with conversion rates at every step — including how many admissions came from enquiries, from applications only, or arrived directly. Filter by batch and academic session, then drill into the actual people at each stage.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Funnel metrics","description":"Totals for enquiries, applications and admissions plus enquiry-to-application, application-to-admission and overall conversion rates."},{"name":"Admission origin split","description":"See how many admissions started as an enquiry, came from an application only, or were direct admissions."},{"name":"Batch and session filter","description":"Scope the whole dashboard to a specific batch and academic session, or view institute-wide."},{"name":"Pipeline people table","description":"A drill-down table of the actual people sitting at each stage of the pipeline."}]},{"id":"learner-progress-reports","name":"Learner Progress Reports & Email Digests","tagline":"Automatic daily, weekly and monthly progress reports","description":"Track every learner's study progress subject by subject, chapter by chapter and slide by slide — for individuals or whole batches — and export any view as a PDF. Automated daily, weekly and monthly email digests keep learners and parents informed without anyone lifting a finger, and the same reports are available in context right inside the study library.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web"],"subFeatures":[{"name":"Learner progress drill-down","description":"Subject-wise, chapter-wise and slide-wise (date-wise) progress views per learner, including average daily time spent."},{"name":"Batch reports and leaderboard","description":"Batch-level subject and chapter progress plus a leaderboard ranking learners to drive healthy competition."},{"name":"Scheduled email digests","description":"Daily, weekly and monthly progress report emails, generated and sent automatically on schedule."},{"name":"Institute and per-learner settings","description":"Admins set the institute-wide report policy; individual learners can carry their own digest settings."},{"name":"PDF exports","description":"Export batch reports, learner reports, subject-wise reports, module progress reports and chapter-wise batch or learner reports as PDFs."},{"name":"In-context study library reports","description":"Batch, individual-learner and leaderboard views open directly inside the study library, so teachers spot who is falling behind without leaving the content area."}]},{"id":"learner-activity-analytics","name":"Learner Activity & Usage Analytics","tagline":"Real-time visibility into who is learning right now","description":"Live and historical analytics on learner behavior across the institute: who is online this minute, daily and hourly activity patterns, your most engaged learners, and which devices and platform areas they use most. Perfect for spotting engagement drops before they become dropouts.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Real-time active users","description":"A live counter of learners on the platform right now, with a list of exactly who is online."},{"name":"Daily and hourly activity patterns","description":"Day-by-day trend charts and hour-of-day heat views reveal when your learners actually study."},{"name":"Engagement trends over time","description":"Activity summaries and trends over configurable time ranges — including a same-day snapshot — to spot momentum or drop-off."},{"name":"Most active learners leaderboard","description":"Rank learners by activity to identify champions and at-risk students."},{"name":"Device usage breakdown","description":"See the split of learners across web, mobile and desktop."},{"name":"Feature usage breakdown","description":"Which parts of the platform — learning, assessments, live classes and more — get used most."},{"name":"Student login statistics","description":"Login frequency and recency per student, feeding attendance-style regularity reports."}]},{"id":"assessment-analytics","name":"Assessment Analytics & Results","tagline":"Leaderboards, question insights and AI performance reports","description":"Every assessment gets a full analytics suite for staff — overview dashboard, ranked leaderboard, marks-vs-rank curve and question-level insights — with CSV and PDF export throughout. Learners get their own detailed results: score breakdowns, question-wise review, peer comparison and an AI-written performance report in plain language.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Overview dashboard","description":"At-a-glance participation, completion and score statistics per assessment, plus institute-wide assessment counts."},{"name":"Leaderboard","description":"A ranked list of all participants by score, exportable to CSV and PDF."},{"name":"Marks-vs-rank analysis","description":"A graph and table mapping marks to ranks, exportable to CSV and PDF."},{"name":"Question insights","description":"Per-question charts of correct, incorrect, partially-correct and skipped responses to spot weak topics or bad questions, with PDF export."},{"name":"Individual student report","description":"Drill into any learner's attempt with question-wise performance, exportable as PDF."},{"name":"Participant exports","description":"Export registered-participant and respondent lists as CSV or PDF."},{"name":"Learner attempt report","description":"Learners see a score summary, marks obtained, accuracy and time-spent breakdown for each attempt, with a question-wise review of their response versus the correct answer."},{"name":"Peer comparison","description":"Learners see how their attempt compares to batch peers — ranks, percentiles and score distributions."},{"name":"AI performance report card","description":"An AI-generated narrative highlighting strengths, weak topics and recommended next steps, presented as a consolidated printable report card."}]},{"id":"challenge-campaign-analytics","name":"Challenge & Campaign Analytics","tagline":"Measure campaigns from first touch to completion","description":"A dedicated analytics suite tracks engagement challenges and messaging campaigns end to end: daily participation, engagement leaderboards, completion cohorts, churn, referrals, centre-wise heatmaps and lead funnels from ad to conversion. Filters slice everything by date range, campaign and centre.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"KPI overview","description":"Headline cards summarising participation, engagement and completion across the selected period."},{"name":"Daily participation reports","description":"Day-by-day view of active participants and who engaged with which message templates, with incoming/outgoing metrics and per-user drill-down including custom profile fields."},{"name":"Engagement leaderboard","description":"Rank participants by engagement over any date range to spot champions — ideal for gamified challenge campaigns."},{"name":"Completion cohorts","description":"Cohort analysis showing how far each intake progressed and exactly who completed a multi-day programme."},{"name":"Churn analysis","description":"Identify where and when participants drop off."},{"name":"Centre heatmap and distribution","description":"Compare performance across physical centres with heatmaps and distribution charts."},{"name":"Referral tracking","description":"Measure participant-driven referrals and their conversion."},{"name":"Lead funnels","description":"A daily funnel of Facebook ad leads flowing into the challenge, plus lead-journey funnels tracing prospects through sequential message touchpoints to spot drop-off."},{"name":"Message template performance","description":"Per-template outgoing metrics and template-to-day mapping so multi-day programmes can be measured stage by stage."},{"name":"Flexible filters","description":"Slice every view by date range, campaign and centre."}]},{"id":"communication-analytics","name":"Communication Analytics Hub","tagline":"Know who saw it, who clicked, who replied","description":"One hub for the health and performance of every communication channel. See whether email and WhatsApp are set up and working, track each announcement's delivery down to the individual recipient, and follow every email through sent, delivered, opened, clicked or bounced — with exact timestamps and the specific link clicked.","roles":["Admin","Teacher","Counsellor","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","API"],"subFeatures":[{"name":"Channel setup status","description":"At-a-glance indicators for whether outbound email, inbound email and WhatsApp are configured and working."},{"name":"Email funnel stats","description":"Sent, delivered, opened, clicked, bounced, complained and inbound email counts for any chosen time window."},{"name":"WhatsApp volume stats","description":"Outgoing and incoming WhatsApp message counts for the selected window."},{"name":"Announcement delivery statistics","description":"Per-announcement stats covering pending, sent, delivered, failed and read counts across channels."},{"name":"Recipient-level tracking","description":"Drill into an announcement's full recipient list and see each person's delivery and read status."},{"name":"Interactions and threaded replies","description":"Read, dismissed, clicked, liked and shared interactions are captured per user per message; recipients can reply in nested threads that senders can browse and moderate."},{"name":"Per-email event timeline","description":"Each email shows a chronological history of delivered, opened, clicked, bounced, complaint and pending events with exact timestamps in the viewer's timezone."},{"name":"Click and bounce detail","description":"Click events record the specific link, device and browser; bounces carry type and sub-type so hard failures are distinguished from temporary ones."},{"name":"Lookup and source attribution","description":"Retrieve the complete email history of any user or address, search across all tracked emails, and trace every message back to the feature that sent it — announcement, campaign or automation."},{"name":"Bulk send monitoring","description":"Watch active and recently completed bulk send batches with per-batch status, alongside a live recent-activity feed across channels."}]},{"id":"fee-collection-dashboard","name":"Fee Collection Dashboard","tagline":"A live picture of expected vs collected fees","description":"A visual dashboard that shows how fee collection is tracking across the institute: total expected, collected, due and overdue, a collection-rate gauge, a pipeline chart and class-wise breakdowns. Filter by batch, plan or period to find exactly where collections are slipping.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Summary cards","description":"At-a-glance totals for expected fees, amount collected, outstanding dues and overdue amounts."},{"name":"Collection rate gauge","description":"A live gauge showing the percentage of expected fees actually collected."},{"name":"Collection pipeline chart","description":"Visualizes fees moving from upcoming to due to paid, making cash flow predictable."},{"name":"Class-wise collection table","description":"Breaks collections down by class and batch to spot which groups are behind."},{"name":"Payment mode insights","description":"See the split of collections across cash, cheque, UPI, card and online gateway payments."},{"name":"Flexible filters","description":"Slice the whole dashboard by batch, fee plan and date range."}]},{"id":"payment-logs","name":"Payment Logs & Reconciliation","tagline":"Every transaction tracked, filterable and reconciled","description":"A dedicated payment log records every payment attempt across all gateways with its live, reconciled status. Filter by time, status or plan, see revenue statistics at the top, and drill into any transaction's full details.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Revenue statistics","description":"Instant totals for payment count, successful payments, failed payments and total revenue for the current filter."},{"name":"Quick time filters","description":"One-click views for the last hour, today, 7/30/90 days or all time, plus a custom date-time range."},{"name":"Status filters","description":"Filter by payment status (paid, failed, pending) and by learner plan status (active, payment failed, expired, inactive)."},{"name":"Rich transaction rows","description":"Each row shows date, payer name and email, amount, color-coded status, payment method and vendor, plan status, course or membership, transaction ID and plan validity."},{"name":"Reconciled status logic","description":"Displayed status is derived from gateway confirmations, not just the initial attempt, so the table reflects reality."},{"name":"Tracking updates","description":"Payment records can be annotated with tracking information as follow-ups happen."},{"name":"Built for scale","description":"Configurable page sizes with newest-first sorting keep large institutes' logs fast to work through."}]},{"id":"membership-analytics","name":"Membership Analytics & Expiry Tracking","tagline":"Know who's new, who's renewing, who's about to lapse","description":"Two dedicated dashboards track membership health: one analyzes new joiners versus retained members over time, the other surfaces memberships that have ended or are about to end — so your team drives renewals before revenue walks out the door.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"New vs retained analysis","description":"Membership stats split members into new users and retainers, with daily and weekly trend charts and filterable stat cards."},{"name":"Expiring-soon pipeline","description":"See memberships expiring in the next 30 days with member-level detail for proactive renewal outreach."},{"name":"Recently expired list","description":"Track memberships that ended in the last 30 days to run win-back campaigns."},{"name":"Filterable member tables","description":"Both dashboards include member tables with date-range, user-type and status filters."},{"name":"Expiry trend charts","description":"Expiry volume charted over time so leadership can spot churn spikes early."}]},{"id":"audit-log","name":"Admin Activity Audit Log","tagline":"Every admin action recorded, searchable and exportable","description":"A complete audit trail of administrative actions across the platform — enrollments, settings changes, certificate updates, live-class edits, parent links and more. Compliance teams can filter the log, inspect exactly what changed with sensitive data automatically redacted, and export everything to CSV.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Filterable log viewer","description":"Filter logs by actor, action, entity and time range in a dedicated screen."},{"name":"Payload inspection","description":"Open any entry to see the full details of what changed, with sensitive fields automatically redacted."},{"name":"CSV export","description":"Export filtered audit logs as CSV for external compliance archives."},{"name":"Automatic capture","description":"Actions across enrollment, settings, certificates, live sessions, bookings, courses and parent-link operations are logged asynchronously, without slowing the app."},{"name":"Retention management","description":"A retention policy automatically prunes old logs on your configured schedule."}]},{"id":"report-branding","name":"Report Branding","tagline":"Every exported report carries your letterhead","description":"Brand the PDF reports your institute sends out: logo and letterhead, custom header and footer with full HTML control, report colors, and an optional watermark — with a live preview as you edit.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Logo and letterhead","description":"Upload the logo and letterhead used across all generated reports."},{"name":"Header and footer","description":"Set footer text, or take full control with custom header and footer HTML."},{"name":"Report colors","description":"Primary and secondary brand colors applied to report styling."},{"name":"Watermark","description":"Optional watermark text across report pages."},{"name":"Live preview","description":"See the branded report layout before saving."}]}]},{"id":"community","name":"Community & Gamification","icon":"cmty","color":"#65A30D","tagline":"Shared question banks, leaderboards, XP and badges","description":"Community & Gamification turns your institute into a place learners want to show up to every day. Built-in chat with a full safety toolkit keeps every conversation on-platform, while XP, streaks, badges and leaderboards convert study time into friendly competition. A network-wide community library of question papers, ratings and reviews rounds it out — so your teachers reuse the best content and your learners broadcast the social proof.","features":[{"id":"in-app-chat","name":"In-App Chat & Messaging","tagline":"DMs, batch groups and community chat — no phone numbers shared","description":"A built-in messenger connects admins, teachers and learners without anyone exchanging phone numbers. It covers one-to-one direct messages, automatic per-batch group chats and an institute-wide community channel, with text, image and file messages delivered in real time. Read receipts, unread counts and offline push notifications keep every conversation current, and a role-based permission matrix puts the institute in full control of who can message whom.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Direct messages","description":"Start one-to-one conversations with anyone the institute's role matrix permits; a people search finds members by name or role."},{"name":"Batch group chats","description":"Every batch gets its own group conversation whose membership syncs automatically with enrollment, plus a searchable batch directory for admins."},{"name":"Community channel","description":"An institute-wide channel for all members that the institute can enable or hide."},{"name":"Text, image and file messages","description":"Send text, images and file attachments, with attachment permissions configurable per institute."},{"name":"Read receipts and unread counts","description":"Per-conversation mark-as-read with unread counters across the conversation list."},{"name":"Real-time delivery with offline push","description":"Messages reach online members instantly; offline members get a push notification so nothing is missed."},{"name":"Role-based permission matrix","description":"Control exactly which role may message which role — student-to-teacher, student-to-student and more — plus who may post in batch groups and the community channel."},{"name":"Message deletion","description":"Senders and moderators can remove messages from a conversation."},{"name":"Member, Moderator and Owner roles","description":"Conversations distinguish members, moderators and owners for management actions."},{"name":"Per-institute opt-in","description":"Chat is off by default and switched on per institute, so every school adopts messaging on its own terms."}]},{"id":"chat-moderation-safety","name":"Chat Moderation & Safety","tagline":"Rules, filters and reporting keep student conversations safe","description":"Community and group chats ship with a complete safety toolkit built for education. Publish channel guidelines that members must acknowledge, calm busy channels with slow mode, restrict links and attachments, and hold new joiners read-only. Banned-keyword filters and a report-and-review workflow give moderators everything they need to act fast on problem messages.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Channel rules and guidelines","description":"Publish titled guideline lists per channel; institutes set defaults and individual channels can override them."},{"name":"Mandatory acknowledgement","description":"Optionally require members to acknowledge the rules before they can post."},{"name":"Slow mode","description":"Enforce a minimum number of seconds between posts per member to calm busy channels."},{"name":"Link and attachment controls","description":"Allow or block links and attachments on a per-channel basis."},{"name":"New-member read-only period","description":"Keep new joiners read-only for a configurable number of minutes before they can post."},{"name":"Banned-keyword filters","description":"Maintain a banned-keyword list per channel and choose the action: block the message outright or flag it for review."},{"name":"Message reporting","description":"Members report messages for spam, abuse, harassment or inappropriate content; auto-moderation flags create reports too."},{"name":"Moderation review queue","description":"Admins work an Open, Reviewing, Actioned or Dismissed queue of reports from a dedicated review screen."}]},{"id":"gamification-xp-streaks-badges","name":"Gamification: XP, Streaks & Badges","tagline":"XP, levels, streaks and badges make studying addictive","description":"Learners earn experience points for studying, attending live classes and scoring well on assessments, and XP rolls up into levels with visible progress. Daily streaks reward consistency, while achievement badges unlock automatically from configurable triggers or are awarded manually by admins. Institutes design their own badges and scoring rules — or switch the whole system off with one toggle.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"XP and levels","description":"Points earned across learning activities roll into levels, with an XP-to-next-level progress display and a breakdown of where every point came from."},{"name":"Daily streaks","description":"A streak counter rewards consecutive days of learning activity."},{"name":"Achievement badges","description":"Badges unlock automatically from configurable triggers — course progress, assessment scores, live-class attendance — and admins can also award them manually."},{"name":"Custom badge designer","description":"Create your own badges with a name, an icon from a built-in library and a description, then edit or retire them as your program evolves."},{"name":"Configurable unlock criteria","description":"Choose the activity- or achievement-based rule that unlocks each badge."},{"name":"Institute-controlled scoring","description":"Institutes define the badge and scoring rules, and a master toggle disables badges entirely when they are not wanted."},{"name":"Play theme","description":"A gamified, kid-friendly dashboard theme with progress rings, XP pills and badge showcases."}]},{"id":"leaderboards","name":"Leaderboards","tagline":"Friendly competition that keeps learners coming back","description":"Leaderboards rank learners everywhere they compete: within their batch, across the whole institute, and live during quiz sessions. Learning-activity leaderboards are driven by study time, attendance and badges earned, while live-session leaderboards score every answer in real time with configurable points, optional negative marking and speed-aware ranking. Standings can be shared publicly and exported for prize-giving.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App","Engage Client","Public Web"],"subFeatures":[{"name":"Batch leaderboard","description":"Rankings within a learner's batch, driven by real learning activity such as study time, live-class attendance and badges earned."},{"name":"Institute leaderboard","description":"An institute-wide leaderboard that ranks learners across all batches."},{"name":"Public shareable leaderboard","description":"A public leaderboard view that can be shared outside the app for recognition and marketing."},{"name":"My rank card","description":"Each learner sees their own rank and badge summary on their profile."},{"name":"Live session leaderboard","description":"Every live quiz session ranks the whole audience in real time; both the presenter and participants can view the standings, with results revealed on the final slide."},{"name":"Configurable scoring with negative marking","description":"Set the points each correct answer is worth when creating a session, and optionally deduct a chosen number of marks per wrong answer."},{"name":"Speed-aware ranking","description":"Total response time is recorded alongside score, so faster correct answers rank higher among ties."},{"name":"Full performance breakdown","description":"Each leaderboard row shows rank, name, total score, total time, correct, wrong and unanswered counts, and total questions."},{"name":"CSV export","description":"Download the complete session leaderboard as a spreadsheet for records or prize distribution."}]},{"id":"ratings-reviews","name":"Course Ratings & Reviews","tagline":"Learner reviews that become your best social proof","description":"Learners rate and review courses and batches with a star score and text, and ratings roll up into averages and distributions shown on course pages, library cards and the public catalogue. Readers can mark reviews helpful so the best feedback rises to the top, and admins get a filterable console over every review for moderation and insight.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Public Web"],"subFeatures":[{"name":"Submit and edit reviews","description":"Learners leave a star rating with text for a course or a specific batch, and can update it later."},{"name":"Rating summaries","description":"Aggregate star ratings and rating distributions per course and per batch, ready for display anywhere."},{"name":"Review feed","description":"Read individual reviews with reviewer name, photo, date, star score, text and like counts."},{"name":"Ratings on cards and public catalogues","description":"Star ratings appear on library course cards and public catalogue listings, so prospective students see social proof before enrolling."},{"name":"Like / dislike on reviews","description":"Readers mark a review helpful or not — or withdraw their reaction — surfacing the best feedback first."},{"name":"Admin review console","description":"Browse all ratings for any course or batch with filters, for moderation and insight."}]},{"id":"community-question-paper-library","name":"Community Question Paper Library","tagline":"A shared library of ready-made question papers and practice content","description":"A community hub inside the admin portal where teachers browse question papers and practice resources shared across the Vacademy network. Content is presented as a visual card gallery with instant search, academic filters and topic tags, and any paper can be previewed question by question — with answers toggled on or off — before you adopt it. It turns every institute's best assessments into a reusable, network-wide resource pool.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Browse card gallery","description":"Scroll a paginated grid of community question papers presented as visual cards; click any card to open the full paper."},{"name":"Instant search","description":"Search question papers by name from the hub header, with results refreshing as you type."},{"name":"Cascading academic filters","description":"Narrow the library by level or grade, then stream, then subject — each dropdown shows only options relevant to the previous choice."},{"name":"Difficulty and content-type filters","description":"Filter by Easy, Medium or Hard, and by resource kind — the library is built to hold questions, full question papers, PDFs, videos and PPTs."},{"name":"Topic tag chips","description":"One-click topic chips stack on top of the dropdown filters for precise discovery."},{"name":"Combined multi-filter results","description":"Search text, dropdown selections and tag chips all combine into a single filtered, paginated result set."},{"name":"Question paper preview","description":"Read every question in order with rich formatting, images and math rendered correctly."},{"name":"Show / hide answers toggle","description":"Reveal or hide the answer key with one click while previewing, to judge quality before adopting a paper."},{"name":"Paper detail sidebar","description":"Every paper shows its full tag set — level, stream, subject, topic and difficulty — so you know exactly what it covers."},{"name":"Share a paper","description":"A share action on each community paper lets you pass it along to colleagues."}]},{"id":"cross-institute-sharing","name":"Cross-Institute Content Sharing","tagline":"Publish your papers to the network, import theirs into yours","description":"Institutes share question papers with the wider Vacademy community and pull any public community paper into their own private question bank with one click. Imported papers become fully editable copies inside your institute, ready to use in your own assessments, while a public/private access setting keeps you in control of what leaves your walls.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Add to my Question Bank","description":"One button copies a public community question paper into your institute's private collection, confirmed the moment it lands."},{"name":"Publish to the community","description":"A Share-and-Explore publishing flow pushes your own papers into the community library for other institutes to discover."},{"name":"Public / private access control","description":"Every question paper carries an access setting, so only content deliberately marked public is visible to other institutes."},{"name":"Authorship and history preserved","description":"Shared papers keep their title, description, creator and creation dates, so provenance is always visible."}]},{"id":"academic-taxonomy-tagging","name":"Academic Taxonomy & Smart Tagging","tagline":"Every shared resource organized the way syllabi actually work","description":"A structured academic catalogue — Levels, Streams, Subjects, Chapters and Topics — underpins the community library, so every shared resource is findable by exactly where it fits in a curriculum. Content also carries free-form tags, difficulty ratings and type labels, and the taxonomy itself grows as new chapters and topics are added.","roles":["Admin","Teacher"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"Five-level academic hierarchy","description":"Content is organized by Level → Stream → Subject → Chapter → Topic, mirroring how real syllabi are structured."},{"name":"Structured tag dimensions","description":"Resources are tagged across six dimensions: level, stream, subject, topic, difficulty and content type."},{"name":"Free-form tags","description":"Beyond the structured taxonomy, contributors attach custom tags to any question, paper, PDF, video or PPT."},{"name":"Tag lookup per resource","description":"View all tags attached to any resource — or a batch of resources — grouped by category, to understand its coverage at a glance."},{"name":"Growable curriculum catalogue","description":"Add new chapters under any subject and new topics under any chapter, including bulk additions, so the taxonomy keeps pace with new syllabi."},{"name":"Always-current filter options","description":"The community hub loads live filter options — levels, streams, subjects, difficulties, types and topics — so dropdowns always reflect the current catalogue."},{"name":"Rich-content questions","description":"Question text, options and explanations are stored as rich content, so shared questions keep images, tables and math notation intact."}]}]},{"id":"platform","name":"Platform, Apps & White-Label","icon":"plat","color":"#64748B","tagline":"Your brand, your domain, your apps — on enterprise-grade rails","description":"The foundation that makes Vacademy feel like your own product, not someone else's software. Run every portal on your own domains with your own branding, ship your own Android, iOS, Windows and Mac apps, rename the platform's vocabulary to match yours, and operate multiple brands or branches from one account. Underneath sits serious infrastructure — flexible sign-in, device security, cloud file storage, open APIs, data migration tooling and a support and status operation that keeps your institute running.","features":[{"id":"custom-domains-white-label","name":"Custom Domains & White-Label Portals","tagline":"Your domain, your brand — Vacademy invisible","description":"Run the learner, teacher and admin portals on your own domains (e.g. learn.myschool.com) with zero Vacademy branding. A guided setup wizard provisions domains automatically — DNS and SSL included — and every domain carries its own logo, colors, fonts, browser-tab identity, sign-in rules and legal links, so learners only ever see your brand.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Public Web"],"subFeatures":[{"name":"One-click domain setup","description":"A setup wizard creates DNS records and SSL certificates automatically and wires the domains to your institute. For domains you host elsewhere, it surfaces the exact CNAME record to add and reports live provisioning status."},{"name":"Separate domains per portal","description":"Attach distinct domains or subdomains for the learner, teacher and admin portals. Multiple domains can serve the same portal, with one marked primary."},{"name":"Per-domain branding","description":"Each domain sets its own theme color, font family, logo dimensions, browser tab title and tab icon — and can hide the institute name entirely when the logo already carries it."},{"name":"Per-domain login rules","description":"Choose which sign-in methods (password, email OTP, phone, Google, GitHub) are available on each domain, and whether open self-signup is allowed or access stays invite-only."},{"name":"Navigation, redirects & legal links","description":"Set the after-login landing route, after-logout route and home-icon destination per domain, and point privacy policy and terms & conditions links to your own pages."},{"name":"App download links","description":"Attach your Play Store, App Store, Windows and Mac app links so each branded portal promotes your own apps."},{"name":"Sub-organization branded domains","description":"Bind a domain to a specific sub-organization so each branch or partner brand gets its own branded login and signup entry point."},{"name":"Regional & terminology preferences","description":"Set preferred country lists for phone-number inputs per domain, and choose whether your custom naming terminology applies on each white-labeled domain."},{"name":"White-label status dashboard","description":"See at a glance which portals are configured, their URLs, domain types and provisioning state — verify what is live at any time."}]},{"id":"branded-mobile-desktop-apps","name":"Branded Mobile & Desktop Apps","tagline":"Your own Android, iOS, Windows and Mac apps","description":"The learner experience ships as installable apps for Android, iOS, Windows and Mac — each buildable as a fully branded app published under your institute's own name, icon and store listing. Mobile-native touches like push notifications, privacy screens and offline handling make it feel truly native, and admins get a companion mobile app to run the institute on the go.","roles":["Admin","Learner","Parent"],"platforms":["Learner Mobile App","Learner Desktop App","Admin Web"],"subFeatures":[{"name":"White-label Android & iOS apps","description":"Tenant-specific builds carry your institute's own app name, icon, theme and app-store listing, published under your developer account."},{"name":"Windows & Mac desktop apps","description":"Desktop builds of the learner app for exam centers, office-based training and distraction-free home study."},{"name":"Admin mobile app","description":"A mobile flavor of the admin dashboard so owners and staff can manage the institute from their phone."},{"name":"Native social sign-in","description":"Apps include native Sign in with Apple on iOS and Google sign-in, meeting app-store sign-in requirements."},{"name":"White-label push notifications","description":"Each institute can plug in its own Firebase project so push notifications are delivered under the institute's own app identity."},{"name":"Privacy screen protection","description":"Blocks screenshots and screen recording of protected content on mobile."},{"name":"Offline resilience","description":"Network status detection, offline message queuing and cached preferences keep the app usable on poor connections."},{"name":"Mobile-native UX","description":"Pull-to-refresh, in-app browser, network awareness and mobile-first layouts throughout — no cut-down web wrapper."},{"name":"iOS purchase compliance","description":"Purchase flows automatically adapt on iOS to meet App Store rules."}]},{"id":"ota-app-updates","name":"Over-the-Air App Updates","tagline":"Ship app fixes instantly — no app-store wait","description":"Push new versions of the mobile app straight to users' devices, skipping app-store review for content and UI updates. Releases can target specific institutes' branded apps, be marked as forced updates for critical fixes, and be rolled back instantly if something goes wrong.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Mobile App","API"],"subFeatures":[{"name":"Instant OTA releases","description":"Publish a new app bundle with version, release notes and integrity checksum; devices pick it up on their next update check via an in-app update banner."},{"name":"Targeted rollouts","description":"Aim a release at specific branded apps, specific platforms, or every app at once."},{"name":"Forced updates","description":"Mark a release as mandatory so devices must update before continuing — critical for security fixes."},{"name":"Native-version gating","description":"Each bundle declares the minimum native app version it supports, so older installs are never broken by an incompatible update."},{"name":"One-click rollback","description":"Deactivate a bad release and reactivate a previous one; devices revert on their next check."},{"name":"Release history","description":"A full log of every published version with size, publisher, notes and active status."}]},{"id":"multi-tenant-workspaces","name":"Multi-Tenant Institute Workspaces","tagline":"Isolated, branded workspaces for every institute and sub-org","description":"Every institute runs in its own secure workspace with its own users, roles, settings, branding and data — fully separated from every other tenant. Larger organizations operate sub-organizations (branches, franchises, partner academies) under one umbrella, each with its own branded entry point, while people who belong to several institutes switch between them from a single account.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App","API"],"subFeatures":[{"name":"Isolated institute workspaces","description":"Each institute's data, users and settings are fully separated from every other tenant on the platform."},{"name":"Sub-organizations & multi-brand operations","description":"Run branches or franchise partners as sub-orgs under a parent institute, each with its own domain routing, branding and self-registration entry points."},{"name":"Multi-institute membership","description":"One person can belong to several institutes with different roles in each, choosing the workspace at login and switching anytime — branding, terminology and content reload instantly without re-login."},{"name":"Batch selection for learners","description":"Learners enrolled in multiple batches choose which one to enter after login."},{"name":"Per-institute security settings","description":"Institute-level controls, such as the maximum concurrent sessions per learner, are configured per workspace."},{"name":"Instant workspace signup","description":"New organizations sign up and get a workspace with an owner account created immediately — including via Google or GitHub signup."}]},{"id":"naming-settings","name":"Naming Settings — Custom Terminology","tagline":"The whole platform speaks your institute's language","description":"Rename every user-facing term per institute, with independent singular and plural forms. Call a Course a 'Program', a Batch a 'Cohort', a Learner a 'Student' or 'Trainee' — and the change flows through menus, buttons, page titles, dialogs and reports everywhere, including your white-labeled domains. Ideal for schools, coaching institutes and corporate academies that each have their own vocabulary.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Content & structure terms","description":"Rename Course, Level, Session, Subject, Module, Chapter, Slide, Live Session, Batch, Package and the 'Popular' tag — 16+ configurable terms in total."},{"name":"Role terms","description":"Rename user roles — Admin, Teacher, Course Creator, Assessment Creator, Evaluator and Learner (e.g. 'Learner' becomes 'Student' or 'Trainee')."},{"name":"Other terms","description":"Rename Audience List (campaigns), Invite (enrollment links) and Inventory to match how your team talks."},{"name":"True singular and plural forms","description":"Configure each term's singular and plural independently — 'Faculty/Faculty', 'Child/Children' — not naive 's' appending."},{"name":"Plain-language explanations","description":"Each term shows a description of what it means in the platform, so admins rename with confidence."},{"name":"Applies across the product","description":"Custom names appear in sidebars, tabs, dialogs, table headers, toasts and page titles across admin and learner apps, and can apply on white-labeled domains and per-domain overrides."},{"name":"Session vs Batch taxonomy","description":"Distinguishes academic Session (semester or year) from Batch (learner group), so schools and corporate L&D both get natural language."}]},{"id":"flexible-login-sso","name":"Flexible Login & Single Sign-On","tagline":"Every sign-in method your learners and staff prefer","description":"Learners and staff sign in the way that suits them — password, one-time codes by email or WhatsApp, phone number, or one-tap social sign-in with Google, GitHub and Apple. Institutes choose exactly which methods are enabled on each portal, first-time social sign-ins are registered automatically, and sessions renew silently so users stay signed in without interruption.","roles":["Admin","Teacher","Counsellor","Evaluator","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App","Public Web"],"subFeatures":[{"name":"Email / username + password login","description":"Classic sign-in for both admin and learner portals, with optional automatic lowercase normalization of usernames to avoid typo lockouts."},{"name":"Email OTP login","description":"Passwordless sign-in with a one-time code sent to the user's email — no password to remember or reset."},{"name":"WhatsApp & phone OTP login","description":"One-time codes delivered on WhatsApp for phone-first audiences, including a verify-only flow for confirming phone numbers and a verify-and-login flow."},{"name":"Extended 10-day OTP session","description":"A special OTP login keeps the learner signed in for ten days — ideal for exam-prep apps where daily re-login kills engagement."},{"name":"Social sign-in (Google, GitHub, Apple)","description":"One-tap Google and GitHub OAuth login for admin and learner portals, plus native Sign in with Apple on the learner iOS app."},{"name":"WordPress single sign-on","description":"A secure webhook logs users who sign in on your WordPress website straight into their learner account — one login for website and LMS."},{"name":"Auto account creation with welcome email","description":"First-time social sign-ins get an account created automatically and receive a welcome email with fallback credentials."},{"name":"Cross-app auth handoff","description":"After login, users are returned to the exact app and page they started from — including white-label custom domains — without re-authenticating."},{"name":"Per-portal login controls","description":"For every branded portal, independently switch password login, email OTP, phone login, Google and GitHub sign-in, and self-signup on or off."},{"name":"Credential recovery & distribution","description":"Users request their credentials by email in one click; admins can push login credentials to individual users or in bulk."},{"name":"Silent session renewal","description":"Sessions refresh securely in the background, so users stay signed in without interruption while security is preserved."},{"name":"Account identifier & duplicate detection","description":"Choose the identifier (such as email) that uniquely identifies users at registration and login; enrollment automatically detects existing accounts instead of creating duplicates."}]},{"id":"device-session-security","name":"Device & Session Security","tagline":"Stop account sharing with per-learner device limits","description":"Cap how many devices a learner can be signed in on at once to stop account sharing. When the limit is hit, the learner sees their active devices and can log one out to free a slot — no support ticket needed. Revoked sessions are killed within minutes, and every session records its device type for visibility.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Concurrent device limit","description":"Admins set a maximum number of simultaneous active sessions per learner for their institute (e.g. 2 devices); zero keeps it unlimited."},{"name":"Active device list","description":"When the limit is exceeded, the learner sees every active session with its device type and last activity."},{"name":"Remote logout of a single device","description":"The learner can end one specific session — say, the shared family tablet — and immediately sign in on the new device."},{"name":"Session heartbeat & instant revocation","description":"Apps validate the session every few minutes; a terminated session is signed out on its next request, so revocation takes effect fast."},{"name":"Clean logout everywhere","description":"Normal logout terminates the session server-side, not just locally, keeping the device count accurate."},{"name":"Device-type tracking","description":"Each session records whether it came from web, mobile app or desktop, giving admins visibility into how learners access content."}]},{"id":"learner-portal-designer","name":"Learner Portal Designer","tagline":"Design the learner app without writing code","description":"Shape everything a learner sees — sidebar layout, navigation style, custom tabs and widgets, sign-up options, notifications and post-login redirects. Preview how course navigation will look before saving, and control which profile fields learners can see and edit. Institutes effectively compose their own learner app.","roles":["Admin","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Layout & navigation","description":"Toggle, rename and reorder learner sidebar sections, and add custom tabs, sub-tabs and even custom widgets to the learner dashboard."},{"name":"Course navigation style","description":"Choose between a full expandable course tree or compact breadcrumb dropdowns, with a live visual preview of both."},{"name":"Learning experience defaults","description":"Set the default tab learners land on and how content outlines open."},{"name":"Learner side-view tabs","description":"Choose which side panels and tabs appear inside the learner content view."},{"name":"Login & signup options","description":"Control sign-up availability and account options for learners, including settings exposed to public enrollment pages."},{"name":"Notifications & post-login redirect","description":"Configure learner notification behavior and where learners land after login."},{"name":"Profile field visibility","description":"Choose which profile fields learners can see and which they can edit."},{"name":"Language selection","description":"A language dropdown lets learners switch the app language where enabled."}]},{"id":"tab-visibility-controls","name":"Feature & Tab Visibility Controls","tagline":"Turn whole product areas on or off per institute","description":"Switch entire product areas on or off so your team only sees what you actually use. Hide the Community Centre, Evaluation Centre, Doubt Management or Reports — down to individual sub-items under each area — and restore the standard layout in one click.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Top-level tab toggles","description":"Show or hide major areas such as Community Centre, Evaluation Centre, Doubt Management and Reports."},{"name":"Sub-item toggles","description":"Within a visible area, toggle individual sub-items; at least one sub-item always stays visible as a safety net."},{"name":"Reset to defaults","description":"One click restores the standard tab layout."},{"name":"Module entitlements","description":"Institutes are provisioned with product modules (Assessment, LMS, Volt, Vsmart) and their sub-modules, controlling which product areas appear at all."}]},{"id":"branded-sender-email","name":"Branded Sender Email","tagline":"Send from your own domain, not ours","description":"Verify your own sender email addresses and domains so all platform email goes out under your brand. The product triggers verification, hands you the exact DNS records to pub
