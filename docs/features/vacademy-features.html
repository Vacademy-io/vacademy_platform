,{"name":"Detail tabs","description":"Each assessment opens into Basic Info, Questions, Participants, Access Control and Submissions tabs, including a learner-view preview of the paper."},{"name":"Homework list with status tabs","description":"Browse homework tests split into upcoming, live and past states with per-tab counts, search and filter chips."},{"name":"Create homework via wizard","description":"Launch the multi-step assessment creation flow pre-set to homework mode, with schedule details and quick actions on every item."}]}]},{"id":"live","name":"Live Classroom","icon":"live","color":"#E11D48","tagline":"Schedule, teach and engage live — built-in classroom or Zoom/Meet","description":"Everything an institute needs to run live teaching at scale: schedule one-time or recurring classes in minutes, host them on the built-in classroom or the platforms you already use (Zoom, Google Meet, Zoho, YouTube, custom links), and keep learners inside your branded app from waiting room to replay. Volt, the built-in live presentation studio, turns every lecture into an interactive show with polls, leaderboards, whiteboards and an AI co-pilot. Attendance, recordings and post-class feedback are captured automatically, so nothing about a class needs manual follow-up.","features":[{"id":"live-class-scheduling","name":"Live Class Scheduling","tagline":"One-time or recurring live classes, scheduled in minutes","description":"A guided two-step wizard schedules live classes across batches — one-time sessions or weekly recurring series with per-day timings, subjects, rich descriptions and cover images. Classes can be bulk-imported, saved as drafts, previewed exactly as learners will see them, and rescheduled or cancelled with automatic learner notifications.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Two-step scheduling wizard","description":"Step one sets class basics — title, subject, description, platform and timing; step two adds participants, registration options and notifications before publishing."},{"name":"One-time and weekly recurring classes","description":"Schedule a single class or a weekly repeating series with an end date; each weekday can carry multiple sessions with its own start time, duration and link."},{"name":"Per-day class configuration","description":"In recurring schedules, each day of the week can have its own class link, name, thumbnail and custom learner action button."},{"name":"Timezone-aware scheduling","description":"Every class is scheduled in an explicit timezone, so institutes with learners in multiple regions always see correct local times."},{"name":"Bulk scheduling via CSV import","description":"Upload a spreadsheet to create many classes at once, with a validation grid to review and fix rows before submitting."},{"name":"Draft classes","description":"Save partially configured classes as drafts and finish them later from a dedicated Drafts tab."},{"name":"Live / Upcoming / Past / Drafts session list","description":"One list of all classes filtered by state, with search and pagination."},{"name":"Calendar view","description":"See every scheduled class on a calendar for quick visual planning."},{"name":"Class preview","description":"Preview exactly what learners will see for a scheduled class before it goes live."},{"name":"Custom learner action button","description":"Add a fully branded button — custom text, URL and colors — to the learner's class card, such as 'Download worksheet' or 'Join WhatsApp group'."},{"name":"Cancel with learner notification","description":"Delete single occurrences or whole series and optionally notify enrolled learners automatically."},{"name":"Class cover, thumbnail and waiting-room music","description":"Attach a cover image, thumbnail and background audio track that plays in the waiting room for a polished pre-class experience."},{"name":"Search and audit trail","description":"Search across all sessions, and review each class's log of actions — created, starting, started, rescheduled — for accountability."}]},{"id":"meeting-platform-integrations","name":"Meeting Platform Integrations","tagline":"Zoom, Google Meet, Zoho, YouTube or any link — your choice","description":"Connect the video platforms your institute already uses and let Vacademy create meetings automatically. Zoom (with multiple accounts), Google Meet, Zoho Meeting, YouTube live streams and any custom meeting link are all supported, and entire recurring series are provisioned in the background with retry protection. Recordings and attendance flow back automatically via provider webhooks.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","API"],"subFeatures":[{"name":"Multi-account Zoom","description":"Connect several Zoom accounts, set a default, test each connection, and pick which account hosts each class."},{"name":"Full Zoom meeting controls from inside Vacademy","description":"Configure waiting room, join-before-host, required Zoom login, registration approval, alternative hosts, mute on entry, host and participant video, audio mode (computer, telephony or both), automatic cloud or local recording, breakout rooms, focus mode, multi-device join and identity watermark — all while scheduling."},{"name":"Google Meet integration","description":"Connect one or more Google Workspace accounts via secure Google sign-in, set a default, test the connection and auto-create Meet links for classes; disconnect access at any time."},{"name":"Zoho Meeting integration","description":"Connect Zoho via secure sign-in; meetings, attendance and recordings sync automatically on a schedule."},{"name":"YouTube live and custom links","description":"Paste a YouTube live URL or any meeting link — Teams, Webex and more — when you prefer to manage meetings yourself."},{"name":"Automatic meeting provisioning for series","description":"When a recurring class is created, meetings for every occurrence are created in the background, with a provisioning status view, a manual 'provision now' action and automatic retry."},{"name":"Host and participant links kept separate","description":"Presenter-only start URLs are stored apart from learner join URLs, so hosts always get host privileges and learners never do."},{"name":"Personalized participant join links","description":"Join links tied to each participant's real name give you accurate in-meeting rosters and attendance."},{"name":"Schedule conflict check","description":"Before scheduling, check whether a host account is already booked at the requested time — for a single slot or across a whole recurring series."},{"name":"Provider webhooks","description":"Zoom and Google Meet events such as meeting ended and recording ready flow back into Vacademy automatically, keeping recordings and attendance current."}]},{"id":"built-in-video-classroom","name":"Built-in Video Classroom","tagline":"A full virtual classroom with zero external accounts","description":"Vacademy ships its own hosted virtual classroom, so institutes can run live classes without buying Zoom or Meet licenses. Rooms are created automatically at class time with whiteboard, webcam, screen share and recording, and Vacademy manages the classroom servers behind the scenes for reliability.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"One-click rooms, no account needed","description":"Choose the built-in classroom when scheduling and the room is created automatically — no license, link pasting or setup."},{"name":"Recording controls","description":"Per-class toggles to record the session and to auto-start recording the moment class begins."},{"name":"Moderator controls","description":"Mute all participants on join, restrict webcams so only the host is on camera, and set a guest policy — always accept, ask moderator, or always deny."},{"name":"Personalized learner join","description":"Learners join with their real name and identity so the in-class roster and attendance are accurate; guests get their own supervised join flow."},{"name":"Automatic attendance from the classroom","description":"When class ends, the classroom reports who attended and for how long, and attendance is recorded automatically."},{"name":"Recordings archived to your library","description":"Classroom recordings are processed and uploaded to secure cloud storage so learners can rewatch them later."},{"name":"Managed classroom server fleet","description":"Vacademy operates a pool of classroom servers with capacity and scaling controls, so classes stay smooth even at peak hours."}]},{"id":"volt-presentation-studio","name":"Volt — Live Presentation Studio","tagline":"Build interactive presentations with AI in minutes","description":"Volt is Vacademy's built-in presentation tool for teachers. Create decks on an infinite whiteboard-style editor, import existing PowerPoint files with layouts intact, or have AI generate a complete presentation — slides plus quiz questions — from just a topic. Every deck can then be presented live to an interactive audience.","roles":["Admin","Teacher"],"platforms":["Admin Web","Engage Client"],"subFeatures":[{"name":"Presentation library","description":"Create, search, edit, duplicate and delete presentations, each with its own title, description and cover."},{"name":"Whiteboard-style slide editor","description":"Slides are drawn on a free-form canvas — freehand drawing, shapes, text, images and diagrams — with a slide list for reordering."},{"name":"Rich slide types","description":"Title, text, blank canvas, text-plus-media, fullscreen media, web link, quiz, feedback and interactive-video slides in one deck."},{"name":"Quiz and feedback slides","description":"Embed live questions directly into the deck — single and multi-select multiple choice, true/false, one-word, numeric and long-answer formats — plus open feedback prompts."},{"name":"AI presentation generation","description":"Type a topic, pick a language and AI model, and get a complete deck of designed slides with auto-generated quiz questions, ready to edit."},{"name":"AI slide regeneration","description":"Regenerate any individual slide with AI when it needs a fresh take."},{"name":"PowerPoint import","description":"Import existing PPT and PPTX files; each slide becomes its own fully editable whiteboard scene, keeping deck order and per-slide backgrounds."},{"name":"High-fidelity slide conversion","description":"Shapes, text boxes, images, tables, connectors and grouped objects are recreated as native editable elements, with fonts, colors, alignment and positions carried over."},{"name":"Public share link","description":"Share a read-only public link so anyone can flip through a presentation without logging in."},{"name":"Session history per deck","description":"Every live run of a presentation is kept in history with its participants and results, available long after the session ends."}]},{"id":"volt-live-sessions","name":"Volt Live Sessions — Presenter Cockpit","tagline":"Present live with polls, leaderboards and an AI co-pilot","description":"Start any Volt deck as a live session and the audience joins instantly from any browser with a short code — no account or install required. Slides sync to every participant's screen in real time, responses stream into the presenter's dashboard as they arrive, and an AI co-pilot suggests slides based on what the teacher is actually saying. Sessions run reliably for hours with automatic reconnection, built for audiences of hundreds.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Engage Client","Public Web"],"subFeatures":[{"name":"Start live with a join code","description":"One click generates a short invite code; enrolled learners and guests alike join from any browser by entering the code and a name — codes auto-uppercase and Enter submits, so entry takes seconds."},{"name":"Session rules and gamification settings","description":"Per-session switches for joining mid-session, showing results on the last slide, learner hand-raise, chat, session recording, default seconds per question, attempts allowed per learner, points per correct answer and negative marking with a configurable penalty."},{"name":"Real-time slide control and sync","description":"Move forward, back or jump to any slide and every participant's screen follows instantly, with heartbeats and automatic reconnection keeping late joiners and flaky networks in step."},{"name":"Waiting room","description":"Participants who join early sit in a waiting room and are pulled in automatically the moment the presenter begins."},{"name":"Live participant roster","description":"See who is in the room in real time, with heartbeat-based presence so drop-offs are immediately visible."},{"name":"Live response views","description":"Watch answers arrive as an overlay, open a response-distribution chart per question, view text answers as a word cloud, and drill into a per-slide list of every participant's response with correctness."},{"name":"Live leaderboard with CSV export","description":"A points leaderboard updates throughout the session, can be shown to the room, and exports to CSV afterwards."},{"name":"Quick question on the fly","description":"Fire an instant poll or quiz question mid-session without leaving the presentation — AI helps prepare it in seconds."},{"name":"Insert and annotate slides mid-session","description":"Drop a new slide — including a new question — into a running session at any position, and draw over the current slide with a live annotation overlay; changes appear for all participants immediately."},{"name":"Automatic answer checking","description":"Objective answers are evaluated against the answer key the moment they arrive; open-ended answers are flagged for review."},{"name":"AI-assisted evaluation","description":"AI can help evaluate free-text responses that a simple answer key cannot judge."},{"name":"Session audio recording","description":"Record the presenter's audio with pause and resume, a live duration indicator, and download as WebM or MP3."},{"name":"AI slide recommendations from speech","description":"The AI listens to what is being taught and periodically suggests ready-made summary slides and a feedback question the presenter can insert with one click."},{"name":"Live transcript","description":"A transcript of the class audio is generated in the background and can be viewed during or after the session."},{"name":"AI summary email on finish","description":"On ending, optionally transcribe the recording, generate a session summary and email each participant a personalized report including every question and the answer they gave."},{"name":"Marathon-length sessions","description":"Sessions support hours of continuous streaming and are built for hundreds of simultaneous participants."}]},{"id":"engage-audience-response","name":"Engage — Live Polls, Quizzes & Leaderboards","tagline":"Turn passive listeners into active competitors","description":"Polls, graded MCQs, speed quizzes, word clouds and real-time leaderboards embed directly into live-class slides, with every response scored the moment it arrives. Engage runs natively in the browser or layers on top of an existing Zoom, Google Meet or built-in classroom call, and pushes all scores into learner report cards automatically.","roles":["Admin","Teacher","Learner"],"platforms":["Engage Client","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Polls, MCQs and short answers as slide types","description":"Quick opinion polls, graded single and multi-select MCQs, one-word, numeric and short-answer questions live inside the deck, so lecture and assessment mix without breaking flow."},{"name":"Speed-quiz mode","description":"Time-boxed questions where answering faster earns bonus points."},{"name":"Per-question timers","description":"Mix quick speed rounds, longer thoughtful MCQs and untimed polls within a single deck."},{"name":"Real-time leaderboard","description":"Ranks update after every question with animated position changes; names can be hidden for privacy or shown for gamification, and standings can persist across the week or month."},{"name":"Word cloud and sentiment polls","description":"Open-text answers render as a live word cloud for recaps, brainstorms and sentiment checks."},{"name":"Auto-grading with report-card push","description":"In-class scores flow into learner report cards and analytics, and can trigger automations such as remedial content, top-performer cohorts or parent digests after class."},{"name":"Hand-raise and moderated chat","description":"Configurable raise-hand, public chat and a private mentor channel let moderators surface the best questions."},{"name":"Layer on Zoom, Meet or the built-in classroom","description":"Run slides and interactions on top of an existing video call — no platform migration needed."},{"name":"Reconnect-safe session state","description":"The current slide, timers and scores live on the server, so refreshes, network blips and mobile suspends lose nothing."}]},{"id":"interactive-whiteboard","name":"Interactive Whiteboard","tagline":"Sketch, annotate and teach together in real time","description":"A shared infinite canvas inside every live class for diagrams, math, brainstorms and slide annotation. Multiple participants can draw together with live cursors, the board survives disconnects, and the finished canvas can be saved straight back into the course for replay.","roles":["Teacher","Learner"],"platforms":["Engage Client","Learner Web"],"subFeatures":[{"name":"Infinite canvas toolkit","description":"Shapes, text, freehand pen, arrows, images, sticky notes, frames and group selection on an unbounded canvas."},{"name":"Multi-user drawing with presence","description":"Multiple participants draw with live cursors; choose teacher-only mode, full collaboration, or invite specific learners to the board."},{"name":"LaTeX and code blocks","description":"Live-rendered math formulas, syntax-highlighted code and chemistry diagrams — built for real subjects."},{"name":"Annotate any slide","description":"Drop the whiteboard layer onto any slide; replays show exactly what was drawn over what."},{"name":"Save back into the course","description":"One click converts the end-of-class canvas into a new slide attached to the chapter."},{"name":"Reconnect-safe server state","description":"Network blips, mobile suspends and refreshes reconnect everyone to the exact same canvas."}]},{"id":"in-app-class-experience","name":"In-App Class Experience","tagline":"Learners attend class inside your branded app","description":"Classes open embedded inside the learner app instead of bouncing learners to another website. YouTube streams play in a distraction-free player with institute-controlled playback rules, Zoom classes run in-browser without the Zoom app, and teachers can host Zoom right from the admin portal.","roles":["Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App","Learner Desktop App"],"subFeatures":[{"name":"Embed or redirect, per class","description":"Choose whether each class opens inside the app or redirects to the meeting platform."},{"name":"Embedded YouTube live player","description":"YouTube live streams play in-app with institute-controlled restrictions — allow or block pausing and rewinding to keep everyone at the live edge."},{"name":"Zoom in-browser player for learners","description":"Learners join Zoom classes directly in the browser or app with no Zoom install, and the meeting passcode is handled automatically."},{"name":"Host Zoom from the admin portal","description":"Teachers start and run their Zoom class as host from a dedicated full-screen page inside the admin dashboard."},{"name":"Zoho embedded player and Google Meet launcher","description":"Zoho classes embed in-app, and Google Meet classes open through a streamlined launcher."},{"name":"Simulated live (pre-recorded) classes","description":"Schedule a pre-recorded video to 'go live' at a set time — learners experience it as a live class, with play, pause and rewind rules enforced by the institute."}]},{"id":"learner-live-class-hub","name":"Learner Live Class Hub","tagline":"Every class, recording and reminder in one place","description":"Learners get a dedicated live-class home showing today's and upcoming classes grouped by date, with times auto-converted to their timezone and one-tap join buttons that route them correctly to the waiting room, embedded player or external platform. Past classes appear in list and calendar views with recordings ready to replay, and public sessions welcome guests too.","roles":["Learner","Parent"],"platforms":["Learner Web","Learner Mobile App","Learner Desktop App","Public Web"],"subFeatures":[{"name":"Date-grouped schedule in local time","description":"What's live now and what's coming next, with class cards showing time, subject and thumbnail — times auto-converted to the learner's timezone."},{"name":"One-tap multi-provider join","description":"Join buttons route learners correctly — waiting room, embedded player or external platform — for Zoom, Google Meet, Zoho, YouTube live and the built-in classroom."},{"name":"Past classes with recordings","description":"Browse past sessions in a list or calendar view and replay their recordings in the in-app player."},{"name":"Default class link cards","description":"Recurring classes surface the day's default class card, so learners always know where today's class happens."},{"name":"Custom action buttons","description":"Institute-configured buttons — worksheets, WhatsApp groups and more — appear on class cards where enabled."},{"name":"Post-class feedback prompts","description":"After class, learners are guided to the feedback form when the institute has enabled it."},{"name":"Guest join links","description":"Non-enrolled guests join open sessions via public links, with an embed mode for external websites and their own waiting room."},{"name":"Public live-class registration pages","description":"Shareable registration pages for open live classes with a registration form, email verification and a session countdown — a lead-generation tool for webinars."}]},{"id":"waiting-room","name":"Waiting Room & Pre-Join","tagline":"A branded countdown lobby before every class","description":"Learners who arrive early land in a branded waiting room with a live countdown, class details and background music, then flow into class the moment it opens. Institutes control how early the room opens, can set a last-entry cutoff, or switch to a direct pre-join mode that skips the lobby entirely.","roles":["Learner"],"platforms":["Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Configurable open time","description":"Set how many minutes before the start time the waiting room opens for each class."},{"name":"Live countdown timer","description":"A real-time countdown to class start keeps early arrivals informed and engaged."},{"name":"Background music","description":"Play an institute-selected background score in the waiting room; custom waiting-room media can be set per schedule."},{"name":"Waiting room or direct pre-join","description":"Choose between a classic waiting-room screen or a pre-join mode where learners enter the live class directly during the pre-class window."},{"name":"Last-entry cutoff","description":"Optionally set a last entry time after which late learners can no longer join the class."},{"name":"Attendance from the lobby","description":"Joining from the waiting room automatically marks the learner present and logs the join."}]},{"id":"attendance-tracking","name":"Attendance Tracking & Reports","tagline":"Live classes record their own attendance","description":"Attendance is captured automatically the moment learners join, enriched with join and dwell data synced from Zoom, Zoho and the built-in classroom, and backed by manual and bulk marking for corrections. Rich reports break attendance down by session, batch and individual learner over any date range, and attendance events can trigger notifications and automations.","roles":["Admin","Teacher","Learner","Parent"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Automatic attendance on join","description":"Learners are marked present the moment they join a class from the app, including guests on public sessions."},{"name":"Sync from meeting platforms","description":"Zoom participant reports, Zoho session data and built-in classroom analytics are pulled automatically to record who attended and for how long."},{"name":"Threshold-based marking rules","description":"Grace periods, dwell time and join rules mark learners present, late or absent automatically, including across recurring cohorts."},{"name":"Manual and bulk marking by staff","description":"Teachers mark or correct attendance for individuals or whole lists in one action from an attendance-marking table."},{"name":"Per-occurrence attendance for recurring classes","description":"Recurring series can count attendance per occurrence, so every class day is tracked separately."},{"name":"Session-wise and batch-wise reports","description":"View attendance for one session or across a batch, with filters, pagination and date ranges."},{"name":"Individual learner report","description":"Pull one learner's attendance across a batch for any date range — ideal for parent conversations."},{"name":"Guest attendance tracking","description":"Public-session guests have their attendance recorded against their registration for follow-up."},{"name":"Attendance notifications and summaries","description":"Optionally notify learners and parents when attendance is marked, with customizable messages and branded WhatsApp, email or dashboard summaries — no exports needed."},{"name":"Attendance-triggered automations","description":"Fire WhatsApp nudges on missed-class streaks, alert mentors, unlock assessments at an attendance threshold, or start CRM workflows on drop-off."},{"name":"Audit-ready records","description":"Versioned attendance records with timestamps and device information support accreditations and compliance reviews."}]},{"id":"class-recordings-hub","name":"Class Recordings Hub","tagline":"Every class recorded, archived and replayable","description":"Recordings from Zoom, Google Meet, Zoho and the built-in classroom are collected automatically after each class and archived to the institute's secure cloud storage, safe from provider retention limits. Learners replay past classes from their app, while admins control retention, cleanup and re-sync.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Automatic recording sync","description":"Zoom cloud, Google Meet and Zoho recordings are pulled automatically on a schedule and attached to the right class occurrence."},{"name":"Archive to institute cloud storage","description":"Recordings are copied from the meeting provider into Vacademy's storage so they survive provider retention limits, with a manual sync-to-storage action available."},{"name":"Built-in classroom recording upload","description":"Recordings from the built-in classroom are processed and uploaded automatically after class ends."},{"name":"Learner replay","description":"Learners browse past sessions in list and calendar views and play recordings in an in-app player."},{"name":"Recording expiry and cleanup","description":"Per-recording expiry dates with automatic cleanup keep storage costs controlled."},{"name":"On-demand re-sync","description":"Admins trigger an immediate recordings sync for any class if a recording hasn't appeared yet."}]},{"id":"post-class-feedback","name":"Post-Class Feedback","tagline":"Structured learner feedback after every class","description":"Configure a feedback form per class and learners are prompted to rate the session the moment it ends. Institutes choose the questions, star scales and whether feedback is skippable, then review every response in a searchable inbox with statistics and CSV export.","roles":["Admin","Teacher","Learner"],"platforms":["Admin Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Configurable feedback forms","description":"Enable feedback per class and compose questions — star ratings with custom scales and optional half-stars, plus text answers — each optional or mandatory."},{"name":"Compulsory or skippable","description":"Decide whether learners can skip the form or must submit feedback before moving on."},{"name":"Learner feedback page","description":"A clean, mobile-friendly form with star ratings and comments shown to learners after class."},{"name":"Feedback inbox with search and filters","description":"Browse all feedback with search, date-range presets, subject filters and multi-select filtering."},{"name":"Feedback statistics","description":"Per-session statistics summarize ratings so teaching-quality trends are visible at a glance."},{"name":"CSV export","description":"Export feedback data to CSV for further analysis or reporting."},{"name":"Institute-wide defaults","description":"Set default feedback questions and behavior once in settings; new classes inherit them."}]},{"id":"live-class-settings","name":"Live Class Settings & Defaults","tagline":"Set your live-class policies once, apply everywhere","description":"An institute-level settings panel defines the rules every new live class inherits — allowed platforms, waiting-room and registration policy, Zoom and built-in classroom presets, recording and transcription behavior, reminder timings and notification channels. It also controls exactly which recording and material features learners see.","roles":["Admin","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Allowed streaming platforms","description":"Control which platforms — Zoom, Google Meet, Zoho, YouTube embeds, the built-in classroom — teachers can schedule classes on."},{"name":"Waiting room and registration policy","description":"Choose always accept, manually approve, automatically approve or always deny guests — or require no registration at all."},{"name":"Scheduling and recurring defaults","description":"Defaults for weekly recurring schedules, per-day default class links, daily attendance counting and the class description field."},{"name":"Zoom presets","description":"Institute defaults for recording destination (cloud, local or off), audio mode, waiting room, join-before-host, required login, entry muting, video states, breakout rooms, focus mode, multi-device join and watermark."},{"name":"Built-in classroom presets","description":"Defaults for recording, auto-start recording, mute on join and host-only webcams."},{"name":"Recording transcription","description":"Automatically transcribe class recordings."},{"name":"Class reminder timing","description":"Pick reminder timing — 5, 10, 30 minutes or 1 hour before class, or none."},{"name":"Notification channel defaults","description":"Default channels (email, WhatsApp, push, in-app) and moments (on create, on live, on attendance) for class notifications."},{"name":"Feedback defaults","description":"Enable feedback forms and compulsory feedback by default, with institute-wide default questions."},{"name":"Default custom action button","description":"Add your own call-to-action button on the class screen by default, such as 'Download worksheet'."},{"name":"Learner display controls","description":"Toggle what learners see — the custom action button card, recording processing options, adding recordings to courses, and the class materials section."},{"name":"Class description and course connection","description":"Standardize class descriptions and connect live sessions to course content."},{"name":"Default timezone","description":"One institute timezone applied to all new live-class schedules."}]},{"id":"volt-public-site","name":"Volt Public Site & Self-Serve Signup","tagline":"Volt sells itself — landing, pricing and signup built in","description":"Volt ships with its own polished public presence: an animated landing page with live feature demos, a transparent multi-currency pricing page, and a self-serve signup funnel that takes a visitor from first look to a working workspace in minutes. Anyone with a session code can also jump straight into a live session from these pages — no account or install required.","roles":["Admin","Teacher","Counsellor","Learner","Parent"],"platforms":["Public Web","Admin Web","Engage Client"],"subFeatures":[{"name":"Animated product landing page","description":"A responsive, animation-rich page that walks visitors from a bold hero pitch through features and use cases to a closing sign-up banner, with a sticky navigation header and footer quick links."},{"name":"Live animated feature demos","description":"Eight self-playing demos show Volt working before signup — audience quizzing from a phone, AI deck generation from a prompt, live analytics and leaderboards, audio transcription, real-time recommendations, the whiteboard editor, PowerPoint import and auto-sent session summaries."},{"name":"Use-case storytelling for educators and trainers","description":"A tabbed section pitches Volt separately to educators — live polls, formative checks, flipped classrooms — and to corporate trainers — energized workshops, onboarding comprehension checks, instant all-hands feedback."},{"name":"Join a live session by code","description":"A front-and-center join box and a compact header popover let anyone enter a session code — auto-uppercased, Enter to submit — and land in the live participant experience with no login or download."},{"name":"Three-tier pricing lineup","description":"Free, Pro and Business plans compared side by side with per-plan feature checklists, a highlighted Most Popular tier, and tier-appropriate calls-to-action from Start for Free to Contact Sales."},{"name":"Monthly / yearly billing toggle","description":"Flip all plan prices between monthly and yearly rates, with yearly savings flagged and the effective billed-per-year total shown under each paid plan."},{"name":"Multi-currency price display","description":"A currency selector instantly re-renders all prices in US Dollars, Indian Rupees, Euros or British Pounds with the correct symbol."},{"name":"Self-serve signup funnel","description":"Every call-to-action drops visitors into the guided signup and onboarding wizard with learning and assessment modules pre-enabled, while a persistent Sign In shortcut serves returning users."}]}]},{"id":"crm","name":"CRM, Sales & Admissions","icon":"crm","color":"#0E7490","tagline":"Capture every lead, empower counsellors, convert admissions","description":"An education-native CRM that takes every enquiry from first click to enrolled student. Capture leads from your website, ads, forms, walk-ins and spreadsheets into one auto-scored, auto-routed pipeline; give counsellors a focused workbench with SLA clocks, follow-up queues and complete lead histories; and run enquiries, applications, admissions and bookings on the same platform that teaches your students. Built for institutes — parents and children, demo classes, batches and counsellor pools come standard, not as workarounds.","features":[{"id":"lead-capture-campaigns","name":"Lead Capture Campaigns & Forms","tagline":"Capture every lead from every source into one pipeline","description":"Build lead-capture campaigns with custom forms in minutes and share them anywhere — as public links, website embeds, QR-friendly pages or API endpoints. Leads from website forms, ad platforms, form vendors, walk-ins and staff entries all land in one pipeline, deduplicated automatically, with each campaign keeping its own response list. Confirmation emails and team notifications fire the moment a lead arrives.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web","API"],"subFeatures":[{"name":"Campaign builder","description":"Create campaigns with a name, type (Website, Google Ads, Social Media or custom), objective (lead generation, event registration, course inquiry, demo request, newsletter, webinar, contact-us or custom), start/end dates and status."},{"name":"Custom form fields","description":"Attach any set of custom fields to a campaign's form, rendered in your chosen order and grouping with required-field validation. Every field becomes a filterable column in the lead list."},{"name":"Shareable public form link","description":"Every active campaign has a no-login public form showing the campaign's name and context — ideal for ads, WhatsApp, QR codes and social bios. Submissions become leads instantly."},{"name":"Website embed widget","description":"Generate embed code as a customizable button-plus-popup (text, colors, border radius, popup title) or a direct iframe with configurable size, with live preview."},{"name":"API integration kit","description":"A built-in dialog generates ready-to-use API commands and documentation so Zapier, Make or custom apps can push leads into any campaign."},{"name":"Ad-platform and form-vendor intake","description":"Bring in leads from Meta (Facebook/Instagram) Lead Ads, Google Lead Form Extensions and third-party form tools alongside your own forms, so every source feeds the same pipeline."},{"name":"Lead deduplication","description":"Match incoming leads by phone or email — scoped to selected lead lists or institute-wide — so the same person never becomes two leads."},{"name":"Confirmation emails and team alerts","description":"Optionally auto-email each respondent a confirmation on submission and notify chosen staff whenever a response arrives."},{"name":"Add response on behalf","description":"Staff can fill and submit the campaign form for a walk-in or phone prospect without using the public link."},{"name":"Per-campaign lead table","description":"Each campaign has a detailed responses table with dynamic columns from its custom fields, fast pagination and CSV export."},{"name":"Quick automations","description":"From a campaign card, set an instant confirmation message or a follow-up that goes out N days later — and see which workflows are attached to the campaign — without opening the full workflow builder."},{"name":"Campaign lifecycle and search","description":"Campaigns move through Active, Paused, Completed and Archived states (only active campaigns accept leads), with search by name and filters by status and dates."},{"name":"Audience surveys","description":"Public survey pages with dynamic question sets collect structured responses from audiences and feed survey reports."}]},{"id":"website-lead-capture","name":"Website Lead Capture","tagline":"Turn website visitors into enquiries automatically","description":"Built-in lead collection on your course catalogue website: gate browsing behind a lead form or keep it optional, style it as a single page or multi-step wizard, and route every submission straight into your CRM. An enquiry mode lets visitors raise their hand for a course without paying first.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Site-wide lead collection form","description":"Enable a lead form across your site, choose whether it's mandatory before browsing, and connect it to an enrollment invite link so leads flow into the platform."},{"name":"Single-page or multi-step forms","description":"Choose a one-shot form or a multi-step wizard with a progress indicator (bar, dots or steps) and slide/fade transitions."},{"name":"Custom form fields","description":"Define exactly which fields the website form collects."},{"name":"Enquiry mode","description":"Let visitors submit an enquiry for a course instead of (or in addition to) paying — built for high-touch sales."},{"name":"Contact and newsletter widgets","description":"Drop-in contact forms with required-field control and newsletter signup sections anywhere on the site."},{"name":"Lead-focused hero sections","description":"Hero buttons can open the lead-collection form directly ('Talk to Us') alongside browse calls-to-action."}]},{"id":"bulk-lead-import","name":"Bulk Lead Import","tagline":"Upload hundreds of leads from a spreadsheet","description":"Import leads in bulk from a CSV file into any campaign. The importer generates a template from the campaign's own form fields, understands natural column names, and reports per-row results so you can fix and retry failures — nothing fails silently.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"CSV template download","description":"Download a ready-made template whose columns match the campaign's custom fields, including optional Lead Owner and Lead Status columns."},{"name":"Smart column matching","description":"Column headers are matched flexibly — 'Counsellor', 'Lead Owner Email' or 'Status' all work — and email, phone and name are auto-extracted from mapped fields."},{"name":"Owner and stage on import","description":"Assign each imported lead to a counsellor and place it on a pipeline stage directly from columns in the file."},{"name":"Phone-only rows supported","description":"Rows without an email are still imported, so phone-first lead lists never lose records."},{"name":"Per-row results","description":"The import reports exactly which rows succeeded and which failed with reasons, so partial imports are always visible."}]},{"id":"multi-center-lead-attribution","name":"Multi-Center Lead Attribution","tagline":"Every captured lead stamped with the right branch","description":"For multi-center institutes: map each lead-capture connector to a physical center with defaults like center name and manager contact, so every lead arrives pre-attributed to the right branch alongside its campaign.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Connector-to-center mapping","description":"Assign center name, center manager name and manager mobile as default values on each lead connector."},{"name":"Multi-vendor support","description":"Works across Zoho Forms, Meta Lead Ads, Google Lead Ads, Google Forms and Microsoft Forms connectors."},{"name":"Campaign linkage","description":"Center defaults combine with campaign lists so lead attribution includes both campaign and center."}]},{"id":"lead-inbox","name":"Lead Inbox & Lead List","tagline":"Every lead, filterable, actionable, in one table","description":"A central workspace showing leads across all campaigns with rich filtering, bulk actions and one-click calling. Open any lead in a side panel to see their full profile, form answers, notes and journey without leaving the list — built to keep counsellors working leads, not switching tabs.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Powerful filters","description":"Filter by campaign, lead tier, pipeline status, assigned counsellor (including unassigned), converted state, active/deleted state, date presets or custom ranges, and by any custom form field's values."},{"name":"Action-deadline filters","description":"One click shows every lead whose first-contact or follow-up deadline is due or missed."},{"name":"Lead detail side panel","description":"Click a lead to open a full profile drawer — contact info, form responses, notes, status, score and timeline — without losing your place in the list."},{"name":"Bulk assign and unassign","description":"Select many leads and assign them to a counsellor, or remove the owner, in one action."},{"name":"Click-to-call and AI call","description":"Place a phone call or an AI agent call to a lead directly from its row (see the Voice & AI Calling pillar for the full calling suite)."},{"name":"Tier tagging","description":"Mark leads hot, warm or cold inline from the table."},{"name":"Quick notes","description":"Add a note to any lead straight from the table row."},{"name":"Soft delete and restore","description":"Remove leads from view without losing data and restore them later; both actions are recorded on the lead's timeline."},{"name":"Lead profile editing","description":"Edit a lead's profile details after capture, with every change logged."},{"name":"Configurable CSV export","description":"Export leads with a column picker, including an optional lead-journey column that flattens every status change, note and call into the export."},{"name":"Fast at any scale","description":"Server-side sorting and pagination keep the table responsive even with very large lead databases."}]},{"id":"lead-scoring","name":"Automatic Lead Scoring","tagline":"Know which leads deserve attention first","description":"Every lead gets a 0–100 score computed in real time from source quality, profile completeness, recency and engagement, plus a percentile rank refreshed every 15 minutes. Tune the weights to match how your institute sells, and override any score by hand when your team knows better.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Four-factor scoring","description":"Scores combine source quality (e.g. ad leads and walk-ins rank above manual entries), profile completeness, how recent the lead is, and how much activity it has generated."},{"name":"Configurable weights and decay","description":"Adjust how much each factor contributes and set a recency-decay factor so fresh engagement counts more."},{"name":"Percentile ranking","description":"Leads are ranked against each other so you always see the top slice of your pipeline, recalculated automatically every 15 minutes."},{"name":"Manual score override","description":"Set a score by hand; the old and new score, and who changed it, are recorded on the lead's timeline."},{"name":"Campaign-wide recalculation","description":"Recalculate scores for an entire campaign on demand."},{"name":"Score change history","description":"Every automatic or manual score update is logged as a journey event on the lead."},{"name":"Score badge visibility","description":"Choose whether lead-score badges are shown to the team."}]},{"id":"sales-pipeline","name":"Custom Sales Pipeline","tagline":"Your funnel, your stages, your labels","description":"Define your own pipeline stages — a sensible starter set is created automatically — and move leads through them from the lead list or in bulk. Every stage change is time-stamped and kept as history, powering funnel reports and the lead journey view. Conversion outcomes are tracked independently of the working stage.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Custom stage editor","description":"Create, rename, reorder and delete pipeline stages per institute; stages feed filters, reports and automations."},{"name":"One-click stage changes","description":"Set a lead's current stage straight from the lead table or detail drawer."},{"name":"Bulk stage updates","description":"Update the stage of many leads or enquiries at once."},{"name":"Full stage history","description":"Every from-to stage movement is stored and shown on the lead's journey timeline."},{"name":"Conversion tracking","description":"Converted and lost outcomes are tracked separately from the working stage, feeding conversion reports."},{"name":"Analytics definitions","description":"Set the report timezone and define which call statuses count as 'connected' and which lead statuses count as 'interested' in analytics."}]},{"id":"lead-slas","name":"Lead Response SLAs & Alerts","tagline":"Never let a lead go cold again","description":"Set service-level rules for how fast your team must make first contact with a new lead and how quickly follow-ups must be completed. The platform reminds the right roles before deadlines hit and flags overdue leads across the CRM, so no enquiry sits unanswered.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"First-contact turnaround time","description":"Set a first-contact deadline in hours for every new lead, with multiple 'remind me N minutes before' warning windows."},{"name":"Follow-up SLA","description":"A separate deadline for completing follow-ups, with its own pre-deadline reminder window."},{"name":"Role-based notifications","description":"Choose which roles — counsellors, admins, managers — get notified for each SLA reminder."},{"name":"Overdue visibility everywhere","description":"Leads that missed first contact or follow-up are filterable in the lead list and surfaced on dashboards."},{"name":"Automation-ready events","description":"Reminder and overdue events can trigger notifications and workflows, so escalations run themselves."}]},{"id":"follow-up-tasks","name":"Follow-up Task Management","tagline":"Today's call list, ready when you log in","description":"Counsellors schedule follow-ups against leads and land on a focused task view that buckets everything into Pending, Today, Upcoming and All. A calendar view shows the month's follow-up load, and managers can drill into any rep's queue.","roles":["Counsellor","Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Schedule follow-ups","description":"Create dated follow-up tasks on any lead; tasks move through pending, ongoing, overdue and completed states."},{"name":"Bucketed task view","description":"Stat tiles for Pending / Today / Upcoming / All drive the page, so a counsellor instantly sees today's workload."},{"name":"Calendar view","description":"Switch to a month calendar of follow-ups and click any day to see that day's list."},{"name":"Complete with outcome","description":"Close a follow-up in place with a completion note, optionally scheduling the next touch in the same step."},{"name":"My-queue by default","description":"Counsellors automatically see only their own assigned leads; admins can switch to any counsellor's queue."},{"name":"Quick actions inline","description":"Call, note, counsellor assignment and tier updates are available directly from each follow-up row."}]},{"id":"counsellor-pools","name":"Counsellor Pools & Auto-Assignment","tagline":"New leads route themselves to the right rep","description":"Group counsellors into pools attached to specific campaigns and let the system assign each incoming lead automatically — round-robin, by shift schedule, or by performance and load. Weekly shift rosters, per-rep monthly targets and safe deactivation with lead handover are built in, so every lead lands with the right person at the right time.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Pool management","description":"Create pools, attach one or more campaigns to each, and add or remove counsellors; changes apply all-or-nothing so pools never end up half-configured."},{"name":"Assignment modes","description":"Choose per pool: Manual (leads wait for a human), Round-Robin (rotate through members in order), or Time-Based (only reps currently on shift receive leads). New assignees are notified instantly."},{"name":"Advanced distribution strategies","description":"The routing engine also supports weighted rotation, performance-based routing (send leads to the best converter) and least-loaded routing (send to the rep with fewest active leads)."},{"name":"Rotation order control","description":"Drag to set the exact rotation order of counsellors — one order for all campaigns or a separate order per campaign."},{"name":"Weekly shift scheduler","description":"Author shifts per day or apply the same hours to all seven days, with multiple shift blocks per day; the system validates full coverage before saving so no lead ever arrives with nobody on duty."},{"name":"Monthly target matrix","description":"Set a monthly lead target per counsellor per campaign in a simple grid."},{"name":"Safe deactivation with handover","description":"Mark a rep inactive in one or many pools at once, name a backup, and optionally reassign their existing leads — every handover is logged with the right actor."},{"name":"Workflow triggers from pools","description":"Fire an automation workflow for pool events straight from the pool screen."}]},{"id":"counsellor-workbench","name":"Counsellor Workbench","tagline":"Manage your sales team and their pipelines","description":"A team-management hub listing every counsellor with their open leads, activity, calls, performance and targets. Managers see their own reporting line; admins see the whole institute. Reassign entire books of leads between reps with a safe preview step before anything changes.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Counsellor roster","description":"Card or list view of all counsellors with open-lead counts, active status, rating badges and search; managers automatically see only the reps in their reporting line."},{"name":"Per-counsellor drawer","description":"Open any counsellor to tabs for their Leads, Activity feed, Calls, AI Coaching, Performance and Targets."},{"name":"Assign leads with preview","description":"Assign unowned leads to a counsellor, with a dry-run preview showing exactly what will change before you commit."},{"name":"Bulk reassign between reps","description":"Move some or all of one counsellor's leads to another — again with preview-then-apply."},{"name":"Lead transfer history","description":"Expand any lead to see its full chain of counsellor handovers, oldest first."},{"name":"Mark counsellor inactive","description":"Flip a counsellor to inactive (e.g. on leave) and hand their leads to a backup in the same step."},{"name":"Activity feed","description":"A per-counsellor feed of recent actions — status changes, notes, calls and assignments."},{"name":"Hierarchy-aware permissions","description":"What each manager can see and reassign is scoped by their team hierarchy; admins see institute-wide."}]},{"id":"counsellor-targets","name":"Counsellor Targets","tagline":"Set goals, track them live","description":"Give each counsellor measurable targets — conversions closed, leads handled or calls made — for a week, a month or a custom date range. Progress is computed live from actual CRM and call data and shown as target-vs-achieved everywhere the counsellor appears.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Three target metrics","description":"Target conversions closed, leads assigned, or calls made — each measured automatically from real activity."},{"name":"Flexible periods","description":"Recurring weekly or monthly targets that auto-apply to the current period, or one-off targets bound to a custom date range."},{"name":"Bulk apply to a team","description":"Set the same target across many counsellors in one action."},{"name":"Live progress tracking","description":"Target-vs-completed progress bars per counsellor, with a period selector to review past windows."}]},{"id":"counsellor-ratings","name":"Counsellor Ratings & Leaderboard","tagline":"Objective rep ratings, computed from results","description":"Each counsellor carries a rating computed automatically from their conversion ratio and how fast they convert, refreshed on a schedule. Pick a preset strategy or tune the formula, switch any rep to a manual rating when circumstances warrant, and rank the whole team on a leaderboard.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Auto-computed ratings","description":"A strategy-based score derived from each rep's conversion ratio and time-to-convert, refreshed on a schedule."},{"name":"Preset strategies","description":"One-click presets: Balanced, Reward closers, or Reward fast callers."},{"name":"Fine-grained tuning","description":"Set the conversion-vs-speed weighting, ideal and worst response-time thresholds, starting score, minimum activity before a rep is rated, and how many days of history the rating considers."},{"name":"Manual override","description":"Switch any counsellor to a hand-set rating when needed."},{"name":"Team leaderboard","description":"A ranked leaderboard of counsellors by rating, also surfaced as a widget on the sales dashboard."},{"name":"On-demand recompute","description":"Trigger a recalculation any time, in addition to the scheduled refresh."},{"name":"Rating badges","description":"Ratings appear as badges throughout the workbench and dashboards."}]},{"id":"lead-timeline","name":"Lead Timeline & Journey","tagline":"The complete story of every prospect","description":"Every lead carries a unified timeline mixing automatic lifecycle events with manual notes, call logs and meetings — from first form submission through assignment, stage changes, scoring, conversion, payment and enrollment. Notes can be pinned to the top, and the whole journey can be exported.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Automatic journey events","description":"System-logged milestones: lead submitted, duplicate merged, deleted/restored, counsellor assigned or unassigned, status changed, follow-up, outreach, score updated, converted, lost, payment received and enrollment completed."},{"name":"Manual activity logging","description":"Staff add notes, call logs, follow-ups and meeting records against any lead."},{"name":"Pinned notes","description":"Pin the most important note so it always appears first for the next person who opens the lead."},{"name":"Cross-stage timeline","description":"One continuous timeline follows the person across enquiry, application and enrollment — not just one stage."},{"name":"Latest-note previews","description":"Lead tables show each lead's most recent note and note count inline."},{"name":"Journey export","description":"Flatten a lead's entire journey — status changes, notes, calls — into an export column for offline analysis."}]},{"id":"communication-timeline","name":"Contact Communication Timeline","tagline":"Every message ever exchanged with a contact, in order","description":"Open any lead or learner and see a unified chronological timeline of every email, WhatsApp message, push notification and SMS — outbound and inbound — with per-message delivery status. Perfect for a counsellor resuming a conversation or support resolving a dispute.","roles":["Admin","Counsellor"],"platforms":["Admin Web","API"],"subFeatures":[{"name":"All-channel timeline","description":"Email, WhatsApp, push and SMS for a contact merged into one time-ordered view, filterable by channel."},{"name":"Direction and status","description":"Each entry shows outbound/inbound direction and a chronological status trail — pending, sent, delivered, read, failed, bounced."},{"name":"Message preview and full body","description":"See a preview of each message inline and expand to the full content."},{"name":"Source attribution","description":"Every entry records which feature produced it — an announcement, chatbot flow, OTP or campaign — with a link back to the source."}]},{"id":"enquiry-management","name":"Enquiry Management","tagline":"Track every admission enquiry to a decision","description":"A structured enquiry desk for schools and institutes: capture enquiries with fee expectations, transport needs and parent details, score interest, work a checklist, and move each enquiry through stages from New to Admitted. Counsellors can be linked to enquiries for clear ownership.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Rich enquiry records","description":"Each enquiry captures reference source, mode, fee-range expectation, transport requirement, parent's relation to the child, interest score, notes and a tracking ID."},{"name":"Enquiry stages","description":"Move enquiries through New, Contacted, Not Eligible, Qualified, Follow up, Closed, Converted and Admitted."},{"name":"Built-in checklist","description":"A per-enquiry checklist tracks required steps — documents, visits, calls — toward admission."},{"name":"In-app entry and public link","description":"Front-desk staff create enquiries in-app, or share a public enquiry form link; a kiosk mode suits reception desks."},{"name":"Walk-in registration","description":"Register walk-in visitors as a lead plus an enquiry in a single submission."},{"name":"Counsellor linking","description":"Link a counsellor to an enquiry source so ownership and performance tracking are clear."},{"name":"Bulk status updates","description":"Update many enquiries' statuses in one action with per-item results."},{"name":"Filters and search","description":"Filter enquiries by date presets, status and source type, with name search."}]},{"id":"applications-pipeline","name":"Online Applications & Applicant Pipeline","tagline":"Online applications with a staged admissions workflow","description":"Accept applications through a public online form and move each applicant through configurable stages — Form, Payment, Test, Verification, Admission. Application fees can be collected online, parents and children stay linked, and bulk imports migrate existing applicant lists.","roles":["Admin","Counsellor","Parent"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Public application form","description":"Prospective families submit applications online with child and parent details; a printable application template is generated."},{"name":"Configurable stage pipeline","description":"Define application stages of type Form, Payment, Test, Verification and Admission, and advance each applicant stage by stage."},{"name":"Application fee payment","description":"Initiate online payment for the application fee directly from the applicant record."},{"name":"Parent-child records","description":"One parent account can hold multiple child applicants, viewable together."},{"name":"Enquiry lookup and linking","description":"Search existing enquiries while creating an application so prior history carries over instead of duplicating the family."},{"name":"Bulk application import","description":"Import many applications from a file with per-row success and failure results."},{"name":"Applicant list with filters","description":"A filterable, paginated applicant list with a full applicant profile side panel."},{"name":"Staff-side onboarding","description":"Admins can onboard an applicant directly without the public form."}]},{"id":"admissions-desk","name":"Admissions Desk","tagline":"From application to enrolled student, end-to-end","description":"Process admissions through a guided form wizard or in bulk, review each admission with statuses like Under Review, Approved, Waitlisted or Rejected, and enroll approved students into their batch in one step. A full online-application workflow and a quick manual-admission workflow run in parallel and feed the same pipeline.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Admission form wizard","description":"A step-by-step wizard collects the complete admission form, with a printable admission template."},{"name":"Two admission workflows","description":"Online Application (application first, then admission) and Manual Admission (direct entry) both feed the same pipeline."},{"name":"Admission review statuses","description":"Each admission carries a status: Pending, Under Review, Approved, Rejected, Waitlisted or Cancelled."},{"name":"Bulk admission import","description":"Submit many admissions from a spreadsheet with row-level results."},{"name":"Responses list and detail","description":"Browse all admission submissions with filters and open a full detail view of any one."},{"name":"One-step enrollment","description":"Convert an approved admission into an enrolled student, with payment details, in a single step."},{"name":"Custom application stages","description":"Add and label the stages applications move through, with display text per stage."},{"name":"UPI payment collection","description":"Attach a payment QR code with payee name and UPI ID (VPA) to collect application fees."},{"name":"Counsellor auto-assignment","description":"Auto-assign counsellors to applications with a selectable assignment strategy and a chosen counsellor pool."}]},{"id":"enrollment-invites","name":"Enrollment Invites & Self-Registration","tagline":"One link that sells, collects payment, and enrolls","description":"Create shareable enrollment links for any course batch that carry the enrollment form, pricing and payment options, and optional referral rewards. Prospects open the link, see a course preview, fill the form, pay and get enrolled — no staff involvement required. Open self-signup and partner registration wizards cover every other path onboard.","roles":["Admin","Learner","Parent","Counsellor"],"platforms":["Admin Web","Public Web","Learner Web","Learner Mobile App"],"subFeatures":[{"name":"Invite link builder","description":"Create invites tied to one or more course batches, with validity dates, currency, learner access duration and a short URL for sharing."},{"name":"Payment options per batch","description":"Attach one or several payment plans to each batch on the invite so the prospect chooses how to pay."},{"name":"Custom enrollment form","description":"Configure the fields prospects fill during enrollment; submissions are stored with the enrollee."},{"name":"Course preview page","description":"The invite renders a public course preview so prospects see what they're buying before enrolling."},{"name":"Referral rewards on invites","description":"Link referral programs to an invite's payment plans so enrollees can earn or give referral benefits."},{"name":"Bundled course invites","description":"One invite can cover a bundle of multiple batches or courses."},{"name":"Default invite per batch","description":"Each batch keeps a default enrollment invite whose configuration can be updated centrally."},{"name":"Invite management","description":"Search, filter, update and delete invites; look up invites by learner or payment plan."},{"name":"Open self-signup","description":"Open registration pages let new learners create accounts directly, with institute-defined registration questions rendered dynamically; invitees land in the right batch automatically."},{"name":"Partner (sub-organization) registration wizard","description":"A reusable open link takes partner organizations through a multi-step wizard — details, custom fields, OTP verification, KYC, terms acceptance and payment — and mints a new sub-organization with its own admin and learner invites."}]},{"id":"bookings-appointments","name":"Bookings & Appointments","tagline":"Schedule visits, demos and counselling on a calendar","description":"Define your own booking types — school visits, counselling sessions, demo classes, enquiry meetings — and manage bookings in list or calendar view. Each booking carries a schedule, participants, an optional meeting link and recurrence, with availability checks that prevent double-booking staff.","roles":["Admin","Counsellor","Teacher"],"platforms":["Admin Web"],"subFeatures":[{"name":"Custom booking types","description":"Use global defaults like School Visit or Enquiry Meeting, or create institute-specific types with a name, unique code and description."},{"name":"Create bookings","description":"Schedule an event with title, subject, rich description, date, start/end times, timezone, recurrence and an optional meeting link."},{"name":"Participants and attendees","description":"Add individual users — leads, parents, learners — or whole batches as participants on a booking."},{"name":"Availability check","description":"Check whether a time slot is free before confirming, avoiding double-booked staff."},{"name":"Reschedule and cancel","description":"Move a booking to a new time or cancel it, with status tracking through draft, live, completed and cancelled."},{"name":"Calendar and list views","description":"Browse bookings on a month calendar with day drill-down, or as a filterable list of upcoming, live and past events."},{"name":"Linked pipeline records","description":"Bookings can reference a source record — a lead or enquiry — so appointments stay connected to the pipeline."}]},{"id":"contacts-directory","name":"Contacts Directory","tagline":"Everyone you know, in one searchable place","description":"A unified directory combining enrolled users and campaign respondents into one contact list. Search by name; filter by campaign, region, gender, enrollment status, batch or payment status; and see each contact's custom-field data at a glance.","roles":["Admin","Counsellor"],"platforms":["Admin Web"],"subFeatures":[{"name":"Unified contact list","description":"Toggle inclusion of institute users and lead-form respondents to see students, prospects or both in one table."},{"name":"Rich filtering","description":"Filter by campaign, campaign status/type/dates, email, phone, region, gender, enrollment status, batch, payment status and organization type."},{"name":"Search and sort","description":"Name search with server-side sorting and pagination for large databases."},{"name":"Custom fields on contacts","description":"Each contact row carries its captured custom-field values and flags whether the person is an enrolled user, a lead respondent, or both."}]},{"id":"tags-segmentation","name":"User Tags & Segmentation","tagline":"Label anyone, then act on the whole segment","description":"Create tags and apply them to any set of users — by picking users, pasting IDs or uploading a CSV. Tags power segmentation across the platform: count and list tagged users, feed messaging and workflows, and even bulk-assign courses to everyone carrying selected tags.","roles":["Admin"],"platforms":["Admin Web"],"subFeatures":[{"name":"Tag library","description":"Create institute tags with name and description alongside platform defaults; deactivate tags you no longer need."},{"name":"Bulk tagging","description":"Add one or many tags to many users at once — by user list, by tag name (missing tags are auto-created), or by CSV upload with validation and a failed-rows download."},{"name":"Tag statistics","description":"See user counts per tag and pull detailed lists of users carrying any tag combination."},{"name":"Untagging","description":"Deactivate tags on selected users without deleting history."},{"name":"Courses by tag","description":"A wizard assigns course batches to every user holding selected tags — select courses, configure enrollment, preview, then apply with results."},{"name":"Segments for automation","description":"Fetch all users behind a tag or tag set to power downstream messaging and workflows."}]}]},{"id":"marketing","name":"Marketing & Website","icon":"mkt","color":"#DB2777","tagline":"Websites, campaigns, coupons and referrals that fill your funnel","description":"Everything an institute needs to attract, capture and convert learners — without hiring a web agency or stitching together five tools. Build a branded website and course storefront with a drag-and-drop editor, run sales pages with built-in checkout, pull ad leads straight from Meta and Google, and grow through email campaigns, coupons, referrals and shareable branded links. Every touchpoint runs on your own domain and feeds directly into your CRM.","features":[{"id":"website-builder","name":"Website & Course Catalogue Builder","tagline":"Build your institute's website with drag-and-drop, no developer needed","description":"An Elementor-style visual builder for creating your institute's public website and course catalogue. Assemble multi-page sites from a library of 40+ ready-made sections, watch a pixel-accurate live preview as you edit, and publish when ready. Every site is drafted, versioned and role-permissioned, so your team can work safely before anything goes live.","roles":["Admin"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Multiple websites per institute","description":"Create and manage several independent sites, each with its own name and Active/Draft/Archived status — for example a main site plus campaign microsites."},{"name":"Multi-page sites with clean URLs","description":"Add unlimited pages such as /about, /pricing and /policy, each with its own auto-sanitized URL slug, page title and publish toggle. Rename, duplicate, reorder or delete pages at any time."},{"name":"Drag-and-drop canvas with live preview","description":"Arrange sections on a canvas while a real, pixel-accurate preview of the live site renders alongside; clicking a section highlights it in the preview."},{"name":"Desktop, tablet and mobile preview","description":"Switch the preview between desktop, tablet and mobile widths to check responsiveness before publishing."},{"name":"40+ ready-made section widgets","description":"Header with navigation and CTA, hero, course catalogue grid, footer, media showcase, stats, testimonials, FAQ accordion, video embed, CTA banner, pricing table, contact form, team, announcement feed, image gallery, tabs, logo cloud, trust chips, map embed, countdown timer, feature grid, newsletter signup, steps, scrolling marquee, custom HTML block and more."},{"name":"Bookstore widgets","description":"Dedicated book catalogue, book details, cart and buy/rent sections plus a policy renderer — enough to run a small book store on the same site."},{"name":"Multi-column layout containers","description":"2, 3 and 4 column layouts (including asymmetric splits) that nest other widgets inside, with adjustable gaps, vertical alignment and automatic stacking on mobile."},{"name":"Section layout variants","description":"Each widget ships multiple style presets — switch a hero from Split to Centered to Full-Width, or a catalogue from grid to list, without losing content."},{"name":"Page and section templates","description":"Start from full page templates (Landing Page, Course Landing, About Page, Book Store) or drop in pre-built section combos like Social Proof or Course Showcase."},{"name":"Live course catalogue section","description":"The catalogue widget pulls your real courses automatically, with configurable filters, card fields, grid or list layout and hover effects — no manual updates when courses change."},{"name":"Per-page SEO settings","description":"Set meta title, meta description and a social-share (Open Graph) image on every page so it looks right in search results and link previews."},{"name":"Rich text, images and link picker","description":"Edit copy with a rich-text editor, upload images directly into any section, and pick link targets — pages, external URLs or in-page anchors — from a link picker."},{"name":"Anchor links and conditional visibility","description":"Give any section an anchor ID so navigation buttons smooth-scroll to it, and enable, disable or conditionally show any section."},{"name":"Undo/redo and layers panel","description":"Full edit history with keyboard shortcuts, plus a structural tree of every section on the page for quick selection and reordering."},{"name":"Draft-to-publish workflow","description":"Save work as a draft visitors never see, then publish the exact version live in one click; discard a draft to fall back to the published site."},{"name":"Version history and one-click restore","description":"Browse every saved draft and published revision, restore any old version into the editor, and re-publish it."},{"name":"Role-based editing permissions","description":"Read, write, delete and publish rights are gated by role — admins can publish and delete while other staff are limited to editing."},{"name":"Sticky header and back-to-top","description":"Optional site-wide sticky navigation header and a floating back-to-top button."}]},{"id":"design-studio","name":"Website Themes & Design Studio","tagline":"Agency-grade design: themes, fonts, gradients and animation","description":"Deep design controls make institute sites look professionally designed rather than templated. Pick from named color themes or set your own brand color, choose typography pairings from a curated font library, and layer in modern effects like glassmorphism, gradients and scroll-in animations — all without touching code.","roles":["Admin"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"9 color themes plus custom brand color","description":"Default, Ocean, Forest, Sunset, Midnight, Rose, Violet, Amber and Slate presets, or override with any custom primary color — with light and dark site modes."},{"name":"Curated Google Fonts library","description":"17 hand-picked typefaces with separate body and heading fonts, so you can pair a display serif over a clean sans."},{"name":"Typography scale controls","description":"Heading size scale (compact to display), body font-size override, and site-wide compactness settings."},{"name":"Corner style","description":"Sharp, rounded or pill corner radius applied consistently across the whole site."},{"name":"Page atmosphere backgrounds","description":"Whole-page canvas treatments — flat, soft, mesh or aurora — with adjustable intensity for a premium, non-flat look."},{"name":"Layered backgrounds and gradients","description":"Per-section background stacks: linear and radial gradients, solid layers, and background images with legibility overlays."},{"name":"Glassmorphism, glow and gradient borders","description":"Frosted-glass panels, soft brand-colored glow shadows, and gradient border effects on any section."},{"name":"Entrance animations","description":"Scroll-in animations per section with cascading stagger across child items, and a site-wide motion personality that scales all animation from calm to dynamic."},{"name":"Decorative ornaments","description":"Placeable background ornaments — blobs, rings, dot fields, grids and glow orbs — positioned freely behind content."},{"name":"Section shape dividers","description":"Wave, angle and curve dividers on the top or bottom edge of any section for smooth transitions between blocks."},{"name":"Section width presets","description":"Content-column width presets per section, including full-bleed, with custom max-width override."},{"name":"What you design is what visitors see","description":"The editor and the live site share one style engine, so the published page matches the design exactly."},{"name":"Audience mode","description":"Tune the site's presentation for children, adults or all audiences."}]},{"id":"sales-pages","name":"Sales & Product Pages with Checkout","tagline":"Landing pages that sell courses and take payment","description":"Purpose-built sales pages: pick the courses and payment plans to sell, design the page with the same visual builder, attach coupons and custom form fields, and share a short branded link. Every detail of the funnel — starting step, terms acceptance, invoices, upsells and redirects — is configurable per page.","roles":["Admin","Counsellor"],"platforms":["Admin Web","Public Web"],"subFeatures":[{"name":"Course and plan bundling","description":"Map any combination of courses and payment plans onto one page, mark items preselected, and control display order."},{"name":"Visual page design","description":"Design the sales page with the full widget library — header, hero, product course grid, footer and any other section — in a dedicated design tab."},{"name":"Page-specific coupon codes","description":"Create coupons scoped to the page with percentage or fixed discounts and an optional cap, and toggle whether the coupon box shows at checkout."},{"name":"Custom checkout fields","description":"Add or remove custom fields collected from buyers during checkout on that page."},{"name":"Funnel start step","description":"Choose whether visitors land on the catalog, the cart, or straight on payment."},{"name":"'People also buy' upsells","description":"Configure suggested-course cross-sells per offering, with a custom heading, shown on the cart, the checkout form, or both."},{"name":"Terms and conditions gate","description":"Require acceptance of inline terms or an external terms URL before purchase."},{"name":"Automatic invoices","description":"Send pu
