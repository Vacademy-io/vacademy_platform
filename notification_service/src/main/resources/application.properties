spring.application.name=notification_service
server.port=8076
management.endpoints.web.base-path=/notification-service
management.endpoints.web.path-mapping.health=actuator/health
springdoc.api-docs.path=/notification-service/api-docs
springdoc.swagger-ui.path=/notification-service/swagger-ui.html
spring.profiles.active=${environment}

# Force JDBC to write/read TIMESTAMP columns in UTC so Instant.now() round-trips
# correctly regardless of DB session TZ.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============ HikariCP Connection Pool Configuration ============
# These settings are CRITICAL for preventing inconsistent API latency

# Maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=3

# Minimum number of idle connections to maintain
spring.datasource.hikari.minimum-idle=1

# How long (ms) to wait for a connection from the pool
spring.datasource.hikari.connection-timeout=60000

# How long a connection can be idle before being retired
spring.datasource.hikari.idle-timeout=300000

# Maximum lifetime of a connection
spring.datasource.hikari.max-lifetime=600000

# Connection validation timeout
spring.datasource.hikari.validation-timeout=5000

# Keep connections alive
spring.datasource.hikari.keepalive-time=60000

# Log pool usage warnings
spring.datasource.hikari.leak-detection-threshold=60000

# Sentry Configuration
sentry.dsn=${SENTRY_DSN}
sentry.send-default-pii=true

# Performance Monitoring. One transaction per message + external provider call.
# 0.3 trims volume while keeping trend visibility. Errors are captured
# independently of this rate.
sentry.traces-sample-rate=0.3
# Enable performance monitoring for all integrations
sentry.enable-tracing=true
# Database query monitoring
sentry.trace-propagation-targets=localhost,127.0.0.1
# Additional performance settings
sentry.in-app-includes=vacademy.io

# ============ SES Sender Identity Verification ============
# Lets institutes self-verify a custom "from" address (white-label email).
# Disabled by default: requires AWS credentials (reuses aws.accessKey/aws.secretKey,
# i.e. SQS_AWS_* ) whose IAM policy grants ses:VerifyEmailIdentity, ses:VerifyDomainDkim,
# ses:VerifyDomainIdentity and ses:GetIdentityVerificationAttributes / ses:GetIdentityDkimAttributes.
# IMPORTANT: the verification API must target the SAME AWS account+region as the SES SMTP
# endpoint used for sending (spring.mail.host = email-smtp.<region>.amazonaws.com), otherwise
# a "verified" identity here will still be rejected at send time.
aws.ses.verification.enabled=${SES_VERIFICATION_ENABLED:false}
# Region of the SES account that actually sends mail. Defaults to aws.region (SQS_AWS_REGION),
# then us-east-1. Override with SES_VERIFICATION_REGION if SES sending lives in a different region.
aws.ses.verification.region=${SES_VERIFICATION_REGION:${aws.region:us-east-1}}
# Credentials used to call the SES verification API. Default to the existing SQS AWS creds
# (aws.accessKey/aws.secretKey). Override ONLY if the SES-sending account differs from the SQS
# account — the identity must be verified in the same account whose SMTP creds send the mail.
aws.ses.verification.accessKey=${SES_VERIFICATION_ACCESS_KEY:${aws.accessKey:}}
aws.ses.verification.secretKey=${SES_VERIFICATION_SECRET_KEY:${aws.secretKey:}}