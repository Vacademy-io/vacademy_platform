# analytics-api — read-only SQL-over-HTTP proxy for internal dashboards.
#
# Lets internal React dashboards (or any HTTP client) run arbitrary SELECTs
# against the DB standby (10.0.0.5) as the SELECT-only `dev_analytics` role,
# without SSH tunnels or Postgres wire access from the browser.
#
#   POST https://backend-stage.vacademy.io/analytics-api/query
#     Authorization: Bearer <API_TOKEN>
#     { "db": "admin_core_service", "sql": "SELECT ...", "params": [] }
#
# Deliberately NOT part of the `vac` Helm release: applied manually with
#   kubectl apply -f vacademy_devops/analytics-api.yaml
# nginx merges this Ingress with the helm-managed one on the same host, so CI
# deploys never touch it. The secret `analytics-api-secret` (DB_PASSWORD,
# API_TOKEN) is created out-of-band and never committed:
#   kubectl create secret generic analytics-api-secret \
#     --from-literal=DB_PASSWORD=... --from-literal=API_TOKEN=...
#
# Guardrails: standby is physically read-only + dev_analytics is SELECT-only +
# statement_timeout 30s + 50k row cap + tiny pool (standby is a small CPX22).
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-api-code
  namespace: default
  labels:
    app: analytics-api
data:
  server.js: |
    'use strict';
    const http = require('http');
    const crypto = require('crypto');
    const { Pool } = require('pg');

    const PORT = 8080;
    const DB_HOST = process.env.DB_HOST || '10.0.0.5';
    const DB_USER = process.env.DB_USER || 'dev_analytics';
    const DB_PASSWORD = process.env.DB_PASSWORD;
    const API_TOKEN = process.env.API_TOKEN;
    // Platform JWT signing key (same HS256 key the Java services use in
    // common_service JwtService — the string is decoded as base64 there too).
    const JWT_SECRET_B64 = process.env.JWT_SECRET_B64 || '';
    const JWT_KEY = JWT_SECRET_B64 ? Buffer.from(JWT_SECRET_B64, 'base64') : null;
    const STATEMENT_TIMEOUT_MS = 30000;
    const MAX_ROWS = 50000;
    const MAX_BODY_BYTES = 1 * 1024 * 1024;

    if (!DB_PASSWORD || !API_TOKEN) {
      console.error('DB_PASSWORD and API_TOKEN are required');
      process.exit(1);
    }

    const DATABASES = [
      'admin_core_service', 'auth_service', 'assessment_service',
      'community_service', 'media_service', 'notification_service',
    ];

    // Lazy per-database pools. Tiny max per DB — the standby is a small box
    // and pgbouncer's app pools also live there.
    const pools = new Map();
    function poolFor(db) {
      if (!pools.has(db)) {
        pools.set(db, new Pool({
          host: DB_HOST, port: 5432, database: db,
          user: DB_USER, password: DB_PASSWORD,
          max: 3, idleTimeoutMillis: 60000, connectionTimeoutMillis: 10000,
          // Belt and suspenders: role is SELECT-only and the standby is
          // physically read-only, but declare intent anyway.
          options: `-c statement_timeout=${STATEMENT_TIMEOUT_MS} -c default_transaction_read_only=on`,
          application_name: 'analytics-api',
        }));
      }
      return pools.get(db);
    }

    // Accepts either the static API token (scripts, server-side tools) or a
    // platform-issued super-admin JWT (health-check dashboard) — HS256-verified
    // against the same key the Java services sign with, and gated on the
    // is_root_user claim so regular institute admins cannot query raw prod data.
    function isAuthorized(bearer) {
      if (!bearer) return false;
      if (timingSafeEq(bearer, API_TOKEN)) return true;
      return !!verifyPlatformJwt(bearer);
    }

    function timingSafeEq(a, b) {
      const ba = Buffer.from(String(a));
      const bb = Buffer.from(String(b));
      return ba.length === bb.length && crypto.timingSafeEqual(ba, bb);
    }

    function verifyPlatformJwt(token) {
      if (!JWT_KEY) return null;
      const parts = token.split('.');
      if (parts.length !== 3) return null;
      let header, payload;
      try {
        header = JSON.parse(Buffer.from(parts[0], 'base64url').toString('utf8'));
        payload = JSON.parse(Buffer.from(parts[1], 'base64url').toString('utf8'));
      } catch { return null; }
      if (header.alg !== 'HS256') return null;
      const expected = crypto.createHmac('sha256', JWT_KEY)
        .update(`${parts[0]}.${parts[1]}`).digest('base64url');
      if (!timingSafeEq(parts[2], expected)) return null;
      if (typeof payload.exp === 'number' && payload.exp * 1000 < Date.now()) return null;
      if (payload.is_root_user !== true) return null;
      return payload;
    }

    function cors(res) {
      res.setHeader('Access-Control-Allow-Origin', '*');
      res.setHeader('Access-Control-Allow-Methods', 'GET, POST, OPTIONS');
      res.setHeader('Access-Control-Allow-Headers', 'Content-Type, Authorization');
      res.setHeader('Access-Control-Max-Age', '86400');
    }

    function send(res, status, obj) {
      const body = JSON.stringify(obj);
      res.writeHead(status, { 'Content-Type': 'application/json' });
      res.end(body);
    }

    const server = http.createServer((req, res) => {
      cors(res);
      const url = (req.url || '').split('?')[0];

      if (req.method === 'OPTIONS') { res.writeHead(204); res.end(); return; }

      if (req.method === 'GET' && (url === '/analytics-api/health' || url === '/health')) {
        send(res, 200, { ok: true, databases: DATABASES });
        return;
      }

      if (req.method !== 'POST' || (url !== '/analytics-api/query' && url !== '/query')) {
        send(res, 404, { error: 'not found' });
        return;
      }

      const auth = req.headers['authorization'] || '';
      const bearer = auth.startsWith('Bearer ') ? auth.slice(7) : '';
      if (!isAuthorized(bearer)) {
        send(res, 401, { error: 'unauthorized' });
        return;
      }

      let size = 0;
      const chunks = [];
      req.on('data', (c) => {
        size += c.length;
        if (size > MAX_BODY_BYTES) { send(res, 413, { error: 'body too large' }); req.destroy(); return; }
        chunks.push(c);
      });
      req.on('end', async () => {
        if (res.writableEnded) return;
        let body;
        try { body = JSON.parse(Buffer.concat(chunks).toString('utf8')); }
        catch { send(res, 400, { error: 'invalid JSON body' }); return; }

        const { db, sql, params } = body || {};
        if (!DATABASES.includes(db)) {
          send(res, 400, { error: `db must be one of: ${DATABASES.join(', ')}` });
          return;
        }
        if (typeof sql !== 'string' || !sql.trim()) {
          send(res, 400, { error: 'sql (string) is required' });
          return;
        }
        if (params !== undefined && !Array.isArray(params)) {
          send(res, 400, { error: 'params must be an array when provided' });
          return;
        }

        const started = Date.now();
        try {
          const result = await poolFor(db).query({ text: sql, values: params || [], rowMode: undefined });
          const rows = result.rows || [];
          const truncated = rows.length > MAX_ROWS;
          send(res, 200, {
            db,
            rowCount: truncated ? MAX_ROWS : rows.length,
            truncated,
            durationMs: Date.now() - started,
            fields: (result.fields || []).map((f) => f.name),
            rows: truncated ? rows.slice(0, MAX_ROWS) : rows,
          });
        } catch (err) {
          const msg = err && err.message ? err.message : 'query failed';
          const isTimeout = /statement timeout/i.test(msg);
          send(res, isTimeout ? 408 : 400, {
            error: msg,
            code: err && err.code,
            hint: isTimeout
              ? `queries are capped at ${STATEMENT_TIMEOUT_MS / 1000}s — add filters or aggregate in SQL`
              : (err && err.hint) || undefined,
            durationMs: Date.now() - started,
          });
        }
      });
    });

    server.listen(PORT, () => console.log(`analytics-api listening on :${PORT}`));

    process.on('SIGTERM', () => {
      server.close(() => process.exit(0));
      setTimeout(() => process.exit(0), 5000).unref();
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-api
  namespace: default
  labels:
    app: analytics-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-api
  template:
    metadata:
      labels:
        app: analytics-api
    spec:
      containers:
        - name: analytics-api
          image: node:22-alpine
          # No registry/image-build pipeline for this tiny service: the code is
          # a ConfigMap and `pg` (its only dep) is installed at pod start.
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /app && cd /app
              cp /code/server.js .
              npm install --no-audit --no-fund --loglevel=error pg@8.13.1
              exec node server.js
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "10.0.0.5"
            - name: DB_USER
              value: "dev_analytics"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: analytics-api-secret
                  key: DB_PASSWORD
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: analytics-api-secret
                  key: API_TOKEN
            - name: JWT_SECRET_B64
              valueFrom:
                secretKeyRef:
                  name: analytics-api-secret
                  key: JWT_SECRET_B64
                  optional: true
          volumeMounts:
            - name: code
              mountPath: /code
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /analytics-api/health
              port: 8080
            # npm install at startup — allow up to ~2.5 min before failing
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /analytics-api/health
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /analytics-api/health
              port: 8080
            periodSeconds: 15
      volumes:
        - name: code
          configMap:
            name: analytics-api-code
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-api
  namespace: default
  labels:
    app: analytics-api
spec:
  type: ClusterIP
  selector:
    app: analytics-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: analytics-api-ingress
  namespace: default
  labels:
    app: analytics-api
  annotations:
    # No cert-manager annotation on purpose: the cert for this host is owned
    # by the helm-managed vacademy-services-ingress; we just reuse its secret.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "2m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - backend-stage.vacademy.io
      secretName: vacademy-tls-secret
  rules:
    - host: backend-stage.vacademy.io
      http:
        paths:
          - path: /analytics-api
            pathType: Prefix
            backend:
              service:
                name: analytics-api
                port:
                  number: 8080
