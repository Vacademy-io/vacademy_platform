# =============================================================================
# values-prod-hetzner.yaml (LOCAL, gitignored)
# -----------------------------------------------------------------------------
# Helm values overlay for "vac" release on the Hetzner Singapore prod cluster.
# Applied with:
#   helm upgrade --install vac vacademy_devops/vacademy-services \
#       -n default \
#       -f vacademy_devops/vacademy-services/values.yaml \
#       -f vacademy_devops/hetzner/values-prod-hetzner.yaml
#
# NOTE: full app env (API keys, OAuth, AWS, etc.) is INJECTED post-chart-install
#       via apply-prod-env-to-hetzner.sh (kubectl set env), mirroring the prod
#       deploy pattern that the GitHub Actions workflows use on Linode. The
#       chart's ConfigMap + Secret are used only for DB credentials + JWT.
# =============================================================================

# 2 replicas is the global default for all backend services (matches Linode
# cloud prod). Per-service overrides below scale/resize individual services.
replicaCount: 2

# Per-service overrides for the Hetzner cluster (3x CCX23 = 4 vCPU / 16Gi each).
# These keys deep-merge onto services.* from values.yaml; they exist ONLY here
# (prod), so standalone/other envs keep the template's hardcoded defaults.
services:
  admin_core_service:
    # Scaled 2 -> 4 (spare node capacity; CPU idle, memory has headroom).
    replicas: 4
    resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
  ai_service:
    # Stays at replicaCount (2). Memory ceiling raised 3Gi -> 4Gi for Whisper /
    # image-gen headroom. CPU limit set to 1 core per request.
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "4Gi"

# Cloud-prod mode (NOT standalone): managed-ish Postgres on Hetzner db-primary,
# Cloudflare serves the frontends.
standalone:
  enabled: false
postgres:
  bundled: false
frontends:
  enabled: false

# cert-manager + Let's Encrypt for in-cluster TLS termination on the new ingress
certManager:
  enabled: true
  email: shreyash@vidyayatan.com

# Use nginx (chart default for cloud prod)
ingress:
  className: nginx
  clusterIssuer: letsencrypt-prod
  hosts:
    - admin.vacademy.io
    - app.vacademy.io
    - backend.vacademy.io

# pgbouncer in-cluster → Hetzner db-primary on private network
pgbouncer:
  enabled: true
  dbHost: 10.0.0.4
  dbReadHost: 10.0.0.5      # db-standby for read-only routing (chart may not use today, set for future)
  dbPort: "5432"
  dbUsername: vacademy
  dbPassword: "3tZ5X3aYKoJ8ZvsAhFi7pX68gIbJkFde"   # generated by bring-up-postgres.sh

# Don't fail-fast on empty env — apply-prod-env-to-hetzner.sh sets real env after.
# The chart's ConfigMap/Secret will render with placeholders; kubectl set env
# overrides them at the deployment level.
env:
  required: false
  springProfile: prod
  db:
    host: pgbouncer
    port: "6432"
    username: vacademy
  app:
    username: admin
  # The rest of env.* keys (S3, mail, etc.) come from apply-prod-env-to-hetzner.sh
  s3:
    region: ap-south-1
    bucket: ""
    publicBucket: ""

# Critical: jwtSecretKey MUST equal the value Java services hardcode.
# Chart default already matches it; keep as-is.
secrets:
  dbPassword: "3tZ5X3aYKoJ8ZvsAhFi7pX68gIbJkFde"
  appPassword: "vacademy-prod-app"
  # jwtSecretKey: omitted → uses chart default (matches Java's hardcoded value)
  internalClientSecret: "3fac2e2f9ce28d2515ee5c3daddb0772866063388a75ecfaade4b9581d0b2418"
  ai:
    clientName: ai_service
    clientSecret: "3fac2e2f9ce28d2515ee5c3daddb0772866063388a75ecfaade4b9581d0b2418"
  # Other secrets stay at chart defaults (mostly "not-configured" sentinels).
  # Real values come from apply-prod-env-to-hetzner.sh.
