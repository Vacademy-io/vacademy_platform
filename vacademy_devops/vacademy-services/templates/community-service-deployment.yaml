{{- if .Values.services.community_service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: community-service
  namespace: default
  labels:
    app: community-service
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: community-service
  template:
    metadata:
      labels:
        app: community-service
    spec:
      # ServiceAccount for diagnostics feature - allows reading K8s resources
      serviceAccountName: diagnostics-service-account
      containers:
        - name: community-service
          image: {{ .Values.services.community_service.image.repository }}:{{ .Values.services.community_service.image.tag }}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: myconfigmapv1.0
            - secretRef:
                name: vacademy-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "700Mi"
            limits:
              cpu: "2000m"
              memory: "1400Mi"
          # See PR #1847 era — startupProbe at initialDelaySeconds=30 lets the rollout
          # complete in ~2-3 min instead of waiting 5 min before the first probe even fires.
          # liveness/readiness initialDelay=0 is safe because k8s won't run them until
          # startupProbe succeeds; failureThreshold=60 × periodSeconds=30 = 30 min grace.
          startupProbe:
            httpGet:
              path: /community-service/actuator/health
              port: {{ .Values.services.community_service.port }}
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 60
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /community-service/actuator/health
              port: {{ .Values.services.community_service.port }}
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /community-service/actuator/health
              port: {{ .Values.services.community_service.port }}
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
            successThreshold: 1
          ports:
            - containerPort: {{ .Values.services.community_service.port }}
{{- end }}
