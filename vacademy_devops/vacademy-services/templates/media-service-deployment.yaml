{{- /*
  JVM heap is pinned via JAVA_TOOL_OPTIONS below because the Hetzner
  Ubuntu 26.04 / Linux 7.0.0 kernel breaks the JVM's cgroup-v2
  container-support detection: every Java pod read the node's full
  memory (~11.4 GiB) as its heap budget on a 1-2 GiB pod limit, which
  caused OOMKill cascades (migration day + media-service OOMKill).
  Explicit -Xms/-Xmx via JAVA_TOOL_OPTIONS sidesteps the broken
  auto-detection. See memory/jvm-cgroup-detection-broken-hetzner.md.
*/ -}}
{{- if .Values.services.media_service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  namespace: default
  labels:
    app: media-service
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: {{ .Values.services.media_service.image.repository }}:{{ .Values.services.media_service.image.tag }}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: myconfigmapv1.0
            - secretRef:
                name: vacademy-secrets
          env:
            # Pin heap explicitly; cgroup-v2 auto-detection is broken on this kernel.
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx1280m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /media-service/actuator/health
              port: {{ .Values.services.media_service.port }}
              scheme: HTTP
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /media-service/actuator/health
              port: {{ .Values.services.media_service.port }}
              scheme: HTTP
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 30
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /media-service/actuator/health
              port: {{ .Values.services.media_service.port }}
              scheme: HTTP
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          ports:
            - containerPort: {{ .Values.services.media_service.port }}
{{- end }}
