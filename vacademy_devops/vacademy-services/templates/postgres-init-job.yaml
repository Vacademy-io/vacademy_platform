{{- /*
  Post-install/upgrade hook: creates the per-service databases in the bundled
  Postgres and loads each baseline (schema + flyway history) ONLY if that DB is
  still empty. Idempotent — safe to re-run on every helm upgrade. community_service
  shares the assessment_service DB, so only five DBs are created.
*/ -}}
{{- if and .Values.standalone.enabled .Values.postgres.bundled .Values.postgres.loadBaseline }}
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-baseline-load
  namespace: default
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: postgres-baseline-load
    spec:
      restartPolicy: OnFailure
      containers:
        - name: baseline-load
          image: {{ .Values.postgres.image }}
          env:
            - name: PGUSER
              value: {{ .Values.env.db.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: vacademy-secrets
                  key: DB_PASSWORD
            - name: INTERNAL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vacademy-secrets
                  key: INTERNAL_CLIENT_SECRET
          command: ["sh", "-c"]
          args:
            - |
              set -e
              echo "waiting for postgres to accept connections..."
              until pg_isready -h postgres -U "$PGUSER" -d postgres; do sleep 3; done
              for db in auth_service admin_core_service assessment_service media_service notification_service; do
                exists=$(psql -h postgres -U "$PGUSER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='$db'")
                if [ "$exists" != "1" ]; then
                  echo "creating database $db"
                  psql -h postgres -U "$PGUSER" -d postgres -c "CREATE DATABASE $db"
                fi
                n=$(psql -h postgres -U "$PGUSER" -d "$db" -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public' AND table_type='BASE TABLE'")
                if [ "$n" = "0" ] && [ -f "/baseline/$db.sql" ]; then
                  echo "loading baseline into $db"
                  psql -h postgres -U "$PGUSER" -v ON_ERROR_STOP=1 -d "$db" -f "/baseline/$db.sql"
                else
                  echo "$db already has $n table(s); skipping baseline"
                fi
              done
              echo "baseline load complete"

              # --- Seed reference data NOT present in schema-only baselines ---
              # (seed-data migrations like V9__Create_super_admin_user don't replay,
              #  because Flyway sees them as already-applied in the baseline). Idempotent.
              echo "seeding roles..."
              psql -h postgres -U "$PGUSER" -v ON_ERROR_STOP=1 -d auth_service -c "
                INSERT INTO roles (id, role_name, created_at, updated_at)
                SELECT gen_random_uuid()::text, rn, now(), now()
                FROM (VALUES ('ADMIN'),('TEACHER'),('EVALUATOR'),('STUDENT'),('COURSE_CREATOR'),('ASSESSMENT_CREATOR')) AS t(rn)
                ON CONFLICT (role_name) DO NOTHING;"
              echo "seeding client_secret_key (inter-service HMAC) into all service DBs..."
              for db in auth_service admin_core_service assessment_service media_service notification_service; do
                psql -h postgres -U "$PGUSER" -v ON_ERROR_STOP=1 -d "$db" -c "
                  INSERT INTO client_secret_key (client_name, secret_key, created_at, updated_at)
                  SELECT cn, '$INTERNAL_CLIENT_SECRET', now(), now()
                  FROM (VALUES ('auth_service'),('admin_core_service'),('assessment_service'),('media_service'),('notification_service'),('community_service'),('ai_service')) AS t(cn)
                  ON CONFLICT (client_name) DO UPDATE SET secret_key=EXCLUDED.secret_key, updated_at=now();"
              done
              # Course creation (POST /admin-core-service/course/v1/add-course) looks up
              # rows with id='DEFAULT' in level/session/groups (the "default structure"
              # path). Prod created these by hand; the schema-only baseline has no seed
              # for them, so a fresh standalone DB throws "Level not found". BulkCourseService
              # auto-creates the DEFAULT level, but CourseService doesn't — until that's
              # fixed in code, seed the rows so single-course creation works out of the box.
              echo "seeding DEFAULT level/session/groups (admin_core_service)..."
              psql -h postgres -U "$PGUSER" -v ON_ERROR_STOP=1 -d admin_core_service -c "
                INSERT INTO level (id, level_name, status, created_at, updated_at)
                VALUES ('DEFAULT', 'Default', 'ACTIVE', now(), now())
                ON CONFLICT (id) DO NOTHING;
                INSERT INTO session (id, session_name, status, created_at, updated_at)
                VALUES ('DEFAULT', 'Default', 'ACTIVE', now(), now())
                ON CONFLICT (id) DO NOTHING;
                INSERT INTO groups (id, group_name, created_at, updated_at)
                VALUES ('DEFAULT', 'Default', now(), now())
                ON CONFLICT (id) DO NOTHING;"
              echo "seed complete"
          volumeMounts:
            - name: baselines
              mountPath: /baseline
      volumes:
        - name: baselines
          projected:
            sources:
            {{- range $path, $_ := $.Files.Glob "baseline/*.sql" }}
              - configMap:
                  name: baseline-{{ base $path | trimSuffix ".sql" | replace "_" "-" }}
            {{- end }}
{{- end }}
