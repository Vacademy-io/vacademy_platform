{{- /*
  Secret half of the env source of truth. Mounted via `envFrom: secretRef` on
  every service deployment alongside the ConfigMap. Provide real values in a
  gitignored values.secret.yaml. stringData lets us keep values human-readable
  in the chart while Kubernetes stores them base64-encoded.
*/ -}}
{{- $s := .Values.secrets -}}
apiVersion: v1
kind: Secret
metadata:
  name: vacademy-secrets
  namespace: default
type: Opaque
stringData:
  # --- Database / app ---
  DB_PASSWORD: {{ $s.dbPassword | quote }}
  APP_PASSWORD: {{ $s.appPassword | quote }}
  JWT_SECRET_KEY: {{ $s.jwtSecretKey | quote }}

  # --- OAuth (per-domain; client registers their own apps) ---
  # Spring's OAuth2 client autoconfig rejects EMPTY client ids at startup
  # ("Client id must not be empty"), so default to a placeholder when unset —
  # the service boots and social login is simply inert until real keys are set.
  GOOGLE_CLIENT_ID: {{ $s.oauth.googleClientId | default "not-configured" | quote }}
  GOOGLE_CLIENT_SECRET: {{ $s.oauth.googleClientSecret | default "not-configured" | quote }}
  OAUTH_GITHUB_CLIENT_ID: {{ $s.oauth.githubClientId | default "not-configured" | quote }}
  OAUTH_GITHUB_CLIENT_SECRET: {{ $s.oauth.githubClientSecret | default "not-configured" | quote }}

  # --- S3 (media) ---
  S3_AWS_ACCESS_KEY: {{ $s.s3.accessKey | quote }}
  S3_AWS_ACCESS_SECRET: {{ $s.s3.accessSecret | quote }}

  # --- SES (notification email) ---
  AWS_MAIL_USERNAME: {{ $s.ses.mailUsername | quote }}
  AWS_MAIL_PASSWORD: {{ $s.ses.mailPassword | quote }}

  # --- SQS (notification events) ---
  SQS_AWS_ACCESS_KEY: {{ $s.sqs.accessKey | quote }}
  SQS_AWS_SECRET_KEY: {{ $s.sqs.secretKey | quote }}

  # --- WhatsApp (notification; required-non-empty at startup) ---
  WHATSAPP_ACCESS_TOKEN_VIDYAYATAN: {{ $s.whatsapp.accessToken | default "not-configured" | quote }}
  WHATSAPP_PHONE_NUMBER_ID_VIDYAYATAN: {{ $s.whatsapp.phoneNumberId | default "not-configured" | quote }}

  # --- AI / external APIs ---
  OPENROUTER_API_KEY: {{ $s.api.openrouter | quote }}
  GEMINI_API_KEY: {{ $s.api.gemini | quote }}
  YOUTUBE_API_KEY: {{ $s.api.youtube | quote }}
  UNSPLASH_ACCESS_KEY: {{ $s.api.unsplash | quote }}
  # media maps spring.ai.openai.api-key=${DEEPSEEK_API_KEY}; Spring AI rejects a
  # blank key at startup ("OpenAI API key must be set"), so default to a
  # placeholder — media boots and AI features are inert until a real key is set.
  DEEPSEEK_API_KEY: {{ $s.api.deepseek | default "not-configured" | quote }}
  FAL_API_KEY: {{ $s.api.fal | quote }}
  WHATSAPP_ACCESS_TOKEN: {{ $s.api.whatsappToken | quote }}

  # --- ai-service internal auth ---
  # ai-service's client secret MUST equal the client_secret_key rows seeded in the
  # DBs (auth validates ai's calls against that table). Both come from
  # internalClientSecret so they always match.
  CLIENT_SECRET: {{ $s.internalClientSecret | default $s.ai.clientSecret | quote }}
  INTERNAL_CLIENT_SECRET: {{ $s.internalClientSecret | default $s.ai.clientSecret | quote }}

  # --- admin-core white-label (Cloudflare custom domains) ---
  # Required-non-empty at startup (cloudflareService @Value has no default), so
  # default to a placeholder — admin-core boots and white-label is inert until set.
  CLOUDFLARE_API_TOKEN: {{ $s.cloudflare.apiToken | default "not-configured" | quote }}
  CLOUDFLARE_ZONE_ID: {{ $s.cloudflare.zoneId | default "not-configured" | quote }}

  # --- Sentry ---
  SENTRY_DSN: {{ $s.sentry.dsn | quote }}
  SENTRY_AUTH_TOKEN: {{ $s.sentry.authToken | quote }}

  # --- Cashfree SecureID (DigiLocker KYC in open sub-org registration; admin-core) ---
  # Optional at startup (@Value has empty default); the KYC step errors cleanly until set.
  CASHFREE_SECUREID_CLIENT_ID: {{ ($s.cashfreeSecureId).clientId | default "not-configured" | quote }}
  CASHFREE_SECUREID_CLIENT_SECRET: {{ ($s.cashfreeSecureId).clientSecret | default "not-configured" | quote }}
