# Example secret overlay — committed as a template. Copy to `values.secret.yaml`
# (gitignored — never commit) and fill in real values.
#
# Deploy:
#   # Cloud prod (managed DB):
#   helm upgrade --install vacademy-services ./vacademy-services \
#     -f values.yaml -f values.secret.yaml
#   # Standalone single-server (install.sh generates this file for you):
#   helm upgrade --install vacademy ./vacademy-services \
#     -f values.yaml -f values-standalone.yaml -f values.secret.yaml
#
# =====================================================================
# CLOUD PROD — managed DB via pgbouncer
# =====================================================================
pgbouncer:
  dbHost: "lin-xxxxx-pgsql-primary.servers.linodedb.net"
  dbReadHost: "lin-xxxxx-pgsql-replica.servers.linodedb.net"
  dbPort: 26754
  dbUsername: "linpostgres"
  dbPassword: "replace-with-real-password"

# =====================================================================
# STANDALONE — client single-server (install.sh writes most of this).
# Only the keys you actually use need values; blanks are fine for
# features you don't enable.
# =====================================================================
standalone:
  domain: "client.example.com"     # admin.<domain> + app.<domain>
certManager:
  email: "ops@client.example.com"

env:
  s3:
    region: "ap-south-1"
    bucket: "client-media-bucket"
    publicBucket: "client-public-bucket"
  cloudFrontUrl: "https://app.client.example.com/media-service/media/"
  mail:                            # SES SMTP (if notification enabled)
    host: "email-smtp.ap-south-1.amazonaws.com"
    port: "587"
  ses:
    senderEmail: "support@client.example.com"

secrets:
  # Auto-generated by install.sh — unique per install. Set manually only if not
  # using the installer. JWT must be the same across this install's services.
  dbPassword: "auto-generated"
  appPassword: "auto-generated"
  jwtSecretKey: "auto-generated-64-hex"

  # Media (S3) — required for the media service.
  s3:
    accessKey: ""
    accessSecret: ""

  # AI (if ai-service enabled)
  api:
    openrouter: ""
    gemini: ""
    youtube: ""
    unsplash: ""
    deepseek: ""
    fal: ""
    whatsappToken: ""

  # ai-service internal auth
  ai:
    clientName: ai_service
    clientSecret: "auto-generated"

  # Email/OTP (if notification-service enabled)
  ses:
    mailUsername: ""               # AWS SES SMTP username
    mailPassword: ""               # AWS SES SMTP password
  sqs:
    accessKey: ""
    secretKey: ""

  # OAuth social login (per-domain — register your OWN Google/GitHub apps with
  # redirect https://admin.<domain>/login/oauth2/... ). Leave blank to disable.
  oauth:
    googleClientId: ""
    googleClientSecret: ""
    githubClientId: ""
    githubClientSecret: ""

  # Sentry (optional)
  sentry:
    dsn: ""
    authToken: ""
