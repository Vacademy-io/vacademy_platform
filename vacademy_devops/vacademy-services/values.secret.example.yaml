# Example overlay for values.yaml — committed as a template.
#
# To use:
#   1. Copy this file to `values.secret.yaml` in the same directory.
#   2. Replace placeholder values below with real Linode managed-DB credentials.
#   3. Deploy with both files:
#        helm upgrade --install vacademy-services ./vacademy-services \
#          -f ./vacademy-services/values.yaml \
#          -f ./vacademy-services/values.secret.yaml
#
# `values.secret.yaml` is gitignored — never commit it.

pgbouncer:
  dbHost: "lin-xxxxx-pgsql-primary.servers.linodedb.net"
  dbReadHost: "lin-xxxxx-pgsql-replica.servers.linodedb.net"
  dbPort: 26754
  dbUsername: "linpostgres"
  dbPassword: "replace-with-real-password"
