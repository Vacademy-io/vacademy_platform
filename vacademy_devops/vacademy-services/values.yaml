replicaCount: 1

rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0

services:
  admin_core_service:
    port: 8072
    image:
      repository: public.ecr.aws/e0x1f4p4/admin-core-service/admin-core-service-repo
      tag: latest
  community_service:
    port: 8073
    image:
      repository: public.ecr.aws/e0x1f4p4/community-service/community-service-repo
      tag: latest
  media_service:
    port: 8075
    image:
      repository: public.ecr.aws/e0x1f4p4/media-service/media-service-repo
      tag: latest
  auth_service:
    port: 8071
    image:
      repository: public.ecr.aws/e0x1f4p4/auth-service/auth-service-repo
      tag: latest
  assessment_service:
    port: 8074
    image:
      repository: public.ecr.aws/e0x1f4p4/assessment-service/assessment-service-repo
      tag: latest
  notification_service:
    port: 8076
    image:
      repository: public.ecr.aws/e0x1f4p4/notification-service/notification-service-repo
      tag: latest
  ai_service:
    port: 8077
    image:
      repository: public.ecr.aws/e0x1f4p4/ai-service/ai-service-repo
      tag: latest
    # Whisper forced-alignment knobs. Defaults in code are 2 threads / 1 worker;
    # set explicitly here so they're visible and tunable without a code deploy.
    # WHISPER_MODEL_SIZE: "small" cuts model RAM from ~1.5 GB to ~500 MB if the
    # 3Gi limit ever feels tight again.
    whisper:
      cpuThreads: "2"
      numWorkers: "1"
      modelSize: ""  # blank = use code default (medium for non-English, base for English)

environment:
  stage: stage
  prod: prod

# PgBouncer Configuration
# Override these values via a local `values.secret.yaml` overlay (see
# values.secret.example.yaml). That file is gitignored — never commit real
# credentials to this file.
pgbouncer:
  dbHost: "REPLACE_WITH_LINODE_DB_HOST"
  dbReadHost: "REPLACE_WITH_LINODE_READ_REPLICA_HOST"
  dbPort: 26754
  dbUsername: "postgres"
  dbPassword: "REPLACE_WITH_LINODE_DB_PASSWORD"

# Redis Configuration
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
